name: Microbio
options:
  bundleIdPrefix: com.microbio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  Microbio:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: web
        type: folder        # 蓝色文件夹引用：原样打包，保留 web/ 目录结构
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.microbio.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 微生物学习
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
