<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>巧克力琼脂</title><desc>血琼脂加热约80℃使红细胞裂解，释放X因子（高铁血红素）与V因子（NAD），培养基呈巧克力色；为嗜血杆菌、奈瑟菌等苛养菌提供生长条件。本身非选择性亦非鉴别性培养基</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">巧克力琼脂</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">血琼脂加热至约 80℃ 裂解红细胞，释放 X 与 V 因子</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：血琼脂（未加热） ===== -->
<text x="75" y="76" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">血琼脂（未加热）</text>
<circle cx="75" cy="120" r="37" fill="#f5f7f9" stroke="#c9ced6"/>
<circle cx="75" cy="120" r="33" fill="#b02a2f" stroke="#7d1d21"/>
<g fill="#8c1c22" stroke="#701217" stroke-width="0.6">
  <ellipse cx="62" cy="108" rx="4.2" ry="3"/><ellipse cx="80" cy="104" rx="4.2" ry="3"/>
  <ellipse cx="92" cy="118" rx="4.2" ry="3"/><ellipse cx="58" cy="128" rx="4.2" ry="3"/>
  <ellipse cx="76" cy="132" rx="4.2" ry="3"/><ellipse cx="90" cy="138" rx="4.2" ry="3"/>
  <ellipse cx="68" cy="120" rx="4.2" ry="3"/>
</g>
<g stroke="#8f1f24" stroke-width="1.1" fill="none" opacity="0.85">
  <path d="M52,146 C70,140 84,152 100,144"/>
</g>
<g stroke="#c2413d" stroke-width="1.8" stroke-linecap="round">
  <line x1="66" y1="88" x2="84" y2="100"/><line x1="84" y1="88" x2="66" y2="100"/>
</g>
<text x="75" y="168" text-anchor="middle" font-size="9.5" fill="#5c6672">红细胞完整</text>
<text x="75" y="181" text-anchor="middle" font-size="9.5" fill="#5c6672">V 因子被 NADase 破坏</text>
<text x="75" y="194" text-anchor="middle" font-size="9.5" fill="#a3332f">嗜血杆菌不生长</text>

<!-- 加热箭头 -->
<text x="137" y="112" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">80℃ 加热</text>
<line x1="114" y1="122" x2="164" y2="122" stroke="#33404f" stroke-width="1.6" marker-end="url(#arr)"/>
<text x="137" y="140" text-anchor="middle" font-size="9.5" fill="#5c6672">红细胞裂解</text>

<!-- ===== 中：巧克力琼脂平板（俯视） ===== -->
<circle cx="222" cy="124" r="52" fill="#f5f7f9" stroke="#c9ced6"/>
<circle cx="222" cy="124" r="47" fill="#7b4a2b" stroke="#5a3520"/>
<circle cx="222" cy="124" r="47" fill="none" stroke="#9a6238" stroke-width="0.8" opacity="0.6"/>
<!-- ❶ 嗜血杆菌：细小灰白半透明 -->
<g fill="#e0dbcf" stroke="#c3bba6" stroke-width="0.7" opacity="0.92">
  <circle cx="204" cy="96" r="3"/><circle cx="212" cy="92" r="2.6"/><circle cx="218" cy="100" r="3"/>
  <circle cx="207" cy="104" r="2.6"/><circle cx="215" cy="108" r="2.8"/><circle cx="197" cy="102" r="2.4"/>
</g>
<circle cx="182" cy="96" r="6.5" fill="#1f2733"/>
<text x="182" y="99.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<!-- ❷ 奈瑟菌：灰白湿润、较大 -->
<g fill="#dbd6c8" stroke="#bdb49f" stroke-width="0.8">
  <circle cx="242" cy="112" r="5.4"/><circle cx="254" cy="120" r="5"/><circle cx="246" cy="128" r="4.6"/>
</g>
<circle cx="266" cy="100" r="6.5" fill="#1f2733"/>
<text x="266" y="103.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<!-- ❸ 卡他莫拉菌：灰白不透明 -->
<g fill="#efeade" stroke="#d3c9b3" stroke-width="0.8">
  <circle cx="210" cy="148" r="5"/><circle cx="221" cy="154" r="4.6"/><circle cx="212" cy="159" r="4.2"/>
</g>
<circle cx="185" cy="157" r="6.5" fill="#1f2733"/>
<text x="185" y="160.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<text x="222" y="190" text-anchor="middle" font-size="9.5" fill="#8a6d2f">巧克力色 ＝ 变性的血红蛋白</text>

<!-- ===== 右：菌落图例 ===== -->
<circle cx="298" cy="84.5" r="6.5" fill="#1f2733"/>
<text x="298" y="88" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<text x="310" y="88" font-size="9.5" font-weight="700" fill="#33404f">流感嗜血杆菌</text>
<text x="310" y="100" font-size="9.5" fill="#5c6672">细小灰白半透明、露滴样</text>

<circle cx="298" cy="118.5" r="6.5" fill="#1f2733"/>
<text x="298" y="122" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<text x="310" y="122" font-size="9.5" font-weight="700" fill="#33404f">脑膜炎／淋病奈瑟菌</text>
<text x="310" y="134" font-size="9.5" fill="#5c6672">灰白湿润、菌落略大</text>

<circle cx="298" cy="152.5" r="6.5" fill="#1f2733"/>
<text x="298" y="156" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<text x="310" y="156" font-size="9.5" font-weight="700" fill="#33404f">卡他莫拉菌</text>
<text x="310" y="168" font-size="9.5" fill="#5c6672">灰白不透明、整块推动不散</text>

<text x="292" y="190" font-size="9.5" fill="#a3332f">孵育：35℃、5% CO₂、湿润环境</text>

<!-- ===== 选择 / 鉴别成分 ===== -->
<rect x="24" y="198" width="212" height="48" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="36" y="214" font-size="9.5" font-weight="700" fill="#33404f">选择成分　无</text>
<text x="36" y="228" font-size="9.5" fill="#5c6672">非选择性，杂菌同样生长</text>
<text x="36" y="242" font-size="9.5" fill="#5c6672">分离淋球菌改用 Thayer-Martin</text>

<rect x="244" y="198" width="212" height="48" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="256" y="214" font-size="9.5" font-weight="700" fill="#33404f">鉴别成分　无</text>
<text x="256" y="228" font-size="9.5" fill="#5c6672">不靠颜色区分菌种</text>
<text x="256" y="242" font-size="9.5" fill="#5c6672">须 X／V 因子需求或氧化酶试验</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">加热释出 X 与 V 因子并灭活 NADase → 苛养菌得以生长</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　流感嗜血杆菌 · 脑膜炎／淋病奈瑟菌 · 卡他莫拉菌 · 布鲁菌</text>
</svg>
