<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="azBox" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ccfbf1"/><stop offset="1" stop-color="#5eead4"/></linearGradient>
    <linearGradient id="azDrug" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <filter id="azSh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="480" height="300" fill="#f8fafc"/>
  <text x="240" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">唑类：抑制麦角固醇合成</text>

  <!-- 通路 -->
  <g filter="url(#azSh)">
    <rect x="18" y="142" width="96" height="44" rx="10" fill="url(#azBox)" stroke="#0f766e"/>
    <rect x="180" y="142" width="96" height="44" rx="10" fill="url(#azBox)" stroke="#0f766e"/>
  </g>
  <text x="66" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#0f766e">羊毛甾醇</text>
  <text x="66" y="180" text-anchor="middle" font-size="9" fill="#475569">Lanosterol</text>
  <text x="228" y="166" text-anchor="middle" font-size="12" font-weight="700" fill="#0f766e">麦角固醇</text>
  <text x="228" y="180" text-anchor="middle" font-size="9" fill="#475569">Ergosterol</text>

  <line x1="114" y1="164" x2="176" y2="164" stroke="#475569" stroke-width="2"/>
  <polygon points="176,164 168,160 168,168" fill="#475569"/>
  <text x="145" y="134" text-anchor="middle" font-size="9.5" fill="#64748b">14α-去甲基酶 (CYP51)</text>

  <!-- 唑类阻断酶 -->
  <rect x="113" y="80" width="64" height="32" rx="9" fill="url(#azDrug)" stroke="#2563eb" filter="url(#azSh)"/>
  <text x="145" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">唑类</text>
  <line x1="145" y1="112" x2="145" y2="150" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="145" y="158" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>

  <!-- 膜 -->
  <line x1="276" y1="164" x2="316" y2="164" stroke="#475569" stroke-width="2"/>
  <polygon points="316,164 308,160 308,168" fill="#475569"/>
  <rect x="320" y="138" width="150" height="52" rx="10" fill="#fff" stroke="#cbd5e1" filter="url(#azSh)"/>
  <g>
    <circle cx="336" cy="150" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="350" cy="150" r="4" fill="#99f6e4" stroke="#0f766e"/>
    <circle cx="378" cy="150" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="406" cy="150" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="434" cy="150" r="4" fill="#99f6e4" stroke="#0f766e"/>
    <circle cx="336" cy="178" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="350" cy="178" r="4" fill="#99f6e4" stroke="#0f766e"/>
    <circle cx="378" cy="178" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="406" cy="178" r="4" fill="#99f6e4" stroke="#0f766e"/><circle cx="434" cy="178" r="4" fill="#99f6e4" stroke="#0f766e"/>
    <rect x="360" y="146" width="8" height="36" rx="3" fill="#ddd6fe" stroke="#7c3aed"/>
    <rect x="416" y="146" width="8" height="36" rx="3" fill="#ddd6fe" stroke="#7c3aed" opacity="0.35"/>
  </g>
  <text x="395" y="166" text-anchor="middle" font-size="9" fill="#7c3aed">麦角固醇↓</text>
  <text x="395" y="130" text-anchor="middle" font-size="9.5" fill="#475569">真菌细胞膜</text>

  <text x="240" y="234" text-anchor="middle" font-size="10.5" fill="#64748b">麦角固醇缺乏 + 毒性 14α-甲基固醇堆积</text>
  <text x="240" y="284" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">真菌细胞膜结构 / 功能障碍 → 抑制生长</text>
</svg>
