<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">抗真菌 · 唑类（抑制麦角固醇合成）</text>

  <rect x="14" y="106" width="84" height="34" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="56" y="127" text-anchor="middle" font-size="11.5" fill="#0f766e">羊毛甾醇</text>

  <rect x="182" y="106" width="84" height="34" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="224" y="127" text-anchor="middle" font-size="11.5" fill="#0f766e">麦角固醇</text>

  <rect x="324" y="100" width="84" height="46" rx="6" fill="#a7f3d0" stroke="#0f766e"/>
  <text x="366" y="120" text-anchor="middle" font-size="11" fill="#0f766e">真菌</text>
  <text x="366" y="134" text-anchor="middle" font-size="11" fill="#0f766e">细胞膜</text>

  <!-- 箭头1 + 酶 + 阻断 -->
  <line x1="98" y1="123" x2="176" y2="123" stroke="#64748b" stroke-width="2"/>
  <polygon points="176,123 168,119 168,127" fill="#64748b"/>
  <text x="138" y="98" text-anchor="middle" font-size="9" fill="#475569">14-α-去甲基酶</text>
  <text x="138" y="123" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>
  <rect x="104" y="150" width="70" height="22" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="139" y="165" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">唑类</text>

  <!-- 箭头2 -->
  <line x1="266" y1="123" x2="320" y2="123" stroke="#64748b" stroke-width="2"/>
  <polygon points="320,123 312,119 312,127" fill="#64748b"/>

  <text x="210" y="206" text-anchor="middle" font-size="11.5" fill="#334155">麦角固醇减少 → 细胞膜合成受损、通透性改变</text>
</svg>
