<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>SS 琼脂</title><desc>SS 琼脂平板俯视：胆盐、枸橼酸盐与煌绿强力抑制革兰阳性菌及大肠菌群；乳糖加中性红鉴别发酵与否（无色 vs 粉红），硫代硫酸钠与枸橼酸铁指示 H₂S（黑心）；沙门菌无色带黑心，志贺菌无色，大肠埃希菌粉红且多被抑制</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">SS 琼脂</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">强选择压住杂菌，再用乳糖／H₂S 指示剂读菌落颜色</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视 ===== -->
<text x="112" y="78" text-anchor="middle" font-size="9.5" fill="#5c6672">SS 平板（俯视，35℃ 18–24 h）</text>
<circle cx="112" cy="158" r="76" fill="none" stroke="#cfd6dd" stroke-width="1.2"/>
<circle cx="112" cy="158" r="72" fill="#f3d9bf" stroke="#d3ab80" stroke-width="1.2"/>
<!-- 划线痕迹 -->
<g fill="none" stroke="#e6c8a6" stroke-width="1.1">
  <path d="M52,120 Q112,96 172,124"/>
  <path d="M46,152 Q112,132 176,158"/>
  <path d="M54,192 Q112,172 168,196"/>
</g>

<!-- 菌落：无色（不发酵乳糖） -->
<g fill="#fbf7f1" stroke="#cbb69c" stroke-width="1">
  <circle cx="85" cy="130" r="7"/>
  <circle cx="70" cy="176" r="5.5"/>
  <circle cx="135" cy="145" r="8"/>
  <circle cx="151" cy="112" r="6"/>
  <circle cx="126" cy="199" r="6.5"/>
</g>
<!-- 产 H₂S：中心变黑 -->
<g fill="#26211d">
  <circle cx="135" cy="145" r="3.4"/>
  <circle cx="151" cy="112" r="2.4"/>
  <circle cx="126" cy="199" r="2.6"/>
</g>
<!-- 菌落：粉红（发酵乳糖，多被抑制，故小而少） -->
<g fill="#e0719b" stroke="#b8446f" stroke-width="1">
  <circle cx="94" cy="205" r="4.6"/>
  <circle cx="63" cy="149" r="3.4"/>
</g>

<!-- 编号 -->
<g fill="#1f2733">
  <circle cx="68" cy="116" r="6.8"/><circle cx="156" cy="167" r="6.8"/><circle cx="88" cy="219" r="6.8"/>
</g>
<g fill="#ffffff" font-size="9.5" font-weight="700" text-anchor="middle">
  <text x="68" y="119.5">1</text><text x="156" y="170.5">2</text><text x="88" y="222.5">3</text>
</g>
<line x1="74" y1="120" x2="80" y2="126" stroke="#1f2733" stroke-width="1"/>
<line x1="150" y1="163" x2="142" y2="152" stroke="#1f2733" stroke-width="1"/>
<line x1="90" y1="213" x2="93" y2="210" stroke="#1f2733" stroke-width="1"/>

<!-- ===== 右上：选择成分 ===== -->
<rect x="196" y="84" width="260" height="62" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="206" y="100" font-size="10" font-weight="700" fill="#33404f">选择成分 → 抑制谁</text>
<g stroke="#c2413d" stroke-width="1.8" stroke-linecap="round">
  <line x1="205" y1="111" x2="213" y2="119"/><line x1="213" y1="111" x2="205" y2="119"/>
  <line x1="205" y1="127" x2="213" y2="135"/><line x1="213" y1="127" x2="205" y2="135"/>
</g>
<text x="220" y="118.5" font-size="9.5" fill="#5c6672">革兰阳性菌（胆盐 · 煌绿 · 枸橼酸盐）</text>
<text x="220" y="134.5" font-size="9.5" fill="#5c6672">大肠菌群大部受抑，仅少数长成粉红菌落</text>

<!-- ===== 右下：鉴别成分 ===== -->
<rect x="196" y="152" width="260" height="80" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="206" y="168" font-size="10" font-weight="700" fill="#33404f">鉴别成分 → 指示什么</text>
<!-- 行1 -->
<circle cx="209" cy="184" r="6.4" fill="#1f2733"/>
<text x="209" y="187.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="228" cy="184" r="6" fill="#fbf7f1" stroke="#cbb69c"/>
<text x="242" y="187.5" font-size="9.5" fill="#33404f">无色半透明 → 不发酵乳糖（志贺菌）</text>
<!-- 行2 -->
<circle cx="209" cy="202" r="6.4" fill="#1f2733"/>
<text x="209" y="205.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<circle cx="228" cy="202" r="6" fill="#fbf7f1" stroke="#cbb69c"/>
<circle cx="228" cy="202" r="2.6" fill="#26211d"/>
<text x="242" y="205.5" font-size="9.5" fill="#33404f">无色+黑心 → 产H₂S（沙门菌／变形·枸橼酸杆菌）</text>
<!-- 行3 -->
<circle cx="209" cy="220" r="6.4" fill="#1f2733"/>
<text x="209" y="223.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="228" cy="220" r="6" fill="#e0719b" stroke="#b8446f"/>
<text x="242" y="223.5" font-size="9.5" fill="#33404f">粉红 → 乳糖产酸（中性红变红）</text>

<!-- 连线：平板 → 图例 -->
<line x1="186" y1="158" x2="194" y2="158" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- 临床注解 -->
<text x="240" y="246" text-anchor="middle" font-size="9.5" fill="#5c6672">选择性强，部分志贺菌也被抑制 → 须同时接种低选择性平板（如麦康凯）</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">无色＝不发酵乳糖，黑心＝产 H₂S；仅属初筛，确证靠生化＋血清学</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　沙门菌（无色带黑心）· 志贺菌（无色）· 大肠埃希菌（粉红，多被抑制）</text>
</svg>
