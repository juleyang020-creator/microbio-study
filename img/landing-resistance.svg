<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 470" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="470" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">细菌耐药机制总览</text>
  <text x="240" y="46" text-anchor="middle" font-size="11" fill="#8a8f98">细菌抵抗抗菌药的六类主要机制</text>

  <!-- 细胞 -->
  <rect x="96" y="70" width="288" height="118" rx="46" fill="#f3ead0" stroke="#c9a24a" stroke-width="2.5"/>
  <rect x="106" y="80" width="268" height="98" rx="38" fill="#f3f8f5" stroke="#4f9e93" stroke-width="2"/>
  <!-- ⑥ 生物膜层(顶部点状基质) -->
  <path d="M96,84 q144,-26 288,0" fill="none" stroke="#9aa7bb" stroke-width="6" stroke-dasharray="2 4" opacity="0.7"/>
  <!-- ① 灭活酶: Pac-man 咬药 -->
  <path d="M150,118 a11,11 0 1 1 -3,-7 l-8,7 z" fill="#b0506a"/>
  <polygon points="132,118 126,114 126,122" fill="#8a6d1f"/>
  <!-- ② 靶位改变: 靶+星 -->
  <circle cx="232" cy="126" r="11" fill="#7d8bc4" stroke="#3f4f8f" stroke-width="1.2"/>
  <text x="232" y="130" text-anchor="middle" font-size="11" fill="#fff">✦</text>
  <!-- ③ 外排泵: 跨膜泵 + 上箭头 -->
  <rect x="350" y="96" width="14" height="70" rx="4" fill="#aab4dc" stroke="#3f4f8f" stroke-width="1.2"/>
  <line x1="357" y1="96" x2="357" y2="76" stroke="#3f4f8f" stroke-width="2"/><polygon points="357,72 352,82 362,82" fill="#3f4f8f"/>
  <!-- ④ 孔蛋白缺失: 缺口 -->
  <text x="300" y="80" text-anchor="middle" font-size="13" fill="#b04242">✕</text>
  <!-- ⑤ 旁路替代酶 -->
  <polygon points="300,150 309,155 309,165 300,170 291,165 291,155" fill="#cfe6d6" stroke="#3f7a52" stroke-width="1.1"/>

  <!-- 编号标记 -->
  <g font-size="9" font-weight="700" text-anchor="middle">
    <circle cx="140" cy="140" r="10" fill="#b0506a"/><text x="140" y="143.5" fill="#fff">①</text>
    <circle cx="232" cy="150" r="10" fill="#3f4f8f"/><text x="232" y="153.5" fill="#fff">②</text>
    <circle cx="372" cy="120" r="10" fill="#5b6aa8"/><text x="372" y="123.5" fill="#fff">③</text>
    <circle cx="300" cy="96" r="10" fill="#b04242"/><text x="300" y="99.5" fill="#fff">④</text>
    <circle cx="300" cy="150" r="10" fill="#3f7a52"/><text x="300" y="153.5" fill="#fff">⑤</text>
    <circle cx="110" cy="72" r="10" fill="#6b7384"/><text x="110" y="75.5" fill="#fff">⑥</text>
  </g>

  <!-- 图例 -->
  <g font-size="11">
    <g transform="translate(40,216)"><circle cx="0" cy="-4" r="9" fill="#b0506a"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">①</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">产生灭活酶　</tspan><tspan fill="#454b54">β-内酰胺酶 · 氨基糖苷修饰酶</tspan></text></g>
    <g transform="translate(40,252)"><circle cx="0" cy="-4" r="9" fill="#3f4f8f"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">②</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">靶位改变　</tspan><tspan fill="#454b54">PBP2a(MRSA) · 23S 甲基化(MLSB) · D-Ala-D-Lac(VRE)</tspan></text></g>
    <g transform="translate(40,288)"><circle cx="0" cy="-4" r="9" fill="#5b6aa8"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">③</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">主动外排　</tspan><tspan fill="#454b54">外排泵（AcrAB-TolC / MexAB-OprM）</tspan></text></g>
    <g transform="translate(40,324)"><circle cx="0" cy="-4" r="9" fill="#b04242"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">④</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">膜通透性下降　</tspan><tspan fill="#454b54">外膜孔蛋白缺失（OprD / OmpK35·36）</tspan></text></g>
    <g transform="translate(40,360)"><circle cx="0" cy="-4" r="9" fill="#3f7a52"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">⑤</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">旁路代谢　</tspan><tspan fill="#454b54">替代酶绕过靶点（sul / dfr → 复方磺胺）</tspan></text></g>
    <g transform="translate(40,396)"><circle cx="0" cy="-4" r="9" fill="#6b7384"/><text x="-3.3" y="-0.5" font-size="9" font-weight="700" fill="#fff">⑥</text>
      <text x="18" y="0"><tspan font-weight="700" fill="#23272e">生物膜　</tspan><tspan fill="#454b54">基质阻滞渗透、内部菌代谢低下受保护</tspan></text></g>
  </g>
  <text x="40" y="438" font-size="9.5" fill="#8a8f98">多种机制常并存，叠加导致多重 / 广泛耐药</text>
</svg>
