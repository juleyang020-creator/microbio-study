<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 364" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>细菌耐药机制总览</title><desc>以革兰阴性菌包膜为骨架定位六大耐药机制：周质腔灭活酶水解药物、靶位改变、跨膜主动外排泵、孔蛋白丢失致进药减少、替代酶旁路被抑制的步骤、生物膜基质屏障；编号对应下方图例</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="blk" markerWidth="8" markerHeight="12" refX="6" refY="6" orient="auto"><line x1="6" y1="1" x2="6" y2="11" stroke="#c2413d" stroke-width="2.4"/></marker>
</defs>
<rect width="480" height="364" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">细菌耐药机制总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">耐药机制总览</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">以革兰阴性菌为例：药物从进入到作用，每一步都能被耐药机制阻断</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e3e7ec"/>

<!-- ===== 胞外 ===== -->
<text x="28" y="80" font-size="9.5" fill="#5c6672">胞外</text>
<!-- LPS 糖链（标示革兰阴性外膜） -->
<g stroke="#b98a2f" stroke-width="1.2" fill="#d9a441">
  <line x1="40" y1="96" x2="40" y2="88"/><circle cx="40" cy="86" r="2.2"/>
  <line x1="60" y1="96" x2="60" y2="88"/><circle cx="60" cy="86" r="2.2"/>
  <line x1="80" y1="96" x2="80" y2="88"/><circle cx="80" cy="86" r="2.2"/>
  <line x1="100" y1="96" x2="100" y2="88"/><circle cx="100" cy="86" r="2.2"/>
</g>
<text x="110" y="93" font-size="9.5" fill="#8a6d2f">LPS</text>

<!-- 药物①：经孔蛋白进入 -->
<rect x="150" y="68" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="172" y="79" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="186" y1="84" x2="186" y2="94" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<!-- 药物②：孔蛋白丢失，进不来 -->
<rect x="198" y="68" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="220" y="79" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="220" y1="84" x2="220" y2="93" stroke="#c2413d" stroke-width="1.5" marker-end="url(#blk)"/>
<!-- 药物③：被泵出 -->
<rect x="244" y="68" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="266" y="79" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>

<!-- ❻ 生物膜（覆盖菌体表面的胞外基质） -->
<path d="M300,94 L300,80 C312,66 330,74 344,68 C362,61 378,74 396,68 C414,62 432,76 452,70 L452,94 Z" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.1"/>
<g fill="#cfc4e8" stroke="#8b7fb8" stroke-width="0.7">
  <ellipse cx="336" cy="86" rx="7" ry="3.6"/><ellipse cx="366" cy="80" rx="7" ry="3.6"/><ellipse cx="404" cy="88" rx="7" ry="3.6"/><ellipse cx="432" cy="82" rx="7" ry="3.6"/>
</g>
<text x="374" y="102" font-size="9.5" fill="#5b4f8a">生物膜基质</text>
<circle cx="314" cy="80" r="8" fill="#1f2733"/><text x="314" y="84" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">6</text>

<!-- ===== 外膜 ===== -->
<rect x="24" y="96" width="432" height="16" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="30" cy="96" r="2.4"/><circle cx="42" cy="96" r="2.4"/><circle cx="54" cy="96" r="2.4"/><circle cx="66" cy="96" r="2.4"/><circle cx="78" cy="96" r="2.4"/><circle cx="90" cy="96" r="2.4"/><circle cx="102" cy="96" r="2.4"/><circle cx="114" cy="96" r="2.4"/><circle cx="126" cy="96" r="2.4"/><circle cx="138" cy="96" r="2.4"/><circle cx="150" cy="96" r="2.4"/><circle cx="162" cy="96" r="2.4"/><circle cx="174" cy="96" r="2.4"/><circle cx="234" cy="96" r="2.4"/><circle cx="246" cy="96" r="2.4"/><circle cx="288" cy="96" r="2.4"/><circle cx="300" cy="96" r="2.4"/><circle cx="312" cy="96" r="2.4"/><circle cx="324" cy="96" r="2.4"/><circle cx="336" cy="96" r="2.4"/><circle cx="348" cy="96" r="2.4"/><circle cx="360" cy="96" r="2.4"/><circle cx="372" cy="96" r="2.4"/><circle cx="384" cy="96" r="2.4"/><circle cx="396" cy="96" r="2.4"/><circle cx="408" cy="96" r="2.4"/><circle cx="420" cy="96" r="2.4"/><circle cx="432" cy="96" r="2.4"/><circle cx="444" cy="96" r="2.4"/>
  <circle cx="30" cy="112" r="2.4"/><circle cx="42" cy="112" r="2.4"/><circle cx="54" cy="112" r="2.4"/><circle cx="66" cy="112" r="2.4"/><circle cx="78" cy="112" r="2.4"/><circle cx="90" cy="112" r="2.4"/><circle cx="102" cy="112" r="2.4"/><circle cx="114" cy="112" r="2.4"/><circle cx="126" cy="112" r="2.4"/><circle cx="138" cy="112" r="2.4"/><circle cx="150" cy="112" r="2.4"/><circle cx="162" cy="112" r="2.4"/><circle cx="174" cy="112" r="2.4"/><circle cx="234" cy="112" r="2.4"/><circle cx="246" cy="112" r="2.4"/><circle cx="288" cy="112" r="2.4"/><circle cx="300" cy="112" r="2.4"/><circle cx="312" cy="112" r="2.4"/><circle cx="324" cy="112" r="2.4"/><circle cx="336" cy="112" r="2.4"/><circle cx="348" cy="112" r="2.4"/><circle cx="360" cy="112" r="2.4"/><circle cx="372" cy="112" r="2.4"/><circle cx="384" cy="112" r="2.4"/><circle cx="396" cy="112" r="2.4"/><circle cx="408" cy="112" r="2.4"/><circle cx="420" cy="112" r="2.4"/><circle cx="432" cy="112" r="2.4"/><circle cx="444" cy="112" r="2.4"/>
</g>
<text x="28" y="108" font-size="9.5" fill="#8a6d2f">外膜</text>

<!-- ❹ 孔蛋白：一个尚存、一个丢失 -->
<rect x="178" y="94" width="16" height="20" rx="3" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<rect x="202" y="94" width="16" height="20" rx="3" fill="none" stroke="#c2413d" stroke-width="1.2" stroke-dasharray="3,2.5"/>
<g stroke="#c2413d" stroke-width="2" stroke-linecap="round"><line x1="204" y1="97" x2="216" y2="111"/><line x1="204" y1="111" x2="216" y2="97"/></g>
<circle cx="232" cy="132" r="8" fill="#1f2733"/><text x="232" y="136" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
<text x="204" y="152" font-size="9.5" fill="#2b6cb0">孔蛋白丢失</text>

<!-- ===== 周质腔：❶ 灭活酶 ===== -->
<text x="26" y="118" font-size="9.5" fill="#5c6672">周质腔</text>
<ellipse cx="150" cy="128" rx="32" ry="13" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="150" y="131" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">β-内酰胺酶</text>
<line x1="186" y1="114" x2="180" y2="121" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<line x1="117" y1="128" x2="110" y2="128" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<!-- 被水解的药物碎片 -->
<g fill="#f9e6e4" stroke="#c2413d">
  <path d="M78,122 h10 v12 h-10 a6,6 0 0 1 0,-12 z"/>
  <path d="M96,122 h4 a6,6 0 0 1 0,12 h-4 z"/>
</g>
<circle cx="62" cy="128" r="8" fill="#1f2733"/><text x="62" y="132" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>

<!-- ❸ 主动外排泵（跨内膜—周质—外膜） -->
<rect x="252" y="92" width="26" height="24" rx="3" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<rect x="258" y="114" width="14" height="24" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<rect x="252" y="136" width="26" height="26" rx="3" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<line x1="265" y1="158" x2="265" y2="94" stroke="#ffffff" stroke-width="6"/>
<line x1="265" y1="170" x2="265" y2="86" stroke="#33404f" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<circle cx="294" cy="132" r="8" fill="#1f2733"/><text x="294" y="136" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>

<!-- ===== 胞质膜 ===== -->
<rect x="24" y="140" width="228" height="16" fill="#f7ecd4"/>
<rect x="278" y="140" width="178" height="16" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="30" cy="140" r="2.4"/><circle cx="42" cy="140" r="2.4"/><circle cx="54" cy="140" r="2.4"/><circle cx="66" cy="140" r="2.4"/><circle cx="78" cy="140" r="2.4"/><circle cx="90" cy="140" r="2.4"/><circle cx="102" cy="140" r="2.4"/><circle cx="114" cy="140" r="2.4"/><circle cx="126" cy="140" r="2.4"/><circle cx="138" cy="140" r="2.4"/><circle cx="150" cy="140" r="2.4"/><circle cx="162" cy="140" r="2.4"/><circle cx="174" cy="140" r="2.4"/><circle cx="186" cy="140" r="2.4"/><circle cx="198" cy="140" r="2.4"/><circle cx="210" cy="140" r="2.4"/><circle cx="222" cy="140" r="2.4"/><circle cx="234" cy="140" r="2.4"/><circle cx="246" cy="140" r="2.4"/><circle cx="284" cy="140" r="2.4"/><circle cx="296" cy="140" r="2.4"/><circle cx="308" cy="140" r="2.4"/><circle cx="320" cy="140" r="2.4"/><circle cx="332" cy="140" r="2.4"/><circle cx="344" cy="140" r="2.4"/><circle cx="356" cy="140" r="2.4"/><circle cx="368" cy="140" r="2.4"/><circle cx="380" cy="140" r="2.4"/><circle cx="392" cy="140" r="2.4"/><circle cx="404" cy="140" r="2.4"/><circle cx="416" cy="140" r="2.4"/><circle cx="428" cy="140" r="2.4"/><circle cx="440" cy="140" r="2.4"/><circle cx="452" cy="140" r="2.4"/>
  <circle cx="30" cy="156" r="2.4"/><circle cx="42" cy="156" r="2.4"/><circle cx="54" cy="156" r="2.4"/><circle cx="66" cy="156" r="2.4"/><circle cx="78" cy="156" r="2.4"/><circle cx="90" cy="156" r="2.4"/><circle cx="102" cy="156" r="2.4"/><circle cx="114" cy="156" r="2.4"/><circle cx="126" cy="156" r="2.4"/><circle cx="138" cy="156" r="2.4"/><circle cx="150" cy="156" r="2.4"/><circle cx="162" cy="156" r="2.4"/><circle cx="174" cy="156" r="2.4"/><circle cx="186" cy="156" r="2.4"/><circle cx="198" cy="156" r="2.4"/><circle cx="210" cy="156" r="2.4"/><circle cx="222" cy="156" r="2.4"/><circle cx="234" cy="156" r="2.4"/><circle cx="246" cy="156" r="2.4"/><circle cx="284" cy="156" r="2.4"/><circle cx="296" cy="156" r="2.4"/><circle cx="308" cy="156" r="2.4"/><circle cx="320" cy="156" r="2.4"/><circle cx="332" cy="156" r="2.4"/><circle cx="344" cy="156" r="2.4"/><circle cx="356" cy="156" r="2.4"/><circle cx="368" cy="156" r="2.4"/><circle cx="380" cy="156" r="2.4"/><circle cx="392" cy="156" r="2.4"/><circle cx="404" cy="156" r="2.4"/><circle cx="416" cy="156" r="2.4"/><circle cx="428" cy="156" r="2.4"/><circle cx="440" cy="156" r="2.4"/><circle cx="452" cy="156" r="2.4"/>
</g>
<text x="28" y="152" font-size="9.5" fill="#8a6d2f">胞质膜</text>

<!-- ===== 胞质 ===== -->
<rect x="24" y="160" width="432" height="60" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="28" y="214" font-size="9.5" fill="#5c6672">胞质</text>

<!-- ❷ 靶位改变 -->
<circle cx="76" cy="168" r="8" fill="#1f2733"/><text x="76" y="172" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<rect x="86" y="176" width="44" height="26" rx="9" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="108" y="193" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">靶点</text>
<path d="M130,176 l6,-4 l1,7 l6,3 l-6,3 l-1,7 l-6,-4 z" fill="#f9e6e4" stroke="#c2413d" stroke-width="0.9"/>
<rect x="30" y="182" width="40" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="50" y="193" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="70" y1="189" x2="82" y2="189" stroke="#c2413d" stroke-width="1.5" marker-end="url(#blk)"/>

<!-- 待泵出的药物（进入 ❸ 泵） -->
<rect x="220" y="180" width="40" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="240" y="191" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="256" y1="180" x2="264" y2="170" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ❺ 靶点旁路 / 替代酶 -->
<circle cx="294" cy="170" r="8" fill="#1f2733"/><text x="294" y="174" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">5</text>
<rect x="290" y="182" width="40" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="310" y="193" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="330" y1="189" x2="342" y2="189" stroke="#c2413d" stroke-width="1.5" marker-end="url(#blk)"/>
<circle cx="362" cy="189" r="15" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="362" y="192" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">靶酶</text>
<circle cx="420" cy="189" r="16" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="420" y="192" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">替代酶</text>
<path d="M306,202 C330,216 380,216 402,200" fill="none" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>

<!-- ===== 图例 ===== -->
<rect x="24" y="226" width="432" height="80" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<g fill="#1f2733"><circle cx="40" cy="244" r="8"/><circle cx="40" cy="266" r="8"/><circle cx="40" cy="288" r="8"/><circle cx="248" cy="244" r="8"/><circle cx="248" cy="266" r="8"/><circle cx="248" cy="288" r="8"/></g>
<g text-anchor="middle" font-size="10" fill="#fff" font-weight="700">
  <text x="40" y="248">1</text><text x="40" y="270">2</text><text x="40" y="292">3</text>
  <text x="248" y="248">4</text><text x="248" y="270">5</text><text x="248" y="292">6</text>
</g>
<g font-size="9.5" fill="#33404f">
  <text x="54" y="247">灭活酶 · 水解或修饰药物分子</text>
  <text x="54" y="269">靶位改变 · 突变/修饰靶点，药不结合</text>
  <text x="54" y="291">主动外排 · 把已进入的药物泵出</text>
  <text x="262" y="247">孔蛋白减少 · 外膜进药变少</text>
  <text x="262" y="269">靶点旁路 · 替代酶绕开被抑制步骤</text>
  <text x="262" y="291">生物膜 · 基质屏障＋菌代谢迟缓</text>
</g>

<!-- 结论 -->
<text x="240" y="324" text-anchor="middle" font-size="11.5" fill="#33404f">多种机制常在同一株菌叠加 → 单一机制不足以解释耐药表型</text>

<!-- 页脚：典型基因 -->
<rect x="24" y="334" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="350" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">典型基因</tspan>　blaKPC/blaNDM（灭活酶）· acrAB-tolC 过表达（外排）· ompK36 缺失（孔蛋白）</text>
</svg>
