<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>主动外排</title><desc>外排泵耗能把药物泵出：革兰阴性菌 RND 三组件泵（AcrAB-TolC / MexAB-OprM）跨内膜—外膜直排胞外；单组件泵（如 Tet(A)/Tet(K)）仅跨胞浆膜、底物谱窄；常与孔蛋白减少叠加致多重耐药</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="arh" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2f8f83"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">主动外排</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">耐药机制</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">泵蛋白耗能把药物排出，胞内浓度降到作用阈值以下</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e3e7ec"/>
<line x1="257" y1="66" x2="257" y2="222" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== ❶ 革兰阴性菌 RND 三组件泵 ===== -->
<circle cx="33" cy="72" r="7.5" fill="#1f2733"/><text x="33" y="76" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="45" y="76" font-size="10" font-weight="700" fill="#1f4e79">RND 三组件泵（G⁻）</text>

<!-- 排到胞外的药物 -->
<rect x="176" y="62" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="198" y="73" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<text x="250" y="84" text-anchor="end" font-size="9.5" fill="#5c6672">胞外</text>

<!-- 外膜 -->
<rect x="28" y="88" width="224" height="16" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="34" cy="88" r="2.4"/><circle cx="46" cy="88" r="2.4"/><circle cx="58" cy="88" r="2.4"/><circle cx="70" cy="88" r="2.4"/><circle cx="82" cy="88" r="2.4"/><circle cx="94" cy="88" r="2.4"/><circle cx="106" cy="88" r="2.4"/><circle cx="118" cy="88" r="2.4"/><circle cx="178" cy="88" r="2.4"/><circle cx="190" cy="88" r="2.4"/><circle cx="202" cy="88" r="2.4"/><circle cx="214" cy="88" r="2.4"/><circle cx="226" cy="88" r="2.4"/><circle cx="238" cy="88" r="2.4"/><circle cx="250" cy="88" r="2.4"/>
  <circle cx="34" cy="104" r="2.4"/><circle cx="46" cy="104" r="2.4"/><circle cx="58" cy="104" r="2.4"/><circle cx="70" cy="104" r="2.4"/><circle cx="82" cy="104" r="2.4"/><circle cx="94" cy="104" r="2.4"/><circle cx="106" cy="104" r="2.4"/><circle cx="118" cy="104" r="2.4"/><circle cx="178" cy="104" r="2.4"/><circle cx="190" cy="104" r="2.4"/><circle cx="202" cy="104" r="2.4"/><circle cx="214" cy="104" r="2.4"/><circle cx="226" cy="104" r="2.4"/><circle cx="238" cy="104" r="2.4"/><circle cx="250" cy="104" r="2.4"/>
</g>
<text x="34" y="100" font-size="9.5" fill="#8a6d2f">外膜</text>

<!-- 周质腔 + 肽聚糖薄层 -->
<text x="34" y="120" font-size="9.5" fill="#5c6672">周质腔</text>

<!-- 内膜 -->
<rect x="28" y="140" width="224" height="16" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="34" cy="140" r="2.4"/><circle cx="46" cy="140" r="2.4"/><circle cx="58" cy="140" r="2.4"/><circle cx="70" cy="140" r="2.4"/><circle cx="82" cy="140" r="2.4"/><circle cx="106" cy="140" r="2.4"/><circle cx="118" cy="140" r="2.4"/><circle cx="178" cy="140" r="2.4"/><circle cx="190" cy="140" r="2.4"/><circle cx="202" cy="140" r="2.4"/><circle cx="214" cy="140" r="2.4"/><circle cx="226" cy="140" r="2.4"/><circle cx="238" cy="140" r="2.4"/><circle cx="250" cy="140" r="2.4"/>
  <circle cx="34" cy="156" r="2.4"/><circle cx="46" cy="156" r="2.4"/><circle cx="58" cy="156" r="2.4"/><circle cx="70" cy="156" r="2.4"/><circle cx="82" cy="156" r="2.4"/><circle cx="106" cy="156" r="2.4"/><circle cx="118" cy="156" r="2.4"/><circle cx="178" cy="156" r="2.4"/><circle cx="190" cy="156" r="2.4"/><circle cx="202" cy="156" r="2.4"/><circle cx="214" cy="156" r="2.4"/><circle cx="226" cy="156" r="2.4"/><circle cx="238" cy="156" r="2.4"/><circle cx="250" cy="156" r="2.4"/>
</g>
<text x="34" y="152" font-size="9.5" fill="#8a6d2f">内膜</text>

<!-- 三组件泵：外膜通道 / 融合蛋白 / 内膜转运体 -->
<g fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3">
  <path d="M136,82 h28 l-5,26 h-18 z"/>
  <path d="M141,108 h18 l-3,30 h-12 z"/>
  <path d="M132,136 h36 l-6,28 h-24 z"/>
</g>
<text x="172" y="96" font-size="9.5" fill="#1f4e79">TolC（外膜通道）</text>
<text x="172" y="124" font-size="9.5" fill="#1f4e79">AcrA（融合蛋白）</text>
<text x="172" y="152" font-size="9.5" fill="#1f4e79">AcrB（转运体）</text>

<!-- 药物出泵通路 -->
<line x1="150" y1="162" x2="150" y2="84" stroke="#33404f" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arr)"/>
<rect x="44" y="178" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="66" y="189" text-anchor="middle" font-size="9.5" fill="#a3332f">药物</text>
<line x1="92" y1="184" x2="126" y2="168" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="34" y="172" font-size="9.5" fill="#5c6672">胞质</text>

<!-- 供能：质子动力势 -->
<line x1="96" y1="132" x2="96" y2="164" stroke="#2f8f83" stroke-width="1.4" marker-end="url(#arh)"/>
<text x="36" y="134" font-size="9.5" fill="#2f8f83">H⁺质子动力势</text>

<text x="28" y="206" font-size="9.5" fill="#5c6672">跨内膜—外膜，药物从胞质／周质直排胞外</text>
<text x="28" y="219" font-size="9.5" fill="#5c6672">底物谱宽：喹诺酮、四环素、大环内酯等</text>

<!-- ===== ❷ 单组件泵（仅跨胞浆膜） ===== -->
<circle cx="271" cy="72" r="7.5" fill="#1f2733"/><text x="271" y="76" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<text x="283" y="76" font-size="10" font-weight="700" fill="#1f4e79">单组件泵（仅跨胞浆膜）</text>

<rect x="338" y="92" width="44" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="360" y="103" text-anchor="middle" font-size="9.5" fill="#a3332f">四环素</text>
<text x="266" y="124" font-size="9.5" fill="#5c6672">膜外侧</text>

<rect x="266" y="132" width="186" height="16" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="272" cy="132" r="2.4"/><circle cx="284" cy="132" r="2.4"/><circle cx="296" cy="132" r="2.4"/><circle cx="308" cy="132" r="2.4"/><circle cx="320" cy="132" r="2.4"/><circle cx="332" cy="132" r="2.4"/><circle cx="344" cy="132" r="2.4"/><circle cx="380" cy="132" r="2.4"/><circle cx="392" cy="132" r="2.4"/><circle cx="404" cy="132" r="2.4"/><circle cx="416" cy="132" r="2.4"/><circle cx="428" cy="132" r="2.4"/><circle cx="440" cy="132" r="2.4"/><circle cx="452" cy="132" r="2.4"/>
  <circle cx="272" cy="148" r="2.4"/><circle cx="284" cy="148" r="2.4"/><circle cx="296" cy="148" r="2.4"/><circle cx="308" cy="148" r="2.4"/><circle cx="320" cy="148" r="2.4"/><circle cx="332" cy="148" r="2.4"/><circle cx="344" cy="148" r="2.4"/><circle cx="380" cy="148" r="2.4"/><circle cx="392" cy="148" r="2.4"/><circle cx="404" cy="148" r="2.4"/><circle cx="416" cy="148" r="2.4"/><circle cx="428" cy="148" r="2.4"/><circle cx="440" cy="148" r="2.4"/><circle cx="452" cy="148" r="2.4"/>
</g>
<text x="452" y="144" text-anchor="end" font-size="9.5" fill="#8a6d2f">胞浆膜</text>

<rect x="350" y="126" width="20" height="28" rx="4" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<line x1="360" y1="152" x2="360" y2="112" stroke="#33404f" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arr)"/>
<line x1="396" y1="120" x2="396" y2="156" stroke="#2f8f83" stroke-width="1.4" marker-end="url(#arh)"/>
<text x="376" y="118" font-size="9.5" fill="#2f8f83">H⁺ 反向转运</text>

<rect x="290" y="170" width="52" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="316" y="181" text-anchor="middle" font-size="9.5" fill="#a3332f">四环素</text>
<line x1="344" y1="174" x2="356" y2="160" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="266" y="166" font-size="9.5" fill="#5c6672">胞质</text>

<text x="266" y="206" font-size="9.5" fill="#5c6672">单个转运蛋白，只跨一层膜</text>
<text x="266" y="219" font-size="9.5" fill="#5c6672">底物谱窄：tet(A) 等只排四环素类</text>

<!-- ===== ❸ 与通透性下降叠加 ===== -->
<rect x="24" y="228" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="239" r="7.5" fill="#1f2733"/><text x="38" y="243" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<text x="52" y="243" font-size="9.5" fill="#33404f">常与孔蛋白减少叠加：进得少＋排得多，MIC 成倍升高</text>

<!-- 结局 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">排出快于进入 → 胞内浓度低于阈值 → MIC 升高、多重耐药</text>

<!-- 页脚：典型基因 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">典型基因</tspan>　acrAB 过表达 + tolC（肠杆菌）· mexAB-oprM（铜绿）· tet(A)/tet(K)</text>
</svg>
