<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>TCBS 琼脂</title><desc>TCBS 琼脂平板俯视：深绿色基底，胆盐与枸橼酸盐加碱性 pH 约 8.6 抑制革兰阳性菌与肠杆菌，弧菌耐碱可生长；发酵蔗糖产酸使溴麝香草酚蓝由蓝绿变黄，霍乱弧菌呈黄色大菌落并使周围培养基变黄，副溶血性弧菌与创伤弧菌不发酵蔗糖呈蓝绿色菌落</desc>
<defs>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f2dd5c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f2dd5c" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="plateclip"><circle cx="108" cy="152" r="62"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">TCBS 琼脂</text>
<rect x="356" y="14" width="100" height="18" rx="9" fill="#eef1f5"/>
<text x="406" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">选择与鉴别培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">碱性环境选出弧菌；再按蔗糖发酵与否分成黄、绿两类</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视 ===== -->
<text x="24" y="82" font-size="9.5" fill="#5c6672">平板俯视（基底深绿）</text>
<circle cx="108" cy="152" r="66" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="108" cy="152" r="62" fill="#1a7f66" stroke="#125c4a" stroke-width="1.4"/>

<g clip-path="url(#plateclip)">
  <!-- 蔗糖发酵：菌落及周围培养基变黄 -->
  <circle cx="88" cy="124" r="26" fill="url(#halo)"/>
  <circle cx="88" cy="124" r="8" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <circle cx="108" cy="106" r="6.5" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <circle cx="70" cy="146" r="5.5" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <!-- 不发酵蔗糖：蓝绿色菌落，周围培养基不变色 -->
  <circle cx="140" cy="168" r="6" fill="#57c2a4" stroke="#0f5747" stroke-width="1"/>
  <circle cx="124" cy="190" r="5" fill="#57c2a4" stroke="#0f5747" stroke-width="1"/>
  <circle cx="152" cy="140" r="4.5" fill="#57c2a4" stroke="#0f5747" stroke-width="1"/>
  <!-- 被抑制：无菌落，仅示接种处 -->
  <g fill="none" stroke="#9fb8b0" stroke-width="1.2" stroke-dasharray="3,2.5">
    <circle cx="78" cy="186" r="7"/><circle cx="98" cy="200" r="6"/>
  </g>
  <g stroke="#cfe3dc" stroke-width="1.4" stroke-linecap="round">
    <line x1="74" y1="182" x2="82" y2="190"/><line x1="82" y1="182" x2="74" y2="190"/>
    <line x1="94.5" y1="196.5" x2="101.5" y2="203.5"/><line x1="101.5" y1="196.5" x2="94.5" y2="203.5"/>
  </g>
</g>

<!-- 平板上的编号 -->
<g>
  <circle cx="122" cy="132" r="7.5" fill="#1f2733"/>
  <text x="122" y="135.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
  <circle cx="152" cy="188" r="7.5" fill="#1f2733"/>
  <text x="152" y="191.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
  <circle cx="60" cy="178" r="7.5" fill="#1f2733"/>
  <text x="60" y="181.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
</g>

<!-- ===== 右：选择成分 ===== -->
<rect x="186" y="70" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="86" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="196" y="103" font-size="9.5" fill="#5c6672">胆盐 + 枸橼酸盐 → 抑革兰阳性菌与多数肠杆菌</text>
<text x="196" y="120" font-size="9.5" fill="#5c6672">碱性 pH ≈8.6 → 弧菌耐碱照长，杂菌受抑</text>
<circle cx="200" cy="134" r="6.5" fill="#1f2733"/>
<text x="200" y="137.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="216" cy="134" r="4.5" fill="none" stroke="#9aa4ae" stroke-width="1.1" stroke-dasharray="3,2.5"/>
<text x="228" y="137.5" font-size="9.5" fill="#33404f">大肠埃希菌等不长或极小；变形杆菌可长（黑心）</text>

<!-- ===== 右：鉴别成分 ===== -->
<rect x="186" y="154" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="170" font-size="10" font-weight="700" fill="#33404f">鉴别成分：指示什么</text>
<text x="196" y="187" font-size="9.5" fill="#5c6672">蔗糖 + 溴麝香草酚蓝/麝香草酚蓝（碱蓝绿，酸黄）</text>
<circle cx="200" cy="201" r="6.5" fill="#1f2733"/>
<text x="200" y="204.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="216" cy="201" r="5" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
<text x="228" y="204.5" font-size="9.5" fill="#33404f">发酵蔗糖产酸 → 菌落连同周围变黄</text>
<circle cx="200" cy="219" r="6.5" fill="#1f2733"/>
<text x="200" y="222.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<circle cx="216" cy="219" r="5" fill="#57c2a4" stroke="#0f5747" stroke-width="1"/>
<text x="228" y="222.5" font-size="9.5" fill="#33404f">不发酵蔗糖 → 保持基底的蓝绿色</text>

<!-- 临床注解 -->
<rect x="24" y="234" width="432" height="18" rx="6" fill="#f9e6e4" stroke="#e3b8b5"/>
<text x="34" y="246.5" font-size="9.5" fill="#a3332f">须 18–24h 判读：孵育过久黄色可回复绿色；氧化酶试验不能直接取 TCBS 菌落</text>

<!-- 结论 -->
<text x="240" y="263" text-anchor="middle" font-size="11.5" fill="#33404f">黄＝发酵蔗糖；绿＝不发酵蔗糖；TCBS 仅初筛，仍须鉴定</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　霍乱弧菌（黄）· 副溶血性弧菌（绿）· 创伤弧菌（绿）</text>
</svg>
