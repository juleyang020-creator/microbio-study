<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>血琼脂平板（BAP）</title><desc>营养琼脂基础加 5% 脱纤维羊血的非选择性平板：支持绝大多数细菌生长（苛养菌如嗜血杆菌需巧克力琼脂），以菌落周围变化区分 β 溶血（红细胞完全裂解、透明）、α 溶血（血红蛋白被氧化呈草绿，红细胞多仍完整）与 γ 不溶血</desc>
<defs>
  <radialGradient id="agar" cx="38%" cy="32%" r="78%">
    <stop offset="0" stop-color="#b8555b"/><stop offset="1" stop-color="#983f46"/>
  </radialGradient>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">血琼脂平板（BAP）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">营养琼脂 ＋ 5% 脱纤维羊血：不选择、只鉴别——看溶血环</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视 ===== -->
<text x="120" y="80" text-anchor="middle" font-size="9.5" fill="#5c6672">平板俯视 · 35℃ 18–24 h</text>
<circle cx="120" cy="158" r="74" fill="#f0f2f4" stroke="#cdd4db" stroke-width="1.4"/>
<circle cx="120" cy="158" r="70" fill="url(#agar)"/>
<!-- 划线接种痕迹 -->
<g fill="none" stroke="#8c353b" stroke-width="2.4" stroke-linecap="round" opacity="0.5">
  <path d="M70,140 Q110,90 172,132"/>
  <path d="M76,178 Q120,150 178,168"/>
  <path d="M92,206 Q130,180 172,196"/>
</g>

<!-- ① β 溶血：完全透明环（琼脂被清空，露出淡黄底色） -->
<circle cx="98" cy="128" r="14" fill="#e9dcbb" stroke="#d8c69c" stroke-width="0.8"/>
<circle cx="98" cy="128" r="4.2" fill="#f4efe6" stroke="#cfc7b8" stroke-width="0.8"/>
<circle cx="82" cy="110" r="7.5" fill="#1f2733"/>
<text x="82" y="113.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>

<!-- ② α 溶血：草绿色不完全环 -->
<circle cx="152" cy="140" r="12" fill="#7d9256" opacity="0.9"/>
<circle cx="152" cy="140" r="3.6" fill="#e6ded0" stroke="#cfc7b8" stroke-width="0.7"/>
<circle cx="166" cy="118" r="7.5" fill="#1f2733"/>
<text x="166" y="121.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>

<!-- ③ γ 不溶血：培养基颜色不变 -->
<circle cx="110" cy="192" r="5" fill="#efe8dc" stroke="#cfc7b8" stroke-width="0.8"/>
<circle cx="86" cy="198" r="7.5" fill="#1f2733"/>
<text x="86" y="201.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>

<!-- ===== 右：三型溶血对照 ===== -->
<!-- 1 -->
<circle cx="214" cy="104" r="13" fill="url(#agar)" stroke="#cdd4db"/>
<circle cx="214" cy="104" r="9" fill="#e9dcbb"/>
<circle cx="214" cy="104" r="2.8" fill="#f4efe6"/>
<circle cx="205" cy="95" r="6.6" fill="#1f2733"/>
<text x="205" y="98.4" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<text x="236" y="101" font-size="9.5" fill="#33404f">β 溶血：菌落周围完全透明</text>
<text x="236" y="114" font-size="9.5" fill="#5c6672">化脓链球菌、金黄色葡萄球菌</text>
<!-- 2 -->
<circle cx="214" cy="140" r="13" fill="url(#agar)" stroke="#cdd4db"/>
<circle cx="214" cy="140" r="9" fill="#7d9256" opacity="0.9"/>
<circle cx="214" cy="140" r="2.6" fill="#e6ded0"/>
<circle cx="205" cy="131" r="6.6" fill="#1f2733"/>
<text x="205" y="134.4" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<text x="236" y="137" font-size="9.5" fill="#33404f">α 溶血：草绿色不完全环</text>
<text x="236" y="150" font-size="9.5" fill="#5c6672">肺炎链球菌、草绿色链球菌</text>
<!-- 3 -->
<circle cx="214" cy="176" r="13" fill="url(#agar)" stroke="#cdd4db"/>
<circle cx="214" cy="176" r="3.2" fill="#efe8dc"/>
<circle cx="205" cy="167" r="6.6" fill="#1f2733"/>
<text x="205" y="170.4" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<text x="236" y="173" font-size="9.5" fill="#33404f">γ 不溶血：底色无变化</text>
<text x="236" y="186" font-size="9.5" fill="#5c6672">粪肠球菌、表皮葡萄球菌</text>

<!-- 选择成分 / 鉴别成分 -->
<rect x="200" y="200" width="256" height="48" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="208" y="216" font-size="9.5" fill="#5c6672">选择成分：无（多数菌可长；苛养菌需巧克力琼脂）</text>
<text x="208" y="231" font-size="9.5" fill="#33404f">鉴别成分：羊红细胞 → β 完全裂解；α 血红蛋白被氧化</text>
<text x="208" y="245" font-size="9.5" fill="#a3332f">判读迎光透视；SLO 对氧敏感，宜刺种或厌氧</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">红细胞既是营养也是指示剂：菌落周围怎么变，就是什么溶血型</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　化脓链球菌 β · 肺炎链球菌 α · 粪肠球菌 γ · 金黄色葡萄球菌 · 李斯特菌</text>
</svg>
