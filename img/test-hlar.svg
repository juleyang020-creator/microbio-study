<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">高水平氨基糖苷耐药筛选（HLAR）</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#8a8f98">高浓度：庆大霉素 500 / 链霉素 1000–2000 µg/mL</text>

  <!-- 生长=耐药 -->
  <circle cx="138" cy="170" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <g fill="#cdbf9e"><circle cx="110" cy="150" r="6"/><circle cx="150" cy="140" r="6"/><circle cx="170" cy="178" r="6"/><circle cx="120" cy="196" r="6"/><circle cx="158" cy="200" r="6"/><circle cx="96" cy="176" r="6"/><circle cx="140" cy="170" r="6"/></g>
  <circle cx="138" cy="170" r="15" fill="#fff" stroke="#b0b4bb"/><text x="138" y="174" text-anchor="middle" font-size="8" fill="#454b54">GEN</text>
  <text x="138" y="280" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b04242">有生长 → 高水平耐药</text>
  <text x="138" y="297" text-anchor="middle" font-size="10.5" fill="#8a8f98">与β-内酰胺/糖肽协同消失</text>

  <!-- 无生长=可协同 -->
  <circle cx="346" cy="170" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="346" cy="170" r="15" fill="#fff" stroke="#b0b4bb"/><text x="346" y="174" text-anchor="middle" font-size="8" fill="#454b54">GEN</text>
  <text x="346" y="280" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f7a52">无生长 → 可协同</text>
  <text x="346" y="297" text-anchor="middle" font-size="10.5" fill="#8a8f98">联合用药仍有效</text>
</svg>
