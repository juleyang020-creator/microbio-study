<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">抑制细胞壁合成</text>

  <!-- 肽聚糖：两条糖链 -->
  <g stroke="#0f766e">
    <rect x="40" y="92" width="30" height="18" rx="4" fill="#ccfbf1"/>
    <rect x="78" y="92" width="30" height="18" rx="4" fill="#a7f3d0"/>
    <rect x="116" y="92" width="30" height="18" rx="4" fill="#ccfbf1"/>
    <rect x="154" y="92" width="30" height="18" rx="4" fill="#a7f3d0"/>
    <rect x="40" y="158" width="30" height="18" rx="4" fill="#a7f3d0"/>
    <rect x="78" y="158" width="30" height="18" rx="4" fill="#ccfbf1"/>
    <rect x="116" y="158" width="30" height="18" rx="4" fill="#a7f3d0"/>
    <rect x="154" y="158" width="30" height="18" rx="4" fill="#ccfbf1"/>
  </g>
  <g stroke="#16a34a" stroke-width="3">
    <line x1="55" y1="110" x2="55" y2="158"/>
    <line x1="169" y1="110" x2="169" y2="158"/>
  </g>
  <text x="40" y="84" font-size="10.5" fill="#475569">糖链（肽聚糖）</text>
  <text x="150" y="140" font-size="10.5" fill="#16a34a">正常交联</text>

  <!-- 被阻断的交联 -->
  <line x1="93" y1="110" x2="93" y2="158" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4 3"/>
  <circle cx="93" cy="124" r="11" fill="#fff" stroke="#0f766e" stroke-width="1.5"/>
  <text x="93" y="127" text-anchor="middle" font-size="8" fill="#0f766e">PBP</text>
  <text x="93" y="150" text-anchor="middle" font-size="17" fill="#dc2626" font-weight="700">✕</text>

  <!-- 药物 -->
  <rect x="232" y="92" width="156" height="42" rx="9" fill="#fee2e2" stroke="#dc2626"/>
  <text x="310" y="110" text-anchor="middle" font-size="11.5" fill="#b91c1c" font-weight="600">β-内酰胺类 / 糖肽类</text>
  <text x="310" y="126" text-anchor="middle" font-size="10" fill="#b91c1c">阻断转肽酶(PBP)交联</text>
  <line x1="232" y1="120" x2="106" y2="124" stroke="#dc2626" stroke-width="1.5"/>

  <text x="210" y="214" text-anchor="middle" font-size="11.5" fill="#334155">交联受阻 → 细胞壁缺损 → 菌体裂解死亡</text>
</svg>
