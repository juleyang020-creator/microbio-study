<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="cwArr" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#454b54"/>
    </marker>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>

  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">抑制细胞壁合成</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">阻断肽聚糖交联，β-内酰胺类与糖肽类两类作用位点</text>

  <text x="40" y="72" font-size="11" fill="#454b54">肽聚糖：聚糖骨架（NAG–NAM）经转肽酶（PBP）交联成网</text>

  <!-- 糖链：上/下两条，NAG 浅 / NAM 深（同墨青色域，深浅区分） -->
  <g stroke="#2e6b66" stroke-width="1.2">
    <rect x="40" y="84" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="78" y="84" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="116" y="84" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="154" y="84" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="192" y="84" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="230" y="84" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="268" y="84" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="40" y="224" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="78" y="224" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="116" y="224" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="154" y="224" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="192" y="224" width="32" height="20" rx="6" fill="#cfe0db"/>
    <rect x="230" y="224" width="32" height="20" rx="6" fill="#eef4f2"/>
    <rect x="268" y="224" width="32" height="20" rx="6" fill="#cfe0db"/>
  </g>
  <!-- 糖单元图例 -->
  <rect x="40" y="110" width="11" height="10" rx="2" fill="#eef4f2" stroke="#2e6b66" stroke-width="1"/>
  <text x="55" y="119" font-size="9" fill="#454b54">NAG</text>
  <rect x="90" y="110" width="11" height="10" rx="2" fill="#cfe0db" stroke="#2e6b66" stroke-width="1"/>
  <text x="105" y="119" font-size="9" fill="#454b54">NAM</text>

  <!-- 肽桥 + D-Ala-D-Ala 末端（三处：正常 / β-内酰胺 / 万古霉素）-->

  <!-- 正常交联 x=94：转肽酶完成交联 -->
  <line x1="94" y1="104" x2="94" y2="132" stroke="#2e6b66" stroke-width="1.5"/>
  <line x1="94" y1="196" x2="94" y2="224" stroke="#2e6b66" stroke-width="1.5"/>
  <line x1="94" y1="148" x2="94" y2="180" stroke="#3f7a52" stroke-width="3" stroke-linecap="round"/>
  <circle cx="94" cy="164" r="12" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.2"/>
  <text x="94" y="167" text-anchor="middle" font-size="8" fill="#6e571a" font-weight="700">PBP</text>
  <text x="94" y="258" text-anchor="middle" font-size="9.5" fill="#3f7a52" font-weight="600">正常交联</text>

  <!-- β-内酰胺占据 PBP 活性位 x=170 -->
  <line x1="170" y1="104" x2="170" y2="140" stroke="#2e6b66" stroke-width="1.5"/>
  <line x1="170" y1="188" x2="170" y2="224" stroke="#2e6b66" stroke-width="1.5"/>
  <circle cx="170" cy="164" r="12" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.2"/>
  <text x="170" y="167" text-anchor="middle" font-size="8" fill="#6e571a" font-weight="700">PBP</text>
  <rect x="184" y="155" width="26" height="17" rx="6" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="197" y="167" text-anchor="middle" font-size="8.5" fill="#345f86">β内</text>
  <line x1="184" y1="163" x2="181" y2="164" stroke="#345f86" stroke-width="1.2"/>
  <text x="170" y="150" text-anchor="middle" font-size="14" fill="#b04242" font-weight="700">✕</text>
  <text x="170" y="258" text-anchor="middle" font-size="9.5" fill="#345f86" font-weight="600">占据 PBP</text>

  <!-- 万古霉素封闭 D-Ala-D-Ala 末端 x=246 -->
  <line x1="246" y1="104" x2="246" y2="136" stroke="#2e6b66" stroke-width="1.5"/>
  <circle cx="241" cy="142" r="3.4" fill="#ffffff" stroke="#2e6b66" stroke-width="1.2"/>
  <circle cx="251" cy="142" r="3.4" fill="#ffffff" stroke="#2e6b66" stroke-width="1.2"/>
  <line x1="246" y1="190" x2="246" y2="224" stroke="#2e6b66" stroke-width="1.5"/>
  <rect x="222" y="150" width="48" height="18" rx="8" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="246" y="162" text-anchor="middle" font-size="8.5" fill="#345f86">万古霉素</text>
  <line x1="246" y1="150" x2="246" y2="146" stroke="#345f86" stroke-width="1.2"/>
  <text x="246" y="184" text-anchor="middle" font-size="14" fill="#b04242" font-weight="700">✕</text>
  <text x="246" y="258" text-anchor="middle" font-size="9" fill="#345f86" font-weight="600">封闭 D-Ala-D-Ala</text>

  <!-- 右侧说明 -->
  <text x="306" y="98" font-size="11.5" font-weight="700" fill="#23272e">两类作用位点</text>
  <rect x="306" y="108" width="9" height="9" rx="2" fill="#e7eef6" stroke="#345f86" stroke-width="1"/>
  <text x="320" y="116" font-size="10" fill="#454b54">β-内酰胺类</text>
  <text x="320" y="130" font-size="9.5" fill="#8a8f98">占据 PBP 活性位</text>
  <rect x="306" y="142" width="9" height="9" rx="2" fill="#e7eef6" stroke="#345f86" stroke-width="1"/>
  <text x="320" y="150" font-size="10" fill="#454b54">糖肽类（万古）</text>
  <text x="320" y="164" font-size="9.5" fill="#8a8f98">封闭 D-Ala-D-Ala 末端</text>
  <line x1="306" y1="180" x2="370" y2="180" stroke="#d6d2c8" stroke-width="1"/>
  <text x="306" y="198" font-size="10" fill="#b04242">→ 转肽交联均无法完成</text>

  <text x="240" y="280" text-anchor="middle" font-size="10.5" fill="#8a8f98">绿色＝正常交联　红✕＝交联受阻</text>
  <text x="240" y="296" text-anchor="middle" font-size="12.5" fill="#454b54" font-weight="600">交联受阻 → 细胞壁缺损 → 渗透压使菌体裂解死亡</text>
</svg>
