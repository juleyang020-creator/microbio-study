<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>KB 纸片扩散法（Kirby-Bauer）</title><desc>定量抗菌药纸片贴于接种 0.5 麦氏菌液的 M-H 琼脂，药物向四周扩散形成浓度梯度，抑菌处不长菌形成透明抑菌圈；量取圈径（mm）对照该药–菌折点表判 S/I/R，圈越大越敏感，只定性不给 MIC</desc>
<defs>
  <pattern id="lawn" width="8" height="8" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.1" fill="#cbbb90"/><circle cx="6" cy="6" r="1.1" fill="#cbbb90"/>
  </pattern>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">KB 纸片扩散法（Kirby-Bauer）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">药敏试验方法</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">纸片中的药物在琼脂中扩散成浓度梯度 → 抑菌圈直径与 MIC 负相关</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>
<line x1="204" y1="64" x2="204" y2="212" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== 左：真实平板 ===== -->
<text x="24" y="74" font-size="9.5" fill="#5c6672">M-H 琼脂 · 0.5 麦氏菌悬液均匀涂布</text>
<circle cx="114" cy="146" r="66" fill="#e6dcc1" stroke="#c8b887" stroke-width="2.5"/>
<circle cx="114" cy="146" r="65" fill="url(#lawn)"/>

<!-- ❶ 大抑菌圈 -->
<circle cx="96" cy="124" r="30" fill="#faf7ef" stroke="#c8b887" stroke-width="1.2" stroke-dasharray="5,3"/>
<g fill="none" stroke="#d9b96a" stroke-width="1.4">
  <circle cx="96" cy="124" r="13"/><circle cx="96" cy="124" r="20" opacity="0.66"/><circle cx="96" cy="124" r="26" opacity="0.38"/>
</g>
<circle cx="96" cy="124" r="7" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<line x1="66" y1="124" x2="126" y2="124" stroke="#33404f" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="66" y1="119" x2="66" y2="129" stroke="#33404f" stroke-width="1.2"/>
<line x1="126" y1="119" x2="126" y2="129" stroke="#33404f" stroke-width="1.2"/>
<text x="96" y="112" text-anchor="middle" font-size="9.5" fill="#33404f">量直径 d</text>
<text x="96" y="141" text-anchor="middle" font-size="9.5" fill="#8a6d2f">药物浓度高→低</text>
<circle cx="96" cy="94" r="7.5" fill="#1f2733"/><text x="96" y="97.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>

<!-- ❷ 中等抑菌圈 -->
<circle cx="146" cy="176" r="17" fill="#faf7ef" stroke="#c8b887" stroke-width="1.2" stroke-dasharray="5,3"/>
<circle cx="146" cy="176" r="7" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<circle cx="146" cy="193" r="7.5" fill="#1f2733"/><text x="146" y="196.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>

<!-- ❸ 无圈：菌苔紧贴纸片 -->
<circle cx="80" cy="182" r="7" fill="#faf7ef" stroke="#c8b887" stroke-width="1" stroke-dasharray="3,2"/>
<circle cx="80" cy="182" r="7" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<circle cx="80" cy="191" r="7.5" fill="#1f2733"/><text x="80" y="194.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>

<!-- ===== 右：怎么看结果 ===== -->
<text x="216" y="74" font-size="10" font-weight="700" fill="#33404f">怎么看结果：量圈径 → 查折点表</text>

<!-- 行1 敏感 -->
<rect x="208" y="82" width="48" height="44" rx="4" fill="#e6dcc1" stroke="#c8b887"/>
<rect x="209" y="83" width="46" height="42" rx="4" fill="url(#lawn)"/>
<circle cx="232" cy="104" r="20" fill="#faf7ef" stroke="#c8b887" stroke-width="1.1" stroke-dasharray="4,3"/>
<circle cx="232" cy="104" r="6.5" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.1"/>
<circle cx="270" cy="100" r="7" fill="#1f2733"/><text x="270" y="103.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<text x="282" y="103.5" font-size="10" font-weight="700" fill="#33404f">圈大 → 敏感 S</text>
<text x="264" y="119" font-size="9.5" fill="#5c6672">直径 ≥ 该药–菌 S 折点</text>

<!-- 行2 中介 -->
<rect x="208" y="130" width="48" height="44" rx="4" fill="#e6dcc1" stroke="#c8b887"/>
<rect x="209" y="131" width="46" height="42" rx="4" fill="url(#lawn)"/>
<circle cx="232" cy="152" r="13" fill="#faf7ef" stroke="#c8b887" stroke-width="1.1" stroke-dasharray="4,3"/>
<circle cx="232" cy="152" r="6.5" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.1"/>
<circle cx="270" cy="148" r="7" fill="#1f2733"/><text x="270" y="151.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<text x="282" y="151.5" font-size="10" font-weight="700" fill="#33404f">圈中 → 中介 I</text>
<text x="264" y="167" font-size="9.5" fill="#5c6672">介于 S 与 R 折点之间</text>
<text x="264" y="181" font-size="9.5" fill="#5c6672">EUCAST 的 I：加大暴露仍可敏感</text>

<!-- 行3 耐药 -->
<rect x="208" y="178" width="48" height="36" rx="4" fill="#e6dcc1" stroke="#c8b887"/>
<rect x="209" y="179" width="46" height="34" rx="4" fill="url(#lawn)"/>
<circle cx="232" cy="196" r="6.5" fill="#faf7ef" stroke="#c8b887" stroke-width="1" stroke-dasharray="3,2"/>
<circle cx="232" cy="196" r="6.5" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.1"/>
<circle cx="270" cy="196" r="7" fill="#1f2733"/><text x="270" y="199.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<text x="282" y="199.5" font-size="10" font-weight="700" fill="#a3332f">无圈 / 小圈 → 耐药 R</text>
<text x="282" y="213" font-size="9.5" fill="#5c6672">菌苔紧贴纸片边缘</text>
<line x1="262" y1="209" x2="248" y2="200" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>

<!-- 方法 / 质控 -->
<rect x="24" y="220" width="432" height="30" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="34" y="233" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">方法</tspan>　0.5 麦氏浊度涂布 → 15 min 内贴片 → 35℃ 空气 16–18 h → 量圈径</text>
<text x="34" y="246" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">质控</tspan>　E. coli ATCC 25922 等标准株圈径须落在质控范围内</text>

<!-- 结论 -->
<text x="240" y="264" text-anchor="middle" font-size="11.5" fill="#33404f">圈径须对照该「药–菌」折点表判 S/I/R：只定性，不给 MIC</text>

<!-- 页脚：用途 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　生长快的非苛养菌常规药敏；黏菌素等扩散差的药、慢生长菌与厌氧菌须改用稀释法</text>
</svg>
