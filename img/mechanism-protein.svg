<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">抑制蛋白质合成</text>

  <!-- mRNA -->
  <line x1="120" y1="178" x2="320" y2="178" stroke="#64748b" stroke-width="3"/>
  <text x="324" y="182" font-size="10.5" fill="#64748b">mRNA</text>

  <!-- 核糖体 50S / 30S -->
  <ellipse cx="216" cy="112" rx="74" ry="33" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="216" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#0f766e">50S 亚基</text>
  <ellipse cx="216" cy="154" rx="66" ry="22" fill="#a7f3d0" stroke="#0f766e"/>
  <text x="216" y="158" text-anchor="middle" font-size="12" fill="#0f766e">30S 亚基</text>

  <!-- 作用于50S -->
  <rect x="12" y="52" width="192" height="40" rx="9" fill="#fee2e2" stroke="#dc2626"/>
  <text x="108" y="69" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">作用于 50S：</text>
  <text x="108" y="84" text-anchor="middle" font-size="9.5" fill="#b91c1c">大环内酯 / 林可酰胺 / 氯霉素 / 噁唑烷酮</text>
  <line x1="150" y1="92" x2="180" y2="100" stroke="#dc2626" stroke-width="1.5"/>
  <text x="150" y="108" text-anchor="middle" font-size="15" fill="#dc2626" font-weight="700">✕</text>

  <!-- 作用于30S -->
  <rect x="232" y="196" width="176" height="34" rx="9" fill="#fee2e2" stroke="#dc2626"/>
  <text x="320" y="217" text-anchor="middle" font-size="10.5" fill="#b91c1c" font-weight="600">作用于 30S：氨基糖苷 / 四环素</text>
  <line x1="262" y1="196" x2="244" y2="168" stroke="#dc2626" stroke-width="1.5"/>
  <text x="250" y="180" text-anchor="middle" font-size="15" fill="#dc2626" font-weight="700">✕</text>

  <text x="210" y="44" text-anchor="middle" font-size="10" fill="#475569"> </text>
</svg>
