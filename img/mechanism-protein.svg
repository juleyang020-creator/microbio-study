<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>抑制蛋白质合成</title><desc>70S核糖体剖面：四环素阻A位、氨基糖苷致错读（30S）；氯霉素抑肽酰转移酶、大环内酯堵出口通道、利奈唑胺/克林霉素作用于P位（50S）</desc>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">抑制蛋白质合成</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">抗菌机制 2/5</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">药物结合 70S 核糖体的 30S / 50S 亚基，阻断翻译不同阶段</text>
<line x1="24" y1="56" x2="456" y2="56" stroke="#e3e7ec"/>

<!-- ===== 核糖体剖面 ===== -->
<!-- 新生肽链（从50S出口通道伸出） -->
<g fill="#8570b3" stroke="#6e5a9e" stroke-width="0.7">
  <circle cx="178" cy="100" r="3.4"/><circle cx="186" cy="93" r="3.4"/><circle cx="195" cy="87" r="3.4"/><circle cx="204" cy="82" r="3.4"/>
</g>
<text x="212" y="86" font-size="9.5" fill="#6e5a9e">新生肽链</text>
<!-- 出口通道 -->
<path d="M170,156 Q176,132 182,108" fill="none" stroke="#2b6cb0" stroke-width="1.4" stroke-dasharray="3,3"/>
<!-- 50S 亚基 -->
<path d="M100,160 a70,55 0 0 1 140,0 z" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.5"/>
<text x="150" y="120" font-size="12" font-weight="700" fill="#1f4e79">50S</text>
<!-- 30S 亚基 -->
<path d="M108,160 a62,32 0 0 0 124,0 z" fill="#ece6f5" stroke="#6e5a9e" stroke-width="1.5"/>
<text x="140" y="186" font-size="12" font-weight="700" fill="#4a3a6e">30S</text>
<!-- mRNA -->
<line x1="60" y1="160" x2="258" y2="160" stroke="#2f8f83" stroke-width="2"/>
<g stroke="#2f8f83" stroke-width="1"><line x1="150" y1="157" x2="150" y2="163"/><line x1="170" y1="157" x2="170" y2="163"/><line x1="190" y1="157" x2="190" y2="163"/></g>
<text x="60" y="152" font-size="9.5" fill="#2f8f83">mRNA</text>
<!-- A/P/E 位点 -->
<g font-size="9.5" font-weight="700" text-anchor="middle">
  <rect x="124" y="166" width="20" height="11" rx="2" fill="#ffffff" stroke="#6e5a9e" stroke-width="0.8"/><text x="134" y="175" fill="#4a3a6e">A</text>
  <rect x="160" y="166" width="20" height="11" rx="2" fill="#ffffff" stroke="#6e5a9e" stroke-width="0.8"/><text x="170" y="175" fill="#4a3a6e">P</text>
  <rect x="196" y="166" width="20" height="11" rx="2" fill="#ffffff" stroke="#6e5a9e" stroke-width="0.8"/><text x="206" y="175" fill="#4a3a6e">E</text>
</g>
<text x="134" y="152" font-size="9.5" fill="#5c6672" text-anchor="middle">氨酰位</text>
<text x="170" y="152" font-size="9.5" fill="#5c6672" text-anchor="middle">肽酰位</text>
<!-- 位点编号徽标（红） -->
<g font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">
  <circle cx="116" cy="136" r="8" fill="#c2413d"/><text x="116" y="140">1</text>
  <circle cx="122" cy="182" r="8" fill="#c2413d"/><text x="122" y="186">2</text>
  <circle cx="170" cy="138" r="8" fill="#c2413d"/><text x="170" y="142">3</text>
  <circle cx="196" cy="118" r="8" fill="#c2413d"/><text x="196" y="122">4</text>
  <circle cx="170" cy="185" r="8" fill="#c2413d"/><text x="170" y="189">5</text>
</g>

<!-- ===== 右侧图例 ===== -->
<g font-size="10">
  <circle cx="274" cy="80" r="8" fill="#c2413d"/><text x="274" y="84" text-anchor="middle" fill="#ffffff" font-weight="700">1</text>
  <text x="288" y="78" font-weight="700" fill="#1f2733">四环素类</text>
  <text x="288" y="91" font-size="9.5" fill="#5c6672">30S·A位：阻氨酰-tRNA 进入</text>

  <circle cx="274" cy="112" r="8" fill="#c2413d"/><text x="274" y="116" text-anchor="middle" fill="#ffffff" font-weight="700">2</text>
  <text x="288" y="110" font-weight="700" fill="#1f2733">氨基糖苷类</text>
  <text x="288" y="123" font-size="9.5" fill="#5c6672">30S：密码子错读、阻起始（杀菌）</text>

  <circle cx="274" cy="144" r="8" fill="#c2413d"/><text x="274" y="148" text-anchor="middle" fill="#ffffff" font-weight="700">3</text>
  <text x="288" y="142" font-weight="700" fill="#1f2733">氯霉素（酰胺醇类）</text>
  <text x="288" y="155" font-size="9.5" fill="#5c6672">50S：抑肽酰转移酶，阻肽键形成</text>

  <circle cx="274" cy="176" r="8" fill="#c2413d"/><text x="274" y="180" text-anchor="middle" fill="#ffffff" font-weight="700">4</text>
  <text x="288" y="174" font-weight="700" fill="#1f2733">大环内酯类</text>
  <text x="288" y="187" font-size="9.5" fill="#5c6672">50S：堵塞新生肽链出口通道</text>

  <circle cx="274" cy="208" r="8" fill="#c2413d"/><text x="274" y="212" text-anchor="middle" fill="#ffffff" font-weight="700">5</text>
  <text x="288" y="206" font-weight="700" fill="#1f2733">利奈唑胺 / 克林霉素</text>
  <text x="288" y="219" font-size="9.5" fill="#5c6672">50S·P位：阻起始与肽链延伸</text>
</g>

<!-- 结局 -->
<text x="240" y="252" text-anchor="middle" font-size="12" fill="#3f444b">肽链合成受阻或错读 → 多为抑菌；氨基糖苷类可杀菌</text>

<!-- 页脚：代表药 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">代表药</tspan>　多西环素｜阿米卡星·庆大霉素｜阿奇霉素｜克林霉素｜利奈唑胺｜氯霉素</text>
</svg>
