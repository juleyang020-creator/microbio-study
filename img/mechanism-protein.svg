<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="pr50" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4f2"/><stop offset="1" stop-color="#e3ece9"/></linearGradient>
    <linearGradient id="pr30" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4f2"/><stop offset="1" stop-color="#e3ece9"/></linearGradient>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">抑制蛋白质合成</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">细菌 70S 核糖体 = 50S + 30S</text>

  <!-- 生长肽链（从 50S 出口通道伸出） -->
  <g fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.2">
    <circle cx="208" cy="80" r="6"/><circle cx="220" cy="68" r="6"/>
    <circle cx="212" cy="56" r="6"/><circle cx="226" cy="48" r="6"/>
  </g>
  <text x="246" y="56" font-size="10" fill="#6e571a">生长中的肽链</text>

  <!-- 核糖体 50S / 30S -->
  <ellipse cx="210" cy="120" rx="96" ry="42" fill="url(#pr50)" stroke="#2e6b66" stroke-width="1.4"/>
  <text x="210" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#1f4a46">50S 大亚基</text>
  <ellipse cx="210" cy="192" rx="84" ry="32" fill="url(#pr30)" stroke="#2e6b66" stroke-width="1.4"/>
  <text x="210" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#1f4a46">30S 小亚基</text>

  <!-- mRNA 槽 + 密码子（沿 30S 顶面） -->
  <line x1="100" y1="162" x2="326" y2="162" stroke="#2e6b66" stroke-width="2.4"/>
  <g stroke="#2e6b66" stroke-width="2">
    <line x1="124" y1="157" x2="124" y2="167"/><line x1="154" y1="157" x2="154" y2="167"/>
    <line x1="184" y1="157" x2="184" y2="167"/><line x1="214" y1="157" x2="214" y2="167"/>
    <line x1="244" y1="157" x2="244" y2="167"/><line x1="274" y1="157" x2="274" y2="167"/>
  </g>
  <text x="332" y="166" font-size="10.5" fill="#2e6b66">mRNA</text>

  <!-- tRNA（P 位在左／A 位在右，介于两亚基之间） -->
  <path d="M190,154 l-7,-16 h14 z" fill="#fbfaf8" stroke="#2e6b66" stroke-width="1.2"/>
  <text x="183" y="134" text-anchor="middle" font-size="9" fill="#454b54">P 位</text>
  <path d="M218,154 l-7,-16 h14 z" fill="#fbfaf8" stroke="#2e6b66" stroke-width="1.2"/>
  <text x="225" y="134" text-anchor="middle" font-size="9" fill="#454b54">A 位</text>

  <!-- 30S 抑制剂 -->
  <rect x="14" y="180" width="80" height="42" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="54" y="198" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">作用 30S</text>
  <text x="54" y="213" text-anchor="middle" font-size="9.5" fill="#454b54">氨基糖苷·四环素</text>
  <path d="M94,196 C108,193 116,192 126,191" fill="none" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>
  <polygon points="126,191 117,188 118,196" fill="#345f86"/>

  <!-- 50S 抑制剂 -->
  <rect x="354" y="96" width="118" height="52" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="413" y="114" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">作用 50S</text>
  <text x="413" y="129" text-anchor="middle" font-size="9.5" fill="#454b54">大环内酯·酰胺醇</text>
  <text x="413" y="142" text-anchor="middle" font-size="9.5" fill="#454b54">噁唑烷酮·林可酰胺</text>
  <path d="M354,122 C336,122 320,121 308,120" fill="none" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>
  <polygon points="308,120 317,116 317,124" fill="#345f86"/>

  <!-- 阻断标记：30S（A 位 tRNA / 错读）与 50S（肽链延伸 / 出口通道） -->
  <g stroke="#b04242" stroke-width="1.6" fill="none">
    <line x1="213" y1="140" x2="223" y2="150"/><line x1="223" y1="140" x2="213" y2="150"/>
  </g>

  <text x="240" y="266" text-anchor="middle" font-size="12.5" fill="#454b54">30S：阻 A 位 tRNA、致错读　50S：封肽链延伸 / 出口通道</text>
  <text x="240" y="288" text-anchor="middle" font-size="12.5" font-weight="600" fill="#23272e">翻译受阻 → 蛋白质合成停止 → 抑菌 / 杀菌</text>
</svg>
