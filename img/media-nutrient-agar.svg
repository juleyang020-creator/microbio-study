<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>营养琼脂</title><desc>营养琼脂平板俯视图：淡琥珀色半透明基础培养基，无选择成分也无鉴别成分，革兰阳性与阴性的一般细菌均可生长（苛养菌生长不良），菌落颜色不反映代谢；图示大肠埃希菌、金黄色葡萄球菌、奇异变形杆菌（迁徙生长）与蜡样芽孢杆菌的形态差异</desc>
<defs>
  <clipPath id="plate"><circle cx="100" cy="150" r="63"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">营养琼脂</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">基础培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">只供营养，不选择也不鉴别 → 一般细菌都长，靠颜色分不出菌</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视图 ===== -->
<text x="100" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#33404f">营养琼脂平板（俯视）</text>
<circle cx="100" cy="150" r="66" fill="none" stroke="#c3c8cf" stroke-width="2"/>
<circle cx="100" cy="150" r="63" fill="#e9dcb0" stroke="#c9b884" stroke-width="1.2"/>

<g clip-path="url(#plate)">
  <!-- ❸ 奇异变形杆菌：同心波纹迁徙生长，覆盖大片琼脂 -->
  <g fill="none" stroke="#cfc6a6" stroke-width="1.6">
    <circle cx="74" cy="180" r="12"/><circle cx="74" cy="180" r="20"/><circle cx="74" cy="180" r="28"/><circle cx="74" cy="180" r="36"/>
  </g>
  <circle cx="74" cy="180" r="5" fill="#ded2ac" stroke="#c2b78f" stroke-width="1"/>
  <!-- ❹ 蜡样芽孢杆菌：大而粗糙、边缘不齐的毛玻璃样菌落 -->
  <path d="M133,158 q10,-7 18,0 q9,4 5,13 q2,10 -8,12 q-9,6 -17,-2 q-10,-1 -10,-11 q-3,-9 12,-12 z"
        fill="#ebe6d4" stroke="#b3ab90" stroke-width="1.2" stroke-dasharray="3,2"/>
</g>

<!-- ❶ 大肠埃希菌：灰白、湿润、光滑 -->
<g fill="#f4f2e9" stroke="#d3ccb4" stroke-width="1">
  <circle cx="78" cy="124" r="5"/><circle cx="91" cy="134" r="4.4"/><circle cx="67" cy="139" r="3.8"/>
</g>
<!-- ❷ 金黄色葡萄球菌：乳白至淡金黄、圆凸、不透明 -->
<g fill="#eddcae" stroke="#c9b57e" stroke-width="1">
  <circle cx="124" cy="123" r="5.4"/><circle cx="136" cy="134" r="4.6"/><circle cx="115" cy="111" r="4"/>
</g>

<!-- 平板上的编号 -->
<g fill="#1f2733" stroke="#ffffff" stroke-width="2">
  <circle cx="56" cy="112" r="7.5"/><circle cx="142" cy="108" r="7.5"/><circle cx="55" cy="192" r="7.5"/><circle cx="145" cy="190" r="7.5"/>
</g>
<g fill="#ffffff" font-size="10" font-weight="700" text-anchor="middle">
  <text x="56" y="115.5">1</text><text x="142" y="111.5">2</text><text x="55" y="195.5">3</text><text x="145" y="193.5">4</text>
</g>
<text x="100" y="230" text-anchor="middle" font-size="9.5" fill="#8a7f5e">琼脂本身淡琥珀色、半透明</text>

<!-- ===== 右：菌落图例 ===== -->
<circle cx="188" cy="96.5" r="7.5" fill="#1f2733"/>
<text x="188" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<circle cx="206" cy="96.5" r="5.4" fill="#f4f2e9" stroke="#d3ccb4"/>
<text x="218" y="93" font-size="10" font-weight="700" fill="#33404f">大肠埃希菌</text>
<text x="218" y="106" font-size="9.5" fill="#5c6672">灰白、湿润、光滑、中等大小</text>

<circle cx="188" cy="122.5" r="7.5" fill="#1f2733"/>
<text x="188" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<circle cx="206" cy="122.5" r="5.4" fill="#eddcae" stroke="#c9b57e"/>
<text x="218" y="119" font-size="10" font-weight="700" fill="#33404f">金黄色葡萄球菌</text>
<text x="218" y="132" font-size="9.5" fill="#5c6672">乳白至淡金黄（色素需 24–48 h）、圆凸不透明</text>

<circle cx="188" cy="148.5" r="7.5" fill="#1f2733"/>
<text x="188" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<g fill="none" stroke="#c2b78f" stroke-width="1.1"><circle cx="206" cy="148.5" r="2.4"/><circle cx="206" cy="148.5" r="5"/></g>
<text x="218" y="145" font-size="10" font-weight="700" fill="#33404f">奇异变形杆菌</text>
<text x="218" y="158" font-size="9.5" fill="#5c6672">无色薄膜、同心波纹向外迁徙</text>

<circle cx="188" cy="174.5" r="7.5" fill="#1f2733"/>
<text x="188" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">4</text>
<circle cx="206" cy="174.5" r="5.4" fill="#ebe6d4" stroke="#b3ab90" stroke-dasharray="2.5,1.8"/>
<text x="218" y="171" font-size="10" font-weight="700" fill="#33404f">蜡样芽孢杆菌</text>
<text x="218" y="184" font-size="9.5" fill="#5c6672">大、粗糙毛玻璃样、边缘不整齐</text>

<!-- ===== 右下：选择成分 / 鉴别成分 ===== -->
<rect x="178" y="192" width="278" height="52" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="188" y="208" font-size="9.5" fill="#33404f"><tspan font-weight="700">选择成分</tspan>　无抑菌剂 → 阳性/阴性的一般细菌均生长</text>
<text x="188" y="224" font-size="9.5" fill="#33404f"><tspan font-weight="700">鉴别成分</tspan>　无糖与指示剂 → 颜色不指示代谢</text>
<text x="188" y="239" font-size="9.5" fill="#a3332f">注意：变形杆菌迁徙可覆满平板，掩盖他菌</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">苛养菌长不好、菌落又一个样 → 须转血/巧克力或选择性平板</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　大肠埃希菌 · 金黄色葡萄球菌 · 奇异变形杆菌 · 蜡样芽孢杆菌</text>
</svg>
