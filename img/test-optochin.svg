<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">Optochin 试验（血平板）</text>

  <!-- 敏感=肺炎链球菌 -->
  <circle cx="138" cy="166" r="92" fill="#e0c2c2" stroke="#c49a9a" stroke-width="2.5"/>
  <circle cx="138" cy="166" r="58" fill="#f3e6e6" stroke="#c9b0b0" stroke-dasharray="4 3"/>
  <circle cx="138" cy="166" r="14" fill="#fff" stroke="#b0b4bb"/><text x="138" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#454b54">P</text>
  <text x="138" y="278" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f7a52">敏感（圈 ≥14mm）</text>
  <text x="138" y="296" text-anchor="middle" font-size="10.5" fill="#8a8f98">→ 肺炎链球菌</text>

  <!-- 耐药=草绿色链球菌 -->
  <circle cx="346" cy="166" r="92" fill="#e0c2c2" stroke="#c49a9a" stroke-width="2.5"/>
  <circle cx="346" cy="166" r="14" fill="#fff" stroke="#b0b4bb"/><text x="346" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#454b54">P</text>
  <text x="346" y="278" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b04242">耐药（无/小圈）</text>
  <text x="346" y="296" text-anchor="middle" font-size="10.5" fill="#8a8f98">→ 草绿色链球菌</text>
</svg>
