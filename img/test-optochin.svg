<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>Optochin 试验（血平板）</title><desc>P 纸片（盐酸乙基氢化羟基奎宁）抑菌圈判读</desc>
  <defs>
    <radialGradient id="bap" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#e7cfcf"/>
      <stop offset="100%" stop-color="#e0c2c2"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">Optochin 试验（血平板）</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#565b63">P 纸片（盐酸乙基氢化羟基奎宁）抑菌圈判读</text>

  <!-- 敏感 = 肺炎链球菌 -->
  <g>
    <circle cx="138" cy="160" r="92" fill="url(#bap)" stroke="#c9a49f" stroke-width="2.5"/>
    <!-- 抑菌圈（清亮区） -->
    <circle cx="138" cy="160" r="58" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="1.2" stroke-dasharray="5 3"/>
    <!-- P 纸片 -->
    <circle cx="138" cy="160" r="14" fill="#e6ecf4" stroke="#5a80b0" stroke-width="1.3"/>
    <text x="138" y="164.5" text-anchor="middle" font-size="12" font-weight="700" fill="#5a80b0">P</text>
    <!-- 抑菌圈直径标注 -->
    <line x1="80" y1="160" x2="196" y2="160" stroke="#565b63" stroke-width="1" stroke-dasharray="2 2" opacity="0.55"/>
    <line x1="80" y1="156" x2="80" y2="164" stroke="#565b63" stroke-width="1" opacity="0.55"/>
    <line x1="196" y1="156" x2="196" y2="164" stroke="#565b63" stroke-width="1" opacity="0.55"/>
    <text x="138" y="124" text-anchor="middle" font-size="11" fill="#565b63">清亮抑菌圈</text>
  </g>
  <text x="138" y="276" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f7a52">敏感（抑菌圈 ≥ 14 mm）</text>
  <text x="138" y="293" text-anchor="middle" font-size="11" fill="#565b63">肺炎链球菌</text>

  <!-- 耐药 = 草绿色链球菌 -->
  <g>
    <circle cx="346" cy="160" r="92" fill="url(#bap)" stroke="#c9a49f" stroke-width="2.5"/>
    <!-- 菌苔密布至纸片边缘（无清亮区） -->
    <circle cx="346" cy="160" r="14" fill="#e6ecf4" stroke="#5a80b0" stroke-width="1.3"/>
    <text x="346" y="164.5" text-anchor="middle" font-size="12" font-weight="700" fill="#5a80b0">P</text>
    <text x="346" y="124" text-anchor="middle" font-size="11" fill="#565b63">菌苔布满，无清亮区</text>
  </g>
  <text x="346" y="276" text-anchor="middle" font-size="12.5" font-weight="700" fill="#c46a62">耐药（无圈 / 圈 &lt; 14 mm）</text>
  <text x="346" y="293" text-anchor="middle" font-size="11" fill="#565b63">草绿色链球菌</text>
</svg>
