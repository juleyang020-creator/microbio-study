<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>多烯类（抗真菌）</title><desc>两性霉素B结合麦角固醇并寡聚成跨膜孔道，K⁺等离子外漏致真菌死亡；对麦角固醇亲和力高于胆固醇（选择性有限，肾毒性）</desc>
<defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#3a6f8c"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">多烯类（抗真菌）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">抗真菌机制 2/4</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">直接结合膜麦角固醇，聚集成孔 → 膜通透性剧增</text>
<line x1="24" y1="56" x2="456" y2="56" stroke="#e3e7ec"/>

<!-- 多烯类标签 -->
<rect x="76" y="80" width="56" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="104" y="91" text-anchor="middle" font-size="9.5" fill="#a3332f">多烯类</text>
<line x1="112" y1="95" x2="206" y2="122" stroke="#c2413d" stroke-width="1.3"/>

<!-- ===== 真菌细胞膜（含麦角固醇）===== -->
<text x="250" y="108" font-size="9.5" fill="#8a6d2f">真菌细胞膜（含麦角固醇）</text>
<rect x="60" y="120" width="360" height="30" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="66" cy="120" r="2.4"/><circle cx="78" cy="120" r="2.4"/><circle cx="90" cy="120" r="2.4"/><circle cx="102" cy="120" r="2.4"/><circle cx="114" cy="120" r="2.4"/><circle cx="126" cy="120" r="2.4"/><circle cx="138" cy="120" r="2.4"/><circle cx="150" cy="120" r="2.4"/><circle cx="162" cy="120" r="2.4"/><circle cx="174" cy="120" r="2.4"/><circle cx="186" cy="120" r="2.4"/><circle cx="198" cy="120" r="2.4"/><circle cx="210" cy="120" r="2.4"/><circle cx="222" cy="120" r="2.4"/><circle cx="234" cy="120" r="2.4"/><circle cx="246" cy="120" r="2.4"/><circle cx="258" cy="120" r="2.4"/><circle cx="270" cy="120" r="2.4"/><circle cx="282" cy="120" r="2.4"/><circle cx="294" cy="120" r="2.4"/><circle cx="306" cy="120" r="2.4"/><circle cx="318" cy="120" r="2.4"/><circle cx="330" cy="120" r="2.4"/><circle cx="342" cy="120" r="2.4"/><circle cx="354" cy="120" r="2.4"/><circle cx="366" cy="120" r="2.4"/><circle cx="378" cy="120" r="2.4"/><circle cx="390" cy="120" r="2.4"/><circle cx="402" cy="120" r="2.4"/><circle cx="414" cy="120" r="2.4"/>
  <circle cx="66" cy="150" r="2.4"/><circle cx="78" cy="150" r="2.4"/><circle cx="90" cy="150" r="2.4"/><circle cx="102" cy="150" r="2.4"/><circle cx="114" cy="150" r="2.4"/><circle cx="126" cy="150" r="2.4"/><circle cx="138" cy="150" r="2.4"/><circle cx="150" cy="150" r="2.4"/><circle cx="162" cy="150" r="2.4"/><circle cx="174" cy="150" r="2.4"/><circle cx="186" cy="150" r="2.4"/><circle cx="198" cy="150" r="2.4"/><circle cx="210" cy="150" r="2.4"/><circle cx="222" cy="150" r="2.4"/><circle cx="234" cy="150" r="2.4"/><circle cx="246" cy="150" r="2.4"/><circle cx="258" cy="150" r="2.4"/><circle cx="270" cy="150" r="2.4"/><circle cx="282" cy="150" r="2.4"/><circle cx="294" cy="150" r="2.4"/><circle cx="306" cy="150" r="2.4"/><circle cx="318" cy="150" r="2.4"/><circle cx="330" cy="150" r="2.4"/><circle cx="342" cy="150" r="2.4"/><circle cx="354" cy="150" r="2.4"/><circle cx="366" cy="150" r="2.4"/><circle cx="378" cy="150" r="2.4"/><circle cx="390" cy="150" r="2.4"/><circle cx="402" cy="150" r="2.4"/><circle cx="414" cy="150" r="2.4"/>
</g>
<!-- 孔道内腔 -->
<rect x="228" y="118" width="24" height="34" fill="#ffffff" opacity="0.9"/>
<!-- 游离麦角固醇 -->
<g fill="#4e8d5b"><ellipse cx="105" cy="135" rx="3" ry="8"/><ellipse cx="150" cy="135" rx="3" ry="8"/><ellipse cx="330" cy="135" rx="3" ry="8"/><ellipse cx="375" cy="135" rx="3" ry="8"/></g>
<!-- 药物-固醇孔道：两列药杆 -->
<g fill="#c2413d">
  <rect x="212" y="117" width="7" height="36" rx="3.5"/><rect x="221" y="117" width="7" height="36" rx="3.5"/>
  <rect x="252" y="117" width="7" height="36" rx="3.5"/><rect x="261" y="117" width="7" height="36" rx="3.5"/>
</g>
<!-- 参与成孔的固醇 -->
<g fill="#4e8d5b"><ellipse cx="206" cy="135" rx="3" ry="8"/><ellipse cx="272" cy="135" rx="3" ry="8"/></g>
<text x="240" y="172" text-anchor="middle" font-size="9.5" fill="#1f2733">药物-固醇孔道</text>

<!-- 离子外漏 -->
<g stroke="#3a6f8c" stroke-width="1.4" fill="none">
  <line x1="234" y1="154" x2="228" y2="188" marker-end="url(#arr)"/>
  <line x1="246" y1="154" x2="252" y2="188" marker-end="url(#arr)"/>
</g>
<text x="240" y="202" text-anchor="middle" font-size="9.5" fill="#3a6f8c">K⁺ / Mg²⁺ 等离子外漏</text>

<!-- 选择性说明 -->
<text x="240" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">对麦角固醇亲和力 ＞ 胆固醇 → 有选择性，但仍可损伤肾小管（肾毒性）</text>

<!-- 结局 -->
<text x="240" y="252" text-anchor="middle" font-size="12" fill="#3f444b">跨膜孔道 → 胞内离子/物质外漏 → 杀真菌</text>

<!-- 页脚：代表药 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">代表药</tspan>　两性霉素 B（含脂质体制剂）｜制霉菌素（毒性大，仅局部用）</text>
</svg>
