<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">抗真菌 · 多烯类（结合麦角固醇成孔）</text>

  <!-- 脂质双层 -->
  <g fill="#0f766e">
    <circle cx="40" cy="112" r="6"/><circle cx="66" cy="112" r="6"/><circle cx="92" cy="112" r="6"/><circle cx="118" cy="112" r="6"/>
    <circle cx="250" cy="112" r="6"/><circle cx="276" cy="112" r="6"/><circle cx="302" cy="112" r="6"/><circle cx="328" cy="112" r="6"/><circle cx="354" cy="112" r="6"/>
    <circle cx="40" cy="156" r="6"/><circle cx="66" cy="156" r="6"/><circle cx="92" cy="156" r="6"/><circle cx="118" cy="156" r="6"/>
    <circle cx="250" cy="156" r="6"/><circle cx="276" cy="156" r="6"/><circle cx="302" cy="156" r="6"/><circle cx="328" cy="156" r="6"/><circle cx="354" cy="156" r="6"/>
  </g>
  <!-- 麦角固醇(橙) -->
  <circle cx="144" cy="112" r="6" fill="#f59e0b"/><circle cx="144" cy="156" r="6" fill="#f59e0b"/>
  <circle cx="224" cy="112" r="6" fill="#f59e0b"/><circle cx="224" cy="156" r="6" fill="#f59e0b"/>
  <text x="40" y="186" font-size="10" fill="#475569">真菌细胞膜（含</text>
  <text x="126" y="186" font-size="10" fill="#b45309">麦角固醇</text>
  <text x="170" y="186" font-size="10" fill="#475569">）</text>

  <!-- 药物结合成孔 -->
  <rect x="168" y="98" width="40" height="72" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-dasharray="4 3"/>
  <text x="188" y="138" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>
  <line x1="188" y1="96" x2="188" y2="74" stroke="#dc2626" stroke-width="2"/>
  <polygon points="188,72 184,80 192,80" fill="#dc2626"/>
  <text x="238" y="78" text-anchor="middle" font-size="9.5" fill="#b91c1c">K⁺ / 内容物外漏</text>

  <rect x="250" y="186" width="160" height="40" rx="9" fill="#fff" stroke="#dc2626"/>
  <text x="330" y="203" text-anchor="middle" font-size="10.5" fill="#b91c1c" font-weight="600">两性霉素B（多烯类）</text>
  <text x="330" y="218" text-anchor="middle" font-size="10" fill="#b91c1c">结合麦角固醇、形成孔道</text>

  <text x="120" y="214" text-anchor="middle" font-size="11" fill="#334155">膜通透性破坏 → 死亡</text>
</svg>
