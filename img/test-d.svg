<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>D 试验（红霉素诱导克林霉素耐药）</title><desc>红霉素纸片(E)与克林霉素纸片(DA)相邻放置，边缘相距 15–26 mm；红霉素扩散诱导 erm 编码的 23S rRNA 甲基化酶表达，使克林霉素抑菌圈朝红霉素一侧被压平呈 D 形，即阳性（诱导型 MLSB），克林霉素须报耐药；克林霉素圈内出现模糊生长即使未压平呈 D 也判为阳性；抑菌圈完整圆形且圈内清亮为阴性（MS 表型），可按敏感报告。孵育 35 ℃±2 ℃ 空气 16–18 h（链球菌 5% CO₂ 20–24 h）后读取</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#c2413d"/></marker>
  <marker id="dimS" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M8,0 L0,4 L8,8 z" fill="#5c6672"/></marker>
  <marker id="dimE" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5c6672"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">D 试验（红霉素诱导克林霉素耐药）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">耐药表型检测</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">红霉素诱导 erm 甲基化酶 → 克林霉素抑菌圈朝 E 侧压平呈 D 形</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===================== ❶ 阳性平板 ===================== -->
<circle cx="60" cy="72" r="7.5" fill="#1f2733"/>
<text x="60" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="72" y="76" font-size="10" font-weight="700" fill="#33404f">阳性（诱导型耐药）</text>

<!-- 平板 + 菌苔 -->
<circle cx="128" cy="152" r="72" fill="#eef1f5" stroke="#c9d1da" stroke-width="2"/>
<circle cx="128" cy="152" r="66" fill="none" stroke="#dde3ea"/>

<!-- 克林霉素抑菌圈：朝 E 一侧被压平 → D 形 -->
<path d="M136,122.1 A36,36 0 1 1 136,181.9 Z" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="4,3"/>
<!-- 红霉素抑菌圈：菌对红霉素耐药，圈很小 -->
<circle cx="100" cy="152" r="16" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="4,3"/>

<!-- 压平的直边（教学重点） -->
<line x1="136" y1="122.1" x2="136" y2="181.9" stroke="#c2413d" stroke-width="2"/>

<!-- 诱导箭头：红霉素向 DA 侧扩散 -->
<path d="M112,136 Q124,120 134,128" fill="none" stroke="#c2413d" stroke-width="1.4" stroke-dasharray="3,2" marker-end="url(#arr)"/>
<text x="128" y="104" text-anchor="middle" font-size="9.5" fill="#a3332f">红霉素扩散 → 诱导 erm</text>

<!-- 纸片 -->
<circle cx="100" cy="152" r="9" fill="#f9e6e4" stroke="#c2413d"/>
<text x="100" y="155.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a3332f">E</text>
<circle cx="156" cy="152" r="9" fill="#f9e6e4" stroke="#c2413d"/>
<text x="156" y="155.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a3332f">DA</text>

<!-- 纸片间距 -->
<line x1="109" y1="200" x2="147" y2="200" stroke="#5c6672" marker-start="url(#dimS)" marker-end="url(#dimE)"/>
<line x1="109" y1="163" x2="109" y2="200" stroke="#b9c2cc" stroke-dasharray="2,3"/>
<line x1="147" y1="163" x2="147" y2="200" stroke="#b9c2cc" stroke-dasharray="2,3"/>
<text x="128" y="214" text-anchor="middle" font-size="9.5" fill="#5c6672">间距 葡球 15–26 · 链球 12 mm</text>

<text x="128" y="237" text-anchor="middle" font-size="9.5" fill="#a3332f">DA 圈压平呈 D 或圈内模糊 = 阳性</text>
<text x="128" y="249" text-anchor="middle" font-size="9.5" fill="#33404f">诱导型 MLSB，克林霉素报耐药</text>

<!-- ===================== 图例 ===================== -->
<text x="240" y="116" text-anchor="middle" font-size="9.5" fill="#a3332f">E＝红霉素</text>
<text x="240" y="132" text-anchor="middle" font-size="9.5" fill="#a3332f">DA＝克林霉素</text>
<rect x="212" y="145" width="13" height="10" fill="#eef1f5" stroke="#c9d1da"/>
<text x="230" y="153.5" font-size="9.5" fill="#5c6672">菌苔</text>
<rect x="212" y="165" width="13" height="10" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
<text x="230" y="173.5" font-size="9.5" fill="#5c6672">抑菌圈</text>

<!-- ===================== ❷ 阴性平板 ===================== -->
<circle cx="286" cy="72" r="7.5" fill="#1f2733"/>
<text x="286" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="298" y="76" font-size="10" font-weight="700" fill="#33404f">阴性（非诱导型）</text>

<circle cx="352" cy="152" r="72" fill="#eef1f5" stroke="#c9d1da" stroke-width="2"/>
<circle cx="352" cy="152" r="66" fill="none" stroke="#dde3ea"/>

<circle cx="380" cy="152" r="36" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="4,3"/>
<circle cx="324" cy="152" r="16" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="4,3"/>

<circle cx="324" cy="152" r="9" fill="#f9e6e4" stroke="#c2413d"/>
<text x="324" y="155.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a3332f">E</text>
<circle cx="380" cy="152" r="9" fill="#f9e6e4" stroke="#c2413d"/>
<text x="380" y="155.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a3332f">DA</text>

<text x="352" y="104" text-anchor="middle" font-size="9.5" fill="#5c6672">无诱导，圈缘不变形</text>
<text x="352" y="214" text-anchor="middle" font-size="9.5" fill="#5c6672">35 ℃ 16–18 h 读（链球 CO₂ 20–24 h）</text>
<text x="352" y="237" text-anchor="middle" font-size="9.5" fill="#33404f">DA 圈完整圆形且圈内清亮 = 阴性</text>
<text x="352" y="249" text-anchor="middle" font-size="9.5" fill="#5c6672">MS 表型，克林霉素可按敏感报告</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">阳性即诱导型 MLSB：克林霉素须报耐药、不可单用</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　葡萄球菌、β 溶血链球菌凡 E 耐药而 DA 敏感者必做；否则可能漏检治疗中出现的耐药</text>
</svg>
