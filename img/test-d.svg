<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">D 试验（诱导型克林霉素耐药）</text>

  <!-- 平板 -->
  <circle cx="180" cy="162" r="110" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <!-- 克林霉素侧 D 形抑菌圈（红霉素侧被压平）-->
  <path d="M196,128 A46,46 0 1 1 196,196 Z" fill="#fbfaf8" stroke="#c9c3b6" stroke-dasharray="4 3"/>
  <!-- 红霉素侧小抑菌圈（耐药）-->
  <circle cx="150" cy="162" r="24" fill="#fbfaf8" stroke="#c9c3b6" stroke-dasharray="4 3"/>
  <!-- 纸片 -->
  <circle cx="150" cy="162" r="15" fill="#fff" stroke="#b0b4bb"/><text x="150" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#454b54">E</text>
  <circle cx="232" cy="162" r="15" fill="#fff" stroke="#b0b4bb"/><text x="232" y="166" text-anchor="middle" font-size="10" font-weight="700" fill="#454b54">DA</text>
  <!-- 压平边指示 -->
  <line x1="200" y1="124" x2="200" y2="200" stroke="#b04242" stroke-width="1.5" stroke-dasharray="3 2"/>

  <text x="312" y="120" font-size="12" fill="#454b54">E　红霉素</text>
  <text x="312" y="142" font-size="12" fill="#454b54">DA　克林霉素</text>
  <text x="312" y="176" font-size="11.5" fill="#b04242">红霉素侧抑菌圈被压平</text>
  <text x="312" y="194" font-size="13" font-weight="700" fill="#b04242">呈 "D" 形 = 阳性</text>
  <text x="312" y="212" font-size="11" fill="#8a8f98">诱导型克林霉素耐药</text>

  <text x="240" y="288" text-anchor="middle" font-size="12.5" fill="#454b54">阳性：即使体外克林霉素"敏感"也应报告耐药、不可单用</text>
</svg>
