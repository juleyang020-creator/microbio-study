<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>D 试验（诱导型克林霉素耐药）</title><desc>红霉素(E)诱导克林霉素(DA)耐药</desc>
  <defs>
    <radialGradient id="dishHL" cx="40%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#f6f2ea"/>
      <stop offset="100%" stop-color="#efe9de"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">D 试验（诱导型克林霉素耐药）</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#77797e">红霉素(E)诱导克林霉素(DA)耐药</text>

  <!-- 琼脂平板 -->
  <circle cx="178" cy="172" r="108" fill="url(#dishHL)" stroke="#cbc1a8" stroke-width="2.5"/>
  <circle cx="178" cy="172" r="101" fill="none" stroke="#d9d1bd" stroke-width="1"/>

  <!-- 克林霉素(DA)侧抑菌圈：朝向红霉素的一侧被诱导压平 -> "D" 形 -->
  <!-- 圆形主体在右(DA)，左缘(朝向 E)被压平为直边 -->
  <path d="M210,128 A48,48 0 1 1 210,224 L210,128 Z" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- 红霉素(E)侧抑菌圈：菌对红霉素耐药，圈较小 -->
  <circle cx="138" cy="172" r="23" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- 纸片 E -->
  <circle cx="138" cy="172" r="15" fill="#ffffff" stroke="#5a80b0" stroke-width="1.2"/>
  <text x="138" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#5a80b0">E</text>
  <!-- 纸片 DA -->
  <circle cx="234" cy="172" r="15" fill="#ffffff" stroke="#5a80b0" stroke-width="1.2"/>
  <text x="234" y="176" text-anchor="middle" font-size="11" font-weight="700" fill="#5a80b0">DA</text>

  <!-- 压平直边指示 -->
  <line x1="210" y1="130" x2="210" y2="214" stroke="#c46a62" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="210" y="252" text-anchor="middle" font-size="11" fill="#c46a62">压平的直边</text>

  <!-- 右侧说明 -->
  <text x="312" y="118" font-size="12" fill="#565b63"><tspan font-weight="700" fill="#5a80b0">E</tspan>　红霉素</text>
  <text x="312" y="140" font-size="12" fill="#565b63"><tspan font-weight="700" fill="#5a80b0">DA</tspan>　克林霉素</text>

  <line x1="312" y1="154" x2="452" y2="154" stroke="#d9d1bd" stroke-width="1"/>

  <text x="312" y="176" font-size="11.5" fill="#c46a62">DA 圈朝 E 一侧被压平</text>
  <text x="312" y="196" font-size="13" font-weight="700" fill="#c46a62">呈 “D” 形 = 阳性</text>
  <text x="312" y="214" font-size="11" fill="#77797e">诱导型克林霉素耐药</text>

  <!-- 底部结论 -->
  <text x="240" y="290" text-anchor="middle" font-size="12.5" fill="#565b63">阳性时即使体外克林霉素“敏感”也按耐药报告，不可单用</text>
</svg>
