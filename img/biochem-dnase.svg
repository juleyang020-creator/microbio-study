<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>耐热核酸酶(DNase)试验</title><desc>DNase 琼脂含 DNA 与甲苯胺蓝，培养基呈蓝色；产核酸酶的菌落将 DNA 解聚，染料与解聚产物结合发生异染而显玫瑰粉红，菌落周围出现粉红色晕环即 DNase 阳性；须将菌落煮沸 15 分钟后仍阳性，才判为耐热核酸酶，高度提示金黄色葡萄球菌</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">耐热核酸酶(DNase)试验</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生化试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">DNA 被解聚 → 甲苯胺蓝异染由蓝变粉（菌落周围粉红晕）</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>
<line x1="172" y1="66" x2="172" y2="220" stroke="#e3e7ec" stroke-dasharray="4,4"/>
<line x1="308" y1="66" x2="308" y2="220" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== 左：阴性对照平板 ===== -->
<text x="110" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#5c6672">阴性对照</text>
<circle cx="110" cy="140" r="58" fill="#7d95c6" stroke="#4f6fa0" stroke-width="2"/>
<circle cx="110" cy="140" r="52" fill="none" stroke="#93a8d2" stroke-width="1"/>
<g fill="#f3efe4" stroke="#cfc6ae" stroke-width="1">
  <circle cx="110" cy="112" r="7.5"/><circle cx="86" cy="164" r="7.5"/><circle cx="136" cy="162" r="7.5"/>
</g>
<text x="110" y="212" text-anchor="middle" font-size="9.5" fill="#33404f">菌落周围仍为蓝色</text>
<text x="110" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">不产 DNase（−）</text>

<!-- ===== 中：化学转化 ===== -->
<text x="240" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#5c6672">DNase 琼脂 · 甲苯胺蓝</text>
<rect x="178" y="88" width="124" height="30" rx="6" fill="#dfe6f5" stroke="#7d93bd"/>
<text x="240" y="102" text-anchor="middle" font-size="9.5" fill="#1f2733">DNA–甲苯胺蓝复合物</text>
<text x="240" y="114" text-anchor="middle" font-size="9.5" fill="#3f5a8f">培养基呈蓝色</text>
<line x1="240" y1="118" x2="240" y2="124" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<rect x="178" y="126" width="124" height="26" rx="6" fill="#e3edf8" stroke="#2b6cb0"/>
<text x="240" y="138" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1f4e79">胞外 DNase 水解 DNA</text>
<text x="240" y="149" text-anchor="middle" font-size="9.5" fill="#1f4e79">金葡菌为耐热型 (nuc)</text>
<line x1="240" y1="152" x2="240" y2="160" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<rect x="178" y="162" width="124" height="32" rx="6" fill="#fadfe8" stroke="#d48aa4"/>
<text x="240" y="176" text-anchor="middle" font-size="9.5" fill="#1f2733">DNA 解聚为寡核苷酸</text>
<text x="240" y="188" text-anchor="middle" font-size="9.5" fill="#b04a70">染料与解聚产物异染显粉红</text>
<text x="240" y="208" text-anchor="middle" font-size="9.5" fill="#5c6672">35 ℃ 孵育 24 h 判读</text>

<!-- ===== 右：阳性平板 ===== -->
<text x="370" y="76" text-anchor="middle" font-size="10" font-weight="700" fill="#a3332f">阳性</text>
<circle cx="370" cy="140" r="58" fill="#7d95c6" stroke="#4f6fa0" stroke-width="2"/>
<circle cx="370" cy="140" r="52" fill="none" stroke="#93a8d2" stroke-width="1"/>
<g fill="#e58aa8">
  <circle cx="370" cy="112" r="20"/><circle cx="346" cy="164" r="20"/><circle cx="396" cy="162" r="20"/>
</g>
<g fill="#f3efe4" stroke="#cfc6ae" stroke-width="1">
  <circle cx="370" cy="112" r="7.5"/><circle cx="346" cy="164" r="7.5"/><circle cx="396" cy="162" r="7.5"/>
</g>
<text x="370" y="212" text-anchor="middle" font-size="9.5" fill="#a3332f">菌落周围粉红色晕环</text>
<text x="370" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">DNase（＋）</text>

<!-- ===== 确认法与陷阱 ===== -->
<rect x="24" y="228" width="432" height="26" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="34" y="239" font-size="9.5" fill="#33404f"><tspan font-weight="700">两级判读</tspan>　平板粉红晕＝DNase(+)；煮沸 15 min 后仍阳性才是耐热</text>
<text x="34" y="250" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#a3332f">陷阱</tspan>　部分凝固酶阴性葡萄球菌产热不稳定 DNase，煮沸后转阴</text>

<!-- 结论 -->
<text x="240" y="264" text-anchor="middle" font-size="11.5" fill="#33404f">粉红晕 = DNase(+)；耐热者高度提示金黄色葡萄球菌</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　阳性：金黄色葡萄球菌 · 黏质沙雷菌 · 卡他莫拉菌 ｜ 阴性：表皮葡萄球菌</text>
</svg>
