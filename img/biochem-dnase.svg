<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>耐热核酸酶 (DNase) 试验</title><desc>核酸酶水解 DNA，甲苯胺蓝平板上菌落周围出现粉红色透明环</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">耐热核酸酶 (DNase) 试验</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#565b63">核酸酶水解 DNA，甲苯胺蓝平板上菌落周围出现粉红色透明环</text>

  <!-- 阴性平板 -->
  <g>
    <circle cx="148" cy="158" r="76" fill="#6f8fc4" stroke="#4f6fa0" stroke-width="2.5"/>
    <rect x="138" y="118" width="20" height="80" rx="8" fill="#dfe6f2"/>
    <text x="148" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#565b63">阴性（无粉红环）</text>
  </g>

  <!-- 阳性平板 -->
  <g>
    <circle cx="332" cy="158" r="76" fill="#6f8fc4" stroke="#4f6fa0" stroke-width="2.5"/>
    <!-- 粉红水解环 -->
    <ellipse cx="332" cy="158" rx="44" ry="50" fill="#e08aa8"/>
    <rect x="322" y="118" width="20" height="80" rx="8" fill="#f2dde6"/>
    <text x="332" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#c46a62">阳性（粉红透明环）</text>
  </g>

  <text x="240" y="278" text-anchor="middle" font-size="11" fill="#565b63">金黄色葡萄球菌、黏质沙雷菌阳性；用于葡萄球菌与沙雷菌的辅助鉴定</text>
</svg>
