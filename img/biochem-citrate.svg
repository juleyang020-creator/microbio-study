<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>枸橼酸盐利用试验 (Citrate)</title><desc>以枸橼酸为唯一碳源，产碱使溴麝香草酚蓝由绿变蓝（Simmons 斜面）</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">枸橼酸盐利用试验 (Citrate)</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#565b63">以枸橼酸为唯一碳源，产碱使溴麝香草酚蓝由绿变蓝（Simmons 斜面）</text>

  <!-- 阴性管(绿) -->
  <g>
    <path d="M150,78 L150,238 Q150,256 168,256 Q186,256 186,238 L186,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="168" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M150,150 L186,120 L186,238 Q186,256 168,256 Q150,256 150,238 Z" fill="#3f9e5a"/>
    <text x="168" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#3f7a52">阴性（绿色）</text>
  </g>

  <!-- 阳性管(蓝) -->
  <g>
    <path d="M300,78 L300,238 Q300,256 318,256 Q336,256 336,238 L336,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="318" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M300,150 L336,120 L336,238 Q336,256 318,256 Q300,256 300,238 Z" fill="#2f6bb0"/>
    <text x="318" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#2f6bb0">阳性（深蓝）</text>
  </g>

  <g stroke="#565b63" stroke-width="1.4" fill="none">
    <line x1="210" y1="165" x2="280" y2="165" marker-end="url(#arr2)"/>
  </g>
  <defs><marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#565b63"/></marker></defs>
  <text x="245" y="158" text-anchor="middle" font-size="11" fill="#565b63">产碱</text>

  <text x="240" y="295" text-anchor="middle" font-size="11" fill="#565b63">克雷伯菌、产气肠杆菌、沙门菌（多数）阳性；大肠埃希菌、志贺菌阴性</text>
</svg>
