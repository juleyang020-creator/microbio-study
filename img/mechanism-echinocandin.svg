<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>棘白菌素类（抗真菌）</title><desc>非竞争性抑制β-1,3-葡聚糖合成酶（Fks1），真菌细胞壁葡聚糖缺损、渗透溶解；人体细胞无细胞壁故毒性低</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="blk" markerWidth="8" markerHeight="12" refX="6" refY="6" orient="auto"><line x1="6" y1="1" x2="6" y2="11" stroke="#c2413d" stroke-width="2.4"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">棘白菌素类（抗真菌）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">抗真菌机制 3/4</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">抑制真菌细胞壁主要成分 β-1,3-葡聚糖的合成</text>
<line x1="24" y1="56" x2="456" y2="56" stroke="#e3e7ec"/>

<!-- ===== 真菌细胞包被分层 ===== -->
<rect x="40" y="84" width="400" height="12" fill="#eef1f8" stroke="#c8d2e4" stroke-width="0.6"/>
<text x="44" y="93" font-size="9.5" fill="#5b7aa8">甘露糖蛋白层</text>
<rect x="40" y="96" width="400" height="26" fill="#e7dff2" stroke="#b9a8d8" stroke-width="0.6"/>
<text x="44" y="112" font-size="9.5" fill="#6e5a9e">β-1,3-葡聚糖层（细胞壁骨架）</text>
<rect x="40" y="122" width="400" height="8" fill="#f3e8d8"/>
<text x="436" y="129" text-anchor="end" font-size="9.5" fill="#8a6d2f">几丁质</text>
<!-- 细胞膜 -->
<rect x="40" y="130" width="400" height="22" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="46" cy="130" r="2.2"/><circle cx="58" cy="130" r="2.2"/><circle cx="70" cy="130" r="2.2"/><circle cx="82" cy="130" r="2.2"/><circle cx="94" cy="130" r="2.2"/><circle cx="106" cy="130" r="2.2"/><circle cx="118" cy="130" r="2.2"/><circle cx="130" cy="130" r="2.2"/><circle cx="142" cy="130" r="2.2"/><circle cx="154" cy="130" r="2.2"/><circle cx="166" cy="130" r="2.2"/><circle cx="178" cy="130" r="2.2"/><circle cx="190" cy="130" r="2.2"/><circle cx="202" cy="130" r="2.2"/><circle cx="214" cy="130" r="2.2"/><circle cx="226" cy="130" r="2.2"/><circle cx="238" cy="130" r="2.2"/><circle cx="250" cy="130" r="2.2"/><circle cx="262" cy="130" r="2.2"/><circle cx="274" cy="130" r="2.2"/><circle cx="286" cy="130" r="2.2"/><circle cx="298" cy="130" r="2.2"/><circle cx="310" cy="130" r="2.2"/><circle cx="322" cy="130" r="2.2"/><circle cx="334" cy="130" r="2.2"/><circle cx="346" cy="130" r="2.2"/><circle cx="358" cy="130" r="2.2"/><circle cx="370" cy="130" r="2.2"/><circle cx="382" cy="130" r="2.2"/><circle cx="394" cy="130" r="2.2"/><circle cx="406" cy="130" r="2.2"/><circle cx="418" cy="130" r="2.2"/><circle cx="430" cy="130" r="2.2"/>
  <circle cx="46" cy="152" r="2.2"/><circle cx="58" cy="152" r="2.2"/><circle cx="70" cy="152" r="2.2"/><circle cx="82" cy="152" r="2.2"/><circle cx="94" cy="152" r="2.2"/><circle cx="106" cy="152" r="2.2"/><circle cx="118" cy="152" r="2.2"/><circle cx="130" cy="152" r="2.2"/><circle cx="142" cy="152" r="2.2"/><circle cx="154" cy="152" r="2.2"/><circle cx="166" cy="152" r="2.2"/><circle cx="178" cy="152" r="2.2"/><circle cx="190" cy="152" r="2.2"/><circle cx="202" cy="152" r="2.2"/><circle cx="214" cy="152" r="2.2"/><circle cx="226" cy="152" r="2.2"/><circle cx="238" cy="152" r="2.2"/><circle cx="250" cy="152" r="2.2"/><circle cx="262" cy="152" r="2.2"/><circle cx="274" cy="152" r="2.2"/><circle cx="286" cy="152" r="2.2"/><circle cx="298" cy="152" r="2.2"/><circle cx="310" cy="152" r="2.2"/><circle cx="322" cy="152" r="2.2"/><circle cx="334" cy="152" r="2.2"/><circle cx="346" cy="152" r="2.2"/><circle cx="358" cy="152" r="2.2"/><circle cx="370" cy="152" r="2.2"/><circle cx="382" cy="152" r="2.2"/><circle cx="394" cy="152" r="2.2"/><circle cx="406" cy="152" r="2.2"/><circle cx="418" cy="152" r="2.2"/><circle cx="430" cy="152" r="2.2"/>
</g>
<text x="46" y="145" font-size="9.5" fill="#8a6d2f">细胞膜</text>

<!-- 葡聚糖合成酶 Fks1（跨膜） -->
<rect x="296" y="112" width="28" height="50" rx="9" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="310" y="176" text-anchor="middle" font-size="9.5" fill="#1f4e79">β-1,3-葡聚糖合成酶（Fks1）</text>
<!-- 新生葡聚糖链 -->
<g fill="#8570b3"><circle cx="304" cy="108" r="2.6"/><circle cx="312" cy="104" r="2.6"/><circle cx="304" cy="100" r="2.6"/><circle cx="312" cy="96" r="2.6"/></g>

<!-- 棘白菌素阻断 -->
<rect x="342" y="96" width="66" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="375" y="107" text-anchor="middle" font-size="9.5" fill="#a3332f">棘白菌素</text>
<line x1="350" y1="111" x2="326" y2="130" stroke="#c2413d" stroke-width="1.5" marker-end="url(#blk)"/>

<!-- 壁缺损 -->
<path d="M232,99 l14,8 l-10,7 l14,7" fill="none" stroke="#c2413d" stroke-width="2" stroke-linecap="round"/>
<path d="M282,98 l12,9 l-9,7 l13,7" fill="none" stroke="#c2413d" stroke-width="2" stroke-linecap="round"/>
<text x="222" y="84" text-anchor="middle" font-size="9.5" fill="#c2413d">葡聚糖缺损 → 壁强度下降</text>

<!-- 选择性说明 -->
<text x="240" y="206" text-anchor="middle" font-size="9.5" fill="#5c6672">人体细胞无细胞壁 → 毒性低；对念珠菌属杀菌，对曲霉属抑菌（作用于菌丝尖端）</text>

<!-- 结局 -->
<text x="240" y="240" text-anchor="middle" font-size="12" fill="#3f444b">β-1,3-葡聚糖合成停止 → 细胞壁缺损 → 渗透溶解</text>

<!-- 页脚：代表药 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">代表药</tspan>　卡泊芬净｜米卡芬净｜阿尼芬净（静脉用）</text>
</svg>
