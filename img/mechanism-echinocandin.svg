<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>棘白菌素类（抗真菌）</title><desc>抑制 β-1,3-葡聚糖合成酶，破坏真菌细胞壁。卡泊芬净/米卡芬净/阿尼芬净</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">棘白菌素类（抗真菌）</text>
<text x="240" y="44" font-size="12" fill="#77797e" text-anchor="middle">抑制 β-1,3-葡聚糖合成酶，破坏真菌细胞壁</text>
<rect x="60" y="76" width="360" height="26" fill="#e4dcc0" stroke="#c8b887"/> <text x="70" y="93" font-size="11" fill="#6e6b52" text-anchor="start">β-1,3-葡聚糖细胞壁</text>
 <rect x="60" y="152" width="360" height="18" fill="#efe6c6" stroke="#c8b887"/> <text x="70" y="165" font-size="11" fill="#6e6b52" text-anchor="start">细胞膜</text>
 <circle cx="232" cy="152" r="18" fill="#b79ac9" stroke="#9d7fb4" stroke-width="1.3"/> <text x="232" y="156" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">合成酶</text> <text x="232" y="192" font-size="11" fill="#2c3138" text-anchor="middle">β-1,3-葡聚糖合成酶</text>
 <g transform="translate(232,122) rotate(0) scale(0.85)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <line x1="232" y1="122" x2="232" y2="134" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <g stroke="#c6403a" stroke-width="3" stroke-linecap="round"><line x1="252" y1="100" x2="268" y2="116"/><line x1="252" y1="116" x2="268" y2="100"/></g>
 <g stroke="#c9b887" stroke-width="2" opacity="0.5"><line x1="120" y1="89" x2="150" y2="89"/><line x1="150" y1="76" x2="150" y2="102"/></g>
 <text x="240" y="214" font-size="12" fill="#3f444b" text-anchor="middle">细胞壁缺损 → 渗透不稳、真菌溶解</text>
<text x="240" y="288" font-size="13" fill="#3f444b" text-anchor="middle">卡泊芬净/米卡芬净/阿尼芬净</text>
</svg>