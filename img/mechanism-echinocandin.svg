<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <pattern id="ecBi" width="13" height="30" patternUnits="userSpaceOnUse">
      <circle cx="6.5" cy="6" r="4.4" fill="#cfe0db" stroke="#2e6b66" stroke-width="1"/>
      <line x1="4.8" y1="10.2" x2="4.8" y2="15" stroke="#2e6b66" stroke-width="0.9"/><line x1="8.2" y1="10.2" x2="8.2" y2="15" stroke="#2e6b66" stroke-width="0.9"/>
      <line x1="4.8" y1="15" x2="4.8" y2="19.8" stroke="#2e6b66" stroke-width="0.9"/><line x1="8.2" y1="15" x2="8.2" y2="19.8" stroke="#2e6b66" stroke-width="0.9"/>
      <circle cx="6.5" cy="24" r="4.4" fill="#cfe0db" stroke="#2e6b66" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">棘白菌素类：抑制 β-1,3-葡聚糖合成</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">阻断真菌细胞壁主骨架合成</text>

  <!-- 细胞壁分层 -->
  <rect x="40" y="64" width="400" height="14" rx="3" fill="#f3ead0" stroke="#cfcabd" stroke-width="1"/>
  <text x="46" y="74.5" font-size="9" fill="#6e571a">甘露糖蛋白</text>

  <rect x="40" y="84" width="400" height="46" rx="4" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.5"/>
  <g stroke="#2e6b66" stroke-width="1" opacity="0.4">
    <line x1="60" y1="84" x2="60" y2="130"/><line x1="100" y1="84" x2="100" y2="130"/><line x1="140" y1="84" x2="140" y2="130"/>
    <line x1="260" y1="84" x2="260" y2="130"/><line x1="300" y1="84" x2="300" y2="130"/><line x1="340" y1="84" x2="340" y2="130"/><line x1="380" y1="84" x2="380" y2="130"/><line x1="420" y1="84" x2="420" y2="130"/>
    <line x1="40" y1="107" x2="440" y2="107"/>
  </g>
  <text x="196" y="111" text-anchor="middle" font-size="11" font-weight="700" fill="#1f4a46">β-1,3 / β-1,6-葡聚糖</text>

  <rect x="40" y="134" width="400" height="12" rx="2" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1"/>
  <text x="46" y="143.5" font-size="9" fill="#1f4a46">几丁质</text>

  <!-- 细胞膜 + 合成酶 -->
  <rect x="40" y="150" width="400" height="30" fill="url(#ecBi)"/>
  <ellipse cx="170" cy="165" rx="24" ry="17" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.5"/>
  <text x="170" y="162" text-anchor="middle" font-size="7.5" font-weight="700" fill="#6e571a">葡聚糖</text>
  <text x="170" y="172" text-anchor="middle" font-size="7.5" font-weight="700" fill="#6e571a">合成酶</text>
  <!-- 被阻断的葡聚糖链（虚线表示无法合成） -->
  <path d="M158,150 q-4,-18 0,-34" fill="none" stroke="#2e6b66" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.55"/>
  <path d="M182,150 q4,-18 0,-34" fill="none" stroke="#2e6b66" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.55"/>
  <text x="180" y="216" text-anchor="middle" font-size="9.5" fill="#8a8f98">胞质</text>

  <!-- 棘白菌素阻断合成酶 -->
  <rect x="244" y="196" width="86" height="30" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.5"/>
  <text x="287" y="215" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">棘白菌素类</text>
  <path d="M244,205 C220,190 200,178 192,172" fill="none" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>
  <polygon points="192,172 201,174.5 196.5,181.5" fill="#345f86"/>
  <text x="170" y="147" text-anchor="middle" font-size="15" fill="#b04242" font-weight="700">✕</text>

  <!-- 缺陷区 -->
  <rect x="300" y="84" width="60" height="46" rx="3" fill="#fbfaf8" stroke="#c9c3b6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="330" y="110" text-anchor="middle" font-size="9" fill="#b04242">葡聚糖缺失</text>

  <text x="240" y="250" text-anchor="middle" font-size="12.5" fill="#454b54">哺乳动物无细胞壁，故选择性高</text>
  <text x="240" y="282" text-anchor="middle" font-size="12.5" font-weight="600" fill="#454b54">细胞壁骨架缺陷 → 渗透不稳定 → 真菌溶解</text>
</svg>
