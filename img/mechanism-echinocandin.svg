<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">抗真菌 · 棘白菌素类（抑制细胞壁）</text>

  <!-- 细胞壁（葡聚糖网格） -->
  <g stroke="#0f766e" fill="#ccfbf1">
    <rect x="40" y="92" width="28" height="18" rx="4"/>
    <rect x="76" y="92" width="28" height="18" rx="4"/>
    <rect x="112" y="92" width="28" height="18" rx="4"/>
    <rect x="148" y="92" width="28" height="18" rx="4"/>
    <rect x="40" y="150" width="28" height="18" rx="4"/>
    <rect x="76" y="150" width="28" height="18" rx="4"/>
    <rect x="112" y="150" width="28" height="18" rx="4"/>
    <rect x="148" y="150" width="28" height="18" rx="4"/>
  </g>
  <g stroke="#16a34a" stroke-width="3">
    <line x1="54" y1="110" x2="54" y2="150"/>
    <line x1="162" y1="110" x2="162" y2="150"/>
  </g>
  <text x="40" y="84" font-size="10.5" fill="#475569">细胞壁 β-(1,3)-D-葡聚糖</text>

  <!-- 合成酶被阻断 -->
  <line x1="108" y1="110" x2="108" y2="150" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="4 3"/>
  <circle cx="108" cy="130" r="12" fill="#fff" stroke="#0f766e" stroke-width="1.5"/>
  <text x="108" y="133" text-anchor="middle" font-size="7" fill="#0f766e">合成酶</text>
  <text x="108" y="150" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>

  <rect x="232" y="98" width="160" height="44" rx="9" fill="#fee2e2" stroke="#dc2626"/>
  <text x="312" y="116" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">卡泊芬净 / 米卡芬净</text>
  <text x="312" y="132" text-anchor="middle" font-size="9.5" fill="#b91c1c">抑制 β-(1,3)-D-葡聚糖合成酶</text>
  <line x1="232" y1="124" x2="122" y2="130" stroke="#dc2626" stroke-width="1.5"/>

  <text x="210" y="208" text-anchor="middle" font-size="11.5" fill="#334155">葡聚糖合成受阻 → 真菌细胞壁缺损</text>
</svg>
