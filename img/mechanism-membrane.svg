<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">破坏细胞膜</text>

  <!-- 脂质双层 -->
  <g>
    <g fill="#0f766e">
      <circle cx="44" cy="112" r="6"/><circle cx="70" cy="112" r="6"/><circle cx="96" cy="112" r="6"/><circle cx="122" cy="112" r="6"/><circle cx="148" cy="112" r="6"/>
      <circle cx="262" cy="112" r="6"/><circle cx="288" cy="112" r="6"/><circle cx="314" cy="112" r="6"/><circle cx="340" cy="112" r="6"/><circle cx="366" cy="112" r="6"/>
      <circle cx="44" cy="156" r="6"/><circle cx="70" cy="156" r="6"/><circle cx="96" cy="156" r="6"/><circle cx="122" cy="156" r="6"/><circle cx="148" cy="156" r="6"/>
      <circle cx="262" cy="156" r="6"/><circle cx="288" cy="156" r="6"/><circle cx="314" cy="156" r="6"/><circle cx="340" cy="156" r="6"/><circle cx="366" cy="156" r="6"/>
    </g>
    <g stroke="#5eead4" stroke-width="2">
      <line x1="44" y1="118" x2="44" y2="134"/><line x1="70" y1="118" x2="70" y2="134"/><line x1="96" y1="118" x2="96" y2="134"/><line x1="122" y1="118" x2="122" y2="134"/><line x1="148" y1="118" x2="148" y2="134"/>
      <line x1="262" y1="118" x2="262" y2="134"/><line x1="288" y1="118" x2="288" y2="134"/><line x1="314" y1="118" x2="314" y2="134"/><line x1="340" y1="118" x2="340" y2="134"/><line x1="366" y1="118" x2="366" y2="134"/>
      <line x1="44" y1="150" x2="44" y2="134"/><line x1="70" y1="150" x2="70" y2="134"/><line x1="96" y1="150" x2="96" y2="134"/><line x1="122" y1="150" x2="122" y2="134"/><line x1="148" y1="150" x2="148" y2="134"/>
      <line x1="262" y1="150" x2="262" y2="134"/><line x1="288" y1="150" x2="288" y2="134"/><line x1="314" y1="150" x2="314" y2="134"/><line x1="340" y1="150" x2="340" y2="134"/><line x1="366" y1="150" x2="366" y2="134"/>
    </g>
  </g>
  <text x="44" y="186" font-size="10.5" fill="#475569">细胞膜（脂质双层）</text>

  <!-- 药物插入形成孔道 -->
  <rect x="176" y="98" width="58" height="72" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-dasharray="4 3"/>
  <text x="205" y="138" text-anchor="middle" font-size="17" fill="#dc2626" font-weight="700">✕</text>
  <!-- 外漏箭头 -->
  <line x1="205" y1="96" x2="205" y2="74" stroke="#dc2626" stroke-width="2"/>
  <polygon points="205,72 201,80 209,80" fill="#dc2626"/>
  <text x="246" y="78" text-anchor="middle" font-size="9.5" fill="#b91c1c">K⁺ / 内容物外漏</text>

  <!-- 药物 -->
  <rect x="232" y="186" width="178" height="40" rx="9" fill="#fff" stroke="#dc2626"/>
  <text x="321" y="203" text-anchor="middle" font-size="10.5" fill="#b91c1c" font-weight="600">多黏菌素类（G⁻外膜）</text>
  <text x="321" y="218" text-anchor="middle" font-size="10.5" fill="#b91c1c">脂肽类·达托霉素（G⁺膜）</text>

  <text x="120" y="214" text-anchor="middle" font-size="11.5" fill="#334155">插入并破坏细胞膜 → 通透性改变 → 死亡</text>
</svg>
