<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <pattern id="mbBi" width="13" height="32" patternUnits="userSpaceOnUse">
      <circle cx="6.5" cy="6" r="4.7" fill="#99f6e4" stroke="#0f766e"/>
      <line x1="4.6" y1="10.5" x2="4.6" y2="16" stroke="#0f766e"/><line x1="8.4" y1="10.5" x2="8.4" y2="16" stroke="#0f766e"/>
      <line x1="4.6" y1="16" x2="4.6" y2="21.5" stroke="#0f766e"/><line x1="8.4" y1="16" x2="8.4" y2="21.5" stroke="#0f766e"/>
      <circle cx="6.5" cy="26" r="4.7" fill="#99f6e4" stroke="#0f766e"/>
    </pattern>
    <linearGradient id="mbDrug" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <filter id="mbSh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="480" height="300" fill="#f8fafc"/>
  <rect x="0" y="56" width="480" height="106" fill="#eff6ff" opacity="0.5"/>
  <rect x="0" y="194" width="480" height="80" fill="#f0fdfa" opacity="0.6"/>
  <text x="240" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#0f766e">破坏细胞膜</text>
  <text x="466" y="74" text-anchor="end" font-size="11" fill="#64748b">胞外</text>
  <text x="466" y="216" text-anchor="end" font-size="11" fill="#64748b">胞质</text>

  <!-- 磷脂双层 -->
  <rect x="0" y="162" width="480" height="32" fill="url(#mbBi)"/>

  <!-- 达托霉素插入成孔 + K+ 外流 -->
  <g filter="url(#mbSh)">
    <rect x="132" y="158" width="9" height="40" rx="4" fill="url(#mbDrug)"/>
    <rect x="146" y="158" width="9" height="40" rx="4" fill="url(#mbDrug)"/>
    <rect x="168" y="158" width="9" height="40" rx="4" fill="url(#mbDrug)"/>
    <rect x="182" y="158" width="9" height="40" rx="4" fill="url(#mbDrug)"/>
  </g>
  <circle cx="162" cy="214" r="8" fill="#fde047" stroke="#ca8a04"/><text x="162" y="217" text-anchor="middle" font-size="8" fill="#713f12">K⁺</text>
  <circle cx="162" cy="150" r="8" fill="#fde047" stroke="#ca8a04"/><text x="162" y="153" text-anchor="middle" font-size="8" fill="#713f12">K⁺</text>
  <circle cx="162" cy="116" r="8" fill="#fde047" stroke="#ca8a04"/><text x="162" y="119" text-anchor="middle" font-size="8" fill="#713f12">K⁺</text>
  <line x1="162" y1="206" x2="162" y2="126" stroke="#ca8a04" stroke-width="1.6" stroke-dasharray="4 3"/>
  <polygon points="162,108 156,120 168,120" fill="#ca8a04"/>
  <text x="162" y="250" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">达托霉素（钙依赖）</text>
  <text x="162" y="264" text-anchor="middle" font-size="9.5" fill="#334155">插入成孔 → 去极化 / K⁺ 外流</text>

  <!-- 多黏菌素结合 LPS 破坏外膜 -->
  <g stroke="#0f766e" fill="#a7f3d0">
    <circle cx="338" cy="150" r="4"/><circle cx="338" cy="138" r="4"/><circle cx="338" cy="126" r="4"/>
    <circle cx="356" cy="150" r="4"/><circle cx="356" cy="138" r="4"/>
  </g>
  <text x="368" y="130" font-size="9" fill="#0f766e">LPS</text>
  <rect x="372" y="150" width="78" height="30" rx="9" fill="url(#mbDrug)" stroke="#1d4ed8" filter="url(#mbSh)"/>
  <text x="411" y="169" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff">多黏菌素</text>
  <path d="M372,164 C362,158 352,154 344,150" fill="none" stroke="#1d4ed8" stroke-width="1.6" stroke-dasharray="4 3"/>
  <rect x="320" y="162" width="44" height="32" fill="#fde68a" opacity="0.5"/>
  <text x="342" y="216" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">✕</text>
  <text x="372" y="250" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="600">多黏菌素</text>
  <text x="372" y="264" text-anchor="middle" font-size="9.5" fill="#334155">结合 LPS → 外膜破坏</text>

  <text x="240" y="288" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">膜完整性破坏 → 胞内物质外漏、去极化 → 菌死亡</text>
</svg>
