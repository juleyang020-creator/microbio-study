<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <!-- 磷脂双层：头部 + 两条尾链 -->
    <pattern id="mbBi" width="13" height="32" patternUnits="userSpaceOnUse">
      <circle cx="6.5" cy="6" r="4.4" fill="#cfe0db" stroke="#2e6b66" stroke-width="1"/>
      <line x1="4.7" y1="10.2" x2="4.7" y2="16" stroke="#2e6b66" stroke-width="1"/><line x1="8.3" y1="10.2" x2="8.3" y2="16" stroke="#2e6b66" stroke-width="1"/>
      <line x1="4.7" y1="16" x2="4.7" y2="21.8" stroke="#2e6b66" stroke-width="1"/><line x1="8.3" y1="16" x2="8.3" y2="21.8" stroke="#2e6b66" stroke-width="1"/>
      <circle cx="6.5" cy="26" r="4.4" fill="#cfe0db" stroke="#2e6b66" stroke-width="1"/>
    </pattern>
    <marker id="mbArr" markerWidth="8" markerHeight="8" refX="3.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a6d1f"/>
    </marker>
  </defs>

  <rect width="480" height="300" fill="#ffffff"/>

  <!-- 区带底色：极轻分层，仅作阅读引导 -->
  <rect x="0" y="56" width="480" height="106" fill="#f6f8f8"/>
  <rect x="0" y="194" width="480" height="80" fill="#f4f6f6"/>

  <!-- 标题 + 副标题 -->
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">破坏细胞膜</text>
  <text x="240" y="46" text-anchor="middle" font-size="11" fill="#8a8f98">达托霉素成孔 · 多黏菌素破坏外膜</text>

  <text x="466" y="78" text-anchor="end" font-size="10" fill="#8a8f98">胞外</text>
  <text x="466" y="218" text-anchor="end" font-size="10" fill="#8a8f98">胞质</text>

  <!-- 磷脂双层 -->
  <rect x="0" y="162" width="480" height="32" fill="url(#mbBi)"/>
  <line x1="0" y1="162" x2="480" y2="162" stroke="#cfcabd" stroke-width="1"/>
  <line x1="0" y1="194" x2="480" y2="194" stroke="#cfcabd" stroke-width="1"/>

  <!-- 达托霉素插入成孔 + K+ 外流 -->
  <g fill="#e7eef6" stroke="#345f86" stroke-width="1.2">
    <rect x="132" y="158" width="9" height="40" rx="4"/>
    <rect x="146" y="158" width="9" height="40" rx="4"/>
    <rect x="168" y="158" width="9" height="40" rx="4"/>
    <rect x="182" y="158" width="9" height="40" rx="4"/>
  </g>

  <!-- K+ 外流：自胞质经孔道向胞外 -->
  <line x1="162" y1="208" x2="162" y2="124" stroke="#8a6d1f" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#mbArr)"/>
  <g>
    <circle cx="162" cy="214" r="8" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1"/><text x="162" y="217.5" text-anchor="middle" font-size="8.5" fill="#6e571a">K⁺</text>
    <circle cx="162" cy="148" r="8" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1"/><text x="162" y="151.5" text-anchor="middle" font-size="8.5" fill="#6e571a">K⁺</text>
    <circle cx="162" cy="112" r="8" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1"/><text x="162" y="115.5" text-anchor="middle" font-size="8.5" fill="#6e571a">K⁺</text>
  </g>

  <text x="162" y="250" text-anchor="middle" font-size="10" fill="#345f86" font-weight="700">达托霉素（钙依赖）</text>
  <text x="162" y="264" text-anchor="middle" font-size="9.5" fill="#454b54">插入革兰阳性菌胞质膜成孔</text>
  <text x="162" y="276" text-anchor="middle" font-size="9.5" fill="#454b54">→ 去极化 / K⁺ 外流</text>

  <!-- 多黏菌素结合外膜 LPS、破坏外膜通透性 -->
  <!-- 外膜（革兰阴性）：此处的磷脂双层即外膜，外侧带 LPS -->
  <g stroke="#2e6b66" stroke-width="1" fill="#e9f0ee">
    <circle cx="338" cy="150" r="4"/><circle cx="338" cy="138" r="4"/><circle cx="338" cy="126" r="4"/>
    <circle cx="356" cy="150" r="4"/><circle cx="356" cy="138" r="4"/>
  </g>
  <text x="366" y="129" font-size="9" fill="#2e6b66" font-weight="600">LPS</text>

  <!-- 多黏菌素药物卡 -->
  <rect x="372" y="148" width="80" height="30" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="412" y="167" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">多黏菌素</text>
  <path d="M372,162 C362,156 352,152 344,148" fill="none" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>

  <!-- 外膜通透性破坏标记 -->
  <rect x="320" y="162" width="44" height="32" fill="#fbfaf8" stroke="#c9c3b6" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="342" y="217" text-anchor="middle" font-size="14" fill="#b04242" font-weight="700">✕</text>

  <text x="384" y="250" text-anchor="middle" font-size="10" fill="#345f86" font-weight="700">多黏菌素</text>
  <text x="384" y="264" text-anchor="middle" font-size="9.5" fill="#454b54">结合革兰阴性菌外膜 LPS</text>
  <text x="384" y="276" text-anchor="middle" font-size="9.5" fill="#454b54">→ 外膜通透性破坏</text>

  <text x="240" y="294" text-anchor="middle" font-size="12.5" fill="#454b54">膜完整性破坏 → 去极化、胞内物质外漏 → 菌死亡</text>
</svg>
