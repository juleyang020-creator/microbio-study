<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 462" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>病毒的基本结构与对称型</title><desc>病毒体=核酸+衣壳（±包膜、刺突）；衣壳对称分二十面体、螺旋、复合三型；包膜有无决定外形与脂溶剂敏感性</desc>
<rect width="480" height="462" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="28" font-size="16" font-weight="700" fill="#1f2733">病毒的基本结构与对称型</text>
<rect x="368" y="14" width="88" height="18" rx="9" fill="#eef2f7"/>
<text x="412" y="27" text-anchor="middle" font-size="10" fill="#5c6672">形态总览 · 病毒</text>
<text x="24" y="47" font-size="11.5" fill="#5c6672">病毒体 ＝ 核酸 ＋ 衣壳（± 包膜、刺突）；衣壳对称分三型</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e3e7ec"/>

<!-- ===== A 基本结构 ===== -->
<circle cx="30" cy="75" r="4" fill="#4f7cc4"/><text x="42" y="79" font-size="12.5" font-weight="700" fill="#3d63a0">基本结构（包膜病毒剖面）</text>
<!-- 包膜 -->
<circle cx="110" cy="148" r="54" fill="#f0f3fa" stroke="#7a93bd" stroke-width="1.6"/>
<!-- 刺突 ×12 -->
<g stroke="#7a93bd" stroke-width="1.5" fill="#7a93bd">
  <g transform="rotate(0 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(30 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(60 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(90 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(120 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(150 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(180 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(210 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(240 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(270 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(300 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
  <g transform="rotate(330 110 148)"><line x1="110" y1="94" x2="110" y2="84"/><circle cx="110" cy="82" r="3"/></g>
</g>
<!-- 衣壳（二十面体） -->
<polygon points="110,118 136,133 136,163 110,178 84,163 84,133" fill="#d6dfee" stroke="#4f7cc4" stroke-width="1.4"/>
<g stroke="#4f7cc4" stroke-width="0.7" opacity="0.6"><line x1="110" y1="118" x2="110" y2="178"/><line x1="84" y1="133" x2="136" y2="163"/><line x1="136" y1="133" x2="84" y2="163"/></g>
<!-- 核酸 -->
<path d="M96,148 q7,-9 14,0 t14,0" fill="none" stroke="#bf7583" stroke-width="1.8"/>
<!-- 引线 -->
<g stroke="#c9cfda" stroke-width="1"><line x1="152" y1="100" x2="246" y2="88"/><line x1="164" y1="142" x2="246" y2="132"/><line x1="136" y1="142" x2="246" y2="178"/><line x1="110" y1="148" x2="246" y2="224"/></g>
<g fill="#7a93bd"><circle cx="152" cy="100" r="2"/><circle cx="164" cy="142" r="2"/><circle cx="136" cy="142" r="2"/><circle cx="110" cy="148" r="2"/></g>
<!-- 标注 -->
<text x="250" y="92" font-size="11" font-weight="700" fill="#3f444b">刺突（糖蛋白）</text>
<text x="250" y="106" font-size="9.5" fill="#5c6672">介导对宿主细胞的吸附</text>
<text x="250" y="136" font-size="11" font-weight="700" fill="#3f444b">包膜（脂质双层）</text>
<text x="250" y="150" font-size="9.5" fill="#5c6672">源自宿主膜，对脂溶剂敏感</text>
<text x="250" y="182" font-size="11" font-weight="700" fill="#3f444b">衣壳（壳粒 capsomere）</text>
<text x="250" y="196" font-size="9.5" fill="#5c6672">保护核酸，具抗原性</text>
<text x="250" y="228" font-size="11" font-weight="700" fill="#3f444b">核酸（DNA 或 RNA）</text>
<text x="250" y="242" font-size="9.5" fill="#5c6672">一种病毒只含一种核酸类型</text>
<line x1="24" y1="256" x2="456" y2="256" stroke="#e3e7ec"/>

<!-- ===== B 衣壳对称型 ===== -->
<circle cx="30" cy="277" r="4" fill="#4f7cc4"/><text x="42" y="281" font-size="12.5" font-weight="700" fill="#3d63a0">衣壳对称型</text>
<!-- 二十面体对称 -->
<polygon points="96,282 117,294 117,318 96,330 75,318 75,294" fill="#d6dfee" stroke="#4f7cc4" stroke-width="1.4"/>
<g stroke="#4f7cc4" stroke-width="0.7" opacity="0.6"><line x1="96" y1="282" x2="96" y2="330"/><line x1="75" y1="294" x2="117" y2="318"/><line x1="117" y1="294" x2="75" y2="318"/></g>
<text x="96" y="348" text-anchor="middle" font-size="11" fill="#3f444b">二十面体对称</text>
<!-- 螺旋对称 -->
<g fill="#d6dfee" stroke="#4f7cc4" stroke-width="1.1">
  <ellipse cx="212" cy="306" rx="7" ry="13"/><ellipse cx="222" cy="306" rx="7" ry="13"/><ellipse cx="232" cy="306" rx="7" ry="13"/><ellipse cx="242" cy="306" rx="7" ry="13"/><ellipse cx="252" cy="306" rx="7" ry="13"/><ellipse cx="262" cy="306" rx="7" ry="13"/>
</g>
<path d="M208,306 q5,-7 10,0 t10,0 t10,0 t10,0 t10,0 t10,0" fill="none" stroke="#bf7583" stroke-width="1.4"/>
<text x="240" y="348" text-anchor="middle" font-size="11" fill="#3f444b">螺旋对称</text>
<!-- 复合对称（噬菌体） -->
<polygon points="384,276 394,282 394,294 384,300 374,294 374,282" fill="#d6dfee" stroke="#4f7cc4" stroke-width="1.3"/>
<rect x="381" y="300" width="6" height="18" fill="#aab4dc" stroke="#4f7cc4" stroke-width="1"/>
<rect x="372" y="318" width="24" height="4" rx="2" fill="#7a93bd"/>
<g stroke="#7a93bd" stroke-width="1.4" fill="none" stroke-linecap="round"><path d="M374,322 q-8,6 -10,12"/><path d="M384,322 v13"/><path d="M394,322 q8,6 10,12"/></g>
<text x="384" y="348" text-anchor="middle" font-size="11" fill="#3f444b">复合对称（噬菌体）</text>
<line x1="24" y1="362" x2="456" y2="362" stroke="#e3e7ec"/>

<!-- ===== C 包膜与外形 ===== -->
<circle cx="30" cy="381" r="4" fill="#4f7cc4"/><text x="42" y="385" font-size="12.5" font-weight="700" fill="#3d63a0">包膜与外形</text>
<!-- 无包膜（腺病毒，五邻体纤维） -->
<polygon points="96,392 113,402 113,422 96,432 79,422 79,402" fill="#d6dfee" stroke="#4f7cc4" stroke-width="1.3"/>
<g stroke="#7a93bd" stroke-width="1.3" fill="#7a93bd">
  <line x1="96" y1="392" x2="96" y2="383"/><circle cx="96" cy="381" r="2.4"/>
  <line x1="113" y1="402" x2="121" y2="397"/><circle cx="123" cy="396" r="2.3"/>
  <line x1="79" y1="402" x2="71" y2="397"/><circle cx="69" cy="396" r="2.3"/>
</g>
<text x="96" y="452" text-anchor="middle" font-size="11" fill="#3f444b">无包膜（腺病毒）</text>
<!-- 有包膜球形带刺突（冠状/流感） -->
<circle cx="240" cy="412" r="21" fill="#f0f3fa" stroke="#7a93bd" stroke-width="1.5"/>
<circle cx="240" cy="412" r="10" fill="#d6dfee" stroke="#4f7cc4" stroke-width="1"/>
<g stroke="#7a93bd" stroke-width="1.4" fill="#7a93bd">
  <g transform="rotate(0 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(45 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(90 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(135 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(180 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(225 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(270 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
  <g transform="rotate(315 240 412)"><line x1="240" y1="391" x2="240" y2="384"/><circle cx="240" cy="382" r="2.4"/></g>
</g>
<text x="240" y="452" text-anchor="middle" font-size="11" fill="#3f444b">有包膜 · 带刺突（冠状 / 流感）</text>
<!-- 子弹形（狂犬病毒） -->
<path d="M370,432 v-13 a14,14 0 0 1 28,0 v13 z" fill="#f0f3fa" stroke="#7a93bd" stroke-width="1.5"/>
<path d="M376,427 q8,-10 16,0" fill="none" stroke="#bf7583" stroke-width="1.4"/>
<g stroke="#7a93bd" stroke-width="1.3" fill="#7a93bd"><line x1="378" y1="409" x2="375" y2="402"/><circle cx="374" cy="400" r="2.1"/><line x1="390" y1="409" x2="393" y2="402"/><circle cx="394" cy="400" r="2.1"/></g>
<text x="384" y="452" text-anchor="middle" font-size="11" fill="#3f444b">子弹形（狂犬病毒）</text>
</svg>
