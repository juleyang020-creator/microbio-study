<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 462" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>病毒的基本结构与对称型</title><desc>核酸 + 衣壳（±包膜、刺突）；衣壳分二十面体、螺旋、复合三种对称</desc>
  <rect width="480" height="462" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">病毒的基本结构与对称型</text>
  <text x="240" y="46" text-anchor="middle" font-size="11" fill="#565b63">核酸 + 衣壳（±包膜、刺突）；衣壳分二十面体、螺旋、复合三种对称</text>

  <!-- ===== A 基本结构剖面 ===== -->
  <text x="24" y="72" font-size="12.5" font-weight="700" fill="#5a80b0">基本结构</text>
  <!-- 包膜 -->
  <circle cx="120" cy="150" r="56" fill="#eef1f8" stroke="#8093b3" stroke-width="1.6"/>
  <!-- 刺突(12) -->
  <g stroke="#8093b3" stroke-width="1.5" fill="#8093b3">
    <g transform="rotate(0 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(30 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(60 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(90 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(120 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(150 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(180 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(210 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(240 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(270 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(300 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
    <g transform="rotate(330 120 150)"><line x1="120" y1="94" x2="120" y2="84"/><circle cx="120" cy="82" r="3"/></g>
  </g>
  <!-- 衣壳(二十面体) -->
  <polygon points="120,120 146,135 146,165 120,180 94,165 94,135" fill="#ccd5e4" stroke="#5a80b0" stroke-width="1.4"/>
  <g stroke="#5a80b0" stroke-width="0.7" opacity="0.6"><line x1="120" y1="120" x2="120" y2="180"/><line x1="94" y1="135" x2="146" y2="165"/><line x1="146" y1="135" x2="94" y2="165"/></g>
  <!-- 核酸 -->
  <path d="M106,150 q7,-9 14,0 t14,0" fill="none" stroke="#bf7583" stroke-width="1.8"/>

  <!-- 标注 -->
  <g stroke="#cbc1a8" stroke-width="1"><line x1="132" y1="98" x2="246" y2="84"/><line x1="172" y1="132" x2="246" y2="122"/><line x1="146" y1="150" x2="246" y2="160"/><line x1="120" y1="150" x2="246" y2="198"/></g>
  <g fill="#8093b3"><circle cx="132" cy="98" r="2"/><circle cx="172" cy="132" r="2"/><circle cx="146" cy="150" r="2"/><circle cx="120" cy="150" r="2"/></g>
  <text x="250" y="88" font-size="11" font-weight="700" fill="#565b63">刺突（糖蛋白）</text>
  <text x="250" y="104" font-size="11" fill="#565b63">介导吸附，有包膜者具有</text>
  <text x="250" y="126" font-size="11" font-weight="700" fill="#565b63">包膜（脂质双层）</text>
  <text x="250" y="142" font-size="11" fill="#565b63">来自宿主膜，对乙醚敏感</text>
  <text x="250" y="164" font-size="11" font-weight="700" fill="#565b63">衣壳（壳粒 capsomere）</text>
  <text x="250" y="202" font-size="11" font-weight="700" fill="#565b63">核酸（DNA 或 RNA）</text>

  <line x1="24" y1="226" x2="456" y2="226" stroke="#efe6c6" stroke-width="1"/>

  <!-- ===== B 衣壳对称型 ===== -->
  <text x="24" y="248" font-size="12.5" font-weight="700" fill="#5a80b0">衣壳对称型</text>
  <!-- 二十面体对称 cx96 -->
  <polygon points="96,268 118,281 118,305 96,318 74,305 74,281" fill="#ccd5e4" stroke="#5a80b0" stroke-width="1.4"/>
  <g stroke="#5a80b0" stroke-width="0.7" opacity="0.6"><line x1="96" y1="268" x2="96" y2="318"/><line x1="74" y1="281" x2="118" y2="305"/><line x1="118" y1="281" x2="74" y2="305"/></g>
  <text x="96" y="338" text-anchor="middle" font-size="11" fill="#565b63">二十面体对称</text>
  <!-- 螺旋对称 cx240：堆叠壳粒 + 核酸螺纹 -->
  <g fill="#ccd5e4" stroke="#5a80b0" stroke-width="1.1">
    <ellipse cx="214" cy="293" rx="7" ry="14"/><ellipse cx="224" cy="293" rx="7" ry="14"/><ellipse cx="234" cy="293" rx="7" ry="14"/><ellipse cx="244" cy="293" rx="7" ry="14"/><ellipse cx="254" cy="293" rx="7" ry="14"/><ellipse cx="264" cy="293" rx="7" ry="14"/>
  </g>
  <path d="M210,293 q5,-7 10,0 t10,0 t10,0 t10,0 t10,0 t10,0" fill="none" stroke="#bf7583" stroke-width="1.4"/>
  <text x="240" y="338" text-anchor="middle" font-size="11" fill="#565b63">螺旋对称</text>
  <!-- 复合对称(噬菌体) cx384 -->
  <polygon points="384,264 396,271 396,285 384,292 372,285 372,271" fill="#ccd5e4" stroke="#5a80b0" stroke-width="1.3"/>
  <rect x="381" y="292" width="6" height="20" fill="#aab4dc" stroke="#5a80b0" stroke-width="1"/>
  <rect x="372" y="312" width="24" height="4" rx="2" fill="#8093b3"/>
  <g stroke="#8093b3" stroke-width="1.4" fill="none" stroke-linecap="round"><path d="M374,316 q-8,8 -10,14"/><path d="M384,316 v15"/><path d="M394,316 q8,8 10,14"/></g>
  <text x="384" y="338" text-anchor="middle" font-size="11" fill="#565b63">复合对称（噬菌体）</text>

  <line x1="24" y1="352" x2="456" y2="352" stroke="#efe6c6" stroke-width="1"/>

  <!-- ===== C 包膜与外形 ===== -->
  <text x="24" y="374" font-size="12.5" font-weight="700" fill="#5a80b0">包膜与外形</text>
  <!-- 无包膜二十面体(腺病毒) cx96 -->
  <polygon points="96,392 114,403 114,423 96,434 78,423 78,403" fill="#ccd5e4" stroke="#5a80b0" stroke-width="1.3"/>
  <g stroke="#8093b3" stroke-width="1.3" fill="#8093b3">
    <line x1="96" y1="392" x2="96" y2="382"/><circle cx="96" cy="380" r="2.6"/>
    <line x1="114" y1="403" x2="122" y2="398"/><circle cx="124" cy="397" r="2.4"/>
    <line x1="78" y1="403" x2="70" y2="398"/><circle cx="68" cy="397" r="2.4"/>
  </g>
  <text x="96" y="450" text-anchor="middle" font-size="11" fill="#565b63">无包膜（腺病毒）</text>
  <!-- 有包膜球形带刺突(冠状/流感) cx240 -->
  <circle cx="240" cy="412" r="20" fill="#eef1f8" stroke="#8093b3" stroke-width="1.5"/>
  <circle cx="240" cy="412" r="10" fill="#ccd5e4" stroke="#5a80b0" stroke-width="1"/>
  <g stroke="#8093b3" stroke-width="1.4" fill="#8093b3">
    <g transform="rotate(0 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(45 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(90 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(135 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(180 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(225 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(270 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
    <g transform="rotate(315 240 412)"><line x1="240" y1="392" x2="240" y2="384"/><circle cx="240" cy="382" r="2.6"/></g>
  </g>
  <text x="240" y="450" text-anchor="middle" font-size="11" fill="#565b63">有包膜·带刺突（冠状/流感）</text>
  <!-- 子弹形(狂犬) cx384 -->
  <path d="M370,432 v-14 a14,14 0 0 1 28,0 v14 z" fill="#eef1f8" stroke="#8093b3" stroke-width="1.5"/>
  <path d="M376,426 q8,-10 16,0" fill="none" stroke="#bf7583" stroke-width="1.4"/>
  <g stroke="#8093b3" stroke-width="1.3" fill="#8093b3"><line x1="378" y1="408" x2="375" y2="401"/><circle cx="374" cy="399" r="2.2"/><line x1="390" y1="408" x2="393" y2="401"/><circle cx="394" cy="399" r="2.2"/></g>
  <text x="384" y="450" text-anchor="middle" font-size="11" fill="#565b63">子弹形（狂犬病毒）</text>
</svg>
