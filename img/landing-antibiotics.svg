<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 450" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>抗微生物药作用机制总览</title><desc>细菌细胞上的主要抗菌药靶点：细胞壁（肽聚糖）、细胞膜（阴性菌外膜 LPS 与阳性菌胞浆膜）、核糖体 30S 与 50S、核酸（DNA 旋转酶/RNA 聚合酶）、叶酸代谢；图中编号与下方图例对应。抗真菌药靶点另见各药条目。</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="450" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">抗微生物药作用机制总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#5c6672">抗菌机制 总览</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">抗菌药按作用靶点分类；图中编号与下方图例一一对应</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e3e7ec"/>

<!-- ===== 细菌细胞包膜（由外向内） ===== -->
<!-- 外膜：仅革兰阴性菌有，用虚线区别 -->
<rect x="44" y="76" width="330" height="160" rx="56" fill="#f7ecd4" stroke="#d9b96a" stroke-width="1.4" stroke-dasharray="5,4"/>
<!-- 细胞壁（肽聚糖） -->
<rect x="58" y="90" width="302" height="132" rx="46" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.4"/>
<!-- 胞浆膜 -->
<rect x="70" y="102" width="278" height="108" rx="36" fill="#f7ecd4" stroke="#d9b96a" stroke-width="1.4"/>
<!-- 胞质 -->
<rect x="80" y="112" width="258" height="88" rx="28" fill="#ffffff" stroke="#e3e7ec"/>

<!-- 包膜注解 -->
<line x1="382" y1="98" x2="364" y2="98" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>
<text x="384" y="96" font-size="9.5" fill="#8a6d2f">外膜 LPS</text>
<text x="384" y="108" font-size="9.5" fill="#8a6d2f">仅革兰阴性</text>
<line x1="382" y1="152" x2="352" y2="152" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>
<text x="384" y="150" font-size="9.5" fill="#8a6d2f">胞浆膜</text>

<!-- ❶ 细胞壁 -->
<circle cx="210" cy="96" r="8" fill="#1f2733"/><text x="210" y="100" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="222" y="100" font-size="9.5" fill="#5b4f8a">细胞壁（肽聚糖）</text>

<!-- ❷ 细胞膜：括号同时指向外膜与胞浆膜两层 -->
<path d="M44,120 h-8 v72 h8" fill="none" stroke="#33404f" stroke-width="1.1"/>
<circle cx="24" cy="156" r="8" fill="#1f2733"/><text x="24" y="160" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>

<!-- ❺ 拟核 DNA -->
<path d="M112,140 q16,-14 32,-2 q16,12 2,24 q-16,14 -32,2 q-14,-12 -2,-24 z" fill="none" stroke="#33404f" stroke-width="2"/>
<circle cx="98" cy="128" r="8" fill="#1f2733"/><text x="98" y="132" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">5</text>
<text x="128" y="192" text-anchor="middle" font-size="9.5" fill="#5c6672">拟核 DNA</text>

<!-- ❸❹ 核糖体 30S / 50S -->
<ellipse cx="205" cy="138" rx="13" ry="8" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="205" y="141" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">30S</text>
<ellipse cx="205" cy="162" rx="16" ry="11" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="205" y="165" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">50S</text>
<circle cx="175" cy="138" r="8" fill="#1f2733"/><text x="175" y="142" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<circle cx="175" cy="164" r="8" fill="#1f2733"/><text x="175" y="168" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
<text x="205" y="192" text-anchor="middle" font-size="9.5" fill="#5c6672">核糖体</text>

<!-- ❻ 叶酸代谢 -->
<rect x="266" y="136" width="52" height="20" rx="5" fill="#f5f7f9" stroke="#b9c2cc"/>
<text x="292" y="150" text-anchor="middle" font-size="9.5" fill="#1f2733">叶酸合成</text>
<circle cx="250" cy="146" r="8" fill="#1f2733"/><text x="250" y="150" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">6</text>
<text x="292" y="192" text-anchor="middle" font-size="9.5" fill="#5c6672">→ THF → 核酸原料</text>

<!-- 临床注解 -->
<text x="240" y="246" text-anchor="middle" font-size="9.5" fill="#5c6672">临床注意：利福平单用易因 rpoB 突变迅速耐药，须联合用药</text>

<!-- ===== 图例（编号与图中一致） ===== -->
<circle cx="34" cy="264" r="8" fill="#1f2733"/><text x="34" y="268" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="50" y="268" font-size="10.5"><tspan font-weight="700" fill="#1f2733">细胞壁合成　</tspan><tspan fill="#5c6672">β-内酰胺类 · 糖肽类 · 磷霉素</tspan></text>

<circle cx="34" cy="288" r="8" fill="#1f2733"/><text x="34" y="292" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<text x="50" y="292" font-size="10.5"><tspan font-weight="700" fill="#1f2733">细胞膜　</tspan><tspan fill="#5c6672">多黏菌素（阴性菌外膜 LPS）· 达托霉素（阳性菌胞浆膜）</tspan></text>

<circle cx="34" cy="312" r="8" fill="#1f2733"/><text x="34" y="316" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<text x="50" y="316" font-size="10.5"><tspan font-weight="700" fill="#1f2733">核糖体 30S　</tspan><tspan fill="#5c6672">氨基糖苷类 · 四环素类</tspan></text>

<circle cx="34" cy="336" r="8" fill="#1f2733"/><text x="34" y="340" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
<text x="50" y="340" font-size="10.5"><tspan font-weight="700" fill="#1f2733">核糖体 50S　</tspan><tspan fill="#5c6672">大环内酯 · 林可酰胺 · 氯霉素 · 噁唑烷酮</tspan></text>

<circle cx="34" cy="360" r="8" fill="#1f2733"/><text x="34" y="364" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">5</text>
<text x="50" y="364" font-size="10.5"><tspan font-weight="700" fill="#1f2733">核酸合成　</tspan><tspan fill="#5c6672">氟喹诺酮抑旋转酶 · 利福平抑 RNA 聚合酶 · 甲硝唑损伤 DNA</tspan></text>

<circle cx="34" cy="384" r="8" fill="#1f2733"/><text x="34" y="388" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">6</text>
<text x="50" y="388" font-size="10.5"><tspan font-weight="700" fill="#1f2733">叶酸代谢　</tspan><tspan fill="#5c6672">磺胺类抑 DHPS · 甲氧苄啶抑 DHFR</tspan></text>

<!-- 结论 -->
<text x="240" y="414" text-anchor="middle" font-size="11.5" fill="#33404f">靶点决定药物分类；结合位点相同或被同一机制覆盖时才易交叉耐药</text>

<!-- 页脚 -->
<rect x="24" y="424" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="439" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">抗真菌药</tspan>　麦角固醇（唑类·多烯）· β-葡聚糖（棘白菌素）· 核酸（氟胞嘧啶）｜见各药条目</text>
</svg>
