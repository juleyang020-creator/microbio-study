<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 470" width="480" height="470" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>抗微生物药作用机制总览</title><desc>各类抗菌药在细菌细胞上的作用靶点。抗真菌药靶点另见各药条目：麦角固醇 · 细胞壁葡聚糖 · 核酸</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">抗微生物药作用机制总览</text>
<text x="240" y="44" font-size="12" fill="#565b63" text-anchor="middle">各类抗菌药在细菌细胞上的作用靶点</text>
<!-- cell envelope -->
  <rect x="40" y="66" width="400" height="150" rx="62" fill="#f6f2e2" stroke="#b8ac83" stroke-width="5"/>
  <rect x="52" y="78" width="376" height="126" rx="52" fill="none" stroke="#c8b887" stroke-width="2"/>
  <rect x="62" y="88" width="356" height="106" rx="44" fill="none" stroke="#9fb0cc" stroke-width="1.5"/>
  <!-- nucleoid (DNA/RNA) -->
  <path d="M146,152 q16,-24 40,-10 q22,13 5,31 q-19,17 -42,3 q-17,-13 -3,-24 z" fill="none" stroke="#cf7c74" stroke-width="2.4"/>
  <!-- ribosomes 30S(small)/50S(large) -->
  <g><circle cx="250" cy="120" r="7" fill="#6f97c9"/><circle cx="250" cy="112" r="5" fill="#9fb0cc"/></g>
  <g><circle cx="286" cy="160" r="8.5" fill="#5a80b0"/><circle cx="286" cy="150" r="6" fill="#9fb0cc"/></g>
  <!-- folate hexagon -->
  <polygon points="352,146 364,153 364,167 352,174 340,167 340,153" fill="#b79ac9" stroke="#9d7fb4" stroke-width="1.3"/>
  <circle cx="240" cy="66" r="10" fill="#9a8a52"/><text x="240" y="70" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">1</text><circle cx="48" cy="150" r="10" fill="#6f8f5e"/><text x="48" y="154" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">2</text><circle cx="250" cy="100" r="10" fill="#6f97c9"/><text x="250" y="104" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">3</text><circle cx="306" cy="160" r="10" fill="#4f6f9f"/><text x="306" y="164" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">4</text><circle cx="150" cy="180" r="10" fill="#cf7c74"/><text x="150" y="184" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">5</text><circle cx="378" cy="152" r="10" fill="#9d7fb4"/><text x="378" y="156" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">6</text>
  <circle cx="44" cy="250" r="10" fill="#9a8a52"/><text x="44" y="254" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">1</text><text x="62" y="254" font-size="12.5"><tspan font-weight="700" fill="#2c3138">细胞壁合成　</tspan><tspan fill="#565b63">β-内酰胺类 · 糖肽类 · 磷霉素</tspan></text><circle cx="44" cy="283" r="10" fill="#6f8f5e"/><text x="44" y="287" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">2</text><text x="62" y="287" font-size="12.5"><tspan font-weight="700" fill="#2c3138">细胞膜　</tspan><tspan fill="#565b63">多黏菌素（黏菌素）· 达托霉素</tspan></text><circle cx="44" cy="316" r="10" fill="#6f97c9"/><text x="44" y="320" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">3</text><text x="62" y="320" font-size="12.5"><tspan font-weight="700" fill="#2c3138">核糖体 30S　</tspan><tspan fill="#565b63">氨基糖苷类 · 四环素类</tspan></text><circle cx="44" cy="349" r="10" fill="#4f6f9f"/><text x="44" y="353" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">4</text><text x="62" y="353" font-size="12.5"><tspan font-weight="700" fill="#2c3138">核糖体 50S　</tspan><tspan fill="#565b63">大环内酯 · 林可酰胺 · 氯霉素 · 噁唑烷酮</tspan></text><circle cx="44" cy="382" r="10" fill="#cf7c74"/><text x="44" y="386" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">5</text><text x="62" y="386" font-size="12.5"><tspan font-weight="700" fill="#2c3138">核酸合成　</tspan><tspan fill="#565b63">氟喹诺酮（DNA 旋转酶）· 利福平（RNA 聚合酶）</tspan></text><circle cx="44" cy="415" r="10" fill="#9d7fb4"/><text x="44" y="419" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">6</text><text x="62" y="419" font-size="12.5"><tspan font-weight="700" fill="#2c3138">叶酸代谢　</tspan><tspan fill="#565b63">磺胺类（抑 DHPS）· 甲氧苄啶（抑 DHFR）</tspan></text>
<text x="240" y="458" font-size="13" fill="#3f444b" text-anchor="middle">抗真菌药靶点另见各药条目：麦角固醇 · 细胞壁葡聚糖 · 核酸</text>
</svg>