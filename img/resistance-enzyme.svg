<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="enDrug" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef3f9"/><stop offset="1" stop-color="#e0e9f3"/></linearGradient>
    <linearGradient id="enEnz" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f6efda"/><stop offset="1" stop-color="#efe4c6"/></linearGradient>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">产生灭活酶</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">水解或共价修饰药物分子，使其失去活性</text>

  <!-- 上：β-内酰胺酶水解β-内酰胺环 -->
  <text x="20" y="74" font-size="11" font-weight="700" fill="#454b54">① β-内酰胺酶：水解 β-内酰胺环</text>

  <!-- 完整药物（青霉素核心：四元β-内酰胺环 + 噻唑烷环） -->
  <path d="M44,84 h26 v26 h-26 z" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <path d="M70,84 l22,5 l4,8 l-4,8 l-22,5 z" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <text x="57" y="130" text-anchor="middle" font-size="9" fill="#345f86">β-内酰胺环</text>

  <line x1="104" y1="97" x2="146" y2="97" stroke="#8a8f98" stroke-width="1.3"/><polygon points="148,97 141,93.5 141,100.5" fill="#8a8f98"/>

  <!-- 酶 -->
  <ellipse cx="184" cy="97" rx="34" ry="22" fill="url(#enEnz)" stroke="#8a6d1f" stroke-width="1.4"/>
  <text x="184" y="100.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6e571a">β-内酰胺酶</text>

  <line x1="220" y1="97" x2="262" y2="97" stroke="#8a8f98" stroke-width="1.3"/><polygon points="264,97 257,93.5 257,100.5" fill="#8a8f98"/>

  <!-- 失活药物：β-内酰胺环开裂（断口） -->
  <path d="M288,84 h26 v9 M314,110 h-26 v-26" fill="none" stroke="#b04242" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M314,84 l22,5 l4,8 l-4,8 l-22,5 z" fill="#f3e3e3" stroke="#b04242" stroke-width="1.4"/>
  <line x1="320" y1="89" x2="328" y2="97" stroke="#b04242" stroke-width="1.4"/><line x1="328" y1="89" x2="320" y2="97" stroke="#b04242" stroke-width="1.4"/>
  <text x="318" y="130" text-anchor="middle" font-size="9" fill="#b04242">环开裂 → 失活</text>
  <text x="408" y="100.5" text-anchor="middle" font-size="10" fill="#b04242">不能结合 PBP</text>

  <!-- 分隔发丝线 -->
  <line x1="24" y1="150" x2="456" y2="150" stroke="#d6d2c8" stroke-width="1"/>

  <!-- 下：修饰酶修饰氨基糖苷 -->
  <text x="20" y="178" font-size="11" font-weight="700" fill="#454b54">② 氨基糖苷修饰酶：乙酰/磷酸/腺苷化修饰药物</text>

  <!-- 完整氨基糖苷（糖环 + 氨基/羟基位点） -->
  <circle cx="58" cy="216" r="15" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <circle cx="80" cy="222" r="12" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <circle cx="52" cy="206" r="2.4" fill="#3f7a52"/><circle cx="68" cy="228" r="2.4" fill="#3f7a52"/><circle cx="88" cy="214" r="2.4" fill="#3f7a52"/>
  <text x="68" y="250" text-anchor="middle" font-size="9" fill="#345f86">氨基糖苷</text>

  <line x1="102" y1="219" x2="146" y2="219" stroke="#8a8f98" stroke-width="1.3"/><polygon points="148,219 141,215.5 141,222.5" fill="#8a8f98"/>

  <!-- 酶 -->
  <ellipse cx="184" cy="219" rx="34" ry="20" fill="url(#enEnz)" stroke="#8a6d1f" stroke-width="1.4"/>
  <text x="184" y="222.5" text-anchor="middle" font-size="10" font-weight="700" fill="#6e571a">修饰酶</text>

  <line x1="220" y1="219" x2="262" y2="219" stroke="#8a8f98" stroke-width="1.3"/><polygon points="264,219 257,215.5 257,222.5" fill="#8a8f98"/>

  <!-- 被修饰药物：原位点上挂上修饰基 -->
  <circle cx="300" cy="216" r="15" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <circle cx="322" cy="222" r="12" fill="url(#enDrug)" stroke="#345f86" stroke-width="1.4"/>
  <circle cx="294" cy="206" r="2.4" fill="#3f7a52"/><circle cx="310" cy="228" r="2.4" fill="#3f7a52"/>
  <line x1="330" y1="214" x2="330" y2="202" stroke="#b04242" stroke-width="1.3"/>
  <rect x="316" y="190" width="28" height="13" rx="4" fill="#f3e3e3" stroke="#b04242" stroke-width="1.3"/><text x="330" y="200" text-anchor="middle" font-size="8.5" fill="#b04242">修饰基</text>
  <text x="408" y="222.5" text-anchor="middle" font-size="10" fill="#b04242">不能结合 30S</text>

  <text x="240" y="286" text-anchor="middle" font-size="12.5" fill="#454b54">水解或共价修饰药物分子 → 药物失活</text>
</svg>
