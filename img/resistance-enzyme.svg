 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">产生灭活酶</text>
<text x="240" y="42" font-size="11" fill="#8a8f98" text-anchor="middle">酶水解或修饰药物使其失活</text>
<circle cx="140" cy="150" r="30" fill="#6f97c9" stroke="#5a80b0" stroke-width="1.3"/> <text x="140" y="205" font-size="11" fill="#2c3138" text-anchor="middle" font-weight="600">灭活酶</text>
 <g transform="translate(185,150) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g>
 <line x1="228" y1="120" x2="300" y2="95" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <text x="250" y="108" font-size="11" fill="#2c3138" text-anchor="start">水解</text>
 <g transform="translate(330,95)"><rect x="-17" y="-7.5" width="17" height="15" rx="7.5" fill="#df8c7e" stroke="#b0a47c"/></g>
 <g transform="translate(360,95)"><rect x="0" y="-7.5" width="17" height="15" rx="7.5" fill="#e7e0c5" stroke="#b0a47c"/></g>
 <line x1="228" y1="175" x2="300" y2="200" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <text x="250" y="220" font-size="11" fill="#2c3138" text-anchor="start">修饰</text>
 <g transform="translate(345,200) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <text x="372" y="196" font-size="13" fill="#454b54">–CH₃/–PO₄</text>
 <text x="240" y="268" font-size="11" fill="#454b54" text-anchor="middle">药物失去抗菌活性</text>
<text x="240" y="286" font-size="12" fill="#454b54" text-anchor="middle">β-内酰胺酶（水解）/ 乙酰-磷酸-核苷转移酶（修饰）</text>
