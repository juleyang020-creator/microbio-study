<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>产生灭活酶</title><desc>酶水解或修饰药物使其失活。β-内酰胺酶（水解）/ 氨基糖苷修饰酶（AAC/APH/ANT，修饰）</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">产生灭活酶</text>
<text x="240" y="44" font-size="12" fill="#565b63" text-anchor="middle">酶水解或修饰药物使其失活</text>
<circle cx="140" cy="152" r="30" fill="#6f97c9" stroke="#5a80b0" stroke-width="1.3"/> <text x="140" y="206" font-size="12" fill="#2c3138" text-anchor="middle" font-weight="600">灭活酶</text>
 <g transform="translate(186,152) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g>
 <line x1="230" y1="122" x2="300" y2="98" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <text x="252" y="112" font-size="12" fill="#2c3138" text-anchor="start">水解</text>
 <g transform="translate(330,98)"><rect x="-17" y="-7.5" width="17" height="15" rx="7.5" fill="#df8c7e" stroke="#b0a47c"/></g>
 <g transform="translate(360,98)"><rect x="0" y="-7.5" width="17" height="15" rx="7.5" fill="#e7e0c5" stroke="#b0a47c"/></g>
 <line x1="230" y1="176" x2="300" y2="200" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <text x="252" y="220" font-size="12" fill="#2c3138" text-anchor="start">修饰</text>
 <g transform="translate(345,200) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <text x="374" y="205" font-size="13" fill="#3f444b">–CH₃/–PO₄</text>
 <text x="240" y="270" font-size="12" fill="#3f444b" text-anchor="middle">药物失去抗菌活性</text>
<text x="240" y="288" font-size="13" fill="#3f444b" text-anchor="middle">β-内酰胺酶（水解）/ 氨基糖苷修饰酶（AAC/APH/ANT，修饰）</text>
</svg>