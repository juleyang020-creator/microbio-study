<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <radialGradient id="etAgar" cx="42%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#efe7d2"/>
      <stop offset="100%" stop-color="#e6dcc1"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">E-test 浓度梯度法</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#8a8f98">椭圆形抑菌区与试条相交处 = MIC</text>

  <!-- M-H 琼脂平板（菌苔） -->
  <circle cx="160" cy="168" r="110" fill="url(#etAgar)" stroke="#c9b98a" stroke-width="2.5"/>

  <!-- 椭圆抑菌区：上宽（高浓度）→ 下尖（在 MIC 处与试条相交） -->
  <path d="M160,210 C112,196 112,96 160,84 C208,96 208,196 160,210 Z" fill="#faf8f1" stroke="#cfc6ad" stroke-width="1.3" stroke-dasharray="5 3"/>

  <!-- E-test 试条（含浓度刻度，上高下低） -->
  <rect x="152" y="74" width="16" height="170" rx="2" fill="#fbfaf8" stroke="#8a8f98" stroke-width="1.2"/>
  <g font-size="8" fill="#454b54" text-anchor="start">
    <line x1="168" y1="84" x2="173" y2="84" stroke="#8a8f98"/><text x="176" y="87">256</text>
    <line x1="168" y1="116" x2="173" y2="116" stroke="#8a8f98"/><text x="176" y="119">32</text>
    <line x1="168" y1="148" x2="173" y2="148" stroke="#8a8f98"/><text x="176" y="151">8</text>
    <line x1="168" y1="210" x2="173" y2="210" stroke="#8a8f98"/><text x="176" y="213">1</text>
    <line x1="168" y1="236" x2="173" y2="236" stroke="#8a8f98"/><text x="176" y="239">0.25</text>
  </g>

  <!-- MIC 交点标注（椭圆尖端与试条相交处） -->
  <circle cx="160" cy="210" r="3.2" fill="#345f86"/>
  <line x1="160" y1="210" x2="250" y2="232" stroke="#345f86" stroke-width="1"/>
  <text x="254" y="230" font-size="12" font-weight="700" fill="#345f86">MIC = 1 µg/mL</text>
  <text x="254" y="246" font-size="9" fill="#8a8f98">椭圆下尖与试条交点</text>

  <!-- 右侧说明 -->
  <text x="290" y="104" font-size="10.5" font-weight="700" fill="#23272e">读数</text>
  <text x="290" y="122" font-size="10" fill="#454b54">直接读出 MIC，再按折点判 S/I/R</text>
  <text x="290" y="146" font-size="10.5" font-weight="700" fill="#23272e">特点</text>
  <text x="290" y="164" font-size="10" fill="#454b54">较 KB 法精确，可用于苛养菌</text>
  <text x="290" y="180" font-size="10" fill="#454b54">与缓慢生长菌；试条成本较高</text>

  <text x="240" y="290" text-anchor="middle" font-size="9.5" fill="#454b54">0.5 麦氏菌液涂布 M-H（苛养菌用 MH-F），35℃ 16–18 h</text>
</svg>
