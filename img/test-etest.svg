<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>E-test 浓度梯度法</title><desc>预制连续浓度梯度的试条贴于接种平板，药物扩散形成对称椭圆抑菌区；椭圆边缘与试条刻度相交处直接读出 MIC，交点落在两刻度之间取较高刻度</desc>
<defs>
  <marker id="etArr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2b6cb0"/></marker>
  <radialGradient id="etAgar" cx="42%" cy="34%" r="74%">
    <stop offset="0%" stop-color="#efe7d2"/><stop offset="100%" stop-color="#e4dabd"/>
  </radialGradient>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">E-test 浓度梯度法</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">药敏试验方法</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">试条上的连续浓度梯度扩散成椭圆抑菌区，边缘与刻度交点即 MIC</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>
<line x1="208" y1="66" x2="208" y2="250" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== ❶ 平板：接种与贴条 ===== -->
<circle cx="32" cy="76" r="7.5" fill="#1f2733"/>
<text x="32" y="79.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="45" y="80" font-size="10" font-weight="700" fill="#33404f">接种平板 + 贴试条</text>

<circle cx="112" cy="164" r="76" fill="url(#etAgar)" stroke="#c8b887" stroke-width="2.4"/>

<!-- 菌苔（生长区）质地 -->
<g fill="#c1ae7c" opacity="0.85">
  <circle cx="48" cy="140" r="1.8"/><circle cx="58" cy="122" r="1.8"/><circle cx="46" cy="160" r="1.8"/>
  <circle cx="60" cy="150" r="1.8"/><circle cx="56" cy="176" r="1.8"/><circle cx="48" cy="130" r="1.8"/>
  <circle cx="66" cy="112" r="1.8"/><circle cx="78" cy="102" r="1.8"/><circle cx="62" cy="188" r="1.8"/>
  <circle cx="50" cy="196" r="1.8"/><circle cx="72" cy="198" r="1.8"/><circle cx="86" cy="204" r="1.8"/>
  <circle cx="60" cy="212" r="1.8"/><circle cx="76" cy="224" r="1.8"/><circle cx="94" cy="216" r="1.8"/>
  <circle cx="100" cy="228" r="1.8"/><circle cx="124" cy="228" r="1.8"/><circle cx="138" cy="220" r="1.8"/>
  <circle cx="156" cy="208" r="1.8"/><circle cx="168" cy="192" r="1.8"/><circle cx="160" cy="176" r="1.8"/>
  <circle cx="172" cy="160" r="1.8"/><circle cx="166" cy="140" r="1.8"/><circle cx="158" cy="118" r="1.8"/>
  <circle cx="146" cy="104" r="1.8"/><circle cx="112" cy="238" r="1.8"/>
</g>

<!-- 椭圆形抑菌区：上宽（高浓度）→ 下端收敛于试条 -->
<path d="M112,190 C74,180 68,110 112,96 C156,110 150,180 112,190 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="1.3" stroke-dasharray="5,3"/>

<!-- E-test 试条 -->
<rect x="105" y="94" width="14" height="138" rx="2" fill="#ffffff" stroke="#8c96a2" stroke-width="1.2"/>
<g stroke="#8c96a2" stroke-width="1">
  <line x1="119" y1="100" x2="124" y2="100"/><line x1="119" y1="130" x2="124" y2="130"/>
  <line x1="119" y1="160" x2="124" y2="160"/><line x1="119" y1="190" x2="124" y2="190"/>
  <line x1="119" y1="220" x2="124" y2="220"/>
</g>
<g font-size="9.5" fill="#5c6672">
  <text x="126" y="103">256</text><text x="126" y="133">32</text><text x="126" y="163">4</text>
  <text x="126" y="223">0.064</text>
</g>
<text x="126" y="193" font-size="9.5" font-weight="700" fill="#2b6cb0">0.5</text>
<circle cx="112" cy="190" r="3.2" fill="#2b6cb0"/>

<text x="103" y="130" text-anchor="end" font-size="9.5" fill="#8a6d2f">抑菌区</text>
<text x="100" y="210" text-anchor="end" font-size="9.5" fill="#8a6d2f">菌苔生长</text>
<text x="112" y="248" text-anchor="middle" font-size="9.5" fill="#33404f">椭圆边缘与试条交点即 MIC = 0.5 µg/mL</text>

<!-- ===== ❷ 读数规则（放大） ===== -->
<circle cx="230" cy="76" r="7.5" fill="#1f2733"/>
<text x="230" y="79.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="243" y="80" font-size="10" font-weight="700" fill="#33404f">读数规则（试条局部放大）</text>

<!-- 放大 A：交点正对刻度 -->
<rect x="222" y="88" width="112" height="84" fill="#efe7d2" stroke="#c8b887" stroke-width="1.2"/>
<path d="M222,92 L267,92 L267,144 C258,140 232,120 222,98 Z" fill="#faf8f1" stroke="#c8b887" stroke-dasharray="4,3"/>
<path d="M334,92 L289,92 L289,144 C298,140 324,120 334,98 Z" fill="#faf8f1" stroke="#c8b887" stroke-dasharray="4,3"/>
<rect x="267" y="92" width="22" height="76" fill="#ffffff" stroke="#8c96a2" stroke-width="1.2"/>
<g font-size="9.5" fill="#33404f" text-anchor="middle">
  <text x="278" y="107">4</text><text x="278" y="127">2</text><text x="278" y="147">1</text><text x="278" y="167">0.5</text>
</g>
<circle cx="267" cy="144" r="2.6" fill="#2b6cb0"/><circle cx="289" cy="144" r="2.6" fill="#2b6cb0"/>
<line x1="316" y1="144" x2="294" y2="144" stroke="#2b6cb0" stroke-width="1.2" marker-end="url(#etArr)"/>
<text x="278" y="186" text-anchor="middle" font-size="9.5" fill="#33404f">交点正对刻度 → 读 1</text>

<!-- 放大 B：交点落在两刻度之间 -->
<rect x="344" y="88" width="112" height="84" fill="#efe7d2" stroke="#c8b887" stroke-width="1.2"/>
<path d="M344,92 L389,92 L389,134 C380,130 354,116 344,98 Z" fill="#faf8f1" stroke="#c8b887" stroke-dasharray="4,3"/>
<path d="M456,92 L411,92 L411,134 C420,130 446,116 456,98 Z" fill="#faf8f1" stroke="#c8b887" stroke-dasharray="4,3"/>
<rect x="389" y="92" width="22" height="76" fill="#ffffff" stroke="#8c96a2" stroke-width="1.2"/>
<g font-size="9.5" fill="#33404f" text-anchor="middle">
  <text x="400" y="107">4</text><text x="400" y="127">2</text><text x="400" y="147">1</text><text x="400" y="167">0.5</text>
</g>
<circle cx="389" cy="134" r="2.6" fill="#2b6cb0"/><circle cx="411" cy="134" r="2.6" fill="#2b6cb0"/>
<line x1="432" y1="138" x2="432" y2="120" stroke="#2b6cb0" stroke-width="1.2" marker-end="url(#etArr)"/>
<text x="400" y="186" text-anchor="middle" font-size="9.5" fill="#33404f">落在刻度间 → 取较高 2</text>

<!-- 方法/局限 -->
<rect x="222" y="198" width="234" height="46" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="232" y="216" font-size="9.5" fill="#5c6672">0.5 麦氏菌液涂 M-H，35℃ 16–18 h；万古霉素 24 h</text>
<text x="232" y="234" font-size="9.5" fill="#33404f">苛养菌 MH-F+5% CO₂ 20–24 h；试条贵，多用关键药</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">直接读出 MIC 而非仅 S/I/R，比纸片法更精确</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　需精确 MIC 时首选：肺炎链球菌青霉素、葡萄球菌万古霉素、心内膜炎用药</text>
</svg>
