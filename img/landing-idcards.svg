<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 452" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="452" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">VITEK 2 鉴定卡原理与选卡</text>
  <text x="240" y="46" text-anchor="middle" font-size="11" fill="#8a8f98">64 孔密闭塑卡，比色 / 荧光生化底物 + AES 专家系统自动鉴定</text>

  <!-- ===== 64 孔卡示意 ===== -->
  <text x="96" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#2e6b66">64 孔生化卡</text>
  <rect x="36" y="84" width="120" height="120" rx="6" fill="#faf9f5" stroke="#c9b98a" stroke-width="2"/>
  <g>
    <!-- 8x8 微孔，部分着色示反应阴阳 -->
    <!-- 行列循环用显式小圆 -->
    <g fill="#e7decb" stroke="#cabf9f" stroke-width="0.6">
      <circle cx="50" cy="98" r="5"/><circle cx="64" cy="98" r="5"/><circle cx="78" cy="98" r="5"/><circle cx="92" cy="98" r="5"/><circle cx="106" cy="98" r="5"/><circle cx="120" cy="98" r="5"/><circle cx="134" cy="98" r="5"/><circle cx="148" cy="98" r="5"/>
      <circle cx="50" cy="112" r="5"/><circle cx="64" cy="112" r="5"/><circle cx="78" cy="112" r="5"/><circle cx="92" cy="112" r="5"/><circle cx="106" cy="112" r="5"/><circle cx="120" cy="112" r="5"/><circle cx="134" cy="112" r="5"/><circle cx="148" cy="112" r="5"/>
      <circle cx="50" cy="126" r="5"/><circle cx="64" cy="126" r="5"/><circle cx="78" cy="126" r="5"/><circle cx="92" cy="126" r="5"/><circle cx="106" cy="126" r="5"/><circle cx="120" cy="126" r="5"/><circle cx="134" cy="126" r="5"/><circle cx="148" cy="126" r="5"/>
      <circle cx="50" cy="140" r="5"/><circle cx="64" cy="140" r="5"/><circle cx="78" cy="140" r="5"/><circle cx="92" cy="140" r="5"/><circle cx="106" cy="140" r="5"/><circle cx="120" cy="140" r="5"/><circle cx="134" cy="140" r="5"/><circle cx="148" cy="140" r="5"/>
      <circle cx="50" cy="154" r="5"/><circle cx="64" cy="154" r="5"/><circle cx="78" cy="154" r="5"/><circle cx="92" cy="154" r="5"/><circle cx="106" cy="154" r="5"/><circle cx="120" cy="154" r="5"/><circle cx="134" cy="154" r="5"/><circle cx="148" cy="154" r="5"/>
      <circle cx="50" cy="168" r="5"/><circle cx="64" cy="168" r="5"/><circle cx="78" cy="168" r="5"/><circle cx="92" cy="168" r="5"/><circle cx="106" cy="168" r="5"/><circle cx="120" cy="168" r="5"/><circle cx="134" cy="168" r="5"/><circle cx="148" cy="168" r="5"/>
      <circle cx="50" cy="182" r="5"/><circle cx="64" cy="182" r="5"/><circle cx="78" cy="182" r="5"/><circle cx="92" cy="182" r="5"/><circle cx="106" cy="182" r="5"/><circle cx="120" cy="182" r="5"/><circle cx="134" cy="182" r="5"/><circle cx="148" cy="182" r="5"/>
    </g>
    <!-- 着色覆盖：黄(产酸)/紫(脱羧)/蓝(产碱)/荧光绿 -->
    <g stroke="#0000001a" stroke-width="0.6">
      <circle cx="64" cy="98" r="5" fill="#e0c84a"/><circle cx="106" cy="98" r="5" fill="#7b5ea8"/><circle cx="148" cy="112" r="5" fill="#e0c84a"/>
      <circle cx="50" cy="126" r="5" fill="#2f6bb0"/><circle cx="92" cy="126" r="5" fill="#e0c84a"/><circle cx="134" cy="140" r="5" fill="#7b5ea8"/>
      <circle cx="64" cy="154" r="5" fill="#3f9e5a"/><circle cx="120" cy="154" r="5" fill="#e0c84a"/><circle cx="78" cy="168" r="5" fill="#cf4f86"/>
      <circle cx="106" cy="182" r="5" fill="#2f6bb0"/><circle cx="50" cy="98" r="5" fill="#e0c84a"/>
    </g>
  </g>
  <text x="96" y="220" text-anchor="middle" font-size="9" fill="#8a8f98">各孔显色/荧光 = 一项生化反应的阴阳</text>

  <!-- ===== 原理流程(右侧竖排) ===== -->
  <g font-size="10.5" fill="#454b54">
    <text x="200" y="92" font-size="11" font-weight="700" fill="#23272e">鉴定流程</text>
    <g>
      <circle cx="208" cy="112" r="9" fill="#2e6b66"/><text x="208" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
      <text x="224" y="116">配标准菌悬液（按菌定 McFarland 浊度）</text>
      <circle cx="208" cy="138" r="9" fill="#2e6b66"/><text x="208" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
      <text x="224" y="142">导液管真空充注卡片并热封</text>
      <circle cx="208" cy="164" r="9" fill="#2e6b66"/><text x="208" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
      <text x="224" y="168">35℃ 密闭温育，每 15 min 光学读数</text>
      <circle cx="208" cy="190" r="9" fill="#2e6b66"/><text x="208" y="194" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
      <text x="224" y="194">比色 + 荧光动力学曲线</text>
      <circle cx="208" cy="216" r="9" fill="#5b4a8c"/><text x="208" y="220" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
      <text x="224" y="220">AES 专家系统比对数据库</text>
      <circle cx="208" cy="242" r="9" fill="#b04242"/><text x="208" y="246" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6</text>
      <text x="224" y="246">输出菌名 + 可信度（%）</text>
    </g>
  </g>

  <line x1="36" y1="266" x2="444" y2="266" stroke="#e6e2d8" stroke-width="1"/>

  <!-- ===== 7 种鉴定卡 ===== -->
  <text x="36" y="288" font-size="12" font-weight="700" fill="#2e6b66">七种鉴定卡（按菌选卡）</text>
  <g font-size="10">
    <g>
      <rect x="36" y="300" width="200" height="30" rx="5" fill="#f3f6f5" stroke="#cfe0dc"/>
      <text x="48" y="314" font-weight="700" fill="#2e6b66">GN</text><text x="48" y="326" fill="#8a8f98" font-size="8.5">0.5–0.63 McF</text>
      <text x="92" y="320" fill="#454b54">革兰阴性杆菌（肠杆菌/非发酵菌）</text>
    </g>
    <g>
      <rect x="244" y="300" width="200" height="30" rx="5" fill="#f3f6f5" stroke="#cfe0dc"/>
      <text x="256" y="314" font-weight="700" fill="#2e6b66">GP</text><text x="256" y="326" fill="#8a8f98" font-size="8.5">0.5–0.63 McF</text>
      <text x="300" y="320" fill="#454b54">革兰阳性球菌（葡/肠/链球菌）</text>
    </g>
    <g>
      <rect x="36" y="336" width="200" height="30" rx="5" fill="#f3f6f5" stroke="#cfe0dc"/>
      <text x="48" y="350" font-weight="700" fill="#3f7a52">YST</text><text x="48" y="362" fill="#8a8f98" font-size="8.5">1.8–2.2 McF</text>
      <text x="92" y="356" fill="#454b54">酵母菌（念珠菌/隐球菌）</text>
    </g>
    <g>
      <rect x="244" y="336" width="200" height="30" rx="5" fill="#f3f6f5" stroke="#cfe0dc"/>
      <text x="256" y="350" font-weight="700" fill="#8a6d1f">NH</text><text x="256" y="362" fill="#8a8f98" font-size="8.5">2.7–3.3 McF</text>
      <text x="296" y="356" fill="#454b54">苛养菌（奈瑟/嗜血杆菌）</text>
    </g>
    <g>
      <rect x="36" y="372" width="200" height="30" rx="5" fill="#f3f6f5" stroke="#cfe0dc"/>
      <text x="48" y="386" font-weight="700" fill="#5b4a8c">ANC</text><text x="48" y="398" fill="#8a8f98" font-size="8.5">2.7–3.3 McF</text>
      <text x="96" y="392" fill="#454b54">厌氧菌 / 棒状杆菌</text>
    </g>
    <g>
      <rect x="244" y="372" width="200" height="30" rx="5" fill="#f7f3ee" stroke="#e0d4c2"/>
      <text x="256" y="386" font-weight="700" fill="#8a5a3a">BCL · CBC</text><text x="256" y="398" fill="#8a8f98" font-size="8.5">科研(RUO)</text>
      <text x="332" y="392" fill="#454b54">芽胞杆菌 / 棒状杆菌</text>
    </g>
  </g>

  <text x="240" y="424" text-anchor="middle" font-size="9.5" fill="#8a8f98">鉴定卡在前、药敏卡在后同时上机；点击任一鉴定卡查看适用菌、上机要求与主要生化反应</text>
  <text x="240" y="442" text-anchor="middle" font-size="9" fill="#b0b4ba">数据来源：bioMérieux VITEK 2 Compact SOP（V9.02 &amp; V9.04, 2025-03）</text>
</svg>
