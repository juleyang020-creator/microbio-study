<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 364" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>VITEK 2 鉴定卡原理与选卡总览</title><desc>鉴定卡各微孔预置不同生化底物，密闭温育中每 15 min 动力学读数判各孔阴阳，形成生化谱与数据库比对，输出菌名及可信度；卡型按菌群与生长需求选择，菌悬液浊度随卡型不同</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="364" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">VITEK 2 鉴定卡原理与选卡总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">鉴定卡</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">各孔底物显色 → 阴阳生化谱 → 比对数据库出菌名与可信度</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ 卡内微孔预置不同底物 ===== -->
<rect x="24" y="66" width="116" height="112" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="85" r="8" fill="#1f2733"/><text x="38" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="52" y="89" font-size="10.5" font-weight="700" fill="#33404f">各孔预置底物</text>
<rect x="34" y="98" width="96" height="46" rx="4" fill="#ffffff" stroke="#b9c2cc"/>
<g fill="#eef1f5" stroke="#b9c2cc" stroke-width="0.7">
  <circle cx="43" cy="108" r="3.6"/><circle cx="55" cy="108" r="3.6"/><circle cx="67" cy="108" r="3.6"/><circle cx="79" cy="108" r="3.6"/><circle cx="91" cy="108" r="3.6"/><circle cx="103" cy="108" r="3.6"/><circle cx="115" cy="108" r="3.6"/>
  <circle cx="43" cy="121" r="3.6"/><circle cx="55" cy="121" r="3.6"/><circle cx="67" cy="121" r="3.6"/><circle cx="79" cy="121" r="3.6"/><circle cx="91" cy="121" r="3.6"/><circle cx="103" cy="121" r="3.6"/><circle cx="115" cy="121" r="3.6"/>
  <circle cx="43" cy="134" r="3.6"/><circle cx="55" cy="134" r="3.6"/><circle cx="67" cy="134" r="3.6"/><circle cx="79" cy="134" r="3.6"/><circle cx="91" cy="134" r="3.6"/><circle cx="103" cy="134" r="3.6"/><circle cx="115" cy="134" r="3.6"/>
</g>
<circle cx="124" cy="108" r="3.6" fill="#e3edf8" stroke="#2b6cb0" stroke-width="0.7"/>
<circle cx="124" cy="121" r="3.6" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="0.7"/>
<circle cx="124" cy="134" r="3.6" fill="#f9e6e4" stroke="#c2413d" stroke-width="0.7"/>
<text x="32" y="158" font-size="9.5" fill="#33404f">糖类 / 酶底物 / 抑制剂</text>
<text x="32" y="170" font-size="9.5" fill="#5c6672">一孔一项，另设对照孔</text>
<line x1="142" y1="120" x2="150" y2="120" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ===== ❷ 密闭温育、逐孔判阴阳 ===== -->
<rect x="152" y="66" width="116" height="112" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="166" cy="85" r="8" fill="#1f2733"/><text x="166" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<text x="180" y="89" font-size="10.5" font-weight="700" fill="#33404f">动力学逐孔读数</text>
<circle cx="186" cy="119" r="15" fill="#e8c84a" stroke="#a08c3c" stroke-width="1.2"/>
<text x="186" y="123.5" text-anchor="middle" font-size="12" font-weight="700" fill="#5a4a12">＋</text>
<circle cx="234" cy="119" r="15" fill="#fbfaf6" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="234" y="123.5" text-anchor="middle" font-size="12" font-weight="700" fill="#8a929c">－</text>
<text x="186" y="147" text-anchor="middle" font-size="9.5" fill="#33404f">底物被代谢</text>
<text x="234" y="147" text-anchor="middle" font-size="9.5" fill="#5c6672">无变化</text>
<text x="210" y="166" text-anchor="middle" font-size="9.5" fill="#5c6672">密闭温育，每 15 min 读数</text>
<line x1="270" y1="120" x2="278" y2="120" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ===== ❸ 生化谱与数据库比对 ===== -->
<rect x="280" y="66" width="176" height="112" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="294" cy="85" r="8" fill="#1f2733"/><text x="294" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<text x="308" y="89" font-size="10.5" font-weight="700" fill="#33404f">生化谱比对数据库</text>
<g stroke="#b9c2cc" stroke-width="0.8">
  <rect x="288" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="300" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
  <rect x="312" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="324" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="336" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
  <rect x="348" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
  <rect x="360" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="372" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
  <rect x="384" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="396" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
  <rect x="408" y="98" width="10" height="12" rx="2" fill="#e8c84a"/>
  <rect x="420" y="98" width="10" height="12" rx="2" fill="#ffffff"/>
</g>
<text x="288" y="124" font-size="9.5" fill="#33404f">阴阳组合＝该菌的生化指纹</text>
<line x1="368" y1="128" x2="368" y2="140" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<rect x="288" y="142" width="160" height="28" rx="6" fill="#e8f3ef" stroke="#2f8f83"/>
<text x="368" y="154" text-anchor="middle" font-size="9.5" fill="#1f2733">与卡型对应的数据库比对</text>
<text x="368" y="166" text-anchor="middle" font-size="9.5" fill="#2f8f83">→ 菌名 ＋ 可信度百分比</text>

<!-- ===== 选卡依据 ===== -->
<text x="24" y="196" font-size="10.5" font-weight="700" fill="#33404f">选卡依据：按菌群与生长需求定卡型</text>
<text x="456" y="196" text-anchor="end" font-size="9.5" fill="#5c6672">浊度按卡型说明书定，非按苛养程度</text>

<rect x="24" y="204" width="150" height="20" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="99" y="217.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">0.5–0.63 McF</text>
<rect x="182" y="204" width="118" height="20" rx="6" fill="#eaeff5" stroke="#dbe2ea"/>
<text x="241" y="217.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">1.8–2.2 McF</text>
<rect x="308" y="204" width="148" height="20" rx="6" fill="#dde6f0" stroke="#c9d5e2"/>
<text x="382" y="217.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">2.7–3.3 McF</text>

<rect x="24" y="232" width="150" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="30" y="247" font-size="9.5" fill="#33404f"><tspan font-weight="700">GN</tspan>　肠杆菌目 · 非发酵菌</text>
<rect x="24" y="261" width="150" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="30" y="276" font-size="9.5" fill="#33404f"><tspan font-weight="700">GP</tspan>　葡萄球菌 · 肠球菌 · 链球菌</text>

<rect x="182" y="232" width="118" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="188" y="247" font-size="9.5" fill="#33404f"><tspan font-weight="700">YST</tspan>　念珠菌 · 隐球菌</text>
<rect x="182" y="261" width="118" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="188" y="276" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">BCL</tspan>　需氧芽胞杆菌</text>

<rect x="308" y="232" width="148" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="314" y="247" font-size="9.5" fill="#33404f"><tspan font-weight="700">NH</tspan>　奈瑟菌 · 嗜血杆菌等苛养菌</text>
<rect x="308" y="261" width="148" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="314" y="276" font-size="9.5" fill="#33404f"><tspan font-weight="700">ANC</tspan>　厌氧菌 · 棒状杆菌</text>
<rect x="308" y="290" width="148" height="24" rx="5" fill="#ffffff" stroke="#dfe4ea"/>
<text x="314" y="305" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">CBC</tspan>　棒状杆菌精细鉴定</text>

<text x="24" y="305" font-size="9.5" fill="#5c6672">BCL / CBC 美国标为科研（RUO）卡，各地注册状态不同</text>

<!-- 结论 -->
<text x="240" y="330" text-anchor="middle" font-size="11.5" fill="#33404f">卡型选错＝比对了别的数据库：先定菌群，再定卡与浊度</text>

<!-- 页脚 -->
<rect x="24" y="338" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="353" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">上机前提</tspan>　纯培养、菌龄合规的新鲜菌落；混菌或陈旧菌落只会得到低可信度结果</text>
</svg>
