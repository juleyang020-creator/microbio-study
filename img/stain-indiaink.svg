<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>墨汁负染</title><desc>脑脊液沉渣与墨汁等量混匀直接镜检：碳颗粒进不去新型隐球菌宽厚荚膜，黑背景上出现透明亮晕并见窄基出芽；白细胞、脂滴无亮晕不出芽，阴性不能排除隐球菌</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <radialGradient id="ink" cx="42%" cy="36%" r="72%">
    <stop offset="0%" stop-color="#33383f"/><stop offset="100%" stop-color="#21242a"/>
  </radialGradient>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">墨汁负染</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">特殊结构染色</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">墨汁碳颗粒进不去宽厚荚膜 → 黑背景上呈透明亮晕</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 上半：试剂步骤 ===== -->
<!-- ❶ 脑脊液沉渣 -->
<rect x="24" y="72" width="136" height="52" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<rect x="35" y="84" width="14" height="28" rx="6" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<path d="M35,100 h14 v6 a7,7 0 0 1 -14,0 z" fill="#b9c2cc"/>
<text x="58" y="94" font-size="10.5" font-weight="700" fill="#33404f">脑脊液沉渣</text>
<text x="58" y="110" font-size="9.5" fill="#5c6672">离心取沉渣一滴</text>
<circle cx="36" cy="72" r="8" fill="#1f2733"/>
<text x="36" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>

<line x1="161" y1="98" x2="171" y2="98" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❷ 墨汁 -->
<rect x="172" y="72" width="136" height="52" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="190" cy="98" r="11" fill="url(#ink)"/>
<g fill="#6d747d"><circle cx="186" cy="95" r="1.1"/><circle cx="193" cy="99" r="1.1"/><circle cx="189" cy="103" r="1.1"/></g>
<text x="206" y="94" font-size="10.5" font-weight="700" fill="#33404f">等量墨汁混匀</text>
<text x="206" y="110" font-size="9.5" fill="#5c6672">碳颗粒只衬背景</text>
<circle cx="184" cy="72" r="8" fill="#1f2733"/>
<text x="184" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>

<line x1="309" y1="98" x2="319" y2="98" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❸ 加盖玻片镜检 -->
<rect x="320" y="72" width="136" height="52" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<rect x="330" y="88" width="24" height="20" rx="2" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<rect x="336" y="92" width="13" height="13" fill="#eef1f5" stroke="#8c96a2" stroke-width="1"/>
<text x="362" y="94" font-size="10.5" font-weight="700" fill="#33404f">加盖玻片镜检</text>
<text x="362" y="110" font-size="9.5" fill="#5c6672">不固定·不加热</text>
<circle cx="332" cy="72" r="8" fill="#1f2733"/>
<text x="332" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>

<!-- ===== 下半：镜下所见 ===== -->
<rect x="24" y="134" width="212" height="114" rx="8" fill="#fbfcfd" stroke="#e3e7ec"/>
<rect x="244" y="134" width="212" height="114" rx="8" fill="#fbfcfd" stroke="#e3e7ec"/>
<text x="34" y="148" font-size="10" font-weight="700" fill="#33404f">阳性 · 隐球菌属</text>
<text x="254" y="148" font-size="10" font-weight="700" fill="#8c96a2">阴性 / 易误判结构</text>

<!-- 左视野 -->
<circle cx="72" cy="194" r="38" fill="url(#ink)" stroke="#4a4f57" stroke-width="1.6"/>
<g fill="#5a616b" opacity="0.85">
  <circle cx="48" cy="172" r="1"/><circle cx="96" cy="176" r="1"/><circle cx="44" cy="200" r="1"/>
  <circle cx="100" cy="196" r="1"/><circle cx="72" cy="164" r="1"/><circle cx="60" cy="226" r="1"/>
  <circle cx="88" cy="228" r="1"/><circle cx="42" cy="188" r="1"/><circle cx="102" cy="210" r="1"/>
</g>
<!-- 母细胞 + 窄基出芽 -->
<circle cx="66" cy="188" r="20" fill="#e9edf1" opacity="0.95"/>
<circle cx="85" cy="174" r="12" fill="#e9edf1" opacity="0.95"/>
<polygon points="73.0,179.8 78.7,175.6 81.7,179.6 76.0,183.8" fill="#aeb9c2"/>
<circle cx="66" cy="188" r="10.5" fill="#aeb9c2" stroke="#7d8a96" stroke-width="1"/>
<circle cx="85" cy="174" r="6" fill="#aeb9c2" stroke="#7d8a96" stroke-width="1"/>
<!-- 其他菌体 -->
<circle cx="54" cy="216" r="9" fill="#e9edf1" opacity="0.95"/>
<circle cx="54" cy="216" r="5" fill="#aeb9c2" stroke="#7d8a96" stroke-width="1"/>
<circle cx="90" cy="208" r="11" fill="#e9edf1" opacity="0.92"/>
<circle cx="90" cy="208" r="5.5" fill="#aeb9c2" stroke="#7d8a96" stroke-width="1"/>
<!-- 指引线 -->
<line x1="66" y1="173" x2="114" y2="164" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="66" cy="173" r="2" fill="#e9edf1"/>
<line x1="87" y1="180" x2="114" y2="192" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="87" cy="180" r="2" fill="#aeb9c2"/>
<text x="118" y="168" font-size="9.5" font-weight="700" fill="#33404f">透明荚膜亮晕</text>
<text x="118" y="182" font-size="9.5" fill="#5c6672">墨汁进不去荚膜</text>
<text x="118" y="196" font-size="9.5" font-weight="700" fill="#33404f">窄基出芽</text>
<text x="118" y="210" font-size="9.5" fill="#5c6672">菌体圆形、折光</text>

<!-- 右视野 -->
<circle cx="294" cy="194" r="38" fill="url(#ink)" stroke="#4a4f57" stroke-width="1.6"/>
<g fill="#5a616b" opacity="0.85">
  <circle cx="270" cy="172" r="1"/><circle cx="318" cy="178" r="1"/><circle cx="266" cy="202" r="1"/>
  <circle cx="322" cy="196" r="1"/><circle cx="294" cy="164" r="1"/><circle cx="282" cy="226" r="1"/>
  <circle cx="310" cy="226" r="1"/><circle cx="264" cy="188" r="1"/><circle cx="324" cy="210" r="1"/>
</g>
<circle cx="282" cy="182" r="19" fill="none" stroke="#c2413d" stroke-width="1" stroke-dasharray="3,3"/>
<circle cx="282" cy="182" r="11" fill="#cfd6dc" stroke="#9aa7b3" stroke-width="1"/>
<g fill="#9aa7b3"><circle cx="278" cy="179" r="4"/><circle cx="285" cy="184" r="4"/></g>
<circle cx="310" cy="176" r="8" fill="#cfd6dc" stroke="#9aa7b3" stroke-width="1"/>
<circle cx="310" cy="176" r="4" fill="#9aa7b3"/>
<circle cx="306" cy="208" r="9" fill="#d8dde2" stroke="#eef1f5" stroke-width="1.4"/>
<line x1="282" y1="163" x2="336" y2="164" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="282" cy="163" r="2" fill="#c2413d"/>
<text x="340" y="168" font-size="9.5" font-weight="700" fill="#8c96a2">无透明亮晕</text>
<text x="340" y="182" font-size="9.5" fill="#5c6672">白细胞、脂滴虽圆</text>
<text x="340" y="196" font-size="9.5" fill="#5c6672">但无荚膜带不出芽</text>
<text x="340" y="210" font-size="9.5" fill="#33404f">阴性不能排除感染</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">黑背景中见透明荚膜亮晕＋窄基出芽 → 提示隐球菌属（定种靠培养）</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">主要用途</tspan>　脑脊液隐球菌快速辅助镜检 · 确诊首选荚膜抗原 CrAg（阴性亦须送检）</text>
</svg>
