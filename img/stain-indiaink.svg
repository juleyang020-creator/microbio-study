<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>墨汁负染</title><desc>墨汁衬黑背景，荚膜不着墨 → 透明亮晕（新型隐球菌）</desc>
  <defs>
    <radialGradient id="inkField" cx="42%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#23272e"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">墨汁负染</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#8a8f98">墨汁衬黑背景，荚膜不着墨 → 透明亮晕（新型隐球菌）</text>

  <!-- 暗背景视野 -->
  <circle cx="200" cy="158" r="104" fill="url(#inkField)" stroke="#4a4f57" stroke-width="2"/>

  <!-- 隐球菌：透明荚膜晕(浅) + 菌体 + 窄基出芽 -->
  <!-- 个体1(大,带芽) -->
  <circle cx="178" cy="140" r="30" fill="#dfe3ea" opacity="0.92"/>
  <circle cx="178" cy="140" r="16" fill="#9fb7b2"/>
  <circle cx="178" cy="140" r="16" fill="none" stroke="#6f8c87" stroke-width="1"/>
  <!-- 窄基出芽 -->
  <circle cx="206" cy="118" r="17" fill="#dfe3ea" opacity="0.92"/>
  <circle cx="206" cy="118" r="8.5" fill="#9fb7b2"/>
  <rect x="192" y="126" width="6" height="6" fill="#9fb7b2" transform="rotate(-45 195 129)"/>

  <!-- 个体2 -->
  <circle cx="150" cy="196" r="24" fill="#dfe3ea" opacity="0.92"/>
  <circle cx="150" cy="196" r="12" fill="#9fb7b2"/>
  <circle cx="150" cy="196" r="12" fill="none" stroke="#6f8c87" stroke-width="1"/>

  <!-- 个体3(小) -->
  <circle cx="232" cy="188" r="20" fill="#dfe3ea" opacity="0.9"/>
  <circle cx="232" cy="188" r="10" fill="#9fb7b2"/>

  <!-- 标注 -->
  <line x1="178" y1="140" x2="178" y2="140"/>
  <line x1="200" y1="112" x2="334" y2="92" stroke="#cfcabd" stroke-width="1"/>
  <circle cx="200" cy="112" r="2.2" fill="#dfe3ea"/>
  <text x="340" y="88" font-size="11" font-weight="700" fill="#3f7a52">透明荚膜亮晕</text>
  <text x="340" y="104" font-size="11" fill="#8a8f98">墨汁不能进入宽厚荚膜</text>

  <line x1="178" y1="140" x2="334" y2="150" stroke="#cfcabd" stroke-width="1"/>
  <circle cx="178" cy="140" r="2.2" fill="#9fb7b2"/>
  <text x="340" y="146" font-size="11" font-weight="700" fill="#454b54">圆形酵母菌体</text>

  <line x1="206" y1="118" x2="334" y2="206" stroke="#cfcabd" stroke-width="1"/>
  <circle cx="206" cy="118" r="2.2" fill="#9fb7b2"/>
  <text x="340" y="210" font-size="11" font-weight="700" fill="#345f86">窄基出芽</text>

  <text x="240" y="288" text-anchor="middle" font-size="11" fill="#8a8f98">脑脊液中新型隐球菌的快速检测</text>
</svg>
