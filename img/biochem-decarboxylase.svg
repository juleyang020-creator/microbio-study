<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>脱羧酶试验（赖氨酸 / 鸟氨酸）</title><desc>Møller 脱羧酶肉汤：阴性管仅发酵葡萄糖产酸呈黄色，阳性管氨基酸脱羧产碱性胺使 pH 升高、溴甲酚紫由黄转紫；两侧均设无氨基酸对照管，液体石蜡封层维持厌氧</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">脱羧酶试验（赖氨酸 / 鸟氨酸）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生化试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">氨基酸脱羧产碱性胺 → pH 升高 → 溴甲酚紫由黄转紫</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：阴性 ===== -->
<rect x="24" y="70" width="204" height="120" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<text x="36" y="86" font-size="10" font-weight="700" fill="#33404f">阴性（−）</text>
<text x="216" y="86" text-anchor="end" font-size="9.5" fill="#5c6672">仅发酵葡萄糖产酸</text>
<text x="30" y="110" font-size="9.5" fill="#8a6d2f">石蜡封层</text>
<text x="30" y="124" font-size="9.5" fill="#8a6d2f">隔绝空气</text>
<line x1="70" y1="105" x2="83" y2="98" stroke="#d9b96a" stroke-width="1"/>

<!-- 左 对照管 -->
<path d="M85,92 L85,158 Q85,172 100,172 Q115,172 115,158 L115,92 Z" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.4"/>
<path d="M85,104 L115,104 L115,158 Q115,172 100,172 Q85,172 85,158 Z" fill="#cdb85f"/>
<rect x="85" y="92" width="30" height="12" fill="#f7ecd4"/>
<ellipse cx="100" cy="92" rx="15" ry="4" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="100" y="184" text-anchor="middle" font-size="9.5" fill="#5c6672">对照管</text>

<!-- 左 氨基酸管 -->
<path d="M145,92 L145,158 Q145,172 160,172 Q175,172 175,158 L175,92 Z" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.4"/>
<path d="M145,104 L175,104 L175,158 Q175,172 160,172 Q145,172 145,158 Z" fill="#cdb85f"/>
<rect x="145" y="92" width="30" height="12" fill="#f7ecd4"/>
<ellipse cx="160" cy="92" rx="15" ry="4" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="160" y="184" text-anchor="middle" font-size="9.5" fill="#5c6672">赖/鸟氨酸管</text>

<line x1="240" y1="76" x2="240" y2="184" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== 右：阳性 ===== -->
<rect x="252" y="70" width="204" height="120" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<text x="264" y="86" font-size="10" font-weight="700" fill="#33404f">阳性（＋）</text>
<text x="444" y="86" text-anchor="end" font-size="9.5" fill="#5c6672">脱羧产碱性胺</text>
<text x="256" y="110" font-size="9.5" fill="#5c6672">35℃ 孵育</text>
<text x="256" y="124" font-size="9.5" fill="#5c6672">24–48 h</text>

<!-- 右 对照管 -->
<path d="M313,92 L313,158 Q313,172 328,172 Q343,172 343,158 L343,92 Z" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.4"/>
<path d="M313,104 L343,104 L343,158 Q343,172 328,172 Q313,172 313,158 Z" fill="#cdb85f"/>
<rect x="313" y="92" width="30" height="12" fill="#f7ecd4"/>
<ellipse cx="328" cy="92" rx="15" ry="4" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="328" y="184" text-anchor="middle" font-size="9.5" fill="#5c6672">对照管</text>

<!-- 右 氨基酸管（紫） -->
<path d="M373,92 L373,158 Q373,172 388,172 Q403,172 403,158 L403,92 Z" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.4"/>
<path d="M373,104 L403,104 L403,158 Q403,172 388,172 Q373,172 373,158 Z" fill="#9d7fb4"/>
<rect x="373" y="92" width="30" height="12" fill="#f7ecd4"/>
<ellipse cx="388" cy="92" rx="15" ry="4" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="388" y="184" text-anchor="middle" font-size="9.5" fill="#5c6672">赖/鸟氨酸管</text>

<!-- ===== 化学转化带 ===== -->
<rect x="24" y="194" width="432" height="54" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>

<rect x="30" y="211" width="78" height="20" rx="10" fill="#ffffff" stroke="#b9c2cc"/>
<text x="69" y="225" text-anchor="middle" font-size="9.5" fill="#33404f">赖氨酸 / 鸟氨酸</text>
<line x1="110" y1="221" x2="130" y2="221" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<text x="121" y="207" text-anchor="middle" font-size="9.5" fill="#1f4e79">脱羧酶</text>

<rect x="134" y="211" width="92" height="20" rx="10" fill="#ffffff" stroke="#b9c2cc"/>
<text x="180" y="225" text-anchor="middle" font-size="9.5" fill="#33404f">尸胺 / 腐胺 + CO₂</text>
<line x1="228" y1="221" x2="248" y2="221" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<text x="239" y="207" text-anchor="middle" font-size="9.5" fill="#5c6672">碱化</text>

<rect x="252" y="211" width="68" height="20" rx="10" fill="#ffffff" stroke="#b9c2cc"/>
<text x="286" y="225" text-anchor="middle" font-size="9.5" fill="#33404f">pH 升高</text>
<line x1="322" y1="221" x2="342" y2="221" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<text x="333" y="207" text-anchor="middle" font-size="9.5" fill="#5c6672">溴甲酚紫</text>

<rect x="348" y="211" width="34" height="20" rx="4" fill="#cdb85f" stroke="#b9c2cc"/>
<text x="365" y="225" text-anchor="middle" font-size="9.5" fill="#4a3f14">黄</text>
<line x1="384" y1="221" x2="398" y2="221" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>
<rect x="402" y="211" width="34" height="20" rx="4" fill="#9d7fb4" stroke="#b9c2cc"/>
<text x="419" y="225" text-anchor="middle" font-size="9.5" fill="#ffffff">紫</text>

<text x="36" y="244" font-size="9.5" fill="#5c6672">须与无氨基酸对照管同时判读；石蜡封层维持厌氧酸性，是脱羧酶激活的前提</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">变紫为阳性、变黄为阴性；赖/鸟氨酸组合是肠杆菌科分群关键</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　赖+/鸟± 大肠埃希菌 · 赖+/鸟+ 沙门菌属 · 赖+/鸟− 肺炎克雷伯菌 · 赖− 志贺菌属、变形杆菌属</text>
</svg>
