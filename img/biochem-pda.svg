<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>苯丙氨酸脱氨酶试验</title><desc>苯丙氨酸琼脂斜面孵育后滴加 10% FeCl₃：阴性斜面保持原色，产苯丙氨酸脱氨酶者生成苯丙酮酸，与三价铁络合使斜面转深绿</desc>
<defs>
  <marker id="pa" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="pb" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8c96a2"/></marker>
  <linearGradient id="pg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e8dfc0"/><stop offset="0.4" stop-color="#cfd6b0"/><stop offset="1" stop-color="#2f7d4f"/>
  </linearGradient>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">苯丙氨酸脱氨酶试验</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生化试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">苯丙氨酸被脱氨为苯丙酮酸 → 与 FeCl₃ 络合显绿色</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：阴性管 ===== -->
<rect x="26" y="62" width="88" height="16" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="70" y="73.5" text-anchor="middle" font-size="9.5" fill="#5c6672">阴性（无脱氨酶）</text>
<path d="M50,84 L50,174 Q50,190 70,190 Q90,190 90,174 L90,84 Z" fill="#fdfcf8" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M50,124 L90,108 L90,174 Q90,190 70,190 Q50,190 50,174 Z" fill="#e8dfc0"/>
<ellipse cx="70" cy="84" rx="20" ry="5" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.4"/>
<circle cx="66" cy="97" r="3" fill="#d9b96a"/><circle cx="76" cy="104" r="2.4" fill="#d9b96a"/>
<text x="70" y="202" text-anchor="middle" font-size="9.5" fill="#8a6d2f">斜面不变色（−）</text>

<!-- ===== 右：阳性管 ===== -->
<rect x="366" y="62" width="88" height="16" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="410" y="73.5" text-anchor="middle" font-size="9.5" fill="#5c6672">阳性（产脱氨酶）</text>
<path d="M390,84 L390,174 Q390,190 410,190 Q430,190 430,174 L430,84 Z" fill="#fdfcf8" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M390,124 L430,108 L430,174 Q430,190 410,190 Q390,190 390,174 Z" fill="#2f7d4f"/>
<ellipse cx="410" cy="84" rx="20" ry="5" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.4"/>
<circle cx="406" cy="97" r="3" fill="#d9b96a"/><circle cx="416" cy="104" r="2.4" fill="#d9b96a"/>
<text x="410" y="202" text-anchor="middle" font-size="9.5" fill="#2f7d4f">斜面转深绿（＋）</text>

<!-- ===== 中：化学转化链 ===== -->
<rect x="180" y="86" width="120" height="20" rx="10" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="100" text-anchor="middle" font-size="10" fill="#33404f">L-苯丙氨酸</text>

<line x1="240" y1="106" x2="240" y2="126" stroke="#33404f" stroke-width="1.4" marker-end="url(#pa)"/>
<rect x="252" y="107" width="76" height="16" rx="8" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="290" y="118.5" text-anchor="middle" font-size="9.5" fill="#1f4e79">苯丙氨酸脱氨酶</text>

<rect x="168" y="128" width="144" height="20" rx="10" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="142" text-anchor="middle" font-size="10" fill="#33404f">苯丙酮酸 ＋ NH₃</text>

<line x1="240" y1="148" x2="240" y2="167" stroke="#33404f" stroke-width="1.4" marker-end="url(#pa)"/>
<text x="248" y="162" font-size="9.5" fill="#5c6672">滴加 10% FeCl₃</text>

<text x="150" y="163" font-size="9.5" fill="#5c6672">Fe³⁺ 络合显色</text>
<rect x="150" y="168" width="180" height="16" rx="8" fill="url(#pg)" stroke="#e3e7ec"/>
<line x1="146" y1="176" x2="102" y2="176" stroke="#8c96a2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#pb)"/>
<line x1="334" y1="176" x2="384" y2="176" stroke="#8c96a2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#pb)"/>
<text x="150" y="196" font-size="9.5" fill="#8a6d2f">无酮酸：不显色</text>
<text x="330" y="196" text-anchor="end" font-size="9.5" fill="#2f7d4f">酮酸-铁络合物：绿</text>

<!-- ===== 操作与判读提示 ===== -->
<rect x="24" y="210" width="432" height="36" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="36" y="225" font-size="9.5" fill="#33404f">绿色不稳定：滴加 FeCl₃ 后数分钟内判读，久置褪色可致假阴性</text>
<text x="36" y="239" font-size="9.5" fill="#5c6672">斜面须密集划线接种、孵育 18–24 h；菌量不足时绿色浅淡易漏判</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">滴加 FeCl₃ 后斜面转绿即阳性，肠杆菌目中基本只见于 PPM 群</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　阳性：奇异变形杆菌 · 摩根摩根菌 · 普罗威登斯菌属　阴性：大肠埃希菌 · 沙门菌属</text>
</svg>
