<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 350" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>实验室试验总览</title><desc>实验室试验按「要回答什么问题」分类：药敏试验方法用纸片法、梯度试条、微量板测出抑菌圈或 MIC 判 S/I/R；耐药表型检测用 D 试验、ESBL 确证、mCIM 确证耐药机制；鉴别试验用玻片酶反应、CAMP 等平板试验与质谱靶板定菌种</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#c2413d"/></marker>
  <marker id="arrS" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto-start-reverse"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="350" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">实验室试验总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">试验模块</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">按“要回答什么问题”分类：测药效 · 查机制 · 定菌种</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ 药敏试验方法 ===== -->
<g transform="translate(24,66)">
  <rect x="0" y="0" width="432" height="72" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
  <rect x="148" y="4" width="280" height="52" rx="6" fill="#ffffff" stroke="#eceff3"/>
  <circle cx="20" cy="17" r="8" fill="#1f2733"/>
  <text x="20" y="20.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <text x="33" y="21" font-size="11" font-weight="700" fill="#33404f">药敏试验方法</text>
  <text x="8" y="38" font-size="9.5" fill="#33404f">问：还能用哪个药</text>
  <text x="8" y="51" font-size="9.5" fill="#5c6672">答：圈径或 MIC → S/I/R</text>
  <text x="8" y="64" font-size="9.5" fill="#a3332f">黏菌素禁纸片：BMD/CBDE</text>

  <!-- A 纸片扩散 -->
  <circle cx="195" cy="26" r="21" fill="#f5f7f9" stroke="#cfd6de"/>
  <circle cx="195" cy="26" r="13" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <circle cx="195" cy="26" r="4.5" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.2"/>
  <line x1="182" y1="26" x2="208" y2="26" stroke="#33404f" stroke-width="1" marker-start="url(#arrS)" marker-end="url(#arr)"/>
  <text x="195" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">纸片法：量圈径 (mm)</text>

  <!-- B 梯度试条 -->
  <circle cx="285" cy="26" r="21" fill="#f5f7f9" stroke="#cfd6de"/>
  <ellipse cx="285" cy="31" rx="15" ry="11" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <rect x="281" y="8" width="8" height="34" rx="1" fill="#ffffff" stroke="#6b7684" stroke-width="1"/>
  <g stroke="#b9c2cc"><line x1="281" y1="14" x2="289" y2="14"/><line x1="281" y1="26" x2="289" y2="26"/><line x1="281" y1="34" x2="289" y2="34"/></g>
  <circle cx="285" cy="20" r="2.4" fill="#c2413d"/>
  <text x="285" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">梯度试条：读 MIC</text>

  <!-- C 微量板 -->
  <g stroke="#b9c2cc" stroke-width="1">
    <circle cx="340" cy="20" r="4" fill="#c9ced5"/><circle cx="350" cy="20" r="4" fill="#c9ced5"/><circle cx="360" cy="20" r="4" fill="#c9ced5"/>
    <circle cx="370" cy="20" r="4" fill="#ffffff"/><circle cx="380" cy="20" r="4" fill="#ffffff"/><circle cx="390" cy="20" r="4" fill="#ffffff"/><circle cx="400" cy="20" r="4" fill="#ffffff"/><circle cx="410" cy="20" r="4" fill="#ffffff"/>
  </g>
  <line x1="370" y1="34" x2="370" y2="26" stroke="#c2413d" stroke-width="1.2" marker-end="url(#arrR)"/>
  <text x="375" y="44" text-anchor="middle" font-size="9.5" fill="#8c96a2">浓度 →</text>
  <text x="375" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">微量板：首个清亮孔</text>
</g>

<!-- ===== ❷ 耐药表型检测 ===== -->
<g transform="translate(24,144)">
  <rect x="0" y="0" width="432" height="72" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
  <rect x="148" y="4" width="280" height="52" rx="6" fill="#ffffff" stroke="#eceff3"/>
  <circle cx="20" cy="17" r="8" fill="#1f2733"/>
  <text x="20" y="20.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <text x="33" y="21" font-size="11" font-weight="700" fill="#33404f">耐药表型检测</text>
  <text x="8" y="38" font-size="9.5" fill="#33404f">问：耐在哪个机制</text>
  <text x="8" y="51" font-size="9.5" fill="#5c6672">答：确证酶或诱导耐药</text>
  <text x="8" y="64" font-size="9.5" fill="#a3332f">阳性多用于感控流调</text>

  <!-- A D 试验：克林霉素圈被红霉素侧截平 -->
  <circle cx="195" cy="26" r="21" fill="#f5f7f9" stroke="#cfd6de"/>
  <circle cx="181" cy="26" r="8.5" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <path d="M200,15.5 A11,11 0 1 1 200,36.5 Z" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <circle cx="181" cy="26" r="4" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.2"/>
  <circle cx="207" cy="26" r="4" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.2"/>
  <line x1="200" y1="15.5" x2="200" y2="36.5" stroke="#c2413d" stroke-width="1.4"/>
  <text x="195" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">D 试验（诱导 CLI）</text>

  <!-- B ESBL 确证：加酶抑制剂后圈明显增大 -->
  <circle cx="285" cy="26" r="21" fill="#f5f7f9" stroke="#cfd6de"/>
  <circle cx="285" cy="14" r="6" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <circle cx="285" cy="14" r="3.4" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.1"/>
  <circle cx="285" cy="34" r="12" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="3,2"/>
  <circle cx="285" cy="34" r="3.4" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.1"/>
  <g stroke="#c2413d" stroke-width="1.1" fill="none">
    <line x1="292" y1="20" x2="312" y2="20"/><line x1="298" y1="46" x2="312" y2="46"/>
    <line x1="310" y1="30" x2="310" y2="21" marker-end="url(#arrR)"/>
    <line x1="310" y1="36" x2="310" y2="45" marker-end="url(#arrR)"/>
  </g>
  <text x="285" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">ESBL：+克拉维酸</text>

  <!-- C mCIM：纸片在菌悬液中被酶灭活，移贴敏感指示菌 E. coli ATCC 25922 平板后圈缩小 -->
  <rect x="344" y="10" width="13" height="28" rx="4" fill="#eef1f5" stroke="#b9c2cc"/>
  <circle cx="350.5" cy="22" r="3.4" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.1"/>
  <line x1="360" y1="24" x2="370" y2="24" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>
  <circle cx="393" cy="26" r="16" fill="#f5f7f9" stroke="#cfd6de"/>
  <circle cx="393" cy="26" r="6" fill="#ffffff" stroke="#b9c2cc" stroke-dasharray="2,2"/>
  <circle cx="393" cy="26" r="3.6" fill="#ffffff" stroke="#2b6cb0" stroke-width="1.1"/>
  <text x="375" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">mCIM：圈≤15 mm＝产酶</text>
</g>

<!-- ===== ❸ 鉴别试验 ===== -->
<g transform="translate(24,222)">
  <rect x="0" y="0" width="432" height="72" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
  <rect x="148" y="4" width="280" height="52" rx="6" fill="#ffffff" stroke="#eceff3"/>
  <circle cx="20" cy="17" r="8" fill="#1f2733"/>
  <text x="20" y="20.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <text x="33" y="21" font-size="11" font-weight="700" fill="#33404f">鉴别试验</text>
  <text x="8" y="38" font-size="9.5" fill="#33404f">问：这是什么菌</text>
  <text x="8" y="51" font-size="9.5" fill="#5c6672">答：酶/溶血/质谱定种</text>
  <text x="8" y="64" font-size="9.5" fill="#a3332f">触酶勿挑血平板菌落</text>

  <!-- A 玻片法：触酶气泡 + 氧化酶变紫 -->
  <rect x="168" y="12" width="54" height="28" rx="2" fill="#ffffff" stroke="#cfd6de"/>
  <circle cx="182" cy="26" r="8" fill="#eef1f5" stroke="#cfd6de"/>
  <g fill="#ffffff" stroke="#6b7684" stroke-width="0.8"><circle cx="179" cy="23" r="2.2"/><circle cx="185" cy="25" r="1.8"/><circle cx="181" cy="29.5" r="1.6"/></g>
  <circle cx="208" cy="26" r="8" fill="#6b4a9a" stroke="#4c3572"/>
  <text x="195" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">玻片法：气泡/变紫</text>

  <!-- B CAMP：血平板上箭头形协同溶血 -->
  <circle cx="285" cy="26" r="21" fill="#f6e3e3" stroke="#d8b6b6"/>
  <line x1="292" y1="8" x2="292" y2="44" stroke="#8c96a2" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="266" y1="26" x2="280" y2="26" stroke="#8c96a2" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M279,18 L290,26 L279,34 Z" fill="#fdf6f6" stroke="#c2413d" stroke-width="1.2"/>
  <text x="285" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">CAMP：箭头形溶血</text>

  <!-- C 质谱靶板 → 指纹谱 -->
  <rect x="342" y="11" width="26" height="28" rx="3" fill="#f5f7f9" stroke="#cfd6de"/>
  <g fill="#6b7684"><circle cx="349" cy="18" r="2"/><circle cx="355" cy="18" r="2"/><circle cx="361" cy="18" r="2"/><circle cx="349" cy="25" r="2"/><circle cx="355" cy="25" r="2"/><circle cx="361" cy="25" r="2"/><circle cx="349" cy="32" r="2"/><circle cx="355" cy="32" r="2"/><circle cx="361" cy="32" r="2"/></g>
  <line x1="371" y1="25" x2="379" y2="25" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>
  <polyline points="384,39 388,39 388,22 390,22 390,39 395,39 395,14 397,14 397,39 402,39 402,28 404,28 404,39 409,39 409,20 411,20 411,39 416,39" fill="none" stroke="#2b6cb0" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="375" y="64" text-anchor="middle" font-size="9.5" fill="#5c6672">质谱：蛋白指纹谱</text>
</g>

<!-- 结论 -->
<text x="240" y="310" text-anchor="middle" font-size="11.5" fill="#33404f">先定菌 → 再测药 → 结果异常时再做表型确证</text>

<!-- 页脚：共同前提 -->
<rect x="24" y="318" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="334" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">共同前提</tspan>　纯培养单菌落 · 0.5 麦氏浊度 · 规定培养基与孵育时长 · 质控在控</text>
</svg>
