<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>罗氏培养基（L-J）</title><desc>罗氏培养基斜面：全蛋、甘油、天门冬酰胺、马铃薯淀粉加孔雀绿凝固成不透明淡绿色斜面；孔雀绿抑制多数杂菌但真菌仍可污染，标本先经 NALC-NaOH 液化去污染，分枝杆菌因分枝菌酸厚壁而耐受；无显色指示剂，凭生长速度、菌落形态与色素判读——结核分枝杆菌 4 至 8 周长出干燥颗粒状菜花样淡黄白菌落，堪萨斯分枝杆菌见光后转黄，偶发分枝杆菌等快生长菌 3 至 7 天即长出光滑湿润菌落</desc>
<defs>
  <clipPath id="s1"><path d="M32,138 L76,118 L76,140 L32,160 Z"/></clipPath>
  <clipPath id="s2"><path d="M88,138 L132,118 L132,140 L88,160 Z"/></clipPath>
  <clipPath id="s3"><path d="M144,138 L188,118 L188,140 L144,160 Z"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">罗氏培养基（L-J）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">选择性培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">孔雀绿抑杂菌、分枝杆菌照长；再凭生长速度与菌落色泽分种</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：三支斜面 ===== -->
<text x="24" y="76" font-size="9.5" fill="#5c6672">三支斜面：同法接种、同批孵育</text>

<!-- 管1 结核分枝杆菌 -->
<rect x="28" y="80" width="52" height="13" rx="3" fill="#dfe4ea" stroke="#c2c9d1"/>
<rect x="32" y="88" width="44" height="104" rx="7" fill="#f7f9fa" stroke="#c8ced4"/>
<path d="M32,138 L76,118 L76,180 A7,7 0 0 1 69,187 L39,187 A7,7 0 0 1 32,180 Z" fill="#a9c79b" stroke="#7ea36e" stroke-width="1.2"/>
<path d="M32,138 L76,118 L76,140 L32,160 Z" fill="#c1d9b3"/>
<g clip-path="url(#s1)">
  <circle cx="44" cy="148" r="4.6" fill="#e7dcb8" stroke="#a89355" stroke-width="1.1" stroke-dasharray="2,1.4"/>
  <circle cx="55" cy="144" r="4.2" fill="#e7dcb8" stroke="#a89355" stroke-width="1.1" stroke-dasharray="2,1.4"/>
  <circle cx="64" cy="139" r="4" fill="#e7dcb8" stroke="#a89355" stroke-width="1.1" stroke-dasharray="2,1.4"/>
</g>
<circle cx="54" cy="172" r="7.5" fill="#1f2733"/>
<text x="54" y="175.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<text x="54" y="205" text-anchor="middle" font-size="9.5" fill="#33404f">结核菌</text>
<text x="54" y="217" text-anchor="middle" font-size="9.5" fill="#5c6672">4–8 周</text>

<!-- 管2 堪萨斯分枝杆菌（光产色） -->
<rect x="84" y="80" width="52" height="13" rx="3" fill="#dfe4ea" stroke="#c2c9d1"/>
<rect x="88" y="88" width="44" height="104" rx="7" fill="#f7f9fa" stroke="#c8ced4"/>
<path d="M88,138 L132,118 L132,180 A7,7 0 0 1 125,187 L95,187 A7,7 0 0 1 88,180 Z" fill="#a9c79b" stroke="#7ea36e" stroke-width="1.2"/>
<path d="M88,138 L132,118 L132,140 L88,160 Z" fill="#c1d9b3"/>
<g clip-path="url(#s2)">
  <circle cx="94" cy="151" r="3" fill="#f0c93c" stroke="#b58f14" stroke-width="1" stroke-dasharray="2,1.4"/>
  <circle cx="100" cy="148" r="4.4" fill="#f0c93c" stroke="#b58f14" stroke-width="1.1" stroke-dasharray="2,1.4"/>
  <circle cx="111" cy="143" r="4.2" fill="#f0c93c" stroke="#b58f14" stroke-width="1.1" stroke-dasharray="2,1.4"/>
  <circle cx="121" cy="138" r="4" fill="#f0c93c" stroke="#b58f14" stroke-width="1.1" stroke-dasharray="2,1.4"/>
</g>
<!-- 光照 -->
<g stroke="#e0a91c" stroke-width="1.1" stroke-linecap="round">
  <line x1="110" y1="97" x2="110" y2="100"/><line x1="104" y1="104" x2="101" y2="104"/>
  <line x1="119" y1="104" x2="116" y2="104"/><line x1="105.5" y1="99.5" x2="103.5" y2="97.5"/>
  <line x1="114.5" y1="99.5" x2="116.5" y2="97.5"/>
</g>
<circle cx="110" cy="104" r="3.6" fill="#f2c53d" stroke="#c99a12" stroke-width="1"/>
<line x1="110" y1="110" x2="110" y2="124" stroke="#e0a91c" stroke-width="1.2" stroke-dasharray="3,2.4"/>
<circle cx="110" cy="172" r="7.5" fill="#1f2733"/>
<text x="110" y="175.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<text x="110" y="205" text-anchor="middle" font-size="9.5" fill="#33404f">堪萨斯菌</text>
<text x="110" y="217" text-anchor="middle" font-size="9.5" fill="#5c6672">2–3 周</text>

<!-- 管3 快生长分枝杆菌 -->
<rect x="140" y="80" width="52" height="13" rx="3" fill="#dfe4ea" stroke="#c2c9d1"/>
<rect x="144" y="88" width="44" height="104" rx="7" fill="#f7f9fa" stroke="#c8ced4"/>
<path d="M144,138 L188,118 L188,180 A7,7 0 0 1 181,187 L151,187 A7,7 0 0 1 144,180 Z" fill="#a9c79b" stroke="#7ea36e" stroke-width="1.2"/>
<path d="M144,138 L188,118 L188,140 L144,160 Z" fill="#c1d9b3"/>
<g clip-path="url(#s3)" fill="#f3ecdc" stroke="#c0b393" stroke-width="1">
  <circle cx="150" cy="152" r="2.8"/><circle cx="156" cy="150" r="2.6"/>
  <circle cx="162" cy="147" r="2.8"/><circle cx="168" cy="144" r="2.6"/>
  <circle cx="174" cy="141" r="2.8"/><circle cx="180" cy="138" r="2.6"/>
  <circle cx="155" cy="143" r="2.4"/><circle cx="167" cy="139" r="2.4"/>
  <circle cx="173" cy="134" r="2.4"/>
</g>
<circle cx="166" cy="172" r="7.5" fill="#1f2733"/>
<text x="166" y="175.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<text x="166" y="205" text-anchor="middle" font-size="9.5" fill="#33404f">偶发菌</text>
<text x="166" y="217" text-anchor="middle" font-size="9.5" fill="#5c6672">3–7 天</text>

<!-- ===== 右：选择成分 ===== -->
<rect x="204" y="70" width="252" height="74" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="214" y="86" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="214" y="103" font-size="9.5" fill="#5c6672">孔雀绿（碱性染料）→ 抑多数杂菌</text>
<circle cx="219" cy="117" r="5.5" fill="none" stroke="#9aa4ae" stroke-width="1.1" stroke-dasharray="3,2.5"/>
<g stroke="#c2413d" stroke-width="1.3" stroke-linecap="round">
  <line x1="215.6" y1="113.6" x2="222.4" y2="120.4"/><line x1="222.4" y1="113.6" x2="215.6" y2="120.4"/>
</g>
<text x="232" y="120.5" font-size="9.5" fill="#33404f">多数杂菌受抑；真菌仍可污染</text>
<text x="214" y="138" font-size="9.5" fill="#5c6672">标本先经 NALC-NaOH 液化去污染</text>

<!-- ===== 右：鉴别依据 ===== -->
<rect x="204" y="152" width="252" height="80" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="214" y="168" font-size="10" font-weight="700" fill="#33404f">鉴别依据：无显色剂，看这三点</text>
<circle cx="219" cy="184" r="6.5" fill="#1f2733"/>
<text x="219" y="187.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="235" cy="184" r="5" fill="#e7dcb8" stroke="#a89355" stroke-width="1" stroke-dasharray="2,1.4"/>
<text x="248" y="187.5" font-size="9.5" fill="#33404f">慢（4–8 周）、干燥菜花样</text>
<circle cx="219" cy="202" r="6.5" fill="#1f2733"/>
<text x="219" y="205.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<circle cx="235" cy="202" r="5" fill="#f0c93c" stroke="#b58f14" stroke-width="1" stroke-dasharray="2,1.4"/>
<text x="248" y="205.5" font-size="9.5" fill="#33404f">见光后转黄＝光产色菌</text>
<circle cx="219" cy="220" r="6.5" fill="#1f2733"/>
<text x="219" y="223.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="235" cy="220" r="5" fill="#f3ecdc" stroke="#c0b393" stroke-width="1"/>
<text x="248" y="223.5" font-size="9.5" fill="#33404f">3–7 天速生、光滑湿润</text>

<!-- 临床注解 -->
<rect x="24" y="234" width="432" height="18" rx="6" fill="#f9e6e4" stroke="#e3b8b5"/>
<text x="34" y="246.5" font-size="9.5" fill="#a3332f">甘油促结核分枝杆菌却抑牛分枝杆菌（须换丙酮酸钠基）；须满 8 周方可报阴性</text>

<!-- 结论 -->
<text x="240" y="263" text-anchor="middle" font-size="11.5" fill="#33404f">慢＋干燥菜花样＝结核分枝杆菌；速生或产色多属非结核分枝杆菌</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　结核分枝杆菌 · 堪萨斯分枝杆菌（光产色）· 偶发分枝杆菌（速生）</text>
</svg>
