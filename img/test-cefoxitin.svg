<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>头孢西丁筛选（MRSA 检测）</title><desc>头孢西丁能强诱导 mecA 表达，比苯唑西林更可靠地检出 PBP2a</desc>
  <defs>
    <radialGradient id="agarSheen" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#f6f2ea"/>
      <stop offset="100%" stop-color="#f1ede4"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">头孢西丁筛选（MRSA 检测）</text>
  <text x="240" y="46" text-anchor="middle" font-size="11" fill="#8a8f98">头孢西丁能强诱导 mecA 表达，比苯唑西林更可靠地检出 PBP2a</text>

  <!-- 耐药 = MRSA：无抑菌圈 -->
  <circle cx="138" cy="166" r="92" fill="url(#agarSheen)" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="138" cy="166" r="92" fill="none" stroke="#d6d2c8" stroke-width="1" opacity="0.7"/>
  <circle cx="138" cy="166" r="15" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="138" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#345f86">FOX</text>
  <text x="138" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b04242">耐药 → MRSA（mecA 阳性）</text>
  <text x="138" y="280" text-anchor="middle" font-size="11" fill="#454b54">无抑菌圈，菌生长至纸片边缘</text>
  <text x="138" y="295" text-anchor="middle" font-size="11" fill="#8a8f98">对所有 β-内酰胺耐药（头孢洛林除外）</text>

  <!-- 敏感 = MSSA：清晰抑菌圈 -->
  <circle cx="346" cy="166" r="92" fill="url(#agarSheen)" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="346" cy="166" r="92" fill="none" stroke="#d6d2c8" stroke-width="1" opacity="0.7"/>
  <circle cx="346" cy="166" r="60" fill="#fbfaf8" stroke="#c9c3b6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <circle cx="346" cy="166" r="15" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="346" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#345f86">FOX</text>
  <text x="346" y="262" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f7a52">敏感 → MSSA（mecA 阴性）</text>
  <text x="346" y="280" text-anchor="middle" font-size="11" fill="#454b54">清晰抑菌圈，菌被抑制</text>
  <text x="346" y="295" text-anchor="middle" font-size="11" fill="#8a8f98">β-内酰胺类仍有效</text>
</svg>
