<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">头孢西丁筛选（MRSA 检测）</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#8a8f98">头孢西丁是 mecA 的强诱导剂，用于替代检测 PBP2a</text>

  <!-- 耐药=MRSA -->
  <circle cx="138" cy="168" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="138" cy="168" r="15" fill="#fff" stroke="#b0b4bb"/><text x="138" y="172" text-anchor="middle" font-size="9" fill="#454b54">FOX</text>
  <text x="138" y="278" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b04242">耐药 → MRSA</text>
  <text x="138" y="296" text-anchor="middle" font-size="10.5" fill="#8a8f98">无抑菌圈，菌长至纸片</text>

  <!-- 敏感=MSSA -->
  <circle cx="346" cy="168" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="346" cy="168" r="60" fill="#fbfaf8" stroke="#c9c3b6" stroke-dasharray="4 3"/>
  <circle cx="346" cy="168" r="15" fill="#fff" stroke="#b0b4bb"/><text x="346" y="172" text-anchor="middle" font-size="9" fill="#454b54">FOX</text>
  <text x="346" y="278" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3f7a52">敏感 → MSSA</text>
  <text x="346" y="296" text-anchor="middle" font-size="10.5" fill="#8a8f98">清晰抑菌圈</text>
</svg>
