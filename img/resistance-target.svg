<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>靶位改变</title><desc>靶点结构改变，药物无法结合。如 mecA/PBP2a、23S rRNA 甲基化、gyrA 突变</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">靶位改变</text>
<text x="240" y="44" font-size="12" fill="#565b63" text-anchor="middle">靶点结构改变，药物无法结合</text>
<circle cx="168" cy="152" r="30" fill="#e4938c" stroke="#cf7c74" stroke-width="1.3"/>
 <circle cx="140" cy="152" r="9" fill="#f6f2e2" stroke="#cf7c74" stroke-width="1.3"/>
 <g transform="translate(116,152) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g>
 <text x="168" y="202" font-size="12" fill="#2c3138" text-anchor="middle" font-weight="600">原靶点 · 可结合</text>
 <circle cx="322" cy="152" r="30" fill="#e4938c" stroke="#cf7c74" stroke-width="1.3"/>
 <circle cx="345" cy="133" r="6" fill="#b79ac9" stroke="#9d7fb4"/> <text x="360" y="128" font-size="11" fill="#565b63" text-anchor="start">突变/甲基化</text>
 <g transform="translate(262,152) rotate(0) scale(1)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <g stroke="#c6403a" stroke-width="3" stroke-linecap="round"><line x1="285" y1="143" x2="303" y2="161"/><line x1="285" y1="161" x2="303" y2="143"/></g>
 <text x="322" y="202" font-size="12" fill="#2c3138" text-anchor="middle" font-weight="600">靶点改变 · 不结合</text>
 <text x="240" y="270" font-size="12" fill="#3f444b" text-anchor="middle">亲和力下降 → 耐药</text>
<text x="240" y="288" font-size="13" fill="#3f444b" text-anchor="middle">如 mecA/PBP2a、23S rRNA 甲基化、gyrA 突变</text>
</svg>