<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>靶位改变</title><desc>四类靶位改变：mecA编码PBP2a对β-内酰胺低亲和力；erm甲基化23S rRNA致MLSb耐药；gyrA/parC喹诺酮耐药决定区突变；vanA把肽聚糖末端D-Ala-D-Ala改为D-Ala-D-Lac致万古霉素失效</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">靶位改变</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">耐药机制</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">细菌改变靶点结构：药物结合不上，但靶点仍能行使功能</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ PBP2a × β-内酰胺 ===== -->
<rect x="24" y="66" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="85" r="8" fill="#1f2733"/><text x="38" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="52" y="89" font-size="10.5" font-weight="700" fill="#33404f">PBP2a × β-内酰胺</text>
<ellipse cx="88" cy="114" rx="26" ry="15" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="88" y="117.5" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">PBP2a</text>
<rect x="152" y="106" width="64" height="16" rx="8" fill="#f9e6e4" stroke="#c2413d"/>
<text x="184" y="117.5" text-anchor="middle" font-size="9.5" fill="#a3332f">β-内酰胺</text>
<g stroke="#c2413d" stroke-width="2.2" stroke-linecap="round"><line x1="126" y1="107" x2="140" y2="121"/><line x1="126" y1="121" x2="140" y2="107"/></g>
<text x="32" y="138" font-size="9.5" fill="#33404f">mecA 获得低亲和力 PBP2a，替代原有 PBP</text>
<text x="32" y="150" font-size="9.5" fill="#5c6672">→ MRSA：除抗 MRSA 头孢外全类报耐药</text>

<!-- ===== ❷ 23S rRNA × 大环内酯 ===== -->
<rect x="248" y="66" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="262" cy="85" r="8" fill="#1f2733"/><text x="262" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<text x="276" y="89" font-size="10.5" font-weight="700" fill="#33404f">23S rRNA × 大环内酯</text>
<ellipse cx="306" cy="114" rx="27" ry="16" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="306" y="117.5" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">50S</text>
<circle cx="324" cy="100" r="5" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.2"/>
<text x="332" y="98" font-size="9.5" fill="#5b4f8a">CH₃</text>
<rect x="384" y="106" width="64" height="16" rx="8" fill="#f9e6e4" stroke="#c2413d"/>
<text x="416" y="117.5" text-anchor="middle" font-size="9.5" fill="#a3332f">大环内酯</text>
<g stroke="#c2413d" stroke-width="2.2" stroke-linecap="round"><line x1="355" y1="107" x2="369" y2="121"/><line x1="355" y1="121" x2="369" y2="107"/></g>
<text x="256" y="138" font-size="9.5" fill="#33404f">erm 甲基化 23S rRNA A2058</text>
<text x="256" y="150" font-size="9.5" fill="#5c6672">→ MLSb：大环内酯-林可酰胺-链阳菌素B</text>

<!-- ===== ❸ gyrA/parC × 喹诺酮 ===== -->
<rect x="24" y="160" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="179" r="8" fill="#1f2733"/><text x="38" y="182.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<text x="52" y="183" font-size="10.5" font-weight="700" fill="#33404f">gyrA/parC × 喹诺酮</text>
<text x="34" y="198" font-size="9.5" fill="#5c6672">DNA</text>
<g stroke="#8b7fb8" stroke-width="1.4">
  <line x1="34" y1="202" x2="74" y2="202"/><line x1="34" y1="210" x2="74" y2="210"/>
  <line x1="42" y1="202" x2="42" y2="210"/><line x1="54" y1="202" x2="54" y2="210"/><line x1="66" y1="202" x2="66" y2="210"/>
</g>
<ellipse cx="94" cy="206" rx="22" ry="15" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="94" y="209.5" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">GyrA</text>
<circle cx="110" cy="192" r="5" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.2"/>
<text x="118" y="190" font-size="9.5" fill="#5b4f8a">QRDR 突变</text>
<rect x="158" y="198" width="62" height="16" rx="8" fill="#f9e6e4" stroke="#c2413d"/>
<text x="189" y="209.5" text-anchor="middle" font-size="9.5" fill="#a3332f">喹诺酮</text>
<g stroke="#c2413d" stroke-width="2.2" stroke-linecap="round"><line x1="131" y1="199" x2="145" y2="213"/><line x1="131" y1="213" x2="145" y2="199"/></g>
<text x="32" y="234" font-size="9.5" fill="#33404f">gyrA/parC 喹诺酮耐药决定区 QRDR 突变</text>
<text x="32" y="246" font-size="9.5" fill="#5c6672">→ 药物不能稳定酶-DNA 复合物</text>

<!-- ===== ❹ 肽聚糖末端 × 万古霉素 ===== -->
<rect x="248" y="160" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="262" cy="179" r="8" fill="#1f2733"/><text x="262" y="182.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
<text x="276" y="183" font-size="10.5" font-weight="700" fill="#33404f">肽聚糖末端 × 万古霉素</text>
<text x="258" y="196" font-size="9.5" fill="#5c6672">D-Ala-D-Ala</text>
<line x1="320" y1="192" x2="336" y2="192" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="342" y="196" font-size="9.5" font-weight="600" fill="#5b4f8a">D-Ala-D-Lac</text>
<rect x="256" y="208" width="64" height="16" rx="8" fill="#f9e6e4" stroke="#c2413d"/>
<text x="288" y="219.5" text-anchor="middle" font-size="9.5" fill="#a3332f">万古霉素</text>
<g stroke="#c2413d" stroke-width="2.2" stroke-linecap="round"><line x1="329" y1="209" x2="343" y2="223"/><line x1="329" y1="223" x2="343" y2="209"/></g>
<g stroke="#8b7fb8" stroke-width="1.2"><line x1="360" y1="216" x2="367" y2="216"/></g>
<circle cx="372" cy="216" r="5" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.2"/>
<circle cx="384" cy="216" r="5" fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.2"/>
<text x="396" y="219.5" font-size="9.5" fill="#5b4f8a">改造末端</text>
<text x="256" y="234" font-size="9.5" fill="#33404f">vanA：D-Ala-D-Ala → D-Ala-D-Lac</text>
<text x="256" y="246" font-size="9.5" fill="#5c6672">→ 万古霉素亲和力降至约 1/1000（VRE）</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">靶点结构改变→药物结合不上，靶点功能照常→整类药失效</text>

<!-- 页脚：典型基因 -->
<rect x="24" y="270" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="285" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型基因</tspan>　mecA(PBP2a) · erm(23S rRNA) · gyrA/parC · vanA</text>
</svg>
