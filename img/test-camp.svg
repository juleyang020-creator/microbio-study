<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>CAMP 试验（血平板）</title><desc>B 群链球菌的协同溶血鉴别</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">CAMP 试验（血平板）</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#565b63">B 群链球菌的协同溶血鉴别</text>

  <defs>
    <radialGradient id="bloodAgar" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#e8cfcf"/>
      <stop offset="100%" stop-color="#e0c2c2"/>
    </radialGradient>
  </defs>

  <!-- 血平板 -->
  <circle cx="172" cy="174" r="116" fill="url(#bloodAgar)" stroke="#c9a49f" stroke-width="2.5"/>

  <!-- 金葡竖划线（产 β 溶血素），完全在皿内 -->
  <rect x="224" y="92" width="9" height="164" rx="4" fill="#9a8585" stroke="#7a6a6a" stroke-width="1"/>
  <text x="252" y="86" font-size="11" fill="#565b63">金黄色葡萄球菌</text>
  <text x="252" y="100" font-size="11" fill="#565b63">竖划线，产 β 溶血素</text>

  <!-- 待测链球菌横划线，与金葡留有间隙（不相交） -->
  <rect x="70" y="170" width="138" height="9" rx="4" fill="#9a8585" stroke="#7a6a6a" stroke-width="1"/>
  <text x="70" y="154" font-size="11" fill="#565b63">待测链球菌（横划线）</text>

  <!-- 箭头(半月)状增强溶血：跨越间隙，尖端指向金葡 β 溶血素带 -->
  <path d="M205,174 L222,156 L222,193 Z" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="1.2" stroke-dasharray="3 2"/>

  <!-- 引线指向增强溶血区 -->
  <line x1="216" y1="175" x2="300" y2="208" stroke="#cbc1a8" stroke-width="1"/>
  <circle cx="216" cy="175" r="2.2" fill="#3f7a52"/>

  <text x="304" y="206" font-size="11.5" font-weight="700" fill="#3f7a52">箭头（半月）状增强溶血</text>
  <text x="304" y="223" font-size="11" fill="#3f7a52">阳性 → B 群无乳链球菌</text>

  <text x="240" y="290" text-anchor="middle" font-size="12.5" fill="#565b63">CAMP 因子与金葡 β 溶血素协同，于交界处增强溶血</text>
</svg>
