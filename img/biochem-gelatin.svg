<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>明胶液化试验</title><desc>明胶酶水解明胶蛋白使凝胶网络解体；4℃ 冷藏后仍呈液态为阳性，重新凝固为阴性</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <clipPath id="tubeIn"><path d="M-15,-2 L-15,90 Q-15,106 0,106 Q15,106 15,90 L15,-2 Z"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">明胶液化试验 Gelatinase</text>
<rect x="396" y="14" width="60" height="18" rx="9" fill="#eef2f7"/>
<text x="426" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生化试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">明胶酶水解胶原多肽 → 凝胶网络解体 → 4℃ 冷藏仍不凝固</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：阴性对照（未液化，凝固） ===== -->
<text x="73" y="88" text-anchor="middle" font-size="9.5" fill="#5c6672">斜置：不流动</text>
<g transform="translate(92,100) rotate(20)">
  <path d="M-16,-2 L-16,90 Q-16,108 0,108 Q16,108 16,90 L16,-2 Z" fill="#fbfcfd" stroke="#b9c2cc" stroke-width="1.6"/>
  <path d="M-15,26 L15,26 L15,90 Q15,106 0,106 Q-15,106 -15,90 Z" fill="#e6d9a8"/>
  <line x1="-15" y1="26" x2="15" y2="26" stroke="#b09a52" stroke-width="1.8"/>
  <line x1="0" y1="30" x2="0" y2="100" stroke="#b09a52" stroke-width="1.4" stroke-dasharray="3 3"/>
  <path d="M-16,-2 L-16,90 Q-16,108 0,108 Q16,108 16,90 L16,-2" fill="none" stroke="#b9c2cc" stroke-width="1.6"/>
  <ellipse cx="0" cy="-2" rx="16" ry="4.6" fill="#f2f5f8" stroke="#b9c2cc" stroke-width="1.4"/>
</g>
<text x="73" y="218" text-anchor="middle" font-size="10.5" font-weight="700" fill="#5c6672">阴性　未液化</text>
<text x="73" y="232" text-anchor="middle" font-size="9.5" fill="#5c6672">胶面随试管一起倾斜</text>

<!-- ===== 中：化学转化 ===== -->
<rect x="180" y="98" width="130" height="32" rx="5" fill="#f5f7f9" stroke="#b9c2cc"/>
<text x="245" y="111" text-anchor="middle" font-size="9.5" fill="#1f2733">明胶（胶原变性产物）</text>
<text x="245" y="124" text-anchor="middle" font-size="9.5" fill="#5c6672">低温氢键形成凝胶网络</text>

<line x1="245" y1="130" x2="245" y2="144" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<circle cx="245" cy="164" r="17" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="245" y="167" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1f4e79">明胶酶</text>
<text x="268" y="161" font-size="9.5" fill="#5c6672">胞外金属蛋白酶</text>
<text x="268" y="174" font-size="9.5" fill="#5c6672">（切断肽键）</text>
<text x="218" y="167" text-anchor="end" font-size="9.5" fill="#5c6672">22–25℃</text>
<line x1="245" y1="181" x2="245" y2="195" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<rect x="180" y="196" width="130" height="32" rx="5" fill="#e8f3ef" stroke="#2f8f83"/>
<text x="245" y="209" text-anchor="middle" font-size="9.5" fill="#1f2733">小分子多肽 + 氨基酸</text>
<text x="245" y="222" text-anchor="middle" font-size="9.5" fill="#2f8f83">网络断裂 → 不能再凝固</text>

<!-- ===== 右：阳性（液化） ===== -->
<text x="389" y="88" text-anchor="middle" font-size="9.5" fill="#a3332f">斜置：立即流动</text>
<g transform="translate(408,100) rotate(20)">
  <path d="M-16,-2 L-16,90 Q-16,108 0,108 Q16,108 16,90 L16,-2 Z" fill="#fbfcfd" stroke="#b9c2cc" stroke-width="1.6"/>
  <g clip-path="url(#tubeIn)">
    <g transform="rotate(-20)">
      <rect x="-70" y="30" width="140" height="150" fill="#e6d9a8" opacity="0.92"/>
      <line x1="-70" y1="30" x2="70" y2="30" stroke="#b09a52" stroke-width="1.8"/>
    </g>
    <circle cx="-4" cy="62" r="2.6" fill="#f7f2de"/>
    <circle cx="6" cy="80" r="2" fill="#f7f2de"/>
    <circle cx="-3" cy="93" r="1.8" fill="#f7f2de"/>
  </g>
  <path d="M-16,-2 L-16,90 Q-16,108 0,108 Q16,108 16,90 L16,-2" fill="none" stroke="#b9c2cc" stroke-width="1.6"/>
  <ellipse cx="0" cy="-2" rx="16" ry="4.6" fill="#f2f5f8" stroke="#b9c2cc" stroke-width="1.4"/>
</g>
<line x1="424" y1="130" x2="452" y2="130" stroke="#a3332f" stroke-width="1" stroke-dasharray="4 3"/>
<text x="389" y="218" text-anchor="middle" font-size="10.5" font-weight="700" fill="#a3332f">阳性　已液化</text>
<text x="389" y="232" text-anchor="middle" font-size="9.5" fill="#5c6672">液面始终保持水平</text>

<!-- 临床注意 -->
<text x="240" y="248" text-anchor="middle" font-size="9.5" fill="#a3332f">明胶在 35℃ 本身即呈液态 → 判读前须 4℃ 冷藏对照，否则假阳性</text>

<!-- 结论 -->
<text x="240" y="264" text-anchor="middle" font-size="11.5" fill="#33404f">4℃ 冷藏后仍呈液态即阳性；重新凝固为阴性</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　阳性：铜绿假单胞菌、变形杆菌属、沙雷菌属、金葡菌　阴性：肠杆菌科其余多数</text>
</svg>
