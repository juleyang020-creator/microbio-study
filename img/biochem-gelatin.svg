<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">明胶液化试验 (Gelatinase)</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#8a8f98">明胶酶水解明胶；4℃ 冷藏后仍呈液态为阳性，凝固为阴性</text>

  <!-- 阴性管(凝固/固态) -->
  <g>
    <path d="M150,78 L150,238 Q150,256 168,256 Q186,256 186,238 L186,78 Z" fill="#faf8f1" stroke="#c9b98a" stroke-width="2"/>
    <ellipse cx="168" cy="78" rx="18" ry="5" fill="#eee6cf" stroke="#c9b98a" stroke-width="1.4"/>
    <path d="M150,108 L186,108 L186,238 Q186,256 168,256 Q150,256 150,238 Z" fill="#e6d9a8"/>
    <line x1="150" y1="108" x2="186" y2="108" stroke="#c2b07a" stroke-width="2"/>
    <line x1="168" y1="112" x2="168" y2="250" stroke="#c2b07a" stroke-width="1.4" stroke-dasharray="3 3"/>
    <text x="168" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#8a6d1f">阴性（凝固·固态）</text>
  </g>

  <!-- 阳性管(液化/液态,倾斜液面) -->
  <g>
    <path d="M300,78 L300,238 Q300,256 318,256 Q336,256 336,238 L336,78 Z" fill="#faf8f1" stroke="#c9b98a" stroke-width="2"/>
    <ellipse cx="318" cy="78" rx="18" ry="5" fill="#eee6cf" stroke="#c9b98a" stroke-width="1.4"/>
    <path d="M300,128 L336,112 L336,238 Q336,256 318,256 Q300,256 300,238 Z" fill="#ecdfa8" opacity="0.92"/>
    <path d="M300,128 L336,112" stroke="#c2b07a" stroke-width="2"/>
    <circle cx="312" cy="170" r="2.4" fill="#faf8f1"/><circle cx="324" cy="200" r="2" fill="#faf8f1"/>
    <text x="318" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#b04242">阳性（液化·液态）</text>
  </g>

  <text x="240" y="290" text-anchor="middle" font-size="9.5" fill="#8a8f98">金黄色葡萄球菌、黏质沙雷菌、铜绿假单胞菌阳性；判读前须 4℃ 冷藏对照</text>
</svg>
