<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>靶点旁路 / 替代酶</title><desc>获得替代酶，绕过被抑制的原酶继续代谢。如获得 dfr（替代 DHFR，抗甲氧苄啶）、sul（替代 DHPS，抗磺胺）</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">靶点旁路 / 替代酶</text>
<text x="240" y="44" font-size="12" fill="#77797e" text-anchor="middle">获得替代酶，绕过被抑制的原酶继续代谢</text>
<text x="120" y="120" font-size="12" fill="#2c3138" text-anchor="start" font-weight="600">原代谢通路（被抑制）</text>
 <circle cx="110" cy="162" r="15" fill="#e4938c" stroke="#cf7c74"/> <text x="110" y="167" font-size="13" text-anchor="middle" fill="#7a3b36">A</text>
 <line x1="128" y1="162" x2="196" y2="162" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <g fill="#b79ac9" stroke="#9d7fb4"><circle cx="162" cy="146" r="11"/></g> <g stroke="#c6403a" stroke-width="3" stroke-linecap="round"><line x1="154" y1="154" x2="170" y2="170"/><line x1="154" y1="170" x2="170" y2="154"/></g> <text x="162" y="132" font-size="11" fill="#2c3138" text-anchor="middle">原酶</text>
 <circle cx="214" cy="162" r="15" fill="#e4938c" stroke="#cf7c74"/> <text x="214" y="167" font-size="13" text-anchor="middle" fill="#7a3b36">B</text>
 <circle cx="320" cy="152" r="30" fill="#a7b4c9" stroke="#8093b3" stroke-width="1.3"/> <path d="M320,146 a10 10 0 1 0 0.01 0" fill="#f6f2e2"/>
 <text x="320" y="202" font-size="12" fill="#2c3138" text-anchor="middle" font-weight="600">获得性替代酶</text>
 <path d="M124,180 C175,220 255,220 292,182" fill="none" stroke="#3f7a52" stroke-width="1.8" marker-end="url(#arrG)"/>
 <text x="208" y="232" font-size="11" fill="#3f7a52" text-anchor="middle">替代酶催化同一步骤</text>
 <text x="240" y="270" font-size="12" fill="#3f444b" text-anchor="middle">药物抑制原酶，代谢经替代酶继续</text>
<text x="240" y="288" font-size="13" fill="#3f444b" text-anchor="middle">如获得 dfr（替代 DHFR，抗甲氧苄啶）、sul（替代 DHPS，抗磺胺）</text>
</svg>