<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="byBox" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ccfbf1"/><stop offset="1" stop-color="#5eead4"/></linearGradient>
    <linearGradient id="byDrug" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <filter id="bySh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.4" flood-color="#0f172a" flood-opacity="0.16"/></filter>
  </defs>
  <rect width="480" height="300" fill="#f8fafc"/>
  <text x="240" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">旁路代谢 / 靶点旁路</text>
  <text x="240" y="54" text-anchor="middle" font-size="10.5" fill="#64748b">获得不敏感的替代酶，绕过药物抑制</text>

  <!-- 通路框 -->
  <g filter="url(#bySh)">
    <rect x="22" y="150" width="78" height="40" rx="9" fill="url(#byBox)" stroke="#0f766e"/>
    <rect x="200" y="150" width="80" height="40" rx="9" fill="url(#byBox)" stroke="#0f766e"/>
    <rect x="380" y="150" width="78" height="40" rx="9" fill="url(#byBox)" stroke="#0f766e"/>
  </g>
  <text x="61" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#0f766e">PABA</text>
  <text x="240" y="174" text-anchor="middle" font-size="11.5" fill="#0f766e">二氢叶酸</text>
  <text x="419" y="174" text-anchor="middle" font-size="11.5" fill="#0f766e">四氢叶酸</text>

  <!-- 原酶被药物阻断（灰，✕） -->
  <line x1="100" y1="160" x2="198" y2="160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="150" y="152" text-anchor="middle" font-size="9" fill="#94a3b8">敏感型 DHPS</text>
  <line x1="280" y1="160" x2="378" y2="160" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="330" y="152" text-anchor="middle" font-size="9" fill="#94a3b8">敏感型 DHFR</text>

  <rect x="112" y="92" width="74" height="30" rx="9" fill="url(#byDrug)" stroke="#2563eb" filter="url(#bySh)"/>
  <text x="149" y="111" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">磺胺类</text>
  <line x1="149" y1="122" x2="149" y2="150" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="149" y="146" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">✕</text>
  <rect x="293" y="92" width="74" height="30" rx="9" fill="url(#byDrug)" stroke="#2563eb" filter="url(#bySh)"/>
  <text x="330" y="111" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1d4ed8">甲氧苄啶</text>
  <line x1="330" y1="122" x2="330" y2="150" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="330" y="146" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">✕</text>

  <!-- 耐药型酶旁路（绿，继续反应） -->
  <path d="M100,182 C130,224 168,224 198,184" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <polygon points="198,184 188,188 196,194" fill="#16a34a"/>
  <path d="M280,182 C310,224 348,224 378,184" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <polygon points="378,184 368,188 376,194" fill="#16a34a"/>
  <text x="149" y="236" text-anchor="middle" font-size="9.5" fill="#16a34a">耐药型 DHPS (sul)</text>
  <text x="330" y="236" text-anchor="middle" font-size="9.5" fill="#16a34a">耐药型 DHFR (dfr)</text>

  <text x="240" y="284" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">替代酶不被药物抑制 → 叶酸合成继续 → 耐药</text>
</svg>
