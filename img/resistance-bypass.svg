<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">旁路代谢 / 靶点旁路</text>
  <text x="240" y="48" text-anchor="middle" font-size="11" fill="#8a8f98">获得不被药物抑制的替代酶，绕过原靶点</text>

  <!-- 叶酸合成通路：底物/中间物框（靶代谢物） -->
  <rect x="22" y="150" width="78" height="40" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.2"/>
  <rect x="200" y="150" width="80" height="40" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.2"/>
  <rect x="380" y="150" width="78" height="40" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.2"/>
  <text x="61" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#1f4a46">PABA</text>
  <text x="240" y="174" text-anchor="middle" font-size="11.5" fill="#1f4a46">二氢叶酸</text>
  <text x="419" y="174" text-anchor="middle" font-size="11.5" fill="#1f4a46">四氢叶酸</text>

  <!-- 敏感型原酶被药物阻断（发丝虚线 + ✕） -->
  <line x1="100" y1="160" x2="198" y2="160" stroke="#cfcabd" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="150" y="152" text-anchor="middle" font-size="9" fill="#8a8f98">敏感型 DHPS</text>
  <line x1="280" y1="160" x2="378" y2="160" stroke="#cfcabd" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="330" y="152" text-anchor="middle" font-size="9" fill="#8a8f98">敏感型 DHFR</text>

  <!-- 药物（墨蓝）从上方抑制原酶 -->
  <rect x="112" y="92" width="74" height="30" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="149" y="111" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">磺胺类</text>
  <line x1="149" y1="122" x2="149" y2="150" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="149" y="146" text-anchor="middle" font-size="13" fill="#b04242" font-weight="700">✕</text>

  <rect x="293" y="92" width="74" height="30" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.2"/>
  <text x="330" y="111" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">甲氧苄啶</text>
  <line x1="330" y1="122" x2="330" y2="150" stroke="#345f86" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="330" y="146" text-anchor="middle" font-size="13" fill="#b04242" font-weight="700">✕</text>

  <!-- 耐药型替代酶旁路（哑绿，继续反应） -->
  <path d="M100,182 C130,222 168,222 198,184" fill="none" stroke="#3f7a52" stroke-width="2"/>
  <polygon points="198,184 188,187.5 195.5,193.5" fill="#3f7a52"/>
  <path d="M280,182 C310,222 348,222 378,184" fill="none" stroke="#3f7a52" stroke-width="2"/>
  <polygon points="378,184 368,187.5 375.5,193.5" fill="#3f7a52"/>
  <text x="149" y="234" text-anchor="middle" font-size="9.5" fill="#3f7a52">耐药型 DHPS（sul 基因）</text>
  <text x="330" y="234" text-anchor="middle" font-size="9.5" fill="#3f7a52">耐药型 DHFR（dfr 基因）</text>

  <text x="240" y="282" text-anchor="middle" font-size="12.5" fill="#454b54">替代酶不被药物抑制 → 叶酸合成继续 → 耐药</text>
</svg>
