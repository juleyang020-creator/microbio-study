<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>脲酶试验</title><desc>Christensen 尿素琼脂斜面：阴性管保持橙黄；产脲酶菌水解尿素生成氨，培养基碱化，酚红转为深粉红</desc>
<defs>
  <marker id="ua" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="ub" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8c96a2"/></marker>
  <linearGradient id="ph" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e9b949"/><stop offset="0.45" stop-color="#e9a94f"/><stop offset="1" stop-color="#d6407f"/>
  </linearGradient>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">脲酶试验</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生化试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">尿素被脲酶水解产氨 → 培养基碱化 → 酚红由橙黄转粉红</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：阴性管 ===== -->
<rect x="26" y="62" width="88" height="16" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="70" y="73.5" text-anchor="middle" font-size="9.5" fill="#5c6672">阴性（不产脲酶）</text>
<path d="M50,84 L50,174 Q50,190 70,190 Q90,190 90,174 L90,84 Z" fill="#fdfcf8" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M50,124 L90,108 L90,174 Q90,190 70,190 Q50,190 50,174 Z" fill="#e9b949"/>
<ellipse cx="70" cy="84" rx="20" ry="5" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.4"/>
<text x="70" y="202" text-anchor="middle" font-size="9.5" fill="#8a6d2f">橙黄不变色（−）</text>

<!-- ===== 右：阳性管 ===== -->
<rect x="366" y="62" width="88" height="16" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="410" y="73.5" text-anchor="middle" font-size="9.5" fill="#5c6672">阳性（产脲酶）</text>
<path d="M390,84 L390,174 Q390,190 410,190 Q430,190 430,174 L430,84 Z" fill="#fdfcf8" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M390,124 L430,108 L430,174 Q430,190 410,190 Q390,190 390,174 Z" fill="#d6407f"/>
<ellipse cx="410" cy="84" rx="20" ry="5" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.4"/>
<text x="410" y="202" text-anchor="middle" font-size="9.5" fill="#a3332f">深粉红（＋）</text>

<!-- ===== 中：化学转化链 ===== -->
<rect x="180" y="86" width="120" height="20" rx="10" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="100" text-anchor="middle" font-size="10" fill="#33404f">尿素 CO(NH₂)₂</text>

<line x1="240" y1="106" x2="240" y2="126" stroke="#33404f" stroke-width="1.4" marker-end="url(#ua)"/>
<rect x="252" y="107" width="58" height="16" rx="8" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="281" y="118.5" text-anchor="middle" font-size="9.5" fill="#1f4e79">细菌脲酶</text>

<rect x="168" y="128" width="144" height="20" rx="10" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="142" text-anchor="middle" font-size="10" fill="#33404f">2 NH₃ ＋ CO₂（氨溶于水）</text>

<line x1="240" y1="148" x2="240" y2="167" stroke="#33404f" stroke-width="1.4" marker-end="url(#ua)"/>
<text x="248" y="162" font-size="9.5" fill="#5c6672">氨→碱化</text>

<text x="150" y="163" font-size="9.5" fill="#5c6672">酚红指示剂</text>
<rect x="150" y="168" width="180" height="16" rx="8" fill="url(#ph)" stroke="#e3e7ec"/>
<line x1="146" y1="176" x2="102" y2="176" stroke="#8c96a2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ub)"/>
<line x1="334" y1="176" x2="384" y2="176" stroke="#8c96a2" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ub)"/>
<text x="150" y="196" font-size="9.5" fill="#8a6d2f">pH 6.8 橙黄</text>
<text x="330" y="196" text-anchor="end" font-size="9.5" fill="#a3332f">pH ≥8.4 粉红</text>

<!-- ===== 判读窗口提示 ===== -->
<rect x="24" y="210" width="432" height="36" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="36" y="225" font-size="9.5" fill="#33404f">快速脲酶：变形杆菌属、幽门螺杆菌 4–6 h 内即变红（幽门螺杆菌 RUT 即据此）</text>
<text x="36" y="239" font-size="9.5" fill="#5c6672">慢速脲酶：克雷伯菌属等须孵育 24–48 h，且常仅斜面变粉红，过早判读易误判为阴性</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">培养基由橙黄转深粉红即脲酶阳性，变红快慢本身也有鉴别价值</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　阳性：奇异变形杆菌 · 幽门螺杆菌　阴性：大肠埃希菌 · 志贺菌属</text>
</svg>
