<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>XLD 琼脂</title><desc>XLD 平板俯视图：底色因酚红呈红色；沙门菌红色菌落带黑心（木糖产酸后赖氨酸脱羧产碱回复红，硫代硫酸钠/枸橼酸铁铵指示 H₂S），志贺菌红色无黑心（不发酵木糖/乳糖/蔗糖），大肠菌群因过量乳糖蔗糖持续产酸呈黄色菌落；去氧胆酸钠为选择成分</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">XLD 琼脂</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">选择与鉴别</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">一板同判：糖发酵（酚红）＋ 赖氨酸脱羧 ＋ H₂S</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 平板俯视 ===== -->
<text x="24" y="72" font-size="9.5" fill="#5c6672">XLD 平板（俯视）</text>
<circle cx="92" cy="142" r="59" fill="#f5f7f9" stroke="#e3e7ec" stroke-width="1.2"/>
<circle cx="92" cy="142" r="56" fill="#e2626c"/>

<!-- 大肠菌群：黄色菌落 + 黄色变色带（画在底层） -->
<circle cx="120" cy="134" r="14" fill="#f6e08a" opacity="0.9"/>
<circle cx="126" cy="172" r="10" fill="#f6e08a" opacity="0.9"/>
<circle cx="120" cy="134" r="8.5" fill="#f0c64e" stroke="#c99a2a" stroke-width="1"/>
<circle cx="126" cy="172" r="6" fill="#f0c64e" stroke="#c99a2a" stroke-width="1"/>

<!-- 沙门菌：红色菌落带黑心 -->
<circle cx="86" cy="106" r="9" fill="#cf3b48" stroke="#a52f3a" stroke-width="1"/>
<circle cx="86" cy="106" r="4" fill="#26262b"/>
<circle cx="104" cy="116" r="7" fill="#cf3b48" stroke="#a52f3a" stroke-width="1"/>
<circle cx="104" cy="116" r="3" fill="#26262b"/>

<!-- 志贺菌：红色、无黑心、菌落较小 -->
<circle cx="84" cy="178" r="6.5" fill="#ea7d85" stroke="#c2555f" stroke-width="1"/>
<circle cx="104" cy="186" r="5.5" fill="#ea7d85" stroke="#c2555f" stroke-width="1"/>

<!-- 平板上的编号 -->
<g fill="#1f2733"><circle cx="64" cy="110" r="7.5"/><circle cx="60" cy="170" r="7.5"/><circle cx="136" cy="154" r="7.5"/></g>
<g text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">
  <text x="64" y="113.5">1</text><text x="60" y="173.5">2</text><text x="136" y="157.5">3</text>
</g>

<!-- ===== 右侧：三型菌落判读 ===== -->
<!-- ❶ 沙门菌 -->
<circle cx="175" cy="103" r="7.5" fill="#1f2733"/>
<text x="175" y="106.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<circle cx="196" cy="103" r="9" fill="#cf3b48" stroke="#a52f3a" stroke-width="1"/>
<circle cx="196" cy="103" r="4" fill="#26262b"/>
<text x="210" y="96" font-size="10" font-weight="700" fill="#33404f">沙门菌　红色菌落 + 黑心</text>
<rect x="210" y="104" width="56" height="13" rx="6.5" fill="#fdf3d6" stroke="#c99a2a"/>
<text x="238" y="113.5" text-anchor="middle" font-size="9.5" fill="#8a6d2f">木糖→黄</text>
<line x1="268" y1="110.5" x2="280" y2="110.5" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>
<rect x="282" y="104" width="90" height="13" rx="6.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="327" y="113.5" text-anchor="middle" font-size="9.5" fill="#a3332f">赖氨酸脱羧→红</text>
<text x="380" y="113.5" font-size="9.5" fill="#33404f">＋H₂S 黑心</text>
<text x="210" y="128" font-size="9.5" fill="#5c6672">变形杆菌/枸橼酸杆菌亦可黑心，须生化+血清确认</text>

<!-- ❷ 志贺菌 -->
<circle cx="175" cy="147" r="7.5" fill="#1f2733"/>
<text x="175" y="150.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<circle cx="196" cy="147" r="9" fill="#ea7d85" stroke="#c2555f" stroke-width="1"/>
<text x="210" y="140" font-size="10" font-weight="700" fill="#33404f">志贺菌　红色菌落、无黑心</text>
<text x="210" y="156" font-size="9.5" fill="#5c6672">不发酵木糖/乳糖/蔗糖 → 不产酸，保持底色红</text>

<!-- ❸ 大肠菌群 -->
<circle cx="175" cy="191" r="7.5" fill="#1f2733"/>
<text x="175" y="194.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<circle cx="196" cy="191" r="9" fill="#f6e08a"/>
<circle cx="196" cy="191" r="6" fill="#f0c64e" stroke="#c99a2a" stroke-width="1"/>
<text x="210" y="184" font-size="10" font-weight="700" fill="#33404f">大肠菌群　黄色菌落及黄色变色带</text>
<text x="210" y="200" font-size="9.5" fill="#5c6672">乳糖/蔗糖过量产酸 → 持续黄，掩盖产碱</text>

<!-- ===== 选择 / 鉴别成分 ===== -->
<rect x="24" y="204" width="208" height="44" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="34" y="219" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="34" y="232" font-size="9.5" fill="#5c6672">去氧胆酸钠 → 抑制革兰阳性菌</text>
<text x="34" y="244" font-size="9.5" fill="#5c6672">对大肠菌群抑制较弱，故仍见黄色菌落</text>

<rect x="248" y="204" width="208" height="44" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="258" y="219" font-size="10" font-weight="700" fill="#33404f">鉴别成分：指示什么</text>
<text x="258" y="232" font-size="9.5" fill="#5c6672">酚红：酸→黄，碱→红（底色为红）</text>
<text x="258" y="244" font-size="9.5" fill="#5c6672">硫代硫酸钠＋枸橼酸铁铵：H₂S→黑心</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">关键是「先酸后碱」：须 18–24 h 判读，过久大肠菌群也会转红</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　沙门菌（红色带黑心）· 志贺菌（红色无黑心）· 大肠埃希菌（黄色）</text>
</svg>
