<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>Lancefield 分群（胶乳凝集）</title><desc>提取群特异性 C 多糖抗原，与抗血清致敏胶乳颗粒发生凝集</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">Lancefield 分群（胶乳凝集）</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#565b63">提取群特异性 C 多糖抗原，与抗血清致敏胶乳颗粒发生凝集</text>

  <!-- 阴性(均匀乳浊) -->
  <g>
    <circle cx="148" cy="150" r="66" fill="#f3f1ea" stroke="#c8b887" stroke-width="2.5"/>
    <g fill="#cfd6dc">
      <circle cx="120" cy="128" r="2.2"/><circle cx="140" cy="124" r="2.2"/><circle cx="162" cy="130" r="2.2"/><circle cx="178" cy="142" r="2.2"/>
      <circle cx="116" cy="150" r="2.2"/><circle cx="138" cy="150" r="2.2"/><circle cx="160" cy="152" r="2.2"/><circle cx="180" cy="160" r="2.2"/>
      <circle cx="122" cy="172" r="2.2"/><circle cx="144" cy="176" r="2.2"/><circle cx="166" cy="174" r="2.2"/><circle cx="150" cy="190" r="2.2"/>
    </g>
    <text x="148" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#565b63">阴性（均匀乳浊）</text>
  </g>

  <!-- 阳性(凝集成块) -->
  <g>
    <circle cx="332" cy="150" r="66" fill="#f3f1ea" stroke="#c8b887" stroke-width="2.5"/>
    <g fill="#4a6b9a">
      <circle cx="312" cy="132" r="6"/><circle cx="352" cy="128" r="7"/><circle cx="334" cy="152" r="8"/><circle cx="360" cy="166" r="6"/><circle cx="312" cy="172" r="7"/><circle cx="340" cy="184" r="5.5"/>
    </g>
    <text x="332" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#2f4f8a">阳性（凝集成颗粒）</text>
  </g>

  <text x="240" y="270" text-anchor="middle" font-size="11" fill="#565b63">按 C 多糖抗原分 A、B、C、D、F、G 群</text>
  <text x="240" y="286" text-anchor="middle" font-size="11" fill="#565b63">A 群=化脓性链球菌；B 群=无乳链球菌；D 群=肠球菌/牛链球菌</text>
</svg>
