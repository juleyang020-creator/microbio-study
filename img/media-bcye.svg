<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>BCYE 琼脂</title><desc>BCYE 琼脂平板俯视：活性炭-酵母浸膏基底呈灰黑色，ACES 缓冲，活性炭吸附毒性代谢物；加 L-半胱氨酸与焦磷酸铁满足军团菌的营养需求，嗜肺军团菌长出灰白色、毛玻璃样菌落，而在血平板或不含半胱氨酸的对照板上不生长，此双板对比即初步鉴定依据；基础 BCYE 不含抑菌剂，痰中杂菌照长，需用加抗菌剂的选择型 BCYE；生长缓慢需孵育 3 至 5 天</desc>
<defs>
  <clipPath id="clipA"><circle cx="62" cy="130" r="35"/></clipPath>
  <clipPath id="clipB"><circle cx="140" cy="130" r="35"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">BCYE 琼脂</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">特殊培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">补足军团菌所需的半胱氨酸与铁，靠「长/不长」而非显色鉴别</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：双板对比俯视 ===== -->
<text x="24" y="76" font-size="9.5" fill="#5c6672">平板俯视：活性炭基底灰黑</text>

<!-- 平板 A：BCYE -->
<circle cx="62" cy="130" r="38" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="62" cy="130" r="35" fill="#3b4045" stroke="#23272b" stroke-width="1.4"/>
<g clip-path="url(#clipA)">
  <!-- 军团菌：灰白、毛玻璃样 -->
  <g stroke="#9aa39a" stroke-width="1">
    <circle cx="50" cy="116" r="6.5" fill="#e6e9e3"/>
    <circle cx="68" cy="109" r="4.5" fill="#e6e9e3"/>
    <circle cx="42" cy="137" r="5.5" fill="#e6e9e3"/>
  </g>
  <g fill="#f6f8f4" opacity="0.85">
    <circle cx="48" cy="114" r="2.2"/><circle cx="66.5" cy="107.5" r="1.6"/><circle cx="40.5" cy="135" r="1.8"/>
  </g>
  <!-- 痰中杂菌：奶油色，基础 BCYE 不抑制 -->
  <g fill="#efe3c2" stroke="#c9b98a" stroke-width="1">
    <circle cx="76" cy="143" r="5"/><circle cx="60" cy="153" r="4"/>
  </g>
</g>

<!-- 平板 B：血平板 / BCYE−cys 对照对照 -->
<circle cx="140" cy="130" r="38" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="140" cy="130" r="35" fill="#a8393c" stroke="#7d2a2d" stroke-width="1.4"/>
<g clip-path="url(#clipB)">
  <g fill="#efe3c2" stroke="#b08c6a" stroke-width="1">
    <circle cx="128" cy="114" r="5"/><circle cx="150" cy="122" r="4.5"/><circle cx="132" cy="145" r="4"/>
  </g>
  <!-- 军团菌不生长：仅示接种处 -->
  <g fill="none" stroke="#e0b5b6" stroke-width="1.2" stroke-dasharray="3,2.5">
    <circle cx="154" cy="147" r="7"/><circle cx="118" cy="138" r="6"/>
  </g>
  <g stroke="#f0d5d5" stroke-width="1.4" stroke-linecap="round">
    <line x1="150" y1="143" x2="158" y2="151"/><line x1="158" y1="143" x2="150" y2="151"/>
    <line x1="114.5" y1="134.5" x2="121.5" y2="141.5"/><line x1="121.5" y1="134.5" x2="114.5" y2="141.5"/>
  </g>
</g>

<!-- 平板上的编号 -->
<circle cx="78" cy="112" r="7.5" fill="#1f2733"/>
<text x="78" y="115.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="86" cy="156" r="7.5" fill="#1f2733"/>
<text x="86" y="159.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="160" cy="160" r="7.5" fill="#1f2733"/>
<text x="160" y="163.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>

<text x="62" y="180" text-anchor="middle" font-size="9.5" fill="#33404f">BCYE 板</text>
<text x="62" y="193" text-anchor="middle" font-size="9.5" fill="#5c6672">半胱氨酸＋铁</text>
<text x="140" y="180" text-anchor="middle" font-size="9.5" fill="#33404f">对照：血平板</text>
<text x="140" y="193" text-anchor="middle" font-size="9.5" fill="#5c6672">无半胱氨酸</text>

<!-- ===== 右：选择成分 ===== -->
<rect x="186" y="70" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="86" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="196" y="103" font-size="9.5" fill="#5c6672">基础 BCYE 无抑菌剂 → 痰中杂菌照长</text>
<text x="196" y="120" font-size="9.5" fill="#5c6672">选择型加多黏菌素B/万古/茴香霉素才抑杂菌</text>
<circle cx="200" cy="134" r="6.5" fill="#1f2733"/>
<text x="200" y="137.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="216" cy="134" r="5" fill="#efe3c2" stroke="#c9b98a" stroke-width="1"/>
<text x="228" y="137.5" font-size="9.5" fill="#33404f">杂菌两板都长，不能作鉴别依据</text>

<!-- ===== 右：鉴别成分 ===== -->
<rect x="186" y="154" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="170" font-size="10" font-weight="700" fill="#33404f">鉴别成分：指示什么</text>
<text x="196" y="187" font-size="9.5" fill="#5c6672">L-半胱氨酸＋焦磷酸铁＝军团菌的生长必需</text>
<circle cx="200" cy="201" r="6.5" fill="#1f2733"/>
<text x="200" y="204.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="216" cy="201" r="5" fill="#e6e9e3" stroke="#9aa39a" stroke-width="1"/>
<text x="228" y="204.5" font-size="9.5" fill="#33404f">灰白、毛玻璃样菌落 → 疑军团菌</text>
<circle cx="200" cy="219" r="6.5" fill="#1f2733"/>
<text x="200" y="222.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<circle cx="216" cy="219" r="5" fill="none" stroke="#9aa4ae" stroke-width="1.1" stroke-dasharray="3,2.5"/>
<text x="228" y="222.5" font-size="9.5" fill="#33404f">同一菌在对照板不长 → 印证</text>

<!-- 临床注解 -->
<rect x="24" y="234" width="432" height="18" rx="6" fill="#f9e6e4" stroke="#e3b8b5"/>
<text x="34" y="246.5" font-size="9.5" fill="#a3332f">活性炭只吸附毒性代谢物、不显色；生长慢，须孵育 3–5 天，48h 无菌落不能报阴性</text>

<!-- 结论 -->
<text x="240" y="263" text-anchor="middle" font-size="11.5" fill="#33404f">BCYE 上长、对照板不长 → 提示军团菌（营养需求鉴别）</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　嗜肺军团菌（灰白色、毛玻璃样菌落，3–5 天可见）</text>
</svg>
