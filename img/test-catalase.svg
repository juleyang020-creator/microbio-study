<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>触酶（过氧化氢酶）试验</title><desc>玻片菌落滴加 3% H₂O₂：触酶将其分解为水和氧（气泡）</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">触酶（过氧化氢酶）试验</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#77797e">玻片菌落滴加 3% H₂O₂：触酶将其分解为水和氧（气泡）</text>

  <!-- 阳性玻片 -->
  <g>
    <rect x="40" y="92" width="180" height="98" rx="7" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="2"/>
    <!-- 玻片左上角磨砂标识 -->
    <rect x="48" y="100" width="26" height="14" rx="2" fill="#f4efe2" stroke="#d9d1bd" stroke-width="1"/>
    <!-- 菌落涂布 -->
    <ellipse cx="130" cy="146" rx="34" ry="22" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.2"/>
    <!-- 氧气泡（阳性：大量气泡） -->
    <g fill="#f3ead0" stroke="#9a8a52" stroke-width="1">
      <circle cx="116" cy="132" r="6"/>
      <circle cx="140" cy="128" r="7.5"/>
      <circle cx="151" cy="148" r="5"/>
      <circle cx="123" cy="158" r="6"/>
      <circle cx="138" cy="152" r="8"/>
      <circle cx="107" cy="146" r="5"/>
      <circle cx="148" cy="138" r="4.5"/>
    </g>
    <text x="146" y="118" font-size="11" fill="#7c6a34">O₂</text>
  </g>
  <text x="130" y="172" text-anchor="middle" font-size="11" fill="#2e6b66">玻片菌落</text>
  <text x="130" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#c46a62">阳性：大量气泡</text>
  <text x="130" y="232" text-anchor="middle" font-size="11" fill="#77797e">葡萄球菌 / 微球菌</text>

  <!-- 阴性玻片 -->
  <g>
    <rect x="260" y="92" width="180" height="98" rx="7" fill="#fbfaf8" stroke="#cbc1a8" stroke-width="2"/>
    <rect x="268" y="100" width="26" height="14" rx="2" fill="#f4efe2" stroke="#d9d1bd" stroke-width="1"/>
    <!-- 菌落涂布（无气泡） -->
    <ellipse cx="350" cy="146" rx="34" ry="22" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.2"/>
  </g>
  <text x="350" y="172" text-anchor="middle" font-size="11" fill="#2e6b66">玻片菌落</text>
  <text x="350" y="214" text-anchor="middle" font-size="13" font-weight="700" fill="#3f7a52">阴性：无气泡</text>
  <text x="350" y="232" text-anchor="middle" font-size="11" fill="#77797e">链球菌 / 肠球菌</text>

  <!-- 中央 H₂O₂ 试剂滴 -->
  <g>
    <line x1="240" y1="70" x2="240" y2="84" stroke="#5a80b0" stroke-width="1.2"/>
    <path d="M240 89 C236 83 244 83 240 89 Z" fill="#e6ecf4" stroke="#5a80b0" stroke-width="1"/>
    <circle cx="240" cy="86" r="3.4" fill="#e6ecf4" stroke="#5a80b0" stroke-width="1"/>
    <text x="240" y="68" text-anchor="middle" font-size="11" fill="#5a80b0">3% H₂O₂</text>
  </g>

  <text x="240" y="276" text-anchor="middle" font-size="12.5" fill="#565b63">常用于革兰阳性球菌的初步区分</text>
</svg>
