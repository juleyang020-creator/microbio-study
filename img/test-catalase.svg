<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">触酶（过氧化氢酶）试验</text>
  <text x="240" y="52" text-anchor="middle" font-size="11" fill="#8a8f98">触酶将 H₂O₂ 分解为水和氧（气泡）</text>

  <!-- 阳性玻片 -->
  <rect x="40" y="96" width="180" height="96" rx="6" fill="#f2f4f5" stroke="#cfd3d8" stroke-width="2"/>
  <ellipse cx="130" cy="144" rx="30" ry="20" fill="#e7e2d6" stroke="#c9c3b6"/>
  <g fill="#ffffff" stroke="#9fb0bd"><circle cx="118" cy="132" r="6"/><circle cx="140" cy="128" r="7"/><circle cx="150" cy="148" r="5"/><circle cx="124" cy="156" r="6"/><circle cx="138" cy="150" r="8"/><circle cx="108" cy="146" r="5"/></g>
  <text x="130" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#b04242">阳性：大量气泡</text>
  <text x="130" y="234" text-anchor="middle" font-size="10.5" fill="#8a8f98">葡萄球菌 / 微球菌</text>

  <!-- 阴性玻片 -->
  <rect x="260" y="96" width="180" height="96" rx="6" fill="#f2f4f5" stroke="#cfd3d8" stroke-width="2"/>
  <ellipse cx="350" cy="144" rx="30" ry="20" fill="#e7e2d6" stroke="#c9c3b6"/>
  <text x="350" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#3f7a52">阴性：无气泡</text>
  <text x="350" y="234" text-anchor="middle" font-size="10.5" fill="#8a8f98">链球菌 / 肠球菌</text>

  <text x="240" y="278" text-anchor="middle" font-size="12" fill="#454b54">常用于革兰阳性球菌的初步区分</text>
</svg>
