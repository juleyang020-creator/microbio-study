<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>纸片敏感试验（杆菌肽 / 新生霉素）</title><desc>含药纸片贴于菌苔，有抑菌圈为敏感，无圈为耐药</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">纸片敏感试验（杆菌肽 / 新生霉素）</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#8a8f98">含药纸片贴于菌苔，有抑菌圈为敏感，无圈为耐药</text>

  <!-- 敏感(有抑菌圈) -->
  <g>
    <circle cx="148" cy="158" r="78" fill="#efe7d2" stroke="#c9b98a" stroke-width="2.5"/>
    <!-- 菌苔纹理 -->
    <circle cx="148" cy="158" r="78" fill="#d9cba2" opacity="0.5"/>
    <!-- 抑菌圈(清亮) -->
    <circle cx="148" cy="158" r="40" fill="#f7f3e6"/>
    <!-- 纸片 -->
    <circle cx="148" cy="158" r="9" fill="#ffffff" stroke="#8a8f98" stroke-width="1.2"/>
    <text x="148" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#3f7a52">敏感（有抑菌圈）</text>
  </g>

  <!-- 耐药(无圈) -->
  <g>
    <circle cx="332" cy="158" r="78" fill="#d9cba2" stroke="#c9b98a" stroke-width="2.5"/>
    <circle cx="332" cy="158" r="9" fill="#ffffff" stroke="#8a8f98" stroke-width="1.2"/>
    <text x="332" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#b04242">耐药（菌长至纸片边）</text>
  </g>

  <text x="240" y="278" text-anchor="middle" font-size="11" fill="#8a8f98">杆菌肽：A 群链球菌敏感（与其他群区分）；新生霉素：腐生葡萄球菌耐药（与其他凝固酶阴性葡萄球菌区分）</text>
</svg>
