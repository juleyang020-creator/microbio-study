<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>改良抗酸染色（弱抗酸 / Kinyoun 冷染）</title><desc>石炭酸复红初染（靠高浓度苯酚替代加热的冷染）→ 1%~3% 硫酸弱脱色、时间短 → 亚甲蓝复染；镜下弱抗酸阳性（诺卡菌分枝丝状、隐孢子虫等卵囊）呈红色，背景与非抗酸菌呈蓝色</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">改良抗酸染色（弱抗酸）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">常规染色</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">脱色更弱（1%~3% 硫酸）→ 弱抗酸结构仍保留红色</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 上半：试剂步骤 ===== -->
<text x="24" y="80" font-size="10" font-weight="700" fill="#5c6672">试剂步骤（Kinyoun 冷染，全程不加热）</text>

<!-- ❶ 石炭酸复红 -->
<rect x="24" y="88" width="132" height="52" rx="6" fill="#fbeceb" stroke="#c2413d"/>
<circle cx="40" cy="100" r="7.5" fill="#1f2733"/>
<text x="40" y="103.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="53" y="104" font-size="10" font-weight="700" fill="#33404f">石炭酸复红</text>
<text x="34" y="120" font-size="9.5" fill="#5c6672">初染 5~10 min（冷染）</text>
<text x="34" y="133" font-size="9.5" fill="#5c6672">靠高浓度苯酚替代加热</text>
<line x1="158" y1="114" x2="172" y2="114" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❷ 1% 硫酸 -->
<rect x="174" y="88" width="132" height="52" rx="6" fill="#f5f7f9" stroke="#b9c2cc"/>
<circle cx="190" cy="100" r="7.5" fill="#1f2733"/>
<text x="190" y="103.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="203" y="104" font-size="10" font-weight="700" fill="#33404f">1%~3% 硫酸脱色</text>
<text x="184" y="120" font-size="9.5" fill="#5c6672">浓度低、时间短</text>
<text x="184" y="133" font-size="9.5" fill="#5c6672">保留弱抗酸性红色</text>
<line x1="308" y1="114" x2="322" y2="114" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❸ 亚甲蓝 -->
<rect x="324" y="88" width="132" height="52" rx="6" fill="#e5edf8" stroke="#2b6cb0"/>
<circle cx="340" cy="100" r="7.5" fill="#1f2733"/>
<text x="340" y="103.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<text x="353" y="104" font-size="10" font-weight="700" fill="#33404f">亚甲蓝复染</text>
<text x="334" y="120" font-size="9.5" fill="#5c6672">背景与非抗酸菌染蓝</text>
<text x="334" y="133" font-size="9.5" fill="#5c6672">形成红蓝对比</text>

<!-- ===== 下半：镜下所见 ===== -->
<text x="24" y="156" font-size="10" font-weight="700" fill="#5c6672">镜下所见（油镜）</text>

<!-- 视野一：弱抗酸阳性 -->
<circle cx="76" cy="200" r="32" fill="#d8e6f3" stroke="#2b6cb0" stroke-width="1.4"/>
<g stroke="#c0392b" stroke-width="1.8" stroke-linecap="round" fill="none" stroke-dasharray="4,1.8">
  <path d="M56,186 L70,194 L84,188"/>
  <path d="M70,194 L76,208"/>
  <path d="M58,212 L72,206 L86,212"/>
</g>
<circle cx="92" cy="202" r="3.6" fill="#c0392b"/>
<circle cx="86" cy="216" r="3.6" fill="#c0392b"/>
<g fill="#3b6fa8">
  <ellipse cx="52" cy="200" rx="4" ry="1.6" transform="rotate(-25 52 200)"/>
  <ellipse cx="96" cy="184" rx="4" ry="1.6" transform="rotate(35 96 184)"/>
  <ellipse cx="66" cy="224" rx="4" ry="1.6" transform="rotate(10 66 224)"/>
</g>
<text x="76" y="244" text-anchor="middle" font-size="9.5" fill="#a3332f">弱抗酸阳性</text>

<!-- 视野二：阴性对照 -->
<circle cx="180" cy="200" r="32" fill="#d8e6f3" stroke="#2b6cb0" stroke-width="1.4"/>
<g fill="#3b6fa8">
  <ellipse cx="166" cy="186" rx="4.2" ry="1.7" transform="rotate(-20 166 186)"/>
  <ellipse cx="190" cy="190" rx="4.2" ry="1.7" transform="rotate(30 190 190)"/>
  <ellipse cx="172" cy="208" rx="4.2" ry="1.7" transform="rotate(-45 172 208)"/>
  <ellipse cx="196" cy="212" rx="4.2" ry="1.7" transform="rotate(15 196 212)"/>
  <ellipse cx="180" cy="222" rx="4.2" ry="1.7" transform="rotate(-5 180 222)"/>
  <ellipse cx="160" cy="204" rx="4.2" ry="1.7" transform="rotate(60 160 204)"/>
</g>
<text x="180" y="244" text-anchor="middle" font-size="9.5" fill="#1f4e79">全蓝＝阴性</text>

<!-- 图例与要点 -->
<rect x="228" y="164" width="228" height="82" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<rect x="238" y="175" width="14" height="7" rx="3.5" fill="#c0392b"/>
<text x="258" y="182" font-size="9.5" fill="#33404f">红＝阳性：分枝丝状/卵囊（不同标本）</text>
<rect x="238" y="191" width="14" height="7" rx="3.5" fill="#3b6fa8"/>
<text x="258" y="198" font-size="9.5" fill="#33404f">蓝＝背景与非抗酸菌</text>
<text x="238" y="216" font-size="9.5" fill="#c2413d">误用 3% 盐酸乙醇 → 脱色过度、假阴性</text>
<text x="238" y="232" font-size="9.5" fill="#5c6672">卵囊标本先粪便浓集；着色常呈斑点状</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">脱色更弱是关键：红色即弱抗酸阳性，蓝色为背景与非抗酸菌</text>

<!-- 页脚：主要用途 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">主要用途</tspan>　诺卡菌 · 隐孢子虫 / 等孢球虫 / 环孢子虫卵囊</text>
</svg>
