<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>β-内酰胺酶试验（头孢硝噻吩）</title><desc>显色头孢菌素 nitrocefin 被 β-内酰胺酶水解后由黄变红</desc>
  <defs>
    <radialGradient id="bl-neg" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#efdca0"/>
      <stop offset="100%" stop-color="#e3c873"/>
    </radialGradient>
    <radialGradient id="bl-pos" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#c05656"/>
      <stop offset="100%" stop-color="#a83f3f"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">β-内酰胺酶试验（头孢硝噻吩）</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#8a8f98">显色头孢菌素 nitrocefin 被 β-内酰胺酶水解后由黄变红</text>

  <!-- 阴性 黄：不产酶，纸片保持黄色 -->
  <g>
    <circle cx="140" cy="158" r="52" fill="url(#bl-neg)" stroke="#8a6d1f" stroke-width="1.5"/>
    <circle cx="140" cy="158" r="44" fill="none" stroke="#c8ac5e" stroke-width="1" stroke-dasharray="2 4" opacity="0.7"/>
  </g>
  <text x="140" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#6e571a">阴性（黄）</text>
  <text x="140" y="256" text-anchor="middle" font-size="11" fill="#8a8f98">不产 β-内酰胺酶</text>

  <!-- 箭头：β-内酰胺酶水解 -->
  <line x1="208" y1="158" x2="262" y2="158" stroke="#8a8f98" stroke-width="1.5"/>
  <polygon points="266,158 256,153.5 256,162.5" fill="#8a8f98"/>
  <text x="237" y="148" text-anchor="middle" font-size="11" fill="#6e571a">β-内酰胺酶</text>
  <text x="237" y="172" text-anchor="middle" font-size="11" fill="#8a8f98">水解</text>

  <!-- 阳性 红：产酶水解显色，纸片变红 -->
  <g>
    <circle cx="338" cy="158" r="52" fill="url(#bl-pos)" stroke="#7d2e2e" stroke-width="1.5"/>
    <circle cx="338" cy="158" r="44" fill="none" stroke="#c98080" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
  </g>
  <text x="338" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#b04242">阳性（红）</text>
  <text x="338" y="256" text-anchor="middle" font-size="11" fill="#8a8f98">产 β-内酰胺酶</text>

  <text x="240" y="290" text-anchor="middle" font-size="11.5" fill="#454b54">适用：流感嗜血杆菌、淋病奈瑟菌、卡他莫拉菌、葡萄球菌（预测青霉素耐药）</text>
</svg>
