<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>甘露醇盐琼脂（MSA）</title><desc>甘露醇盐琼脂平板俯视：酚红使基底呈红色，7.5% 高浓度氯化钠抑制革兰阴性菌与多数杂菌、耐盐的葡萄球菌（及肠球菌、微球菌）可生长；金黄色葡萄球菌发酵甘露醇产酸，菌落及周围培养基由红变黄，表皮葡萄球菌等不发酵甘露醇者菌落呈白色而基底仍红</desc>
<defs>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f2dd5c" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#f2dd5c" stop-opacity="0"/>
  </radialGradient>
  <clipPath id="plateclip"><circle cx="108" cy="152" r="62"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">甘露醇盐琼脂（MSA）</text>
<rect x="356" y="14" width="100" height="18" rx="9" fill="#eef1f5"/>
<text x="406" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">选择与鉴别培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">高盐先选出葡萄球菌，再按甘露醇产酸把金葡染成黄色</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视 ===== -->
<text x="24" y="82" font-size="9.5" fill="#5c6672">平板俯视（基底酚红＝红）</text>
<circle cx="108" cy="152" r="66" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="108" cy="152" r="62" fill="#d1566c" stroke="#a33a4e" stroke-width="1.4"/>

<g clip-path="url(#plateclip)">
  <!-- 发酵甘露醇：菌落及周围培养基变黄 -->
  <circle cx="88" cy="124" r="27" fill="url(#halo)"/>
  <circle cx="88" cy="124" r="8" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <circle cx="108" cy="106" r="6.5" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <circle cx="68" cy="144" r="5.5" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
  <!-- 不发酵甘露醇：白色菌落，周围基底仍红 -->
  <circle cx="142" cy="168" r="6" fill="#f7eef0" stroke="#a33a4e" stroke-width="1"/>
  <circle cx="126" cy="190" r="5" fill="#f7eef0" stroke="#a33a4e" stroke-width="1"/>
  <circle cx="154" cy="142" r="4.5" fill="#f7eef0" stroke="#a33a4e" stroke-width="1"/>
  <!-- 被高盐抑制：无菌落，仅示接种处 -->
  <g fill="none" stroke="#e2a3af" stroke-width="1.2" stroke-dasharray="3,2.5">
    <circle cx="78" cy="186" r="7"/><circle cx="98" cy="200" r="6"/>
  </g>
  <g stroke="#f0c7cf" stroke-width="1.4" stroke-linecap="round">
    <line x1="74" y1="182" x2="82" y2="190"/><line x1="82" y1="182" x2="74" y2="190"/>
    <line x1="94.5" y1="196.5" x2="101.5" y2="203.5"/><line x1="101.5" y1="196.5" x2="94.5" y2="203.5"/>
  </g>
</g>

<!-- 平板上的编号 -->
<g>
  <circle cx="122" cy="132" r="7.5" fill="#1f2733"/>
  <text x="122" y="135.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
  <circle cx="154" cy="188" r="7.5" fill="#1f2733"/>
  <text x="154" y="191.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
  <circle cx="60" cy="178" r="7.5" fill="#1f2733"/>
  <text x="60" y="181.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
</g>

<!-- ===== 右：选择成分 ===== -->
<rect x="186" y="70" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="86" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="196" y="103" font-size="9.5" fill="#5c6672">7.5% 氯化钠高渗 → 抑革兰阴性菌与多数杂菌</text>
<text x="196" y="120" font-size="9.5" fill="#5c6672">葡萄球菌耐盐大量生长；肠球菌／微球菌也可长</text>
<circle cx="201" cy="134" r="6" fill="none" stroke="#c2413d" stroke-width="1.1" stroke-dasharray="3,2.5"/>
<text x="201" y="137.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a3332f">3</text>
<text x="213" y="137.5" font-size="9.5" fill="#33404f">大肠埃希菌、化脓链球菌：不长或极小</text>

<!-- ===== 右：鉴别成分 ===== -->
<rect x="186" y="154" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="170" font-size="10" font-weight="700" fill="#33404f">鉴别成分：指示什么</text>
<text x="196" y="187" font-size="9.5" fill="#5c6672">甘露醇 + 酚红（中性时呈红，产酸转黄）</text>
<circle cx="201" cy="201" r="6" fill="#f0d63c" stroke="#c9ac1c" stroke-width="1"/>
<text x="201" y="204.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#7a5f00">1</text>
<text x="213" y="204.5" font-size="9.5" fill="#33404f">发酵甘露醇 → 周围变黄（肠球菌可假黄）</text>
<circle cx="201" cy="219" r="6" fill="#f7eef0" stroke="#a33a4e" stroke-width="1"/>
<text x="201" y="222.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a33a4e">2</text>
<text x="213" y="222.5" font-size="9.5" fill="#33404f">不发酵 → 菌落白色，基底保持红色</text>

<!-- 临床注解 -->
<rect x="24" y="234" width="432" height="18" rx="6" fill="#f9e6e4" stroke="#e3b8b5"/>
<text x="34" y="246.5" font-size="9.5" fill="#a3332f">孵育 24–48h 再判：变黄只是筛选，确认金葡仍须凝固酶／乳胶试验</text>

<!-- 结论 -->
<text x="240" y="263" text-anchor="middle" font-size="11.5" fill="#33404f">黄＝发酵甘露醇；红底白落＝其他葡萄球菌；不长＝非耐盐菌</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　金黄色葡萄球菌（黄）· 表皮葡萄球菌（白）· 腐生葡萄球菌（变异）</text>
</svg>
