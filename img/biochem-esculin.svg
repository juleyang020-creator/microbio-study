<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>胆汁七叶苷试验 (BEA)</title><desc>在 40% 胆盐中水解七叶苷，产物与铁盐生成黑色（七叶素-铁）</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">胆汁七叶苷试验 (BEA)</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#565b63">在 40% 胆盐中水解七叶苷，产物与铁盐生成黑色（七叶素-铁）</text>

  <!-- 阴性管(琥珀,不变) -->
  <g>
    <path d="M150,78 L150,238 Q150,256 168,256 Q186,256 186,238 L186,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="168" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M150,150 L186,120 L186,238 Q186,256 168,256 Q150,256 150,238 Z" fill="#cdb878"/>
    <text x="168" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#9a8a52">阴性（琥珀色）</text>
  </g>

  <!-- 阳性管(黑) -->
  <g>
    <path d="M300,78 L300,238 Q300,256 318,256 Q336,256 336,238 L336,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="318" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M300,150 L336,120 L336,238 Q336,256 318,256 Q300,256 300,238 Z" fill="#2c3138"/>
    <text x="318" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3138">阳性（变黑）</text>
  </g>

  <text x="240" y="290" text-anchor="middle" font-size="11" fill="#565b63">肠球菌属、D 群链球菌（牛链球菌群）阳性；耐胆盐 + 水解七叶苷双重选择</text>
</svg>
