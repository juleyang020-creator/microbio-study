<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>胆汁七叶苷(BEA)试验</title><desc>能耐 40% 胆汁并水解七叶苷的菌，产物七叶素与枸橼酸铁铵中的 Fe³⁺ 结合成黑色络合物，使琼脂斜面变黑；不耐胆盐或不产水解酶者斜面保持琥珀色</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="blk" markerWidth="8" markerHeight="12" refX="6" refY="6" orient="auto"><line x1="6" y1="1" x2="6" y2="11" stroke="#c2413d" stroke-width="2.4"/></marker>
</defs>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">胆汁七叶苷(BEA)试验</text>
<rect x="386" y="14" width="70" height="18" rx="9" fill="#eef1f5"/>
<text x="421" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生长特性</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">耐胆盐 ＋ 水解七叶苷：产物遇 Fe³⁺ 生成黑色络合物 → 斜面变黑</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：阴性斜面 ===== -->
<text x="62" y="70" text-anchor="middle" font-size="9.5" fill="#5c6672">阴性（−）</text>
<path d="M46,76 L46,218 Q46,236 62,236 Q78,236 78,218 L78,76 Z" fill="#fbfaf6" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M46,150 L78,118 L78,218 Q78,236 62,236 Q46,236 46,218 Z" fill="#cdb878"/>
<ellipse cx="62" cy="76" rx="16" ry="4.5" fill="#f2f4f6" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="62" y="246" text-anchor="middle" font-size="9.5" fill="#5c6672">斜面不变色</text>

<!-- ===== 右：阳性斜面 ===== -->
<text x="418" y="70" text-anchor="middle" font-size="9.5" fill="#33404f">阳性（+）</text>
<path d="M402,76 L402,218 Q402,236 418,236 Q434,236 434,218 L434,76 Z" fill="#fbfaf6" stroke="#b9c2cc" stroke-width="1.6"/>
<path d="M402,150 L434,118 L434,218 Q434,236 418,236 Q402,236 402,218 Z" fill="#23262b"/>
<ellipse cx="418" cy="76" rx="16" ry="4.5" fill="#f2f4f6" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="418" y="246" text-anchor="middle" font-size="9.5" fill="#33404f">斜面变黑</text>

<!-- ===== 中：培养基与反应链 ===== -->
<rect x="100" y="74" width="280" height="24" rx="5" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="90" text-anchor="middle" font-size="9.5" fill="#33404f">斜面成分　40% 牛胆汁　七叶苷　枸橼酸铁铵</text>

<!-- 底物 -->
<rect x="100" y="112" width="54" height="26" rx="5" fill="#f5f7f9" stroke="#b9c2cc"/>
<text x="127" y="129" text-anchor="middle" font-size="9.5" fill="#1f2733">七叶苷</text>
<line x1="156" y1="125" x2="172" y2="125" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<!-- 酶 -->
<circle cx="194" cy="125" r="18" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="194" y="122" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">七叶苷</text>
<text x="194" y="134" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">水解酶</text>
<line x1="214" y1="125" x2="232" y2="125" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<!-- 产物 -->
<rect x="236" y="112" width="88" height="26" rx="5" fill="#f5f7f9" stroke="#b9c2cc"/>
<text x="280" y="129" text-anchor="middle" font-size="9.5" fill="#1f2733">七叶素 ＋ 葡萄糖</text>

<!-- 与铁盐结合 -->
<line x1="280" y1="138" x2="280" y2="160" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="288" y="154" font-size="9.5" fill="#5c6672">＋ Fe³⁺</text>

<!-- 黑色络合物 -->
<rect x="196" y="164" width="168" height="28" rx="5" fill="#23262b"/>
<text x="280" y="182" text-anchor="middle" font-size="9.5" fill="#ffffff">黑色络合物（七叶素-Fe³⁺）</text>
<line x1="366" y1="178" x2="396" y2="178" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- 阴性：被阻断的支路 -->
<line x1="98" y1="125" x2="86" y2="125" stroke="#c2413d" stroke-width="1.5" stroke-dasharray="3,2.5" marker-end="url(#blk)"/>
<text x="240" y="210" text-anchor="middle" font-size="9.5" fill="#5c6672">阴性：被 40% 胆汁抑制，或能生长却不水解七叶苷 → 无七叶素</text>
<text x="240" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">35℃ 孵育 24–48 h；斜面任一部位变黑即阳性，48 h 不黑才报阴性</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">BEA(+) 须加做 6.5% NaCl：(+) 肠球菌属，(−) 牛链球菌群</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　阳性：粪肠球菌、解没食子酸链球菌 ｜ 阴性：肺炎链球菌、化脓链球菌</text>
</svg>
