<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>X/V 因子需求试验</title><desc>在不含 X/V 因子的 TSA 平板上贴 X（血红素）、V（NAD）、X+V 三种因子纸片：流感嗜血杆菌仅绕 X+V 片生长，副流感嗜血杆菌绕 V 与 X+V 片均生长，据卫星生长部位判定所需因子</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">X/V 因子需求试验</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">生长特性</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">TSA 平板贴 X、V、X+V 因子纸片 → 看菌落绕哪片生长（卫星现象）</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：流感嗜血杆菌（需 X+V） ===== -->
<circle cx="72" cy="78" r="7.5" fill="#1f2733"/>
<text x="72" y="81.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="84" y="82" font-size="10" font-weight="700" fill="#33404f">流感嗜血杆菌</text>
<circle cx="104" cy="150" r="52" fill="#fbfcfd" stroke="#b9c2cc" stroke-width="1.4"/>
<circle cx="104" cy="150" r="47" fill="none" stroke="#e3e7ec"/>
<!-- 生长晕（仅 X+V 片） -->
<circle cx="104" cy="172" r="22" fill="#eef1f5" stroke="#c9d2db" stroke-dasharray="3,2"/>
<g fill="#c9d2db">
  <circle cx="92" cy="164" r="1.7"/><circle cx="116" cy="164" r="1.7"/><circle cx="88" cy="176" r="1.7"/>
  <circle cx="120" cy="176" r="1.7"/><circle cx="98" cy="186" r="1.7"/><circle cx="112" cy="187" r="1.7"/>
</g>
<!-- 纸片 -->
<circle cx="82" cy="130" r="8.5" fill="#f3ddd6" stroke="#a3332f"/>
<text x="82" y="133.5" text-anchor="middle" font-size="9.5" fill="#a3332f">X</text>
<circle cx="126" cy="130" r="8.5" fill="#f7f2e2" stroke="#c2a24a"/>
<text x="126" y="133.5" text-anchor="middle" font-size="9.5" fill="#8a6d2f">V</text>
<ellipse cx="104" cy="172" rx="12.5" ry="8.5" fill="#f0e7de" stroke="#8a6d2f"/>
<text x="104" y="175.5" text-anchor="middle" font-size="9.5" fill="#5b4a2f">X+V</text>
<text x="104" y="214" text-anchor="middle" font-size="9.5" fill="#5c6672">仅 X+V 片周围长菌</text>
<text x="104" y="228" text-anchor="middle" font-size="9.5" fill="#33404f">需 X 因子 ＋ V 因子</text>

<!-- ===== 右：副流感嗜血杆菌（仅需 V） ===== -->
<circle cx="344" cy="78" r="7.5" fill="#1f2733"/>
<text x="344" y="81.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="356" y="82" font-size="10" font-weight="700" fill="#33404f">副流感嗜血杆菌</text>
<circle cx="376" cy="150" r="52" fill="#fbfcfd" stroke="#b9c2cc" stroke-width="1.4"/>
<circle cx="376" cy="150" r="47" fill="none" stroke="#e3e7ec"/>
<!-- 生长晕（V 片 + X+V 片） -->
<circle cx="398" cy="130" r="20" fill="#eef1f5" stroke="#c9d2db" stroke-dasharray="3,2"/>
<circle cx="376" cy="172" r="22" fill="#eef1f5" stroke="#c9d2db" stroke-dasharray="3,2"/>
<g fill="#c9d2db">
  <circle cx="388" cy="118" r="1.7"/><circle cx="410" cy="122" r="1.7"/><circle cx="412" cy="138" r="1.7"/>
  <circle cx="392" cy="144" r="1.7"/><circle cx="364" cy="186" r="1.7"/><circle cx="386" cy="187" r="1.7"/>
  <circle cx="358" cy="166" r="1.7"/><circle cx="394" cy="172" r="1.7"/>
</g>
<circle cx="354" cy="130" r="8.5" fill="#f3ddd6" stroke="#a3332f"/>
<text x="354" y="133.5" text-anchor="middle" font-size="9.5" fill="#a3332f">X</text>
<circle cx="398" cy="130" r="8.5" fill="#f7f2e2" stroke="#c2a24a"/>
<text x="398" y="133.5" text-anchor="middle" font-size="9.5" fill="#8a6d2f">V</text>
<ellipse cx="376" cy="172" rx="12.5" ry="8.5" fill="#f0e7de" stroke="#8a6d2f"/>
<text x="376" y="175.5" text-anchor="middle" font-size="9.5" fill="#5b4a2f">X+V</text>
<text x="376" y="214" text-anchor="middle" font-size="9.5" fill="#5c6672">V 片、X+V 片周围均长菌</text>
<text x="376" y="228" text-anchor="middle" font-size="9.5" fill="#33404f">仅需 V 因子（X 非必需）</text>

<!-- ===== 中：因子是什么、干什么 ===== -->
<text x="240" y="78" text-anchor="middle" font-size="9.5" fill="#5c6672">载体：TSA（不含 X/V）</text>
<rect x="174" y="88" width="132" height="28" rx="5" fill="#f3ddd6" stroke="#a3332f"/>
<text x="240" y="100" text-anchor="middle" font-size="9.5" fill="#a3332f">X 因子＝氯化血红素 hemin</text>
<text x="240" y="112" text-anchor="middle" font-size="9.5" fill="#8a5a52">（原卟啉Ⅸ 螯合 Fe）</text>
<line x1="240" y1="116" x2="240" y2="126" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="240" y="136" text-anchor="middle" font-size="9.5" fill="#5c6672">合成细胞色素、触酶</text>
<rect x="174" y="144" width="132" height="28" rx="5" fill="#f7f2e2" stroke="#c2a24a"/>
<text x="240" y="156" text-anchor="middle" font-size="9.5" fill="#8a6d2f">V 因子＝NAD / NADP</text>
<text x="240" y="168" text-anchor="middle" font-size="9.5" fill="#8a6d2f">（辅酶Ⅰ／辅酶Ⅱ）</text>
<line x1="240" y1="172" x2="240" y2="182" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="240" y="192" text-anchor="middle" font-size="9.5" fill="#5c6672">呼吸链递氢 → 菌落生长</text>
<text x="240" y="212" text-anchor="middle" font-size="9.5" fill="#33404f">红细胞富含二者 →「嗜血」</text>
<text x="240" y="228" text-anchor="middle" font-size="9.5" fill="#5c6672">5%~7% CO₂ 35℃ 20~24 h</text>

<!-- 注解 -->
<text x="240" y="246" text-anchor="middle" font-size="9.5" fill="#c2413d">勿用血琼脂：X 因子丰富，V 因子被红细胞包裹并遭 NAD 酶破坏（故只见卫星现象）</text>

<!-- 结论 -->
<text x="240" y="264" text-anchor="middle" font-size="11.5" fill="#33404f">菌只长在含其所需因子的纸片周围 → 据生长部位定因子需求</text>

<!-- 页脚：典型菌 -->
<rect x="24" y="272" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="288" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　需 X+V：流感嗜血杆菌 ｜ 仅需 V：副流感嗜血杆菌 ｜ 判 X 依赖优选卟啉试验；定种另需糖发酵/测序</text>
</svg>
