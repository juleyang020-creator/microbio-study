<svg role="img" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>硝酸盐还原试验 (Nitrate)</title><desc>硝酸盐→亚硝酸盐，加格里斯试剂（磺胺酸 + α-萘胺）显红</desc>
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="27" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3138">硝酸盐还原试验 (Nitrate)</text>
  <text x="240" y="45" text-anchor="middle" font-size="11" fill="#565b63">硝酸盐→亚硝酸盐，加格里斯试剂（磺胺酸 + α-萘胺）显红</text>

  <!-- 阳性管(红) -->
  <g>
    <path d="M150,78 L150,238 Q150,256 168,256 Q186,256 186,238 L186,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="168" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M150,120 L186,120 L186,238 Q186,256 168,256 Q150,256 150,238 Z" fill="#c46a62"/>
    <text x="168" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#c46a62">阳性（变红）</text>
  </g>

  <!-- 阴性管(无色,需加锌确认) -->
  <g>
    <path d="M300,78 L300,238 Q300,256 318,256 Q336,256 336,238 L336,78 Z" fill="#faf8f1" stroke="#c8b887" stroke-width="2"/>
    <ellipse cx="318" cy="78" rx="18" ry="5" fill="#efe6c6" stroke="#c8b887" stroke-width="1.4"/>
    <path d="M300,120 L336,120 L336,238 Q336,256 318,256 Q300,256 300,238 Z" fill="#eef0ea"/>
    <text x="318" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#565b63">阴性（不变色）</text>
  </g>

  <text x="240" y="290" text-anchor="middle" font-size="11" fill="#565b63">大肠埃希菌等肠杆菌阳性；不变红须加锌粉——变红=真阴性，仍不红=已还原为氮气(阳性)</text>
</svg>
