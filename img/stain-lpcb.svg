<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>乳酸酚棉蓝（LPCB）</title><desc>胶带粘取菌落后滴加 LPCB 一步湿片镜检：乳酸保形、酚杀菌防腐、棉蓝结合几丁质细胞壁使菌丝与产孢结构呈蓝色；据有隔锐角分支加分生孢子头（曲霉）与宽大无隔/少隔近直角分支加孢子囊（毛霉/根霉）初步定属</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">乳酸酚棉蓝（LPCB）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">真菌染色</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">棉蓝结合几丁质细胞壁 → 菌丝与孢子呈蓝色</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 上半：试剂步骤 ===== -->
<!-- ❶ 取材 -->
<rect x="24" y="72" width="120" height="58" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<rect x="32" y="88" width="34" height="20" rx="2" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<g fill="#6f8fc8"><circle cx="46" cy="99" r="3.4"/><circle cx="51" cy="96" r="2.8"/><circle cx="55" cy="100" r="3"/></g>
<rect x="42" y="82" width="16" height="32" rx="2" fill="#dbe6f2" fill-opacity="0.45" stroke="#8fa8c6" stroke-dasharray="3,2"/>
<text x="72" y="92" font-size="10" font-weight="700" fill="#33404f">胶带粘取菌落</text>
<text x="72" y="108" font-size="9.5" fill="#5c6672">保产孢结构完整</text>
<circle cx="36" cy="72" r="8" fill="#1f2733"/>
<text x="36" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>

<line x1="145" y1="100" x2="155" y2="100" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❷ LPCB 三组分 -->
<rect x="156" y="72" width="164" height="58" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="168" cy="72" r="8" fill="#1f2733"/>
<text x="168" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="182" y="75.5" font-size="9.5" font-weight="700" fill="#33404f">LPCB 染液</text>
<rect x="164" y="82" width="38" height="13" rx="6.5" fill="#ffffff" stroke="#b9c2cc"/>
<text x="183" y="92" text-anchor="middle" font-size="9.5" fill="#33404f">乳酸</text>
<text x="208" y="92" font-size="9.5" fill="#5c6672">保持菌丝形态、防干瘪</text>
<rect x="164" y="99" width="38" height="13" rx="6.5" fill="#ffffff" stroke="#b9c2cc"/>
<text x="183" y="109" text-anchor="middle" font-size="9.5" fill="#33404f">酚</text>
<text x="208" y="109" font-size="9.5" fill="#5c6672">杀菌防腐，利于保存</text>
<rect x="164" y="116" width="38" height="13" rx="6.5" fill="#dbe6f2" stroke="#4a6fae"/>
<text x="183" y="126" text-anchor="middle" font-size="9.5" fill="#2f4d86">棉蓝</text>
<text x="208" y="126" font-size="9.5" fill="#2f4d86">结合几丁质壁 → 蓝色</text>

<line x1="321" y1="100" x2="331" y2="100" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<!-- ❸ 镜检 -->
<rect x="332" y="72" width="124" height="58" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="344" cy="72" r="8" fill="#1f2733"/>
<text x="344" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<path d="M344,84 L358,84 L355,94 L347,94 Z" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.1"/>
<rect x="340" y="98" width="26" height="4" fill="#dbe6f2" fill-opacity="0.8" stroke="#9fb3cc" stroke-width="0.8"/>
<rect x="336" y="102" width="34" height="9" rx="1.5" fill="#ffffff" stroke="#b9c2cc" stroke-width="1.2"/>
<rect x="342" y="102" width="22" height="3" fill="#cfe0f2"/>
<text x="376" y="92" font-size="10" font-weight="700" fill="#33404f">加盖玻片镜检</text>
<text x="376" y="108" font-size="9.5" fill="#5c6672">不水洗、不脱色</text>

<!-- ===== 下半：镜下所见 ===== -->
<rect x="24" y="138" width="212" height="110" rx="8" fill="#fbfcfd" stroke="#e3e7ec"/>
<rect x="244" y="138" width="212" height="110" rx="8" fill="#fbfcfd" stroke="#e3e7ec"/>
<text x="34" y="152" font-size="10" font-weight="700" fill="#2f4d86">有隔菌丝型 · 曲霉</text>
<text x="254" y="152" font-size="10" font-weight="700" fill="#2f4d86">无隔/少隔菌丝型 · 毛霉 / 根霉</text>

<!-- 左视野：曲霉 -->
<circle cx="76" cy="196" r="38" fill="#f2f5fa" stroke="#c9d4e3" stroke-width="1.4"/>
<line x1="46" y1="216" x2="108" y2="204" stroke="#4a6fae" stroke-width="5" stroke-linecap="round"/>
<line x1="68" y1="214" x2="82.5" y2="192.4" stroke="#4a6fae" stroke-width="4" stroke-linecap="round"/>
<line x1="82.5" y1="192.4" x2="82" y2="186" stroke="#4a6fae" stroke-width="3.5" stroke-linecap="round"/>
<g stroke="#274a80" stroke-width="1.5">
  <line x1="64.0" y1="209.3" x2="65.2" y2="215.5"/>
  <line x1="82.6" y1="205.7" x2="83.8" y2="211.9"/>
  <line x1="98.1" y1="202.7" x2="99.3" y2="208.9"/>
</g>
<circle cx="82" cy="181" r="6.5" fill="#4a6fae"/>
<g fill="#7d99cf">
  <circle cx="72" cy="181" r="2"/><circle cx="75" cy="173" r="2"/><circle cx="82" cy="170" r="2"/><circle cx="89" cy="173" r="2"/><circle cx="92" cy="181" r="2"/>
  <circle cx="68.5" cy="181" r="1.8"/><circle cx="72" cy="171" r="1.8"/><circle cx="82" cy="166.5" r="1.8"/><circle cx="92" cy="171" r="1.8"/><circle cx="95.5" cy="181" r="1.8"/>
</g>
<line x1="88" y1="176" x2="114" y2="166" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="88" cy="176" r="2" fill="#4a6fae"/>
<line x1="84" y1="208" x2="114" y2="194" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="84" cy="208" r="2" fill="#274a80"/>
<text x="118" y="170" font-size="9.5" font-weight="700" fill="#33404f">分生孢子头</text>
<text x="118" y="184" font-size="9.5" fill="#5c6672">顶囊长小梗、孢子成链</text>
<text x="118" y="198" font-size="9.5" font-weight="700" fill="#33404f">菌丝有横隔</text>
<text x="118" y="212" font-size="9.5" fill="#5c6672">细而均匀、45° 锐角分支</text>

<!-- 右视野：毛霉 / 根霉 -->
<circle cx="296" cy="196" r="38" fill="#f2f5fa" stroke="#c9d4e3" stroke-width="1.4"/>
<line x1="266" y1="216" x2="328" y2="204" stroke="#4a6fae" stroke-width="8" stroke-linecap="round"/>
<line x1="288" y1="212" x2="283" y2="186.5" stroke="#4a6fae" stroke-width="7" stroke-linecap="round"/>
<polyline points="295.9,210.5 294.4,202.6 286.5,204.1" fill="none" stroke="#5c6672" stroke-width="1"/>
<circle cx="282" cy="178" r="10" fill="#4a6fae" stroke="#274a80" stroke-width="1"/>
<circle cx="282" cy="181" r="4" fill="#7d99cf"/>
<g fill="#7d99cf"><circle cx="272" cy="170" r="1.8"/><circle cx="266" cy="177" r="1.8"/><circle cx="277" cy="166" r="1.8"/></g>
<line x1="292" y1="172" x2="334" y2="166" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="292" cy="172" r="2" fill="#4a6fae"/>
<line x1="314" y1="207" x2="334" y2="198" stroke="#b9c2cc" stroke-width="1"/>
<circle cx="314" cy="207" r="2" fill="#274a80"/>
<text x="338" y="170" font-size="9.5" font-weight="700" fill="#33404f">孢子囊</text>
<text x="338" y="184" font-size="9.5" fill="#5c6672">囊内孢子成熟散出</text>
<text x="338" y="198" font-size="9.5" font-weight="700" fill="#33404f">宽大无隔/少隔菌丝</text>
<text x="338" y="212" font-size="9.5" fill="#5c6672">粗细不均、近直角分支</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">棉蓝染的是细胞壁：看横隔、分支角与产孢结构即可初步定属</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">主要用途</tspan>　丝状真菌形态学鉴定（曲霉、毛霉/根霉、镰刀菌）· 须在生物安全柜内制片</text>
</svg>
