<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>KOH 湿片（10% 氢氧化钾）</title><desc>10% KOH 溶解角质与上皮碎屑使背景透明，真菌细胞壁耐碱得以保留；不染色，靠折光辨认分隔分枝菌丝与关节孢子，用于皮肤、甲、毛发浅部真菌感染的快速镜检</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <clipPath id="fL"><circle cx="100" cy="184" r="46"/></clipPath>
  <clipPath id="fR"><circle cx="202" cy="184" r="46"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">KOH 湿片（10% 氢氧化钾）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">真菌染色</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">碱溶背景、不染菌体：清掉角质后靠折光看菌丝</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 试剂步骤 ===== -->
<rect x="24" y="64" width="126" height="48" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="87" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#33404f">标本制片</text>
<text x="87" y="92" text-anchor="middle" font-size="9.5" fill="#5c6672">皮屑/甲屑/毛发</text>
<text x="87" y="105" text-anchor="middle" font-size="9.5" fill="#5c6672">置载玻片加盖片</text>
<line x1="152" y1="88" x2="174" y2="88" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<rect x="176" y="64" width="126" height="48" rx="7" fill="#e3edf8" stroke="#2b6cb0"/>
<text x="239" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#1f4e79">滴加 10% KOH</text>
<text x="239" y="92" text-anchor="middle" font-size="9.5" fill="#1f4e79">溶角质与上皮碎屑</text>
<text x="239" y="105" text-anchor="middle" font-size="9.5" fill="#5c6672">真菌壁耐碱而保留</text>
<line x1="304" y1="88" x2="326" y2="88" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>

<rect x="328" y="64" width="128" height="48" rx="7" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="392" y="78" text-anchor="middle" font-size="10" font-weight="700" fill="#33404f">微加温 · 待清亮</text>
<text x="392" y="92" text-anchor="middle" font-size="9.5" fill="#5c6672">背景变透明后镜检</text>
<text x="392" y="105" text-anchor="middle" font-size="9.5" fill="#5c6672">甲屑厚者可静置 30 分</text>

<!-- ===== 镜下所见 ===== -->
<text x="24" y="130" font-size="10" font-weight="700" fill="#33404f">镜下所见：不着色，调暗光圈靠折光辨认</text>

<!-- 左：阳性视野 -->
<circle cx="100" cy="184" r="46" fill="#fbfcfc" stroke="#b9c2cc"/>
<g clip-path="url(#fL)">
  <g fill="#f8fafa" stroke="#e6eaee">
    <path d="M60,150 L92,144 L104,160 L80,172 L58,164 Z"/>
    <path d="M112,204 L140,196 L148,214 L124,226 L108,218 Z"/>
  </g>
  <g fill="none" stroke="#8a9d96" stroke-width="5" stroke-linecap="round">
    <path d="M64,176 L96,186 L134,176"/><path d="M96,186 L112,208"/>
  </g>
  <g fill="none" stroke="#f4f7f6" stroke-width="2.2" stroke-linecap="round">
    <path d="M64,176 L96,186 L134,176"/><path d="M96,186 L112,208"/>
  </g>
  <g stroke="#8a9d96" stroke-width="1.3">
    <line x1="78" y1="176" x2="82" y2="186"/><line x1="114" y1="176" x2="118" y2="186"/>
    <line x1="101" y1="199" x2="109" y2="195"/>
  </g>
  <g fill="#f4f7f6" stroke="#8a9d96" stroke-width="1.3">
    <ellipse cx="66" cy="201" rx="6" ry="4.4"/><ellipse cx="77" cy="205" rx="6" ry="4.4"/><ellipse cx="88" cy="209" rx="6" ry="4.4"/>
  </g>
</g>
<text x="100" y="238" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">阳性：分隔分枝菌丝</text>
<text x="100" y="250" text-anchor="middle" font-size="9.5" fill="#5c6672">＋关节孢子链</text>

<!-- 右：阴性视野 -->
<circle cx="202" cy="184" r="46" fill="#fbfcfc" stroke="#b9c2cc"/>
<g clip-path="url(#fR)">
  <g fill="#f5f7f9" stroke="#c9d1d9">
    <path d="M170,160 L196,155 L206,172 L188,182 L168,176 Z"/>
    <path d="M206,180 L232,172 L240,190 L222,202 L204,196 Z"/>
    <path d="M172,196 L196,190 L204,208 L182,216 L166,206 Z"/>
  </g>
  <g fill="#e3e7ec"><circle cx="187" cy="169" r="3"/><circle cx="222" cy="187" r="3"/><circle cx="186" cy="203" r="3"/></g>
  <path d="M158,222 L200,216 L246,212" fill="none" stroke="#d7dde3" stroke-width="3"/>
</g>
<text x="202" y="238" text-anchor="middle" font-size="9.5" font-weight="700" fill="#33404f">阴性：仅角化上皮</text>
<text x="202" y="250" text-anchor="middle" font-size="9.5" fill="#5c6672">未见菌丝与孢子</text>

<!-- ===== 伪影鉴别面板 ===== -->
<rect x="258" y="134" width="198" height="118" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="268" y="150" font-size="10" font-weight="700" fill="#33404f">别把伪影当菌丝</text>

<g fill="none" stroke="#8a9d96" stroke-width="5" stroke-linecap="round"><line x1="270" y1="170" x2="302" y2="170"/></g>
<g fill="none" stroke="#f4f7f6" stroke-width="2.2" stroke-linecap="round"><line x1="270" y1="170" x2="302" y2="170"/></g>
<g stroke="#8a9d96" stroke-width="1.3"><line x1="281" y1="166" x2="281" y2="174"/><line x1="292" y1="166" x2="292" y2="174"/></g>
<text x="312" y="167" font-size="9.5" font-weight="700" fill="#33404f">真菌丝</text>
<text x="312" y="180" font-size="9.5" fill="#5c6672">粗细均匀、有分隔分枝</text>

<path d="M269,206 C279,198 289,212 302,201" fill="none" stroke="#b9c2cc" stroke-width="5" stroke-linecap="round"/>
<path d="M288,205 C293,208 297,205 303,201" fill="none" stroke="#b9c2cc" stroke-width="2" stroke-linecap="round"/>
<text x="312" y="199" font-size="9.5" font-weight="700" fill="#33404f">棉纤维</text>
<text x="312" y="212" font-size="9.5" fill="#5c6672">扁带状、粗细不匀无隔</text>

<g stroke="#b9c2cc" stroke-width="1.3" stroke-linecap="round">
  <line x1="270" y1="232" x2="300" y2="242"/><line x1="272" y1="243" x2="300" y2="231"/>
  <line x1="286" y1="228" x2="286" y2="246"/><line x1="268" y1="238" x2="302" y2="236"/>
</g>
<text x="312" y="231" font-size="9.5" font-weight="700" fill="#33404f">KOH 结晶</text>
<text x="312" y="244" font-size="9.5" fill="#5c6672">标本干涸浓缩析出，针羽状</text>

<!-- 结论 -->
<text x="240" y="265" text-anchor="middle" font-size="11.5" fill="#33404f">见菌丝或芽生孢子即可报阳性；阴性不除外感染，必要时送真菌培养</text>

<!-- 页脚：主要用途 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">主要用途</tspan>　皮肤癣 · 甲真菌病 · 头癣快速镜检 ｜ 假丝酵母菌初筛</text>
</svg>
