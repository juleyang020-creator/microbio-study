<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">生物膜</text>

  <!-- 表面（导管/植入物） -->
  <rect x="40" y="172" width="340" height="16" fill="#cbd5e1"/>
  <text x="44" y="184" font-size="9" fill="#475569"></text>

  <!-- 生物膜基质穹顶 -->
  <path d="M70,172 C70,96 350,96 350,172 z" fill="#ccfbf1" stroke="#0f766e" opacity="0.7"/>
  <text x="210" y="120" text-anchor="middle" font-size="10.5" fill="#0f766e">胞外多糖基质</text>

  <!-- 内部菌群 -->
  <circle cx="150" cy="150" r="9" fill="#0f766e"/>
  <circle cx="180" cy="158" r="9" fill="#0f766e"/>
  <circle cx="215" cy="150" r="9" fill="#0f766e"/>
  <circle cx="250" cy="158" r="9" fill="#0f766e"/>
  <circle cx="285" cy="150" r="9" fill="#0f766e"/>

  <!-- 药物被挡在外 -->
  <circle cx="120" cy="60" r="9" fill="#dbeafe" stroke="#1d4ed8"/>
  <circle cx="300" cy="60" r="9" fill="#dbeafe" stroke="#1d4ed8"/>
  <line x1="123" y1="69" x2="150" y2="104" stroke="#dc2626" stroke-width="1.5"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">✕</text>
  <line x1="297" y1="69" x2="270" y2="104" stroke="#dc2626" stroke-width="1.5"/>
  <text x="262" y="92" text-anchor="middle" font-size="14" fill="#dc2626" font-weight="700">✕</text>

  <text x="210" y="212" text-anchor="middle" font-size="11.5" fill="#334155">基质阻滞药物渗透、内部菌代谢低下受保护 → 顽固难清</text>
</svg>
