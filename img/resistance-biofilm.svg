<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <radialGradient id="bfMatrix" cx="0.5" cy="0.8" r="0.9"><stop offset="0" stop-color="#5eead4" stop-opacity="0.55"/><stop offset="1" stop-color="#99f6e4" stop-opacity="0.3"/></radialGradient>
    <radialGradient id="bfDrug" cx="0.4" cy="0.35" r="0.7"><stop offset="0" stop-color="#dbeafe"/><stop offset="1" stop-color="#3b82f6"/></radialGradient>
    <filter id="bfSh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="1.4" stdDeviation="1.5" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  </defs>
  <rect width="480" height="300" fill="#f8fafc"/>
  <text x="240" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#b91c1c">生物膜</text>

  <!-- 抗生素（仅渗透外层） -->
  <g>
    <circle cx="120" cy="58" r="7" fill="url(#bfDrug)" stroke="#1d4ed8"/>
    <circle cx="200" cy="50" r="7" fill="url(#bfDrug)" stroke="#1d4ed8"/>
    <circle cx="280" cy="58" r="7" fill="url(#bfDrug)" stroke="#1d4ed8"/>
    <circle cx="360" cy="50" r="7" fill="url(#bfDrug)" stroke="#1d4ed8"/>
  </g>
  <text x="406" y="56" font-size="9.5" fill="#1d4ed8">抗生素</text>

  <!-- 器械表面 -->
  <rect x="30" y="246" width="420" height="18" rx="3" fill="#cbd5e1"/>
  <text x="240" y="259" text-anchor="middle" font-size="9" fill="#475569">导管 / 植入物表面</text>

  <!-- 生物膜基质穹顶 -->
  <path d="M70,246 C70,120 410,120 410,246 z" fill="url(#bfMatrix)" stroke="#0f766e"/>
  <text x="240" y="138" text-anchor="middle" font-size="10.5" fill="#0f766e">胞外多糖基质（EPS）</text>

  <!-- 水通道 -->
  <path d="M180,246 C176,200 188,170 200,150" fill="none" stroke="#bae6fd" stroke-width="6" opacity="0.7"/>
  <path d="M300,246 C306,205 296,178 286,158" fill="none" stroke="#bae6fd" stroke-width="6" opacity="0.7"/>

  <!-- 内部菌群（深色=休眠/耐受 persister） -->
  <g stroke="#0f766e">
    <circle cx="150" cy="220" r="9" fill="#14b8a6"/>
    <circle cx="195" cy="228" r="9" fill="#14b8a6"/>
    <circle cx="240" cy="218" r="9" fill="#0f766e"/>
    <circle cx="285" cy="228" r="9" fill="#14b8a6"/>
    <circle cx="330" cy="220" r="9" fill="#0f766e"/>
    <circle cx="210" cy="196" r="8" fill="#0f766e"/>
    <circle cx="270" cy="196" r="8" fill="#14b8a6"/>
  </g>
  <text x="240" y="186" text-anchor="middle" font-size="9" fill="#065f46">深色＝休眠 / 耐受菌（persister）</text>

  <!-- 药物受阻 -->
  <line x1="120" y1="66" x2="150" y2="116" stroke="#dc2626" stroke-width="1.6"/>
  <text x="150" y="108" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="700">✕</text>
  <line x1="360" y1="58" x2="330" y2="116" stroke="#dc2626" stroke-width="1.6"/>
  <text x="330" y="108" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="700">✕</text>

  <text x="240" y="286" text-anchor="middle" font-size="12.5" font-weight="600" fill="#334155">基质阻滞渗透、内部菌代谢低下受保护 → 顽固难清，常需移除器械</text>
</svg>
