<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>CIN 琼脂</title><desc>CIN 琼脂平板俯视：淡橙粉色基底，头孢磺啶-Irgasan-新生霉素与胆盐抑制铜绿假单胞菌、革兰阳性菌与多数肠道杂菌；小肠结肠炎耶尔森菌发酵甘露醇产酸，使中性红在菌落中心显深红，周边为无色透明边，形成牛眼样菌落；不发酵甘露醇者呈无色；气单胞菌、弗劳地枸橼酸杆菌可长出相似牛眼菌落，须生化确认</desc>
<defs>
  <clipPath id="cinclip"><circle cx="108" cy="152" r="62"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">CIN 琼脂</text>
<rect x="356" y="14" width="100" height="18" rx="9" fill="#eef1f5"/>
<text x="406" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">选择与鉴别培养基</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">选择剂压住肠道杂菌；发酵甘露醇者显「红心透明边」牛眼菌落</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== 左：平板俯视 ===== -->
<text x="24" y="82" font-size="9.5" fill="#5c6672">平板俯视（基底淡橙粉）</text>
<circle cx="108" cy="152" r="66" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="108" cy="152" r="62" fill="#f4cdb2" stroke="#cf9b76" stroke-width="1.4"/>

<g clip-path="url(#cinclip)">
  <!-- 发酵甘露醇：牛眼菌落（深红心 + 无色透明边） -->
  <g stroke="#cf9b76" stroke-width="1">
    <circle cx="86" cy="120" r="11" fill="#fdf3ea"/>
    <circle cx="112" cy="102" r="8.5" fill="#fdf3ea"/>
    <circle cx="64" cy="146" r="8" fill="#fdf3ea"/>
  </g>
  <g fill="#b02f3a">
    <circle cx="86" cy="120" r="5.2"/><circle cx="112" cy="102" r="4"/><circle cx="64" cy="146" r="3.8"/>
  </g>
  <!-- 相似形态的杂菌：牛眼与耶尔森菌难以区分 -->
  <g stroke="#cf9b76" stroke-width="1">
    <circle cx="146" cy="170" r="9.5" fill="#fdf3ea"/>
    <circle cx="128" cy="192" r="8" fill="#fdf3ea"/>
  </g>
  <g fill="#b02f3a">
    <circle cx="146" cy="170" r="4.5"/><circle cx="128" cy="192" r="3.8"/>
  </g>
  <!-- 被抑制：无菌落，仅示接种处 -->
  <g fill="none" stroke="#c9a48a" stroke-width="1.2" stroke-dasharray="3,2.5">
    <circle cx="76" cy="186" r="7"/><circle cx="98" cy="202" r="6"/>
  </g>
  <g stroke="#e6c4ab" stroke-width="1.4" stroke-linecap="round">
    <line x1="72" y1="182" x2="80" y2="190"/><line x1="80" y1="182" x2="72" y2="190"/>
    <line x1="94.5" y1="198.5" x2="101.5" y2="205.5"/><line x1="101.5" y1="198.5" x2="94.5" y2="205.5"/>
  </g>
</g>

<!-- 平板上的编号 -->
<g>
  <circle cx="120" cy="130" r="7.5" fill="#1f2733"/>
  <text x="120" y="133.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
  <circle cx="158" cy="190" r="7.5" fill="#1f2733"/>
  <text x="158" y="193.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
  <circle cx="58" cy="178" r="7.5" fill="#1f2733"/>
  <text x="58" y="181.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
</g>

<!-- ===== 右：选择成分 ===== -->
<rect x="186" y="70" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="86" font-size="10" font-weight="700" fill="#33404f">选择成分：抑制谁</text>
<text x="196" y="103" font-size="9.5" fill="#5c6672">头孢磺啶抑铜绿假单胞菌；新生霉素抑革兰阳性菌</text>
<text x="196" y="120" font-size="9.5" fill="#5c6672">Irgasan（三氯生）＋胆盐 → 压住多数肠道杂菌</text>
<circle cx="200" cy="134" r="6.5" fill="#1f2733"/>
<text x="200" y="137.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">3</text>
<circle cx="216" cy="134" r="4.5" fill="none" stroke="#c9a48a" stroke-width="1.1" stroke-dasharray="3,2.5"/>
<text x="228" y="137.5" font-size="9.5" fill="#33404f">接种处不长菌 → 非目标菌</text>

<!-- ===== 右：鉴别成分 ===== -->
<rect x="186" y="154" width="270" height="76" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="196" y="170" font-size="10" font-weight="700" fill="#33404f">鉴别成分：指示什么</text>
<text x="196" y="187" font-size="9.5" fill="#5c6672">甘露醇 ＋ 中性红（产酸→红心；不产酸→无色透明）</text>
<circle cx="200" cy="201" r="6.5" fill="#1f2733"/>
<text x="200" y="204.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">1</text>
<circle cx="216" cy="201" r="5.4" fill="#fdf3ea" stroke="#cf9b76" stroke-width="1"/>
<circle cx="216" cy="201" r="2.6" fill="#b02f3a"/>
<text x="228" y="204.5" font-size="9.5" fill="#33404f">发酵产酸 → 红心透明边牛眼</text>
<circle cx="200" cy="219" r="6.5" fill="#1f2733"/>
<text x="200" y="222.5" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">2</text>
<circle cx="216" cy="219" r="5.4" fill="#fdf3ea" stroke="#cf9b76" stroke-width="1"/>
<circle cx="216" cy="219" r="2.6" fill="#b02f3a"/>
<text x="228" y="222.5" font-size="9.5" fill="#33404f">杂菌牛眼可乱真 → 须生化鉴定</text>

<!-- 临床注解 -->
<rect x="24" y="234" width="432" height="18" rx="6" fill="#f9e6e4" stroke="#e3b8b5"/>
<text x="34" y="246.5" font-size="9.5" fill="#a3332f">须 25–28℃ 培养 24（必要时 48）h：37℃ 检出率降，过久牛眼反糊；形态不足定种</text>

<!-- 结论 -->
<text x="240" y="263" text-anchor="middle" font-size="11.5" fill="#33404f">红心透明边＝可疑耶尔森菌，仍须生化/血清学确认</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">典型菌</tspan>　小肠结肠炎耶尔森菌（牛眼）· 气单胞菌属（形似）· 铜绿假单胞菌（受抑）</text>
</svg>
