<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>血浆凝固酶试验</title><desc>玻片法用生理盐水对照与兔血浆两滴菌悬液查结合凝固酶（凝聚因子），10 秒内出现颗粒凝集为阳性；试管法查游离凝固酶，37 ℃ 水浴 4 h 后倾斜试管，凝块随管壁倾斜不流动为阳性，液面随重力保持水平为阴性。阳性提示金黄色葡萄球菌，阴性为凝固酶阴性葡萄球菌。</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <clipPath id="cgNegTube"><rect x="387" y="78" width="26" height="76" rx="13" transform="rotate(45 400 116)"/></clipPath>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">血浆凝固酶试验</text>
<rect x="386" y="14" width="70" height="18" rx="9" fill="#eef1f5"/>
<text x="421" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">鉴别试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">结合凝固酶直接结合纤维蛋白原致菌体凝聚；游离凝固酶经凝血酶原使血浆凝固</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>
<line x1="240" y1="64" x2="240" y2="208" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== ❶ 玻片法：结合凝固酶 ===== -->
<circle cx="32" cy="72" r="7.5" fill="#1f2733"/>
<text x="32" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="44" y="76" font-size="10" font-weight="700" fill="#33404f">玻片法：结合凝固酶（凝聚因子）</text>

<!-- 载玻片 -->
<rect x="30" y="84" width="196" height="62" rx="4" fill="#f5f7f9" stroke="#e3e7ec"/>
<!-- 左滴：生理盐水自凝对照，均匀混浊 -->
<circle cx="80" cy="115" r="22" fill="#eef1f5" stroke="#b9c2cc"/>
<g fill="#b9c2cc" opacity="0.85">
  <circle cx="70" cy="106" r="1.2"/><circle cx="80" cy="103" r="1.2"/><circle cx="90" cy="108" r="1.2"/>
  <circle cx="66" cy="116" r="1.2"/><circle cx="76" cy="114" r="1.2"/><circle cx="86" cy="118" r="1.2"/>
  <circle cx="94" cy="115" r="1.2"/><circle cx="71" cy="126" r="1.2"/><circle cx="82" cy="124" r="1.2"/>
  <circle cx="91" cy="127" r="1.2"/><circle cx="77" cy="133" r="1.2"/><circle cx="87" cy="100" r="1.2"/>
</g>
<!-- 右滴：兔血浆＋菌落，白色颗粒状凝集 -->
<circle cx="176" cy="115" r="22" fill="#f5e9c8" stroke="#d9b96a"/>
<g fill="#ffffff" stroke="#8c96a2" stroke-width="0.8">
  <ellipse cx="167" cy="105" rx="4.6" ry="3.2" transform="rotate(-20 167 105)"/>
  <ellipse cx="184" cy="108" rx="3.8" ry="2.8" transform="rotate(25 184 108)"/>
  <ellipse cx="171" cy="120" rx="5" ry="3.4" transform="rotate(15 171 120)"/>
  <ellipse cx="186" cy="122" rx="3.4" ry="2.6" transform="rotate(-30 186 122)"/>
  <ellipse cx="177" cy="131" rx="4" ry="2.6" transform="rotate(5 177 131)"/>
</g>
<text x="80" y="162" text-anchor="middle" font-size="9.5" fill="#33404f">生理盐水（自凝对照）</text>
<text x="176" y="162" text-anchor="middle" font-size="9.5" fill="#33404f">兔血浆 ＋ 菌落</text>
<text x="80" y="176" text-anchor="middle" font-size="9.5" fill="#5c6672">均匀混浊无凝集</text>
<text x="176" y="176" text-anchor="middle" font-size="9.5" fill="#5c6672">白色颗粒状凝集</text>
<text x="128" y="191" text-anchor="middle" font-size="9.5" fill="#a3332f">10 s 内凝集 → 阳性</text>
<text x="128" y="205" text-anchor="middle" font-size="9.5" fill="#8c96a2">盐水侧也凝集＝自凝，不可判读</text>

<!-- ===== ❷ 试管法：游离凝固酶 ===== -->
<circle cx="256" cy="72" r="7.5" fill="#1f2733"/>
<text x="256" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="268" y="76" font-size="10" font-weight="700" fill="#33404f">试管法：游离凝固酶</text>

<!-- 阳性管：整管凝成胶冻，凝面随管壁一起倾斜 -->
<g transform="rotate(45 296 116)">
  <rect x="283" y="78" width="26" height="76" rx="13" fill="#fbfcfd"/>
  <path d="M284.5,110 h23 v30 a11.5,11.5 0 0 1 -23,0 z" fill="#efe0bd"/>
  <path d="M284.5,110 h23" stroke="#c2413d" stroke-width="1.6"/>
  <path d="M289,120 h14 M287,129 h18 M290,138 h12" stroke="#d9b96a" stroke-width="0.8" stroke-linecap="round"/>
  <rect x="288" y="84" width="4" height="62" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="283" y="78" width="26" height="76" rx="13" fill="none" stroke="#b9c2cc" stroke-width="1.6"/>
</g>
<!-- 阴性管：仍为液体，液面随重力保持水平 -->
<g transform="rotate(45 400 116)">
  <rect x="387" y="78" width="26" height="76" rx="13" fill="#fbfcfd"/>
</g>
<g clip-path="url(#cgNegTube)">
  <rect x="350" y="124" width="110" height="46" fill="#f5e9c8"/>
  <line x1="350" y1="124" x2="460" y2="124" stroke="#33404f" stroke-width="1.4"/>
</g>
<g transform="rotate(45 400 116)">
  <rect x="392" y="84" width="4" height="62" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="387" y="78" width="26" height="76" rx="13" fill="none" stroke="#b9c2cc" stroke-width="1.6"/>
</g>
<!-- 重力方向 -->
<line x1="452" y1="96" x2="452" y2="118" stroke="#33404f" stroke-width="1" marker-end="url(#arr)"/>
<text x="446" y="132" text-anchor="middle" font-size="9.5" fill="#8c96a2">重力</text>

<text x="292" y="162" text-anchor="middle" font-size="9.5" fill="#a3332f">阳性：凝块不流动</text>
<text x="396" y="162" text-anchor="middle" font-size="9.5" fill="#33404f">阴性：仍为液体</text>
<text x="292" y="176" text-anchor="middle" font-size="9.5" fill="#5c6672">凝面随管壁倾斜</text>
<text x="396" y="176" text-anchor="middle" font-size="9.5" fill="#5c6672">液面随重力水平</text>
<text x="352" y="191" text-anchor="middle" font-size="9.5" fill="#33404f">37 ℃ 水浴 4 h 倾斜观察</text>
<text x="352" y="205" text-anchor="middle" font-size="9.5" fill="#8c96a2">阴性 24 h 复看；久置凝块溶解致假阴性</text>

<!-- 两法关系 -->
<rect x="24" y="214" width="432" height="34" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="36" y="229" font-size="9.5" fill="#5c6672">玻片法查菌体表面的结合凝固酶，试管法查分泌到胞外的游离凝固酶，两法结果可不一致</text>
<text x="36" y="243" font-size="9.5" fill="#33404f">玻片法阴性或自凝 → 须用试管法确认；路邓葡萄球菌常玻片法阳性而试管法阴性</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">阳性 → 金黄色葡萄球菌（中间葡萄球菌群等少数亦阳性）；阴性 → CoNS</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　把葡萄球菌分为金葡与 CoNS，决定致病性判断与是否按金葡治疗</text>
</svg>
