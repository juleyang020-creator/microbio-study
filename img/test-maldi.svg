<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>MALDI-TOF MS 质谱鉴定</title><desc>菌落与基质共结晶点于靶板，激光解吸电离后离子经静电场加速进入真空飞行管，质量小者先到探测器，形成以核糖体蛋白为主的质量指纹谱；软件与参考谱库比对按分值排序，最高分显著领先则报告到种，分值普遍偏低提示谱库未收录或制样不佳，需提取法重测</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="las" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#c2413d"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">MALDI-TOF MS 质谱鉴定</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">鉴别试验</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">基质吸收激光能解吸电离菌体蛋白 → 按飞行时间成指纹谱 → 比对谱库定种</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ 点样 ===== -->
<circle cx="31" cy="74" r="7.5" fill="#1f2733"/>
<text x="31" y="77.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="42" y="77.5" font-size="10" font-weight="700" fill="#33404f">菌落＋基质</text>
<rect x="24" y="88" width="76" height="52" rx="4" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.2"/>
<g fill="#e7e2f3" stroke="#8b7fb8" stroke-width="1.1">
  <circle cx="60" cy="103" r="5.5"/><circle cx="80" cy="103" r="5.5"/>
  <circle cx="60" cy="125" r="5.5"/><circle cx="80" cy="125" r="5.5"/>
</g>
<circle cx="40" cy="103" r="5.5" fill="#f7ecd4" stroke="#d9b96a" stroke-width="1.4"/>
<circle cx="40" cy="103" r="2.2" fill="#8b7fb8"/>
<circle cx="40" cy="125" r="5.5" fill="#f7ecd4" stroke="#d9b96a" stroke-width="1.4"/>
<circle cx="40" cy="125" r="2.2" fill="#8b7fb8"/>
<text x="68" y="151" text-anchor="middle" font-size="9.5" fill="#5c6672">点样点＋基质 CHCA</text>

<!-- 靶板 → 电离 -->
<line x1="103" y1="118" x2="124" y2="118" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>

<!-- ===== ❷ 电离与飞行 ===== -->
<circle cx="119" cy="74" r="7.5" fill="#1f2733"/>
<text x="119" y="77.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="130" y="77.5" font-size="10" font-weight="700" fill="#33404f">激光电离 → 按飞行时间分离</text>
<!-- 激光 -->
<line x1="130" y1="96" x2="148" y2="112" stroke="#c2413d" stroke-width="2" marker-end="url(#las)"/>
<text x="126" y="90" font-size="9.5" fill="#a3332f">激光</text>
<!-- 样品点（基质晶体） -->
<line x1="138" y1="126" x2="166" y2="126" stroke="#b9c2cc" stroke-width="2"/>
<ellipse cx="152" cy="120" rx="9" ry="5" fill="#f7ecd4" stroke="#d9b96a" stroke-width="1.3"/>
<circle cx="150" cy="120" r="2" fill="#8b7fb8"/>
<!-- 加速电场极板 -->
<line x1="169" y1="98" x2="169" y2="130" stroke="#6b7684" stroke-width="1.4" stroke-dasharray="3,2"/>
<text x="174" y="91" font-size="9.5" fill="#5c6672">静电场加速</text>
<!-- 飞行管 -->
<rect x="172" y="98" width="100" height="32" rx="4" fill="#f5f7f9" stroke="#b9c2cc" stroke-width="1.2"/>
<text x="222" y="109" text-anchor="middle" font-size="9.5" fill="#5c6672">真空飞行管</text>
<circle cx="196" cy="121" r="6" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<circle cx="252" cy="121" r="3.2" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<g stroke="#33404f" stroke-width="1.1">
  <line x1="204" y1="121" x2="214" y2="121" marker-end="url(#arr)"/>
  <line x1="258" y1="121" x2="268" y2="121" marker-end="url(#arr)"/>
</g>
<!-- 探测器 -->
<rect x="276" y="96" width="9" height="36" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="282" y="91" text-anchor="middle" font-size="9.5" fill="#1f4e79">探测器</text>
<text x="222" y="145" text-anchor="middle" font-size="9.5" fill="#33404f">质量小者飞得快、先到探测器</text>

<!-- ===== ❸ 指纹谱 ===== -->
<circle cx="319" cy="74" r="7.5" fill="#1f2733"/>
<text x="319" y="77.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<text x="330" y="77.5" font-size="10" font-weight="700" fill="#33404f">质量指纹谱</text>
<line x1="322" y1="88" x2="322" y2="140" stroke="#b9c2cc" stroke-width="1.2"/>
<line x1="322" y1="140" x2="452" y2="140" stroke="#b9c2cc" stroke-width="1.2"/>
<g stroke="#2b6cb0" stroke-width="2.2">
  <line x1="332" y1="140" x2="332" y2="118"/><line x1="344" y1="140" x2="344" y2="98"/>
  <line x1="356" y1="140" x2="356" y2="126"/><line x1="370" y1="140" x2="370" y2="106"/>
  <line x1="384" y1="140" x2="384" y2="92"/><line x1="398" y1="140" x2="398" y2="122"/>
  <line x1="412" y1="140" x2="412" y2="112"/><line x1="426" y1="140" x2="426" y2="130"/>
  <line x1="440" y1="140" x2="440" y2="116"/>
</g>
<text x="322" y="152" font-size="9.5" fill="#5c6672">m/z（主要为核糖体蛋白）</text>

<!-- ===== ❹ 判读 ===== -->
<circle cx="31" cy="168" r="7.5" fill="#1f2733"/>
<text x="31" y="171.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">4</text>
<text x="42" y="171.5" font-size="10" font-weight="700" fill="#33404f">判读：与参考谱库比对，候选按分值排序</text>

<rect x="24" y="178" width="210" height="66" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="34" y="194" font-size="9.5" font-weight="700" fill="#1f4e79">结果 A：最高分显著领先</text>
<text x="34" y="212" font-size="9.5" fill="#33404f">金黄色葡萄球菌</text>
<rect x="124" y="204" width="98" height="9" rx="4.5" fill="#2b6cb0"/>
<text x="34" y="228" font-size="9.5" fill="#5c6672">表皮葡萄球菌</text>
<rect x="124" y="220" width="26" height="9" rx="4.5" fill="#b9c2cc"/>
<text x="34" y="240" font-size="9.5" fill="#33404f">→ 与次高项拉开 → 报告到种</text>

<rect x="246" y="178" width="210" height="66" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="256" y="194" font-size="9.5" font-weight="700" fill="#a3332f">结果 B：候选分值普遍偏低</text>
<text x="256" y="212" font-size="9.5" fill="#5c6672">候选菌种 甲</text>
<rect x="346" y="204" width="24" height="9" rx="4.5" fill="#b9c2cc"/>
<text x="256" y="228" font-size="9.5" fill="#5c6672">候选菌种 乙</text>
<rect x="346" y="220" width="17" height="9" rx="4.5" fill="#b9c2cc"/>
<text x="256" y="240" font-size="9.5" fill="#33404f">→ 谱库未收录，或制样不佳需重测</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">单峰无特征、峰型组合才具种属特异性；分值低先加甲酸或乙醇-甲酸提取重测</text>

<!-- 页脚 -->
<rect x="24" y="270" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="286" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　数分钟由菌落鉴定到种；但不能做药敏，大肠埃希菌与志贺菌属难区分</text>
</svg>
