<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>染色方法总览</title><desc>染色按观察目标分四类：常规染色看菌体大类（革兰紫/红）、特殊结构染色看芽孢荚膜鞭毛异染颗粒、真菌染色看菌丝与孢子、血液与寄生虫染色看血中病原；每类给出代表性镜下视野的真实颜色</desc>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">染色方法总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">染色技术</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">按「要看什么」分类：定大类 / 看特殊结构 / 看真菌 / 看血中病原</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ 常规染色 ===== -->
<rect x="24" y="66" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="85" r="8" fill="#1f2733"/><text x="38" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">1</text>
<text x="52" y="89" font-size="10.5" font-weight="700" fill="#33404f">常规染色 · 革兰视野</text>
<circle cx="62" cy="114" r="21" fill="#ffffff" stroke="#b9c2cc"/>
<g fill="#6b3fa0">
  <circle cx="53" cy="105" r="3.2"/><circle cx="59.5" cy="102.5" r="3.2"/>
  <circle cx="56" cy="111" r="3.2"/>
  <rect x="64" y="104" width="14" height="4.4" rx="2.2" transform="rotate(-20 71 106.2)"/>
</g>
<g fill="#c2413d">
  <rect x="46" y="120" width="16" height="4.6" rx="2.3" transform="rotate(-14 54 122.3)"/>
  <circle cx="66" cy="125" r="3.2"/><circle cx="72.5" cy="126.5" r="3.2"/>
</g>
<text x="112" y="102" font-size="9.5" fill="#33404f">看：菌体着色与形态</text>
<text x="112" y="114" font-size="9.5" fill="#5c6672">紫＝阳性 · 红＝阴性</text>
<text x="112" y="126" font-size="9.5" fill="#5c6672">球/杆 · 排列方式</text>
<text x="32" y="149" font-size="9.5" fill="#5c6672">同类：抗酸（红杆／蓝底）· 美蓝单染</text>

<!-- ===== ❷ 特殊结构染色 ===== -->
<rect x="248" y="66" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="262" cy="85" r="8" fill="#1f2733"/><text x="262" y="88.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">2</text>
<text x="276" y="89" font-size="10.5" font-weight="700" fill="#33404f">特殊结构 · 芽孢视野</text>
<circle cx="286" cy="114" r="21" fill="#ffffff" stroke="#b9c2cc"/>
<g>
  <g transform="rotate(-10 282 103)">
    <rect x="271" y="100" width="22" height="6" rx="3" fill="#c2413d"/>
    <ellipse cx="288" cy="103" rx="3.6" ry="2.6" fill="#2f8f4f"/>
  </g>
  <g transform="rotate(7 288 115)">
    <rect x="277" y="112" width="22" height="6" rx="3" fill="#c2413d"/>
    <ellipse cx="282" cy="115" rx="3.6" ry="2.6" fill="#2f8f4f"/>
  </g>
  <g transform="rotate(-4 282 127)">
    <rect x="271" y="124" width="22" height="6" rx="3" fill="#c2413d"/>
    <ellipse cx="282" cy="127" rx="3.6" ry="2.6" fill="#2f8f4f"/>
  </g>
</g>
<text x="336" y="102" font-size="9.5" fill="#33404f">看：菌体内外结构</text>
<text x="336" y="114" font-size="9.5" fill="#5c6672">芽孢绿 · 菌体红</text>
<text x="336" y="126" font-size="9.5" fill="#5c6672">位置 · 是否膨大</text>
<text x="256" y="149" font-size="9.5" fill="#5c6672">同类：荚膜负染 · 鞭毛镀银 · 异染颗粒</text>

<!-- ===== ❸ 真菌染色 ===== -->
<rect x="24" y="160" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="38" cy="179" r="8" fill="#1f2733"/><text x="38" y="182.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">3</text>
<text x="52" y="183" font-size="10.5" font-weight="700" fill="#33404f">真菌染色 · 乳酸酚棉蓝</text>
<circle cx="62" cy="208" r="21" fill="#ffffff" stroke="#b9c2cc"/>
<g stroke="#2b5fa5" fill="none" stroke-linecap="round">
  <path d="M45,220 L74,199" stroke-width="2.6"/>
  <path d="M58,211 L66,220" stroke-width="2.2"/>
  <g stroke-width="1.2">
    <path d="M52,217.5 l3,4"/><path d="M60,211.5 l3,4"/><path d="M68,205.5 l3,4"/>
  </g>
</g>
<g fill="#2b5fa5">
  <circle cx="76" cy="197" r="4"/>
  <circle cx="80" cy="192.5" r="1.7"/><circle cx="75" cy="191.5" r="1.7"/><circle cx="70.5" cy="194" r="1.7"/>
</g>
<text x="112" y="196" font-size="9.5" fill="#33404f">看：菌丝与孢子</text>
<text x="112" y="208" font-size="9.5" fill="#5c6672">棉蓝染几丁质壁</text>
<text x="112" y="220" font-size="9.5" fill="#5c6672">有隔/无隔 · 分支角</text>
<text x="32" y="243" font-size="9.5" fill="#5c6672">同类：六胺银（黑褐）· KOH 湿片</text>

<!-- ===== ❹ 血液与寄生虫染色 ===== -->
<rect x="248" y="160" width="208" height="90" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<circle cx="262" cy="179" r="8" fill="#1f2733"/><text x="262" y="182.5" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">4</text>
<text x="276" y="183" font-size="10.5" font-weight="700" fill="#33404f">血液与寄生虫 · 吉姆萨</text>
<circle cx="286" cy="208" r="21" fill="#ffffff" stroke="#b9c2cc"/>
<g fill="#f0b6bb" stroke="#d98d95" stroke-width="0.9">
  <circle cx="275" cy="198" r="7"/>
  <circle cx="291" cy="196" r="7"/>
  <circle cx="279" cy="214" r="7"/>
</g>
<circle cx="291" cy="196" r="2.6" fill="none" stroke="#3b3b8f" stroke-width="1.5"/>
<circle cx="296" cy="212" r="7.5" fill="#f3dfe6" stroke="#c9a9bb" stroke-width="0.9"/>
<circle cx="296" cy="212" r="4.2" fill="none" stroke="#3b3b8f" stroke-width="1.5"/>
<circle cx="299.2" cy="209.3" r="1.7" fill="#c2413d"/>
<text x="336" y="196" font-size="9.5" fill="#33404f">看：血中病原</text>
<text x="336" y="208" font-size="9.5" fill="#5c6672">虫体：染色质红 · 胞质蓝</text>
<text x="336" y="220" font-size="9.5" fill="#5c6672">疟原虫环状体（空心环）</text>
<text x="256" y="243" font-size="9.5" fill="#5c6672">同类：瑞氏 · 镀银（螺旋体／军团菌）</text>

<!-- 结论 -->
<text x="240" y="262" text-anchor="middle" font-size="11.5" fill="#33404f">先问「要看什么」再选染色：定大类 → 查结构 → 认真菌 → 找血中病原</text>

<!-- 页脚：判读提醒 -->
<rect x="24" y="270" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="285" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">判读提醒</tspan>　脱色过度或菌龄过老，革兰阳性菌也会染成红色 → 误判为阴性</text>
</svg>
