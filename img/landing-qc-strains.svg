<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 362" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>质控菌株总览</title><desc>质控菌株按四类分工：常规药敏质控株验培养基与纸片效价、接种量；耐药机制/酶质控株用阳性与阴性对照验表型检测方法灵敏度；苛养菌质控株验专用培养基与气体条件；抗真菌质控株验肉汤微量稀释体系的 MIC 端点。质控值落入 CLSI 可接受范围为在控可发报告，超出范围须停发报告并查因。</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="arrs" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0.5 L8,4 L0,7.5 z" fill="#5c6672"/></marker>
</defs>
<rect width="480" height="362" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">质控菌株总览</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">质控菌株</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">标准株与临床菌同批同法测定，落入 CLSI 可接受范围才可发报告</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>

<!-- ===== ❶ 常规药敏质控 ===== -->
<rect x="24" y="66" width="210" height="82" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<circle cx="42" cy="82" r="7.5" fill="#1f2733"/>
<text x="42" y="85.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
<text x="55" y="86" font-size="10.5" font-weight="700" fill="#1f2733">常规药敏质控</text>
<circle cx="66" cy="118" r="22" fill="#eef1f5" stroke="#b9c2cc"/>
<circle cx="66" cy="118" r="13" fill="#ffffff" stroke="#c2413d" stroke-dasharray="3,2"/>
<line x1="55" y1="118" x2="77" y2="118" stroke="#5c6672" stroke-width="1" marker-start="url(#arrs)" marker-end="url(#arrs)"/>
<circle cx="66" cy="118" r="4.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="100" y="108" font-size="9.5" fill="#33404f">ATCC 标准株 · 每检测日</text>
<text x="100" y="122" font-size="9.5" fill="#5c6672">验 MHA·纸片效价·接种量</text>
<text x="100" y="136" font-size="9.5" fill="#5c6672">所用方法的圈径或 MIC 在范围</text>

<!-- ===== ❷ 耐药机制 · 酶质控 ===== -->
<rect x="246" y="66" width="210" height="82" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<circle cx="264" cy="82" r="7.5" fill="#1f2733"/>
<text x="264" y="85.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
<text x="277" y="86" font-size="10.5" font-weight="700" fill="#1f2733">耐药机制 · 酶质控</text>
<circle cx="268" cy="110" r="13" fill="#eef1f5" stroke="#b9c2cc"/>
<circle cx="268" cy="110" r="4" fill="#f9e6e4" stroke="#c2413d"/>
<circle cx="304" cy="110" r="13" fill="#eef1f5" stroke="#b9c2cc"/>
<circle cx="304" cy="110" r="9" fill="#ffffff" stroke="#c2413d" stroke-dasharray="3,2"/>
<circle cx="304" cy="110" r="4" fill="#f9e6e4" stroke="#c2413d"/>
<text x="268" y="134" text-anchor="middle" font-size="9.5" fill="#a3332f">阳性</text>
<text x="304" y="134" text-anchor="middle" font-size="9.5" fill="#5c6672">阴性</text>
<text x="322" y="108" font-size="9.5" fill="#33404f">阳性株须阳·阴性株须阴</text>
<text x="322" y="122" font-size="9.5" fill="#5c6672">验 mCIM/ESBL/HLAR 灵敏</text>
<text x="322" y="136" font-size="9.5" fill="#5c6672">在控才可报机制阳性</text>

<!-- ===== ❸ 苛养菌质控 ===== -->
<rect x="24" y="154" width="210" height="82" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<circle cx="42" cy="170" r="7.5" fill="#1f2733"/>
<text x="42" y="173.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
<text x="55" y="174" font-size="10.5" font-weight="700" fill="#1f2733">苛养菌质控</text>
<circle cx="46" cy="204" r="13" fill="#f5f7f9" stroke="#b9c2cc"/>
<g stroke="#c2413d" stroke-width="1.8" stroke-linecap="round">
  <line x1="40" y1="198" x2="52" y2="210"/><line x1="52" y1="198" x2="40" y2="210"/>
</g>
<circle cx="80" cy="204" r="13" fill="#a8443f" stroke="#7d2f2b"/>
<g fill="#f0e2df">
  <circle cx="75" cy="200" r="2"/><circle cx="84" cy="201" r="2"/><circle cx="78" cy="208" r="2"/><circle cx="86" cy="208" r="2"/>
</g>
<text x="46" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">MHA</text>
<text x="80" y="226" text-anchor="middle" font-size="9.5" fill="#5c6672">血平板</text>
<text x="100" y="196" font-size="9.5" fill="#33404f">专用基质与气体条件</text>
<text x="100" y="210" font-size="9.5" fill="#5c6672">HTM / 羊血 / GC 琼脂</text>
<text x="100" y="224" font-size="9.5" fill="#5c6672">35℃ · 5% CO₂ 孵育</text>

<!-- ===== ❹ 抗真菌质控 ===== -->
<rect x="246" y="154" width="210" height="82" rx="8" fill="#ffffff" stroke="#e3e7ec"/>
<circle cx="264" cy="170" r="7.5" fill="#1f2733"/>
<text x="264" y="173.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">4</text>
<text x="277" y="174" font-size="10.5" font-weight="700" fill="#1f2733">抗真菌质控</text>
<text x="262" y="189" text-anchor="middle" font-size="9.5" fill="#8c96a2">高</text>
<text x="306" y="189" text-anchor="middle" font-size="9.5" fill="#8c96a2">低</text>
<line x1="270" y1="186" x2="298" y2="186" stroke="#b9c2cc" stroke-width="1" marker-end="url(#arrs)"/>
<g stroke="#b9c2cc">
  <circle cx="262" cy="202" r="5.5" fill="#ffffff"/><circle cx="273" cy="202" r="5.5" fill="#ffffff"/><circle cx="284" cy="202" r="5.5" fill="#ffffff"/>
  <circle cx="295" cy="202" r="5.5" fill="#cfd8e2"/><circle cx="306" cy="202" r="5.5" fill="#cfd8e2"/>
</g>
<line x1="284" y1="220" x2="284" y2="210" stroke="#33404f" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="284" y="230" text-anchor="middle" font-size="9.5" fill="#33404f">MIC</text>
<text x="322" y="196" font-size="9.5" fill="#33404f">标准株定 MIC 端点</text>
<text x="322" y="210" font-size="9.5" fill="#5c6672">唑类·棘白菌素·两性霉素B</text>
<text x="322" y="224" font-size="9.5" fill="#5c6672">酵母 24 h · 霉菌 48 h 判读</text>

<!-- ===== 在控 vs 失控 判读 ===== -->
<rect x="24" y="244" width="432" height="64" rx="8" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="36" y="273" font-size="9.5" fill="#5c6672">本批质控值</text>
<line x1="96" y1="270" x2="446" y2="270" stroke="#b9c2cc"/>
<rect x="170" y="263" width="120" height="14" rx="3" fill="#e3edf8" stroke="#2b6cb0"/>
<line x1="170" y1="259" x2="170" y2="281" stroke="#2b6cb0" stroke-width="1"/>
<line x1="290" y1="259" x2="290" y2="281" stroke="#2b6cb0" stroke-width="1"/>
<text x="230" y="258" text-anchor="middle" font-size="9.5" fill="#1f4e79">CLSI 可接受范围</text>
<circle cx="230" cy="270" r="4" fill="#2b6cb0"/>
<circle cx="390" cy="270" r="4" fill="#c2413d"/>
<text x="390" y="258" text-anchor="middle" font-size="9.5" fill="#a3332f">超范围 = 失控</text>
<circle cx="40" cy="284.5" r="3.5" fill="#2b6cb0"/>
<text x="50" y="288" font-size="9.5" fill="#33404f">在控 → 当日该组药敏结果可发报告</text>
<circle cx="40" cy="297.5" r="3.5" fill="#c2413d"/>
<text x="50" y="301" font-size="9.5" fill="#33404f">失控 → 停发报告，查菌株传代·培养基批号·纸片效价·接种量·孵育</text>

<!-- 结论 -->
<text x="240" y="322" text-anchor="middle" font-size="11.5" fill="#33404f">四类质控各锁定体系的一环：哪一类失控，就停发哪一类结果</text>

<!-- 页脚 -->
<rect x="24" y="330" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="346" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">判读依据</tspan>　CLSI M100（细菌药敏与酶表型）· M27/M60（抗真菌）· M45（少见菌）</text>
</svg>
