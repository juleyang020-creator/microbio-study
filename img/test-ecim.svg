<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>eCIM（EDTA-改良碳青霉烯灭活试验）</title><desc>与 mCIM 配对：两管待测菌悬液各浸一张美罗培南纸片，其中一管加 EDTA 螯合锌离子；孵育后取纸片贴于接种大肠埃希菌 ATCC 25922 的 MH 平板过夜。加 EDTA 管抑菌圈直径较 mCIM 增大≥5mm（仅适用于肠杆菌目） 提示金属β-内酰胺酶，几乎重合提示丝氨酸碳青霉烯酶</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
  <marker id="tk" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><line x1="0" y1="3" x2="6" y2="3" stroke="#c2413d" stroke-width="1.6"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">eCIM（EDTA-改良碳青霉烯灭活试验）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef1f5"/>
<text x="416" y="27" text-anchor="middle" font-size="9.5" fill="#6b7684">耐药表型检测</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">仅限肠杆菌目：mCIM 阳性前提下配对比较，加 EDTA 后圈直径增大即金属酶</text>
<line x1="24" y1="58" x2="456" y2="58" stroke="#e7e4dd"/>
<line x1="240" y1="64" x2="240" y2="226" stroke="#e3e7ec" stroke-dasharray="4,4"/>

<!-- ===== 左管：不含 EDTA（mCIM） ===== -->
<circle cx="31" cy="72" r="7.5" fill="#1f2733"/>
<text x="31" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">A</text>
<text x="44" y="76" font-size="10" font-weight="700" fill="#33404f">不含 EDTA（mCIM 管）</text>
<path d="M36,84 h26 v30 a13,13 0 0 1 -26,0 z" fill="#fbfaf8" stroke="#b9c2cc" stroke-width="1.2"/>
<path d="M36,94 h26 v20 a13,13 0 0 1 -26,0 z" fill="#f4efe2"/>
<rect x="41" y="104" width="16" height="5" rx="2.5" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.1" transform="rotate(-12 49 106.5)"/>
<text x="70" y="96" font-size="10" fill="#33404f">待测菌悬液 ＋ 美罗培南纸片</text>
<text x="70" y="110" font-size="9.5" fill="#5c6672">35 ℃ 孵育 4 h</text>
<text x="70" y="124" font-size="9.5" fill="#5c6672">产酶菌水解纸片中的 MEM</text>
<line x1="49" y1="129" x2="49" y2="137" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>

<!-- ===== 右管：加 EDTA（eCIM） ===== -->
<circle cx="259" cy="72" r="7.5" fill="#1f2733"/>
<text x="259" y="75.5" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">B</text>
<text x="272" y="76" font-size="10" font-weight="700" fill="#33404f">加 EDTA（eCIM 管）</text>
<path d="M264,84 h26 v30 a13,13 0 0 1 -26,0 z" fill="#fbfaf8" stroke="#b9c2cc" stroke-width="1.2"/>
<path d="M264,94 h26 v20 a13,13 0 0 1 -26,0 z" fill="#eef1f5"/>
<rect x="269" y="104" width="16" height="5" rx="2.5" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.1" transform="rotate(-12 277 106.5)"/>
<text x="298" y="96" font-size="10" fill="#33404f">同一菌悬液 ＋ EDTA</text>
<text x="298" y="110" font-size="9.5" fill="#5c6672">与 A 管同步孵育 4 h</text>
<text x="298" y="124" font-size="9.5" fill="#5c6672">EDTA 螯合 Zn²⁺ → 金属酶失活</text>
<line x1="277" y1="129" x2="277" y2="137" stroke="#33404f" stroke-width="1.3" marker-end="url(#arr)"/>

<!-- ===== 共同步骤条 ===== -->
<rect x="24" y="138" width="432" height="18" rx="9" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="151" text-anchor="middle" font-size="9.5" fill="#33404f">取出纸片 → 贴于接种大肠埃希菌 ATCC 25922 的 MH 平板，过夜</text>

<!-- ===== 左平板：mCIM 小圈 ===== -->
<circle cx="68" cy="192" r="34" fill="#f4efe2" stroke="#cbc1a8" stroke-width="2"/>
<g fill="#cfc6ae">
  <circle cx="88" cy="192" r="1.4"/><circle cx="48" cy="192" r="1.4"/><circle cx="68" cy="170" r="1.4"/><circle cx="68" cy="214" r="1.4"/>
  <circle cx="86" cy="174" r="1.4"/><circle cx="50" cy="174" r="1.4"/><circle cx="86" cy="210" r="1.4"/><circle cx="50" cy="210" r="1.4"/>
  <circle cx="96" cy="182" r="1.4"/><circle cx="40" cy="182" r="1.4"/><circle cx="96" cy="202" r="1.4"/><circle cx="40" cy="202" r="1.4"/>
  <circle cx="78" cy="164" r="1.4"/><circle cx="58" cy="164" r="1.4"/><circle cx="78" cy="220" r="1.4"/><circle cx="58" cy="220" r="1.4"/>
</g>
<circle cx="68" cy="192" r="12" fill="#ffffff" stroke="#cbc1a8" stroke-width="1" stroke-dasharray="3,2.5"/>
<g fill="#cfc6ae"><circle cx="60" cy="184" r="1.4"/><circle cx="76" cy="199" r="1.4"/><circle cx="64" cy="202" r="1.4"/></g>
<circle cx="68" cy="192" r="7" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="68" y="195" text-anchor="middle" font-size="9.5" fill="#1f4e79">MEM</text>
<text x="110" y="172" font-size="9.5" font-weight="700" fill="#33404f">mCIM 阳性</text>
<text x="110" y="186" font-size="9.5" fill="#5c6672">抑菌圈 6–15 mm</text>
<text x="110" y="200" font-size="9.5" fill="#5c6672">或 16–18 mm 圈内针尖菌落</text>
<text x="110" y="214" font-size="9.5" fill="#5c6672">（酶已水解美罗培南）</text>

<!-- ===== 右平板：eCIM 圈明显增大 ===== -->
<circle cx="296" cy="192" r="34" fill="#f4efe2" stroke="#cbc1a8" stroke-width="2"/>
<g fill="#cfc6ae">
  <circle cx="326" cy="192" r="1.4"/><circle cx="322" cy="177" r="1.4"/><circle cx="311" cy="166" r="1.4"/><circle cx="296" cy="162" r="1.4"/>
  <circle cx="281" cy="166" r="1.4"/><circle cx="270" cy="177" r="1.4"/><circle cx="266" cy="192" r="1.4"/><circle cx="270" cy="207" r="1.4"/>
  <circle cx="281" cy="218" r="1.4"/><circle cx="296" cy="222" r="1.4"/><circle cx="311" cy="218" r="1.4"/><circle cx="322" cy="207" r="1.4"/>
</g>
<circle cx="296" cy="192" r="26" fill="#ffffff" stroke="#cbc1a8" stroke-width="1" stroke-dasharray="3,2.5"/>
<circle cx="296" cy="192" r="12" fill="none" stroke="#b9c2cc" stroke-width="1" stroke-dasharray="1.5,2.5"/>
<line x1="296" y1="180" x2="296" y2="166" stroke="#c2413d" stroke-width="1.2" marker-start="url(#tk)" marker-end="url(#tk)"/>
<text x="303" y="176" font-size="9.5" fill="#c2413d">Δ半径</text>
<circle cx="296" cy="192" r="7" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.2"/>
<text x="296" y="195" text-anchor="middle" font-size="9.5" fill="#1f4e79">MEM</text>
<text x="338" y="172" font-size="9.5" font-weight="700" fill="#33404f">直径较 mCIM 增大 ≥5 mm</text>
<text x="338" y="186" font-size="9.5" fill="#8c96a2">（虚线＝mCIM 原大小）</text>
<text x="338" y="200" font-size="9.5" fill="#33404f">→ 金属酶 MBL 阳性</text>
<text x="338" y="214" font-size="9.5" fill="#5c6672">NDM · IMP · VIM</text>

<!-- ===== 阴性对照读法 ===== -->
<rect x="24" y="230" width="432" height="20" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="240" y="244" text-anchor="middle" font-size="10" fill="#33404f">eCIM 阴性：两圈几乎重合（直径增大 ≤4 mm）→ 丝氨酸碳青霉烯酶，如 KPC、OXA-48</text>

<!-- 结论 -->
<text x="240" y="264" text-anchor="middle" font-size="11.5" fill="#33404f">加 EDTA 后圈显著变大＝该酶依赖锌，即金属β-内酰胺酶</text>

<!-- 页脚 -->
<rect x="24" y="272" width="432" height="24" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="288" font-size="9.5" fill="#5c6672"><tspan font-weight="700" fill="#33404f">用途</tspan>　MBL 需氨曲南-阿维巴坦（不能单用氨曲南）；KPC/OXA-48 选头孢他啶-阿维巴坦</text>
</svg>
