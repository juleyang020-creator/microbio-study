<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">eCIM（区分金属酶 / 丝氨酸酶）</text>
  <text x="240" y="50" text-anchor="middle" font-size="11" fill="#8a8f98">在 mCIM 阳性基础上，加 EDTA 螯合锌离子抑制金属酶</text>

  <!-- mCIM（无EDTA）小圈 -->
  <circle cx="138" cy="170" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="138" cy="170" r="22" fill="#fbfaf8" stroke="#c9c3b6" stroke-dasharray="4 3"/>
  <circle cx="138" cy="170" r="15" fill="#fff" stroke="#b0b4bb"/><text x="138" y="174" text-anchor="middle" font-size="9" fill="#454b54">MEM</text>
  <text x="138" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#454b54">mCIM（不含 EDTA）</text>

  <!-- mCIM+EDTA 大圈 -->
  <circle cx="346" cy="170" r="92" fill="#f1ede4" stroke="#cfcabd" stroke-width="2.5"/>
  <circle cx="346" cy="170" r="56" fill="#fbfaf8" stroke="#c9c3b6" stroke-dasharray="4 3"/>
  <circle cx="346" cy="170" r="15" fill="#fff" stroke="#b0b4bb"/><text x="346" y="174" text-anchor="middle" font-size="8" fill="#454b54">MEM+E</text>
  <text x="346" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#454b54">mCIM + EDTA</text>

  <text x="240" y="120" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b04242">圈增大 ≥5mm → 金属β-内酰胺酶(NDM/IMP/VIM)</text>
  <text x="240" y="298" text-anchor="middle" font-size="11.5" fill="#454b54">无明显增大 → 丝氨酸碳青霉烯酶(如 KPC)</text>
</svg>
