<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>抑制叶酸代谢</title><desc>阻断四氢叶酸合成（核苷酸原料）。磺胺(DHPS) ＋ 甲氧苄啶(DHFR)，序贯双阻断</desc><defs>
 <clipPath id="cap"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5"/></clipPath>
 <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3a4a63"/></marker>
 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">抑制叶酸代谢</text>
<text x="240" y="44" font-size="12" fill="#565b63" text-anchor="middle">阻断四氢叶酸合成（核苷酸原料）</text>
<text x="58" y="112" font-size="12" fill="#2c3138" text-anchor="start">PABA</text> <line x1="98" y1="108" x2="150" y2="108" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <circle cx="172" cy="108" r="17" fill="#9fb0cc" stroke="#8093b3" stroke-width="1.3"/><text x="172" y="142" font-size="11" fill="#2c3138" text-anchor="middle">DHPS</text>
 <g transform="translate(172,80) rotate(0) scale(0.82)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <line x1="172" y1="90" x2="172" y2="96" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <g stroke="#c6403a" stroke-width="3" stroke-linecap="round"><line x1="143" y1="101" x2="157" y2="115"/><line x1="143" y1="115" x2="157" y2="101"/></g> <text x="150" y="72" font-size="11" fill="#2c3138" text-anchor="middle">磺胺</text>
 <line x1="191" y1="108" x2="246" y2="108" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <text x="218" y="102" font-size="11" fill="#565b63" text-anchor="middle">DHF</text>
 <circle cx="268" cy="108" r="17" fill="#b79ac9" stroke="#9d7fb4" stroke-width="1.3"/><text x="268" y="142" font-size="11" fill="#2c3138" text-anchor="middle">DHFR</text>
 <g transform="translate(268,80) rotate(0) scale(0.82)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <line x1="268" y1="90" x2="268" y2="96" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <g stroke="#c6403a" stroke-width="3" stroke-linecap="round"><line x1="239" y1="101" x2="253" y2="115"/><line x1="239" y1="115" x2="253" y2="101"/></g> <text x="300" y="72" font-size="11" fill="#2c3138" text-anchor="middle">甲氧苄啶</text>
 <line x1="287" y1="108" x2="342" y2="108" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <text x="372" y="112" font-size="12" fill="#2c3138" text-anchor="start">THF</text> <line x1="372" y1="122" x2="372" y2="150" stroke="#3a4a63" stroke-width="1.7" marker-end="url(#arr)"/> <text x="372" y="168" font-size="11" fill="#565b63" text-anchor="middle">核酸合成</text>
 <text x="240" y="214" font-size="12" fill="#3f444b" text-anchor="middle">叶酸耗竭 → 抑制细菌增殖</text>
<text x="240" y="288" font-size="13" fill="#3f444b" text-anchor="middle">磺胺(DHPS) ＋ 甲氧苄啶(DHFR)，序贯双阻断</text>
