<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="420" height="240" fill="#f8fafc"/>
  <text x="210" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">抑制叶酸代谢</text>

  <!-- 代谢物 -->
  <rect x="14" y="104" width="62" height="30" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="45" y="123" text-anchor="middle" font-size="12" fill="#0f766e">PABA</text>

  <rect x="170" y="104" width="80" height="30" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="210" y="119" text-anchor="middle" font-size="11" fill="#0f766e">二氢叶酸</text>
  <text x="210" y="130" text-anchor="middle" font-size="9" fill="#0f766e">(DHF)</text>

  <rect x="330" y="104" width="80" height="30" rx="6" fill="#a7f3d0" stroke="#0f766e"/>
  <text x="370" y="119" text-anchor="middle" font-size="11" fill="#0f766e">四氢叶酸</text>
  <text x="370" y="130" text-anchor="middle" font-size="9" fill="#0f766e">(THF)</text>

  <!-- 箭头1 -->
  <line x1="76" y1="119" x2="162" y2="119" stroke="#64748b" stroke-width="2"/>
  <polygon points="162,119 154,115 154,123" fill="#64748b"/>
  <text x="119" y="98" text-anchor="middle" font-size="9" fill="#475569">二氢蝶酸合酶</text>
  <text x="119" y="119" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>
  <text x="119" y="150" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">磺胺类</text>

  <!-- 箭头2 -->
  <line x1="250" y1="119" x2="322" y2="119" stroke="#64748b" stroke-width="2"/>
  <polygon points="322,119 314,115 314,123" fill="#64748b"/>
  <text x="286" y="98" text-anchor="middle" font-size="9" fill="#475569">二氢叶酸还原酶</text>
  <text x="286" y="119" text-anchor="middle" font-size="16" fill="#dc2626" font-weight="700">✕</text>
  <text x="286" y="150" text-anchor="middle" font-size="11" fill="#b91c1c" font-weight="600">甲氧苄啶</text>

  <text x="210" y="200" text-anchor="middle" font-size="11.5" fill="#334155">两步序贯阻断叶酸合成 → 抑制核酸合成（协同）</text>
</svg>
