<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">抑制叶酸代谢</text>
  <text x="240" y="44" text-anchor="middle" font-size="11" fill="#8a8f98">磺胺类 + 甲氧苄啶：双重阻断、协同</text>

  <!-- 通路框（代谢中间产物/产物） -->
  <g fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.3">
    <rect x="14" y="150" width="66" height="40" rx="7"/>
    <rect x="118" y="150" width="80" height="40" rx="7"/>
    <rect x="236" y="150" width="80" height="40" rx="7"/>
    <rect x="354" y="150" width="112" height="40" rx="7"/>
  </g>
  <text x="47" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1f4a46">PABA</text>
  <text x="158" y="174" text-anchor="middle" font-size="11.5" fill="#1f4a46">二氢叶酸</text>
  <text x="276" y="174" text-anchor="middle" font-size="11.5" fill="#1f4a46">四氢叶酸</text>
  <text x="410" y="168" text-anchor="middle" font-size="11" fill="#1f4a46">嘌呤 / 胸苷酸</text>
  <text x="410" y="183" text-anchor="middle" font-size="9.5" fill="#454b54">→ DNA / RNA</text>

  <!-- 箭头（通路方向） -->
  <g stroke="#454b54" stroke-width="1.4" fill="#454b54">
    <line x1="80" y1="170" x2="113" y2="170"/><polygon points="114,170 107,166.5 107,173.5"/>
    <line x1="198" y1="170" x2="231" y2="170"/><polygon points="232,170 225,166.5 225,173.5"/>
    <line x1="316" y1="170" x2="349" y2="170"/><polygon points="350,170 343,166.5 343,173.5"/>
  </g>

  <!-- 酶标注（金色酶 token） -->
  <g>
    <rect x="72" y="196" width="50" height="17" rx="5" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.1"/>
    <text x="97" y="208" text-anchor="middle" font-size="9.5" fill="#6e571a">DHPS</text>
    <rect x="190" y="196" width="50" height="17" rx="5" fill="#f3ead0" stroke="#8a6d1f" stroke-width="1.1"/>
    <text x="215" y="208" text-anchor="middle" font-size="9.5" fill="#6e571a">DHFR</text>
  </g>

  <!-- 磺胺类阻 DHPS（药物 token） -->
  <rect x="58" y="86" width="78" height="36" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.3"/>
  <text x="97" y="102" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">磺胺类</text>
  <text x="97" y="115" text-anchor="middle" font-size="8.5" fill="#454b54">PABA 类似物·竞争</text>
  <line x1="97" y1="122" x2="97" y2="148" stroke="#b04242" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="106" y="146" text-anchor="middle" font-size="13" fill="#b04242" font-weight="700">✕</text>

  <!-- 甲氧苄啶阻 DHFR（药物 token） -->
  <rect x="176" y="86" width="78" height="36" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.3"/>
  <text x="215" y="102" text-anchor="middle" font-size="10.5" font-weight="700" fill="#345f86">甲氧苄啶</text>
  <text x="215" y="115" text-anchor="middle" font-size="8.5" fill="#454b54">抑 DHFR</text>
  <line x1="215" y1="122" x2="215" y2="148" stroke="#b04242" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="224" y="146" text-anchor="middle" font-size="13" fill="#b04242" font-weight="700">✕</text>

  <text x="240" y="240" text-anchor="middle" font-size="10.5" fill="#8a8f98">人类直接利用膳食叶酸、无 DHPS，故对细菌有选择性毒性</text>
  <text x="240" y="282" text-anchor="middle" font-size="12.5" fill="#454b54">四氢叶酸缺乏 → 嘌呤 / 胸苷酸不足 → 核酸合成受阻</text>
</svg>
