<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" role="img" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
<title>嘧啶类似物（抗真菌）</title><desc>5-FC经胞嘧啶通透酶入真菌细胞，由胞嘧啶脱氨酶（真菌特有）转为5-FU：掺入RNA致蛋白异常，并抑制胸腺嘧啶核苷酸合成酶阻断DNA合成</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#33404f"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>

<!-- 页眉 -->
<text x="24" y="27" font-size="16" font-weight="700" fill="#1f2733">嘧啶类似物（抗真菌）</text>
<rect x="376" y="14" width="80" height="18" rx="9" fill="#eef2f7"/>
<text x="416" y="27" text-anchor="middle" font-size="10" fill="#5c6672">抗真菌机制 4/4</text>
<text x="24" y="46" font-size="11.5" fill="#5c6672">5-FC 在真菌细胞内转化为 5-FU，干扰 RNA 与 DNA 合成</text>
<line x1="24" y1="56" x2="456" y2="56" stroke="#e3e7ec"/>

<!-- ===== 真菌细胞膜（顶部）===== -->
<rect x="40" y="84" width="400" height="20" fill="#f7ecd4"/>
<g fill="#d9a441">
  <circle cx="46" cy="84" r="2.2"/><circle cx="58" cy="84" r="2.2"/><circle cx="70" cy="84" r="2.2"/><circle cx="82" cy="84" r="2.2"/><circle cx="94" cy="84" r="2.2"/><circle cx="106" cy="84" r="2.2"/><circle cx="118" cy="84" r="2.2"/><circle cx="130" cy="84" r="2.2"/><circle cx="142" cy="84" r="2.2"/><circle cx="154" cy="84" r="2.2"/><circle cx="166" cy="84" r="2.2"/><circle cx="178" cy="84" r="2.2"/><circle cx="190" cy="84" r="2.2"/><circle cx="202" cy="84" r="2.2"/><circle cx="214" cy="84" r="2.2"/><circle cx="226" cy="84" r="2.2"/><circle cx="238" cy="84" r="2.2"/><circle cx="250" cy="84" r="2.2"/><circle cx="262" cy="84" r="2.2"/><circle cx="274" cy="84" r="2.2"/><circle cx="286" cy="84" r="2.2"/><circle cx="298" cy="84" r="2.2"/><circle cx="310" cy="84" r="2.2"/><circle cx="322" cy="84" r="2.2"/><circle cx="334" cy="84" r="2.2"/><circle cx="346" cy="84" r="2.2"/><circle cx="358" cy="84" r="2.2"/><circle cx="370" cy="84" r="2.2"/><circle cx="382" cy="84" r="2.2"/><circle cx="394" cy="84" r="2.2"/><circle cx="406" cy="84" r="2.2"/><circle cx="418" cy="84" r="2.2"/><circle cx="430" cy="84" r="2.2"/>
  <circle cx="46" cy="104" r="2.2"/><circle cx="58" cy="104" r="2.2"/><circle cx="70" cy="104" r="2.2"/><circle cx="82" cy="104" r="2.2"/><circle cx="94" cy="104" r="2.2"/><circle cx="106" cy="104" r="2.2"/><circle cx="118" cy="104" r="2.2"/><circle cx="130" cy="104" r="2.2"/><circle cx="142" cy="104" r="2.2"/><circle cx="154" cy="104" r="2.2"/><circle cx="166" cy="104" r="2.2"/><circle cx="178" cy="104" r="2.2"/><circle cx="190" cy="104" r="2.2"/><circle cx="202" cy="104" r="2.2"/><circle cx="214" cy="104" r="2.2"/><circle cx="226" cy="104" r="2.2"/><circle cx="238" cy="104" r="2.2"/><circle cx="250" cy="104" r="2.2"/><circle cx="262" cy="104" r="2.2"/><circle cx="274" cy="104" r="2.2"/><circle cx="286" cy="104" r="2.2"/><circle cx="298" cy="104" r="2.2"/><circle cx="310" cy="104" r="2.2"/><circle cx="322" cy="104" r="2.2"/><circle cx="334" cy="104" r="2.2"/><circle cx="346" cy="104" r="2.2"/><circle cx="358" cy="104" r="2.2"/><circle cx="370" cy="104" r="2.2"/><circle cx="382" cy="104" r="2.2"/><circle cx="394" cy="104" r="2.2"/><circle cx="406" cy="104" r="2.2"/><circle cx="418" cy="104" r="2.2"/><circle cx="430" cy="104" r="2.2"/>
</g>
<text x="436" y="98" text-anchor="end" font-size="9.5" fill="#8a6d2f">真菌细胞膜</text>
<!-- 胞嘧啶通透酶 -->
<rect x="88" y="80" width="18" height="28" rx="6" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.3"/>
<text x="97" y="122" text-anchor="middle" font-size="9.5" fill="#1f4e79">胞嘧啶通透酶</text>
<!-- 5-FC 进入 -->
<rect x="71" y="56" width="52" height="15" rx="7.5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="97" y="67" text-anchor="middle" font-size="9.5" fill="#a3332f">5-FC</text>
<line x1="97" y1="71" x2="97" y2="78" stroke="#c2413d" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- ===== 胞内转化链 ===== -->
<rect x="66" y="140" width="56" height="24" rx="5" fill="#f5f7f9" stroke="#b9c2cc"/>
<text x="94" y="156" text-anchor="middle" font-size="10" fill="#1f2733">5-FC</text>
<line x1="122" y1="152" x2="146" y2="152" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<circle cx="164" cy="152" r="16" fill="#e3edf8" stroke="#2b6cb0" stroke-width="1.4"/>
<text x="164" y="149" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">胞嘧啶</text>
<text x="164" y="158" text-anchor="middle" font-size="9.5" fill="#1f4e79" font-weight="600">脱氨酶</text>
<text x="164" y="182" text-anchor="middle" font-size="9.5" fill="#c2413d">（真菌特有）</text>
<line x1="180" y1="152" x2="204" y2="152" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<rect x="206" y="140" width="52" height="24" rx="5" fill="#f9e6e4" stroke="#c2413d"/>
<text x="232" y="156" text-anchor="middle" font-size="10" fill="#a3332f">5-FU</text>

<!-- 两条作用途径 -->
<line x1="258" y1="146" x2="298" y2="124" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="304" y="120" font-size="9.5" fill="#1f2733">① 掺入 RNA → 蛋白质合成异常</text>
<line x1="258" y1="158" x2="298" y2="180" stroke="#33404f" stroke-width="1.4" marker-end="url(#arr)"/>
<text x="304" y="176" font-size="9.5" fill="#1f2733">② 抑 TS → DNA 合成受阻</text>
<text x="304" y="189" font-size="9.5" fill="#5c6672">（TS＝胸腺嘧啶核苷酸合成酶）</text>

<!-- 选择性说明 -->
<text x="240" y="222" text-anchor="middle" font-size="9.5" fill="#5c6672">人体细胞无胞嘧啶脱氨酶 → 选择性；单用易耐药 → 常与两性霉素 B 联用</text>

<!-- 结局 -->
<text x="240" y="250" text-anchor="middle" font-size="12" fill="#3f444b">真菌 RNA / DNA 合成被干扰 → 抑制真菌（抑菌）</text>

<!-- 页脚：代表药 -->
<rect x="24" y="272" width="432" height="22" rx="6" fill="#f5f7f9" stroke="#e3e7ec"/>
<text x="32" y="287" font-size="10" fill="#5c6672"><tspan font-weight="700" fill="#1f2733">代表药</tspan>　5-氟胞嘧啶（5-FC）｜隐球菌脑膜炎：与两性霉素 B 联合诱导治疗</text>
</svg>
