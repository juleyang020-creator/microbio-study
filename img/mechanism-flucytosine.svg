<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="480" height="300" fill="#ffffff"/>
  <text x="240" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#23272e">嘧啶类似物：5-氟胞嘧啶（5-FC）</text>
  <text x="240" y="42" text-anchor="middle" font-size="11" fill="#8a8f98">经真菌内活化，干扰 DNA 与 RNA 合成</text>

  <!-- 5-FC 进入真菌（药物：墨蓝） -->
  <rect x="14" y="128" width="60" height="34" rx="7" fill="#e7eef6" stroke="#345f86" stroke-width="1.3"/>
  <text x="44" y="149" text-anchor="middle" font-size="11" font-weight="700" fill="#345f86">5-FC</text>

  <!-- 渗透酶转运 -->
  <line x1="76" y1="145" x2="116" y2="145" stroke="#454b54" stroke-width="1.3"/>
  <polygon points="118,145 110,141.5 110,148.5" fill="#454b54"/>
  <text x="96" y="136" text-anchor="middle" font-size="9" fill="#8a8f98">渗透酶</text>

  <!-- 5-FU（中间代谢物：菌内靶点色域，墨青） -->
  <rect x="120" y="128" width="74" height="34" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.3"/>
  <text x="157" y="149" text-anchor="middle" font-size="11.5" font-weight="700" fill="#2e6b66">5-FU</text>
  <!-- 胞嘧啶脱氨酶（酶：金） -->
  <text x="157" y="119" text-anchor="middle" font-size="9" fill="#6e571a" font-weight="600">胞嘧啶脱氨酶</text>

  <!-- 分支：DNA 通路 -->
  <path d="M194,138 C228,121 252,98 284,88" fill="none" stroke="#454b54" stroke-width="1.3"/>
  <polygon points="286,87 277.5,86.5 280.5,94" fill="#454b54"/>
  <rect x="286" y="70" width="80" height="32" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.3"/>
  <text x="326" y="90" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2e6b66">5-FdUMP</text>
  <!-- 抑制胸苷酸合酶（哑红抑制符号） -->
  <line x1="368" y1="86" x2="383" y2="86" stroke="#b04242" stroke-width="1.6"/>
  <line x1="383" y1="80" x2="383" y2="92" stroke="#b04242" stroke-width="1.6"/>
  <text x="424" y="80" text-anchor="middle" font-size="9.5" fill="#454b54">抑制胸苷酸合酶</text>
  <text x="424" y="95" text-anchor="middle" font-size="9.5" fill="#b04242" font-weight="600">DNA 合成↓</text>

  <!-- 分支：RNA 通路 -->
  <path d="M194,152 C228,169 252,182 284,190" fill="none" stroke="#454b54" stroke-width="1.3"/>
  <polygon points="286,191 277.5,186.5 280.5,194" fill="#454b54"/>
  <rect x="286" y="176" width="80" height="32" rx="7" fill="#e9f0ee" stroke="#2e6b66" stroke-width="1.3"/>
  <text x="326" y="196" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2e6b66">5-FUTP</text>
  <text x="424" y="190" text-anchor="middle" font-size="9.5" fill="#454b54">掺入 RNA</text>
  <text x="424" y="205" text-anchor="middle" font-size="9.5" fill="#b04242" font-weight="600">蛋白合成异常</text>

  <!-- 选择性说明 -->
  <text x="240" y="250" text-anchor="middle" font-size="11" fill="#8a8f98">哺乳动物细胞缺胞嘧啶脱氨酶，不能活化 5-FC → 选择性毒性</text>
  <line x1="120" y1="262" x2="360" y2="262" stroke="#d6d2c8" stroke-width="1"/>
  <text x="240" y="282" text-anchor="middle" font-size="12.5" font-weight="600" fill="#454b54">干扰 DNA 与 RNA 合成 → 抑制真菌</text>
</svg>
