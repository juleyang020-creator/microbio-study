 <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#3f7a52"/></marker>
</defs>
<rect width="480" height="300" fill="#ffffff"/>
<text x="240" y="26" font-size="16" fill="#2c3138" text-anchor="middle" font-weight="700">嘧啶类似物（抗真菌）</text>
<text x="240" y="42" font-size="11" fill="#8a8f98" text-anchor="middle">5-FC 经胞嘧啶脱氨酶转 5-FU，干扰核酸合成</text>
<g transform="translate(90,120) rotate(0) scale(0.9)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e7e0c5"/><rect x="-17" y="-7.5" width="17" height="15" fill="#df8c7e" clip-path="url(#cap)"/><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="none" stroke="#b0a47c" stroke-width="1"/></g> <text x="90" y="150" font-size="11" fill="#2c3138" text-anchor="middle" font-weight="600">5-FC</text>
 <line x1="120" y1="120" x2="180" y2="120" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <text x="150" y="110" font-size="9" fill="#2c3138" text-anchor="middle">胞嘧啶脱氨酶</text> <text x="150" y="100" font-size="9" fill="#8a8f98" text-anchor="middle">(真菌特有)</text>
 <g transform="translate(205,120)"><rect x="-17" y="-7.5" width="34" height="15" rx="7.5" fill="#e6b7a8" stroke="#b0a47c"/></g> <text x="205" y="150" font-size="11" fill="#2c3138" text-anchor="middle" font-weight="600">5-FU</text>
 <line x1="228" y1="110" x2="285" y2="80" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <text x="360" y="80" font-size="10" fill="#454b54" text-anchor="start">掺入 RNA → 抑蛋白</text>
 <line x1="228" y1="130" x2="285" y2="160" stroke="#3a4a63" stroke-width="1.6" marker-end="url(#arr)"/> <text x="360" y="160" font-size="10" fill="#454b54" text-anchor="start">抑 TS → 抑 DNA</text>
 <text x="240" y="215" font-size="11" fill="#454b54" text-anchor="middle">干扰真菌 RNA/DNA 合成</text>
<text x="240" y="286" font-size="12" fill="#454b54" text-anchor="middle">5-氟胞嘧啶（常与两性霉素B联用）</text>
