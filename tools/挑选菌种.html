<style>

button{background:var(--surface);color:var(--accent);border:1px solid var(--line);border-radius:6px;padding:5px 12px;font-size:12.5px;cursor:pointer;font-family:inherit}
button:hover{border-color:var(--accent);background:var(--accentw)}button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.filters{display:flex;gap:6px}.filters button.on{background:var(--accentw);border-color:var(--accent);font-weight:600}
main{padding:16px 20px 210px;max-width:1100px;margin:0 auto}
.top-h{font-size:15px;font-weight:700;margin:16px 0 4px;padding-bottom:4px;border-bottom:2px solid var(--edge)}
.mid-h{display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;color:var(--soft);margin:8px 0 3px;cursor:pointer;user-select:none}
.mid-h .mc{font-family:var(--mono);font-size:11px;color:var(--muted)}.mid-h .tgl{font-size:11px;color:var(--accent);border:1px solid var(--edge);border-radius:4px;padding:0 6px;background:var(--accentw)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2px 14px}
label.row{display:flex;gap:8px;align-items:flex-start;padding:4px 6px;border-radius:5px;cursor:pointer}
label.row:hover{background:var(--line2)}label.row.drop{opacity:.5}label.row input{margin-top:3px}
.nm{font-weight:500}.lt{color:var(--muted);font-style:italic;font-size:12px;margin-left:6px}.hidden{display:none!important}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);padding:10px 20px;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.frow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;max-width:1100px;margin:0 auto}
textarea{flex:1;min-width:280px;height:64px;border:1px solid var(--line);border-radius:6px;padding:8px;font-family:var(--mono);font-size:11.5px;resize:vertical}
.hint{font-size:12px;color:var(--muted);max-width:1100px;margin:6px auto 0}.copied{color:var(--accent);font-weight:600;font-size:12.5px}
</style></head>
<body>
<header>
  <h1>挑选临床常用菌种 —— 勾选＝保留（详情模块），取消＝移除</h1>

  </div>
</header>
<main id="main"></main>
<footer>

</footer>

var state = {}, filter = 'all';
function el(t,a,k){var n=document.createElement(t);a=a||{};for(var x in a){if(x==='text')n.textContent=a[x];else if(x==='cls')n.className=a[x];else n.setAttribute(x,a[x]);}(k||[]).forEach(function(c){if(c)n.appendChild(c);});return n;}
DATA.forEach(function(t){t.mids.forEach(function(m){m.items.forEach(function(it){state[it.id]=true;});});});
var rowEls={};
function build(){
  var main=document.getElementById('main');
  DATA.forEach(function(t){
    main.appendChild(el('div',{cls:'top-h',text:t.top}));
    t.mids.forEach(function(m){
      var mh=el('div',{cls:'mid-h','data-mid':t.top+'/'+m.mid},[el('span',{cls:'tgl',text:'切换本组'}),el('span',{text:m.mid}),el('span',{cls:'mc',text:'('+m.items.length+')'})]);
      mh.addEventListener('click',function(){var anyOn=m.items.some(function(it){return state[it.id];});m.items.forEach(function(it){state[it.id]=!anyOn;});refresh();});
      main.appendChild(mh);
      var grid=el('div',{cls:'grid'});
      m.items.forEach(function(it){
        var cb=el('input',{type:'checkbox'});cb.checked=true;
        cb.addEventListener('change',function(){state[it.id]=cb.checked;refresh();});
        var row=el('label',{cls:'row'},[cb,el('span',{},[el('span',{cls:'nm',text:it.名称}),el('span',{cls:'lt',text:it.拉丁名})])]);
        row._cb=cb;row._search=(it.名称+' '+it.拉丁名+' '+it.id).toLowerCase();row._id=it.id;
        rowEls[it.id]=row;grid.appendChild(row);
      });
      main.appendChild(grid);
    });
  });
}
function refresh(){
  var keep=0,drop=0,total=0,ids=[];
  DATA.forEach(function(t){t.mids.forEach(function(m){m.items.forEach(function(it){total++;if(state[it.id]){keep++;ids.push(it.id);}else{drop++;}});});});
  document.getElementById('cTotal').textContent=total;document.getElementById('cKeep').textContent=keep;document.getElementById('cDrop').textContent=drop;
  document.getElementById('out').value='# 保留 KEEP '+keep+'/'+total+'\n'+ids.join('\n');
  var q=(document.getElementById('q').value||'').trim().toLowerCase();
  Object.keys(rowEls).forEach(function(id){var r=rowEls[id];var kept=!!state[id];r.classList.toggle('drop',!kept);r._cb.checked=kept;var show=true;if(filter==='keep'&&!kept)show=false;if(filter==='drop'&&kept)show=false;if(q&&r._search.indexOf(q)===-1)show=false;r.classList.toggle('hidden',!show);});
}
build();refresh();
document.getElementById('q').addEventListener('input',refresh);
document.querySelectorAll('.filters button').forEach(function(b){b.addEventListener('click',function(){filter=b.getAttribute('data-f');document.querySelectorAll('.filters button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');refresh();});});
document.getElementById('allOn').addEventListener('click',function(){Object.keys(state).forEach(function(k){state[k]=true;});refresh();});
document.getElementById('allOff').addEventListener('click',function(){Object.keys(state).forEach(function(k){state[k]=false;});refresh();});
document.getElementById('copyKeep').addEventListener('click',function(){var ta=document.getElementById('out');ta.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard)navigator.clipboard.writeText(ta.value);document.getElementById('copiedMsg').textContent='已复制 ✓ 粘贴回对话给我';setTimeout(function(){document.getElementById('copiedMsg').textContent='';},2600);});

</script></body></html>
