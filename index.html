<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="临床微生物速查">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>临床微生物学习与速查系统</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <button id="menu-btn" class="menu-btn" aria-label="目录" type="button">☰</button>
    <div class="brand">临床微生物速查</div>
    <nav class="tabs">
      <button class="tab" data-module="microbes">微生物分类</button>
      <button class="tab" data-module="antibiotics">抗微生物药</button>
      <button class="tab" data-module="resistance">耐药因素</button>
      <button class="tab" data-module="idcards">鉴定卡</button>
      <button class="tab" data-module="cards">药敏卡</button>
      <button class="tab" data-module="tests">试验</button>
      <button class="tab" data-module="staining">染色</button>
      <button class="tab" data-module="media">培养基</button>
      <button class="tab" data-module="biochem-tests">生化反应</button>
    </nav>
    <a class="compare-btn" href="#/compare">生化对比</a>
    <input id="search-input" class="search" type="search" placeholder="搜索…" autocomplete="off">
  </header>

  <div class="layout">
    <aside id="sidebar" class="sidebar"></aside>
    <div id="nav-backdrop" class="nav-backdrop"></div>
    <main id="main" class="main"></main>
  </div>

  <!-- 数据（定义 window.DB） -->
  <script src="data/categories.js"></script>
  <script src="data/microbes.js"></script>
  <script src="data/antibiotics.js"></script>
  <script src="data/resistance.js"></script>
  <script src="data/biochem.js"></script>
  <script src="data/differential.js"></script>
  <script src="data/morphology.js"></script>
  <script src="data/idcards.js"></script>
  <script src="data/cards.js"></script>
  <script src="data/tests.js"></script>
  <script src="data/media.js"></script>
  <script src="data/staining.js"></script>
  <script src="data/structures.js"></script>
  <script src="data/breakpoints.js"></script>
  <script src="data/biochem-tests.js"></script>
  <!-- 逻辑 -->
  <script src="js/core.js"></script>
  <script src="js/view.js"></script>
  <script src="js/validate.js"></script>
  <script src="js/app.js"></script>
  <script>
    // PWA：仅在 http(s) 下注册离线缓存（file:// 套壳内跳过）
    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
    }
  </script>
</body>
</html>
